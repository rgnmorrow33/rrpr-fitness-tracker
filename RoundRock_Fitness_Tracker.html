<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="RRPR Tracker" />
<title>Round Rock Parks and Recreation - Fitness Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --navy: #1a2e4a;
    --navy-soft: #223a5c;
    --gold: #c9a84c;
    --gold-soft: #e0c578;
    --cream: #faf8f3;
    --cream-2: #f3efe4;
    --slate: #4a5568;
    --slate-soft: #718096;
    --green: #2d6a4f;
    --green-bg: #e5f1ea;
    --amber: #b45309;
    --amber-bg: #fdf3e3;
    --red: #b91c1c;
    --red-bg: #fde7e7;
    --teal: #0d7377;
    --teal-bg: #e2f1f2;
    --border: #e5ddc8;
    --shadow: 0 2px 8px rgba(26,46,74,0.08);
    --shadow-lg: 0 8px 32px rgba(26,46,74,0.18);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--cream);
    color: var(--navy);
    font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 16px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
    -webkit-text-size-adjust: 100%;
    min-height: 100vh;
  }
  #root { min-height: 100vh; }
  button {
    font-family: inherit;
    font-size: 16px;
    cursor: pointer;
    border: none;
    background: none;
    color: inherit;
    padding: 0;
  }
  input, select, textarea {
    font-family: inherit;
    font-size: 16px !important;
    color: var(--navy);
    background: #fff;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    width: 100%;
    outline: none;
    transition: border-color 0.15s;
  }
  input:focus, select:focus, textarea:focus {
    border-color: var(--gold);
  }
  h1, h2, h3, h4 {
    font-family: 'DM Serif Display', Georgia, serif;
    font-weight: 400;
    margin: 0;
    color: var(--navy);
    letter-spacing: -0.01em;
  }
  .app-shell {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0;
    min-height: 100vh;
  }
  .header {
    background: var(--navy);
    color: var(--cream);
    padding: 18px 22px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 40;
    padding-top: calc(18px + env(safe-area-inset-top));
  }
  .header h1 {
    color: var(--cream);
    font-size: 22px;
    margin: 0;
  }
  .header .sub {
    font-size: 13px;
    color: var(--gold-soft);
    margin-top: 2px;
  }
  .header-right { display: flex; align-items: center; gap: 14px; }
  .header-pill {
    background: rgba(201,168,76,0.18);
    color: var(--gold-soft);
    padding: 6px 12px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 500;
  }
  .logout-btn {
    background: rgba(255,255,255,0.08);
    color: var(--cream);
    padding: 8px 14px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 500;
  }
  .content {
    padding: 22px;
    padding-bottom: 100px;
  }

  /* Login */
  .login-wrap {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 40px 24px;
    padding-top: calc(40px + env(safe-area-inset-top));
    background: linear-gradient(180deg, var(--navy) 0%, var(--navy-soft) 100%);
    color: var(--cream);
  }
  .login-head {
    text-align: center;
    margin-bottom: 32px;
  }
  .login-head .brand {
    font-family: 'DM Serif Display', serif;
    font-size: 34px;
    color: var(--gold);
    letter-spacing: 0.02em;
  }
  .login-head .tag {
    font-size: 14px;
    color: var(--gold-soft);
    opacity: 0.9;
    margin-top: 4px;
  }
  .login-head h2 {
    color: var(--cream);
    font-size: 24px;
    margin-top: 24px;
    font-style: italic;
  }
  .trainer-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 14px;
    max-width: 820px;
    margin: 0 auto;
    width: 100%;
  }
  .trainer-tile {
    background: var(--cream);
    color: var(--navy);
    border-radius: 14px;
    padding: 22px 18px;
    text-align: center;
    font-weight: 600;
    font-size: 16px;
    min-height: 96px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: var(--shadow);
    transition: transform 0.1s, box-shadow 0.15s;
    border: 2px solid transparent;
  }
  .trainer-tile:active {
    transform: scale(0.97);
    border-color: var(--gold);
  }
  .login-admin {
    text-align: center;
    margin-top: 36px;
  }
  .login-admin button {
    color: var(--gold-soft);
    font-size: 15px;
    padding: 12px 20px;
    text-decoration: underline;
    text-underline-offset: 3px;
  }

  /* PIN modal */
  .pin-dots {
    display: flex;
    gap: 14px;
    justify-content: center;
    margin: 18px 0 24px;
  }
  .pin-dot {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 2px solid var(--navy);
    background: #fff;
    transition: background 0.1s;
  }
  .pin-dot.filled { background: var(--navy); }
  .keypad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }
  .keypad button {
    background: var(--cream-2);
    color: var(--navy);
    font-size: 26px;
    font-weight: 500;
    padding: 20px 0;
    border-radius: 12px;
  }
  .keypad button:active { background: var(--gold-soft); }

  /* Modals */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(26,46,74,0.55);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 20px;
    -webkit-backdrop-filter: blur(4px);
    backdrop-filter: blur(4px);
  }
  .modal {
    background: var(--cream);
    border-radius: 18px;
    max-width: 560px;
    width: 100%;
    max-height: 92vh;
    overflow-y: auto;
    box-shadow: var(--shadow-lg);
    -webkit-overflow-scrolling: touch;
  }
  .modal-header {
    padding: 22px 24px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .modal-header h2 { font-size: 22px; }
  .modal-close {
    font-size: 26px;
    color: var(--slate);
    padding: 4px 12px;
    line-height: 1;
  }
  .modal-body { padding: 18px 24px 24px; }
  .modal-footer {
    padding: 16px 24px;
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    border-top: 1px solid var(--border);
    background: rgba(255,255,255,0.5);
    position: sticky;
    bottom: 0;
  }

  /* Forms */
  .field { margin-bottom: 14px; }
  .field label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--slate);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .checkbox-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px;
    background: #fff;
    border: 1.5px solid var(--border);
    border-radius: 10px;
  }
  .checkbox-row input[type=checkbox] {
    width: 20px;
    height: 20px;
    accent-color: var(--navy);
    margin: 0;
  }
  .checkbox-row label {
    margin: 0;
    font-size: 14px;
    text-transform: none;
    letter-spacing: 0;
    color: var(--navy);
    font-weight: 500;
  }

  /* Package tiles */
  .package-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-top: 4px;
  }
  .pkg-tile {
    background: #fff;
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 14px 8px;
    text-align: center;
    transition: all 0.15s;
  }
  .pkg-tile .sessions {
    font-family: 'DM Serif Display', serif;
    font-size: 24px;
    color: var(--navy);
    line-height: 1;
  }
  .pkg-tile .label {
    font-size: 11px;
    color: var(--slate);
    text-transform: uppercase;
    margin-top: 4px;
    letter-spacing: 0.05em;
  }
  .pkg-tile .price {
    font-size: 15px;
    color: var(--gold);
    font-weight: 600;
    margin-top: 6px;
  }
  .pkg-tile.selected {
    border-color: var(--gold);
    background: var(--cream-2);
    box-shadow: 0 0 0 3px rgba(201,168,76,0.15);
  }

  /* Buttons */
  .btn {
    padding: 12px 20px;
    border-radius: 10px;
    font-weight: 600;
    font-size: 15px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: filter 0.1s;
  }
  .btn:active { filter: brightness(0.92); }
  .btn-primary { background: var(--navy); color: var(--cream); }
  .btn-gold { background: var(--gold); color: var(--navy); }
  .btn-ghost { background: transparent; color: var(--slate); }
  .btn-danger { background: var(--red); color: #fff; }
  .btn-outline { background: transparent; color: var(--navy); border: 1.5px solid var(--border); }
  .btn-teal { background: var(--teal); color: #fff; }
  .btn-green { background: var(--green); color: #fff; }
  .btn-amber { background: var(--amber); color: #fff; }
  .btn-sm { padding: 8px 14px; font-size: 14px; }
  .btn[disabled] { opacity: 0.45; pointer-events: none; }

  /* Cards / client list */
  .section-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .section-head h2 {
    font-size: 26px;
  }
  .section-head .meta {
    font-size: 13px;
    color: var(--slate);
  }
  .client-card {
    background: #fff;
    border-radius: 14px;
    padding: 16px 18px;
    margin-bottom: 12px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    transition: transform 0.1s;
  }
  .client-card:active { transform: scale(0.995); }
  .client-card .top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 10px;
    gap: 12px;
  }
  .client-card .name {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    color: var(--navy);
    line-height: 1.15;
  }
  .client-card .sub {
    font-size: 13px;
    color: var(--slate);
    margin-top: 4px;
  }
  .pill {
    display: inline-block;
    font-size: 11px;
    padding: 3px 9px;
    border-radius: 999px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .pill-cmrc { background: var(--navy); color: var(--cream); }
  .pill-baca { background: var(--gold); color: var(--navy); }
  .pill-green { background: var(--green-bg); color: var(--green); }
  .pill-amber { background: var(--amber-bg); color: var(--amber); }
  .pill-red { background: var(--red-bg); color: var(--red); }
  .pill-teal { background: var(--teal-bg); color: var(--teal); }
  .progress-wrap {
    height: 8px;
    background: var(--cream-2);
    border-radius: 999px;
    overflow: hidden;
    margin-top: 10px;
  }
  .progress-bar {
    height: 100%;
    border-radius: 999px;
    transition: width 0.3s;
  }
  .progress-footer {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    margin-top: 6px;
    color: var(--slate);
  }
  .progress-footer .remaining { font-weight: 600; color: var(--navy); }

  /* Bottom nav */
  .bottom-nav {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    background: #fff;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-around;
    padding: 8px 0;
    padding-bottom: calc(8px + env(safe-area-inset-bottom));
    box-shadow: 0 -4px 18px rgba(26,46,74,0.08);
    z-index: 30;
  }
  .bottom-nav button {
    flex: 1;
    padding: 10px 4px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    color: var(--slate);
    font-size: 12px;
    font-weight: 500;
  }
  .bottom-nav button.active { color: var(--navy); font-weight: 700; }
  .bottom-nav button.gx.active { color: var(--teal); }
  .bottom-nav .icon { font-size: 22px; }

  /* Stats strip */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 10px;
    margin-bottom: 18px;
  }
  .stat-card {
    background: #fff;
    border-radius: 12px;
    padding: 14px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
  }
  .stat-card .label {
    font-size: 11px;
    color: var(--slate);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 600;
  }
  .stat-card .value {
    font-family: 'DM Serif Display', serif;
    font-size: 28px;
    color: var(--navy);
    line-height: 1.1;
    margin-top: 4px;
  }
  .stat-card.warn .value { color: var(--amber); }
  .stat-card.warn { border-color: var(--amber); background: var(--amber-bg); }

  /* Banners */
  .banner {
    padding: 14px 16px;
    border-radius: 10px;
    margin-bottom: 14px;
    font-size: 14px;
    font-weight: 500;
    line-height: 1.4;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .banner.amber { background: var(--amber-bg); color: var(--amber); border-left: 4px solid var(--amber); }
  .banner.red { background: var(--red-bg); color: var(--red); border-left: 4px solid var(--red); }
  .banner.green { background: var(--green-bg); color: var(--green); border-left: 4px solid var(--green); }
  .banner.teal { background: var(--teal-bg); color: var(--teal); border-left: 4px solid var(--teal); }

  /* Session log table */
  .log-table {
    background: #fff;
    border-radius: 12px;
    border: 1px solid var(--border);
    overflow: hidden;
    margin-top: 12px;
  }
  .log-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr auto;
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    align-items: center;
    gap: 8px;
    font-size: 14px;
  }
  .log-row:last-child { border-bottom: none; }
  .log-row.header {
    background: var(--cream-2);
    font-weight: 700;
    font-size: 12px;
    text-transform: uppercase;
    color: var(--slate);
    letter-spacing: 0.05em;
  }
  .sig-thumb {
    max-width: 80px;
    max-height: 36px;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 4px;
  }
  .sig-needed-btn {
    background: var(--amber);
    color: #fff;
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
  }

  /* Signature canvas */
  .sig-box {
    background: #fff;
    border: 2px dashed var(--slate-soft);
    border-radius: 10px;
    overflow: hidden;
    position: relative;
    touch-action: none;
  }
  .sig-box canvas {
    display: block;
    width: 100%;
    height: 180px;
    touch-action: none;
  }
  .sig-label {
    position: absolute;
    top: 10px;
    left: 14px;
    font-size: 12px;
    color: var(--slate-soft);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 600;
    pointer-events: none;
  }
  .sig-actions {
    display: flex;
    justify-content: space-between;
    margin-top: 8px;
  }

  /* Audit */
  .audit-section {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
  }
  .audit-section h3 {
    font-size: 20px;
    margin-bottom: 4px;
  }
  .audit-section .section-sub {
    font-size: 13px;
    color: var(--slate);
    margin-bottom: 14px;
  }
  .audit-controls {
    background: var(--cream-2);
    border-radius: 12px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 18px;
    font-size: 14px;
  }
  .audit-controls .pill-btn {
    background: #fff;
    padding: 8px 14px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 600;
    color: var(--slate);
    border: 1px solid var(--border);
  }
  .audit-controls .pill-btn.active {
    background: var(--navy);
    color: var(--cream);
    border-color: var(--navy);
  }
  .audit-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .audit-table th, .audit-table td {
    text-align: left;
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
  }
  .audit-table th {
    font-size: 11px;
    color: var(--slate);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 700;
    background: var(--cream-2);
  }
  .audit-table tr:last-child td { border-bottom: none; }
  .audit-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }
  .audit-bar .label {
    flex: 0 0 160px;
    font-size: 13px;
    color: var(--navy);
    font-weight: 500;
  }
  .audit-bar .track {
    flex: 1;
    height: 10px;
    background: var(--cream-2);
    border-radius: 999px;
    overflow: hidden;
  }
  .audit-bar .fill {
    height: 100%;
    background: var(--navy);
    border-radius: 999px;
  }
  .audit-bar .value {
    flex: 0 0 80px;
    text-align: right;
    font-size: 13px;
    color: var(--navy);
    font-weight: 600;
  }
  .audit-flag {
    background: var(--red-bg);
    color: var(--red);
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.04em;
  }
  .audit-ok {
    background: var(--green-bg);
    color: var(--green);
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.04em;
  }
  .audit-day-group {
    margin-bottom: 14px;
  }
  .audit-day-group .day-head {
    font-family: 'DM Serif Display', serif;
    font-size: 16px;
    color: var(--navy);
    margin-bottom: 6px;
    padding-bottom: 4px;
    border-bottom: 2px solid var(--gold);
  }
  .audit-day-group .day-row {
    display: grid;
    grid-template-columns: 100px 1fr auto;
    gap: 10px;
    font-size: 13px;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
    align-items: baseline;
  }
  .audit-day-group .day-row:last-child { border-bottom: none; }
  .audit-day-group .day-row .time { color: var(--slate); font-variant-numeric: tabular-nums; }
  .audit-subtabs {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }
  .audit-subtabs button {
    padding: 8px 14px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 600;
    background: var(--cream-2);
    color: var(--slate);
    border: 1px solid var(--border);
  }
  .audit-subtabs button.active {
    background: var(--navy);
    color: var(--cream);
    border-color: var(--navy);
  }

  /* Admin dashboard */
  .admin-tabs {
    display: flex;
    gap: 6px;
    padding: 4px;
    background: var(--cream-2);
    border-radius: 12px;
    margin-bottom: 18px;
    overflow-x: auto;
  }
  .admin-tabs button {
    flex: 1;
    min-width: max-content;
    padding: 10px 14px;
    font-weight: 600;
    font-size: 14px;
    border-radius: 8px;
    color: var(--slate);
    white-space: nowrap;
  }
  .admin-tabs button.active {
    background: var(--navy);
    color: var(--cream);
  }
  .trainer-block {
    background: #fff;
    border-radius: 14px;
    padding: 16px 18px;
    margin-bottom: 14px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
  }

  function formatDate(d){
    if (!d) return '';
    try {
      var parts = d.split('-');
      if (parts.length !== 3) return d;
      var dt = new Date(parts[0], parts[1]-1, parts[2]);
      return dt.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
    } catch(_) { return d; }
  }

  /* Returns the array of packages a client has purchased.
     Backward compatible with old single-pkg shape. */
  function getPackages(client){
    if (!client) return [];
    if (Array.isArray(client.packages) && client.packages.length > 0) return client.packages;
    if (client.pkg) {
      /* Wrap legacy single-package shape into the new array form */
      return [{
        sessions: client.pkg.sessions,
        price: client.pkg.price,
        type: client.pkg.type,
        amountPaid: client.amountPaid != null ? client.amountPaid : client.pkg.price,
        purchaseDate: client.purchaseDate || client.createdAt || todayStr(),
        paymentType: client.paymentType || null,
        source: client.source || 'manual'
      }];
    }
    return [];
  }
  function totalSessionsPurchased(client){
    return getPackages(client).reduce(function(sum, p){ return sum + (p.sessions || 0); }, 0);
  }
  function totalPaid(client){
    return getPackages(client).reduce(function(sum, p){ return sum + (p.amountPaid != null ? p.amountPaid : (p.price || 0)); }, 0);
  }
  function sessionsRemaining(client){
    if (!client) return 0;
    var purchased = totalSessionsPurchased(client);
    /* Excused absences do not consume a session per policy.
       Attended sessions, late cancels, and no-shows do (the latter two
       are billed at 50% but still count against the package). */
    var consumed = (client.sessions || []).filter(function(s){
      return s.status !== 'excused';
    }).length;
    return Math.max(0, purchased - consumed);
  }
  function progressPct(client){
    if (!client) return 0;
    var purchased = totalSessionsPurchased(client);
    if (purchased === 0) return 0;
    var consumed = (client.sessions || []).filter(function(s){ return s.status !== 'excused'; }).length;
    return Math.min(100, Math.round((consumed / purchased) * 100));
  }

    if (pkgs.length === 0) return '\u2014';

  /* Match logic: prefer email (unique), then name+DOB, then name only */
  function findMatchingClient(clients, candidate){
    if (!candidate) return null;
    /* v2: RecTrac member ID is the primary match key (highest confidence)
       when the import source provides one. Falls back to legacy chain for
       manual imports that lack a member ID. */
    var cMemberId = (candidate.rectracMemberId || '').trim();
    if (cMemberId) {
      var byId = clients.find(function(x){ return (x.rectracMemberId || '').trim() === cMemberId; });
      if (byId) return { match: byId, confidence: 'high', reason: 'RecTrac ID match' };
    }
    var cEmail = (candidate.email || '').toLowerCase().trim();
    var cName = (candidate.name || '').toLowerCase().trim();
    var cDob = (candidate.dob || '').trim();
    if (cEmail) {
      var byEmail = clients.find(function(x){ return (x.email || '').toLowerCase().trim() === cEmail; });
      if (byEmail) return { match: byEmail, confidence: 'high', reason: 'email match' };
    }
    if (cDob && cName) {
      var byNameDob = clients.find(function(x){
        return (x.name || '').toLowerCase().trim() === cName && (x.dob || '').trim() === cDob;
      });
      if (byNameDob) return { match: byNameDob, confidence: 'high', reason: 'name + DOB match' };
    }
    if (cName) {
      var byName = clients.find(function(x){ return (x.name || '').toLowerCase().trim() === cName; });
      if (byName) return { match: byName, confidence: 'medium', reason: 'name match (verify)' };
    }
    return null;
  }
  function addPackageToClient(client, newPkg){

  function parseYMD(s){
    if (!s) return null;
    var parts = s.split('-');
    if (parts.length !== 3) return null;
    return new Date(parseInt(parts[0],10), parseInt(parts[1],10)-1, parseInt(parts[2],10));
  }
  function toYMD(d){
    var m = String(d.getMonth()+1).padStart(2,'0');
    var day = String(d.getDate()).padStart(2,'0');
    return d.getFullYear() + '-' + m + '-' + day;
  }
  function addDays(d, n){
    var out = new Date(d.getTime());
    out.setDate(out.getDate() + n);
    return out;
  }
  function formatShort(d){
    return d.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });
  }
  function formatTime12(t){
    if (!t) return '';
    var parts = t.split(':');
    var h = parseInt(parts[0],10);
    var m = parts[1] || '00';
    var ampm = h >= 12 ? 'PM' : 'AM';
    var h12 = h % 12; if (h12 === 0) h12 = 12;
    return h12 + ':' + m + ' ' + ampm;
  }
  function minutesBetween(start, end){
    if (!start || !end) return 0;
    var s = start.split(':'); var e = end.split(':');
    var sm = parseInt(s[0],10)*60 + parseInt(s[1],10);
    var em = parseInt(e[0],10)*60 + parseInt(e[1],10);
    return Math.max(0, em - sm);
  }
  function classDurationHours(c){
    return minutesBetween(c.startTime, c.endTime) / 60;
  }
  /* GX class hours rule (v2.1): a "1-hour class" in this department actually
     runs 50-60 minutes on the schedule. Per Reagan's call: anything in the
     50-60 minute band counts as a full 1.0 hour for time-card purposes.
     Shorter (e.g., 30-min express) = 0.5. Longer (e.g., 90-min workshop) = 1.5.
     Returns hours rounded to 2 decimals. */
  function gxClassHours(c){
    var mins = minutesBetween(c.startTime, c.endTime);
    if (mins >= 50 && mins <= 60) return 1.0;
    return Math.round((mins / 60) * 100) / 100;
  }

  function getAssignedSubForDate(cls, dateYMD){
    var subs = cls && cls.subAssignments;

  function getUpcomingSubsFor(classes, trainerName, fromYMD){
    var result = [];

      return (a.cls.startTime || '') < (b.cls.startTime || '') ? -1 : 1;

  /* ---- Pay period helpers ----
     Round Rock 2026 calendar: pay periods start every other Sunday, 14 days long.
     Pay day is the Friday after the period closes (start + 19 days).
     Anchor: Jan 4, 2026 was a confirmed pay-period start. */
  var PAY_PERIOD_EPOCH = '2026-01-04';
  var PAY_PERIOD_DAYS = 14;
  var PAY_DAY_OFFSET = 19;

  function payPeriodForDate(d){
    var epoch = parseYMD(PAY_PERIOD_EPOCH);
    var msPerDay = 24*60*60*1000;
    var diffDays = Math.floor((d.getTime() - epoch.getTime()) / msPerDay);
    var periodIndex = Math.floor(diffDays / PAY_PERIOD_DAYS);
    return payPeriodByIndex(periodIndex);
  }
  function payPeriodByIndex(idx){
    var epoch = parseYMD(PAY_PERIOD_EPOCH);
    var start = addDays(epoch, idx * PAY_PERIOD_DAYS);
    var end = addDays(start, PAY_PERIOD_DAYS - 1);
    var payDay = addDays(start, PAY_DAY_OFFSET);
    return {
      index: idx,
      start: start,
      end: end,
      payDay: payDay,
      startYMD: toYMD(start),
      endYMD: toYMD(end),
      payDayYMD: toYMD(payDay)
    };
  }
  function payPeriodLabel(pp){
    return formatShort(pp.start) + ' – ' + formatShort(pp.end);
  }
  function payPeriodLabelWithPayDay(pp){
    return payPeriodLabel(pp) + ' (paid ' + formatShort(pp.payDay) + ')';
  }
  function listPayPeriodOptions(){
    /* Returns the previous 5 periods, current, and next - most useful audit window */
    var now = payPeriodForDate(new Date());
    var out = [];
    for (var i = -5; i <= 1; i++) {
      out.push(payPeriodByIndex(now.index + i));
    }
    return out;
  }

     Captures the invisible work - quick member interactions on the floor,
     answering questions, demoing equipment, walking someone through a setup.
     Two-tap entry (type + topic), counts toward auto-admin time.
     ========================================================================= */

  var CONTACT_TYPES = ['quick', 'substantive', 'educational'];
  var CONTACT_TYPE_LABEL = {
    quick:        'Quick',
    substantive:  'Substantive',
    educational:  'Educational'
  };
  var CONTACT_TYPE_DESC = {
    quick:        'Less than 2 min - quick answer or pointer',
    substantive:  '2-10 min - real conversation, troubleshooting',
    educational:  '10+ min - taught a skill, demo, or full walkthrough'
  };
  var CONTACT_TYPE_COLOR = {
    quick:        'var(--slate)',
    substantive:  'var(--teal)',
    educational:  'var(--gold)'
  };
  /* Each type maps to estimated minutes for auto-admin credit. */
  var CONTACT_TYPE_MINUTES = {
    quick:        2,
    substantive:  6,
    educational:  15
  };

  var CONTACT_TOPICS = ['form_safety', 'programming', 'equipment', 'facility', 'health', 'general', 'other'];
  var CONTACT_TOPIC_LABEL = {
    form_safety:  'Form / safety',
    programming:  'Programming question',
    equipment:    'Equipment demo or fix',
    facility:     'Facility / wayfinding',
    health:       'Health-related (potential PT referral)',
    general:      'General / social',
    other:        'Other'
  };
  var CONTACT_TOPIC_COLOR = {
    form_safety:  '#7B61FF',
    programming:  'var(--teal)',
    equipment:    'var(--navy)',
    facility:     'var(--slate)',
    health:       'var(--red)',
    general:      'var(--gold)',
    other:        'var(--slate)'
  };

  /* Auto-admin credit from contacts: minutes accumulated, converted to
     hours, capped at a reasonable amount per pay period. Validates the
     work without inflating hours into something a payroll auditor would
     question. Cap is 4 hours per pay period (~16 substantive contacts). */
  var CONTACT_ADMIN_CAP_HOURS = 4;
  function contactsAdminHours(contacts){
    var totalMinutes = 0;
    (contacts || []).forEach(function(c){
      var m = CONTACT_TYPE_MINUTES[c.type];
      if (typeof m === 'number') totalMinutes += m;
    });
    var hours = Math.round((totalMinutes / 60) * 100) / 100;
    return Math.min(hours, CONTACT_ADMIN_CAP_HOURS);
  }

  /* State machine. Returns the list of valid next statuses from a given
     current status. Used to drive the action buttons. */
  function queueValidNextStatuses(current){
    if (current === 'waiting')           return ['assigned', 'lost'];
    if (current === 'assigned')          return ['contacted', 'consult_scheduled', 'lost'];
    if (current === 'contacted')         return ['consult_scheduled', 'contacted', 'lost'];
    if (current === 'consult_scheduled') return ['converted', 'contacted', 'lost'];
    if (current === 'converted')         return [];
    if (current === 'lost')              return ['waiting'];
    return [];
  }

  /* "Aged" = past followUpBy and still in an open status. Surfaces stale
     leads that need attention. Converted/lost are never aged. */
  function isQueueLeadAged(q){
    if (!q || !q.followUpBy) return false;
    if (q.status === 'converted' || q.status === 'lost') return false;
    return q.followUpBy < todayStr();
  }

  /* Days since the lead was created. Used in the pipeline view for aging. */
  function queueLeadAgeDays(q){
    if (!q || !q.createdAt) return 0;
    var created = new Date(q.createdAt);
    var now = new Date();
    return Math.floor((now - created) / (1000 * 60 * 60 * 24));
  }

  /* v2.5: WRO derived state. Three states:
     - 'pending': member signed up, no specialist has claimed it yet
     - 'in_progress': a specialist has claimed it but post-form not submitted
     - 'completed': specialist post-form submitted */
  function wroState(w){
    if (!w) return 'pending';
    if (w.postCompleted) return 'completed';
    if (w.claimedBy) return 'in_progress';
    return 'pending';
  }
  var WRO_STATE_LABEL = {
    pending: 'Pending pickup',
    in_progress: 'In progress',
    completed: 'Completed'
  };
  var WRO_STATE_COLOR = {
    pending: '#C49A4A',          // gold
    in_progress: '#2E8B8B',      // teal
    completed: '#5C8A6F'         // green
  };
  /* Short label for badges on cards */
  var WRO_STATE_BADGE = {
    pending: 'PENDING',
    in_progress: 'IN PROGRESS',
    completed: 'DONE'
  };

  /* Append a status-history entry on transition. Always go through this
     so the timeline stays accurate. Returns the updated queue entry. */
  function applyQueueStatusChange(q, newStatus, opts){
    opts = opts || {};
    var history = (q.statusHistory || []).slice();
    history.push({
      from: q.status,
      to: newStatus,
      at: new Date().toISOString(),
      by: opts.by || null,
      note: opts.note || null,
      lostReason: opts.lostReason || null
    });
    var update = Object.assign({}, q, {
      status: newStatus,
      statusHistory: history
    });
    if (newStatus === 'contacted') update.lastContactedAt = new Date().toISOString();
    if (newStatus === 'consult_scheduled') update.consultScheduledAt = new Date().toISOString();
    if (newStatus === 'converted') {
      update.convertedAt = new Date().toISOString();
      if (opts.convertedToClientId) update.convertedToClientId = opts.convertedToClientId;
    }
    if (newStatus === 'lost') {
      update.lostAt = new Date().toISOString();
      update.lostReason = opts.lostReason || 'other';
    }
    return update;
  }

  /* Default follow-up date: capture date + 3 calendar days. */
  function defaultFollowUpYMD(){
    return toYMD(addDays(new Date(), 3));
  }

  /* Given a list of queue entries, compute pipeline summary stats keyed
     by status, source, and aging. Used by the Pipeline view and Today card. */
  function computePipelineStats(queue){
    var byStatus = {};
    QUEUE_STATUSES.forEach(function(s){ byStatus[s] = 0; });
    var bySource = {};
    QUEUE_SOURCES.forEach(function(s){ bySource[s] = { total: 0, converted: 0, lost: 0 }; });
    var aged = 0;
    var open = 0; /* not converted, not lost */
    (queue || []).forEach(function(q){
      var st = q.status || 'waiting';
      if (byStatus[st] != null) byStatus[st]++;
      if (st !== 'converted' && st !== 'lost') open++;
      if (isQueueLeadAged(q)) aged++;
      var src = q.source || 'other';
      if (!bySource[src]) bySource[src] = { total: 0, converted: 0, lost: 0 };
      bySource[src].total++;
      if (st === 'converted') bySource[src].converted++;
      if (st === 'lost') bySource[src].lost++;
    });
    /* Conversion rate per source: converted / (converted + lost). Pending leads
       are excluded so the rate reflects closed cases only. */
    Object.keys(bySource).forEach(function(s){
      var bs = bySource[s];
      var closed = bs.converted + bs.lost;
      bs.closed = closed;
      bs.conversionRate = closed > 0 ? Math.round((bs.converted / closed) * 100) : null;
    });
    return {
      byStatus: byStatus,
      bySource: bySource,
      aged: aged,
      open: open,
      total: (queue || []).length
    };
  }

  /* Given a list of queue entries, compute median time-to-conversion in days
     across all converted leads. Returns null if no conversions. */
  function medianTimeToConversionDays(queue){
    var times = [];
    (queue || []).forEach(function(q){
      if (q.status !== 'converted' || !q.createdAt || !q.convertedAt) return;
      var ms = new Date(q.convertedAt) - new Date(q.createdAt);
      times.push(ms / (1000 * 60 * 60 * 24));
    });
    if (times.length === 0) return null;
    times.sort(function(a, b){ return a - b; });
    var mid = Math.floor(times.length / 2);
    var med = times.length % 2 === 0 ? (times[mid - 1] + times[mid]) / 2 : times[mid];
    return Math.round(med * 10) / 10;
  }

  /* Given a class list and a date window, return every scheduled occurrence
     (one per matching weekday within the window), annotated with whether
     that occurrence has a matching attendance log. */
  function occurrencesInWindow(classes, startDate, endDate, closures){
    var closureMap = {};
    (closures || []).forEach(function(cl){ closureMap[cl.date] = cl; });
    var result = [];
    var cursor = new Date(startDate.getTime());
    var endMs = endDate.getTime();
    while (cursor.getTime() <= endMs) {
      var idx = cursor.getDay();
      var dow = IDX_TO_DOW[idx];
      var ymd = toYMD(cursor);
      var closure = closureMap[ymd] || null;
      classes.forEach(function(c){
        if (normalizeDow(c.dayOfWeek) !== dow) return;
        /* v2.2: respect optional season window. seasonStart/seasonEnd are
           inclusive YMD strings. Classes without dates are perpetual. This
           preserves attendance history when a class ends seasonally or
           permanently - just set seasonEnd, don't delete. */
        if (c.seasonStart && ymd < c.seasonStart) return;
        if (c.seasonEnd && ymd > c.seasonEnd) return;
        var att = (c.attendance || []).find(function(a){ return a.date === ymd; });
        var cancellation = (c.cancellations || []).find(function(x){ return x.date === ymd; });
        var assignedSub = getAssignedSubForDate(c, ymd);
        var scheduledInstructor = assignedSub ? assignedSub.subInstructor : c.instructor;
        var actualInstructor = att ? att.instructor : null;
        var wasSub = !!(att && att.instructor && att.instructor !== c.instructor);
        result.push({
          date: ymd,
          dateObj: new Date(cursor.getTime()),
          cls: c,
          logged: !!att,
          headcount: att ? att.headcount : null,
          attendance: att || null,
          cancellation: cancellation || null,
          closure: closure,
          isClosed: !!closure,
          isCancelled: !!cancellation,
          assignedSub: assignedSub,
          scheduledInstructor: scheduledInstructor,
          actualInstructor: actualInstructor,
          wasSub: wasSub
        });
      });
      cursor = addDays(cursor, 1);
    }
    return result.sort(function(a,b){
      if (a.date !== b.date) return a.date < b.date ? -1 : 1;
      return (a.cls.startTime || '') < (b.cls.startTime || '') ? -1 : 1;
    });
  }

  /* v2.2: Class status helpers based on season window. */
  function classSeasonStatus(c){
    var todayYMD = todayStr();
    if (c.seasonEnd && c.seasonEnd < todayYMD) return 'ended';
    if (c.seasonStart && c.seasonStart > todayYMD) return 'upcoming';
    return 'active';
  }
  function classSeasonLabel(c){
    var status = classSeasonStatus(c);
    if (status === 'ended') {
      return 'Ended ' + formatShort(parseYMD(c.seasonEnd));
    }
    if (status === 'upcoming') {
      return 'Starts ' + formatShort(parseYMD(c.seasonStart));
    }
    if (c.seasonEnd) {
      return 'Runs through ' + formatShort(parseYMD(c.seasonEnd));
    }
    if (c.seasonStart) {
      return 'Started ' + formatShort(parseYMD(c.seasonStart));
    }
    return null;
  }

  /* =========================================================================
     v2: TRAINER HOURS - unified calc with auto admin (0.25x) + manual admin

     Single source of truth for trainer hours per pay period. Replaces the
     scattered calcs that were sprinkled across the audit view, the Today
     view, and the payroll CSV. Operationalizes Rick's 25 percent indirect
     cost framing at the trainer level: every forward-facing hour delivered
     credits 0.25 admin hours automatically.
     ========================================================================= */

  /* hoursFromTimes('14:00','15:30') returns 1.5 (rounded to 2 decimals).
     Returns 0 if either input is missing or invalid. */
  function hoursFromTimes(timeIn, timeOut){
    var mins = minutesBetween(timeIn, timeOut);
    return Math.round((mins / 60) * 100) / 100;
  }

  /* 0.25 admin hours per forward-facing hour delivered.
     Covers programming, notes, and client communication time. */
  function autoAdminHours(forwardFacingHours){
    return Math.round((forwardFacingHours * 0.25) * 100) / 100;
  }

  /* Safe accessor for sub assignment status. Treats any sub without an
     explicit status as 'approved' so legacy data keeps working before
     the migration runs. */
  function subStatus(s){
    if (!s) return 'open';
    return s.status || 'approved';
  }

  /* Name-match helper for trainer hour aggregation. Matches first name,
     full name, and case-insensitive variants so 'Carlos' and 'Carlos Vega'
     both roll up to the same trainer record. */
  function trainerNameMatches(trainerName, candidate){
    if (!trainerName || !candidate) return false;
    if (trainerName === candidate) return true;
    var t = String(trainerName).toLowerCase().trim();
    var c = String(candidate).toLowerCase().trim();
    if (t === c) return true;
    var tFirst = t.split(' ')[0];
    var cFirst = c.split(' ')[0];
    return tFirst === cFirst && tFirst.length >= 3;
  }

  /* Pull a duration off an attendance entry. If the attendance row has its
     own durationHours, trust it (snapshotted at log time). Otherwise fall
     back to the gxClassHours rule (50-60 min = 1 hour, else actual). */
  function attendanceDurationHours(cls, att){
    if (att && typeof att.durationHours === 'number' && att.durationHours > 0) {
      return att.durationHours;
    }
    return gxClassHours(cls);
  }

  /* Single source of truth for trainer hours per pay period.
     Returns the full breakdown documented in the v2 handoff:
       forwardFacing: { ptSessions, ptHours, gxClasses, gxHours,
                        subCoverage, subHours, total }
       autoAdmin: { hours, breakdown: { ptAdmin, gxAdmin, subAdmin } }
       manualAdmin: { items, hours }
       grandTotal
       subLosses (informational, not deducted)
     payPeriodOffset is relative to the current period:
       0 = current, -1 = previous (just closed), +1 = next */
  function calcTrainerHours(trainerName, payPeriodOffset, clients, classes, items, wros, contacts){
    var nowPeriod = payPeriodForDate(new Date());
    var period = payPeriodByIndex(nowPeriod.index + (payPeriodOffset || 0));
    var startYMD = period.startYMD;
    var endYMD = period.endYMD;

    /* PT sessions: attended only, in window. Late cancel / no show / excused
       are not forward-facing time. durationHours defaults to 1 for legacy. */
    var ptSessions = [];
    var ptHours = 0;
    clients.forEach(function(c){
      if (!trainerNameMatches(trainerName, c.trainerName)) return;
      (c.sessions || []).forEach(function(s){
        if (s.status !== 'attended') return;
        if (!s.date || s.date < startYMD || s.date > endYMD) return;
        var dur = (typeof s.durationHours === 'number' && s.durationHours > 0) ? s.durationHours : 1;
        ptSessions.push({ clientId: c.id, clientName: c.name, date: s.date, hours: dur, kind: 'session' });
        ptHours += dur;
      });
    });

    /* v2.2: Weight Room Orientations completed by this trainer credit toward
       PT hours. Use the post-form's orientationDate as the date and the
       computed durationHours (from time in/out). */
    var orientations = [];
    var orientationHours = 0;
    (wros || []).forEach(function(w){
      if (!w.postCompleted || !w.post) return;
      var sp = w.post.specialistName;
      if (!trainerNameMatches(trainerName, sp)) return;
      var dt = w.post.orientationDate || w.date;
      if (!dt || dt < startYMD || dt > endYMD) return;
      var dur = (typeof w.post.durationHours === 'number' && w.post.durationHours > 0)
        ? w.post.durationHours : 1;
      orientations.push({
        wroId: w.id,
        clientName: w.participantName,
        date: dt,
        hours: dur,
        kind: 'orientation'
      });
      orientationHours += dur;
    });

    /* GX classes: split between regular instruction and sub coverage. */
    var gxClasses = [];
    var gxHours = 0;
    var subCoverage = [];
    var subHours = 0;
    classes.forEach(function(c){
      (c.attendance || []).forEach(function(a){
        if (a.cancelled) return;
        if (!a.date || a.date < startYMD || a.date > endYMD) return;
        var dur = attendanceDurationHours(c, a);
        var actual = a.actualInstructor || a.instructor || c.instructor;
        var wasSub = actual && actual !== c.instructor;
        if (wasSub) {
          if (!trainerNameMatches(trainerName, actual)) return;
          /* Sub coverage credit only counts if the sub assignment is approved.
             If no assignment record exists (on-the-fly cover), treat as approved. */
          var assignment = (c.subAssignments || []).find(function(s){
            var sName = s.subInstructor || s.claimedBy;
            return s.date === a.date && trainerNameMatches(actual, sName);
          });
          var status = assignment ? subStatus(assignment) : 'approved';
          if (status !== 'approved') return;
          subCoverage.push({ classId: c.id, className: c.name, date: a.date, hours: dur });
          subHours += dur;
        } else {
          if (!trainerNameMatches(trainerName, c.instructor)) return;
          gxClasses.push({ classId: c.id, className: c.name, date: a.date, hours: dur });
          gxHours += dur;
        }
      });
    });

    /* Sub losses: classes the trainer was scheduled for that someone else
       covered (approved). Informational only, not deducted from total. */
    var subLosses = [];
    classes.forEach(function(c){
      if (!trainerNameMatches(trainerName, c.instructor)) return;
      (c.subAssignments || []).forEach(function(s){
        if (!s.date || s.date < startYMD || s.date > endYMD) return;
        if (subStatus(s) !== 'approved') return;
        var att = (c.attendance || []).find(function(a){ return a.date === s.date; });
        if (!att || att.cancelled) return;
        var dur = attendanceDurationHours(c, att);
        subLosses.push({ classId: c.id, className: c.name, date: s.date, hours: dur });
      });
    });

    /* PT category total: 1:1 sessions + orientations roll up together
       (per Selisa's pattern: WROs count as PT hours on the timecard). */
    var ptCategoryHours = ptHours + orientationHours;
    var forwardTotal = ptCategoryHours + gxHours + subHours;
    var autoAdmin = autoAdminHours(forwardTotal);

    /* Manual admin items: every assignee gets the FULL hours credited
       (not divided). A 1.5-hour meeting with two assignees = 1.5 each. */
    var myItems = [];
    var manualAdminH = 0;
    (items || []).forEach(function(it){
      if (!it.date || it.date < startYMD || it.date > endYMD) return;
      var matches = (it.assignees || []).some(function(n){ return trainerNameMatches(trainerName, n); });
      if (!matches) return;
      myItems.push(it);
      manualAdminH += (typeof it.hours === 'number' ? it.hours : 0);
    });

    /* v2.4: member contacts. Filter to this trainer + this period. Roll up
       counts by type and topic, compute capped admin hours. */
    var myContacts = [];
    var contactsByType = { quick: 0, substantive: 0, educational: 0 };
    var contactsByTopic = {};
    (contacts || []).forEach(function(ct){
      if (!ct.date || ct.date < startYMD || ct.date > endYMD) return;
      if (!trainerNameMatches(trainerName, ct.trainerName)) return;
      myContacts.push(ct);
      if (contactsByType[ct.type] != null) contactsByType[ct.type]++;
      if (ct.topic) contactsByTopic[ct.topic] = (contactsByTopic[ct.topic] || 0) + 1;
    });
    var contactAdminH = contactsAdminHours(myContacts);
    var contactsRawMinutes = myContacts.reduce(function(sum, c){
      return sum + (CONTACT_TYPE_MINUTES[c.type] || 0);
    }, 0);
    var contactsCapped = (contactsRawMinutes / 60) > CONTACT_ADMIN_CAP_HOURS;

    return {
      trainer: trainerName,
      payPeriod: {
        start: period.startYMD,
        end: period.endYMD,
        label: payPeriodLabel(period),
        payDay: period.payDay
      },
      forwardFacing: {
        ptSessions: ptSessions,
        ptHours: Math.round(ptHours * 100) / 100,
        orientations: orientations,
        orientationHours: Math.round(orientationHours * 100) / 100,
        ptCategoryHours: Math.round(ptCategoryHours * 100) / 100,
        gxClasses: gxClasses,
        gxHours: Math.round(gxHours * 100) / 100,
        subCoverage: subCoverage,
        subHours: Math.round(subHours * 100) / 100,
        total: Math.round(forwardTotal * 100) / 100
      },
      autoAdmin: {
        hours: autoAdmin,
        breakdown: {
          ptAdmin: autoAdminHours(ptCategoryHours),
          gxAdmin: autoAdminHours(gxHours),
          subAdmin: autoAdminHours(subHours)
        }
      },
      manualAdmin: {
        items: myItems,
        hours: Math.round(manualAdminH * 100) / 100
      },
      contacts: {
        items: myContacts,
        count: myContacts.length,
        byType: contactsByType,
        byTopic: contactsByTopic,
        rawMinutes: contactsRawMinutes,
        hours: contactAdminH,
        capped: contactsCapped,
        cap: CONTACT_ADMIN_CAP_HOURS
      },
      grandTotal: Math.round((forwardTotal + autoAdmin + manualAdminH + contactAdminH) * 100) / 100,
      subLosses: subLosses
    };
  }

  /* ============ APP ROOT ============ */
  function App(){
    var trainersTuple = useLocal('pt_trainers_v4', SEED_TRAINERS.slice());
    var trainers = trainersTuple[0];
    var setTrainers = trainersTuple[1];

    var clientsTuple = useLocal('pt_clients_v3', buildSeedClients());
    var clients = clientsTuple[0];
    var setClients = clientsTuple[1];

    var classesTuple = useLocal('cmrc_classes_v2', buildSeedClasses());
    var classes = classesTuple[0];
    var setClasses = classesTuple[1];

    var closuresTuple = useLocal('cmrc_closures_v2', SEED_CLOSURES_2026.slice());
    var closures = closuresTuple[0];
    var setClosures = closuresTuple[1];

    var wrosTuple = useLocal('cmrc_wros_v1', []);
    var wros = wrosTuple[0];
    var setWros = wrosTuple[1];

    var referralsTuple = useLocal('cmrc_pt_referrals_v1', []);
    var referrals = referralsTuple[0];
    var setReferrals = referralsTuple[1];

    /* v2: manual admin time entries (Items) */
    var itemsTuple = useLocal('cmrc_items_v1', []);
    var items = itemsTuple[0];
    var setItems = itemsTuple[1];

    /* v2: consult queue for new PT lead intake */
    var queueTuple = useLocal('cmrc_queue_v1', []);
    var queue = queueTuple[0];
    var setQueue = queueTuple[1];

    /* v2.4: member contacts - quick log of floor interactions */
    var contactsTuple = useLocal('cmrc_contacts_v1', []);
    var contacts = contactsTuple[0];
    var setContacts = contactsTuple[1];

    /* v2.6: schedule versions - rolling GX schedules with effective dates.
       Each version is an immutable snapshot of a schedule with startDate
       and optional endDate. The active version is the one where
       today >= startDate AND (endDate is null OR today <= endDate). When
       a new version activates, classes from the prior version that aren't
       in the new one get seasonEnd set (preserved as historical, not
       deleted). */
    var schedVersionsTuple = useLocal('cmrc_schedule_versions_v1', []);
    var scheduleVersions = schedVersionsTuple[0];
    var setScheduleVersions = schedVersionsTuple[1];

    var pinTuple = useLocal('admin_pin_v1', DEFAULT_PIN);
    var pin = pinTuple[0];
    var setPin = pinTuple[1];

    /* v2: idempotent sub-status migration. Walks every class once on mount;
       any subAssignment without an explicit status field is upgraded to
       status='approved' so legacy data preserves prior behavior. Safe to
       re-run; it only writes when a fixup is needed. */
    useEffect(function(){
      var needsFixup = false;
      (classesTuple[0] || []).forEach(function(c){
        (c.subAssignments || []).forEach(function(s){
          if (!s.status) { needsFixup = true; }
        });
      });
      if (!needsFixup) return;
      setClasses(function(list){
        return list.map(function(c){
          if (!c.subAssignments || !c.subAssignments.length) return c;
          var anyMissing = c.subAssignments.some(function(s){ return !s.status; });
          if (!anyMissing) return c;
          var copy = Object.assign({}, c);
          copy.subAssignments = c.subAssignments.map(function(s){
            if (s.status) return s;
            return Object.assign({}, s, { status: 'approved' });
          });
          return copy;
        });
      });
    }, []);

    /* v2.3: queue entries from earlier versions need source/followUpBy/
       statusHistory backfilled. Idempotent: only fixes records missing fields. */
    useEffect(function(){
      var existing = queueTuple[0] || [];
      var needsFixup = existing.some(function(q){
        return !q.source || !q.statusHistory || q.followUpBy === undefined;
      });
      if (!needsFixup) return;
      setQueue(function(list){
        return list.map(function(q){
          if (q.source && q.statusHistory && q.followUpBy !== undefined) return q;
          var update = Object.assign({}, q);
          if (!update.source) update.source = 'walk_in';
          if (update.followUpBy === undefined) {
            /* Aged guess: if it was created more than 3 days ago, leave undefined

    /* v2.6: schedule version functions ===============================
       saveScheduleVersion: upsert a version with optional auto-activate
       deleteScheduleVersion: remove a version (does NOT roll back classes)
       activateScheduleVersion: apply a version's class roster to the live
         classes array, marking dropped classes with seasonEnd to preserve
         their historical attendance/instructor data. */
    function saveScheduleVersion(v){
      setScheduleVersions(function(list){
        var exists = list.some(function(x){ return x.id === v.id; });
        if (exists) return list.map(function(x){ return x.id === v.id ? v : x; });
        return list.concat([v]);
      });
    }
    function deleteScheduleVersion(id){
      setScheduleVersions(function(list){ return list.filter(function(x){ return x.id !== id; }); });
    }
    /* Apply a schedule version: reconcile classes against the version's
       roster. Idempotent; safe to re-run.

       For each class in the version: match to existing class by
       matchKey = name|location|dayOfWeek (lowercased). If it exists and
       was previously ended, reactivate it (clear seasonEnd, set new
       seasonStart). If it exists and is active, update its time/instructor
       and seasonStart. If it doesn't exist, create it.

       For classes NOT in the version: if they're currently active and
       were previously activated by an earlier schedule version OR have
       no seasonEnd set, mark them as ended on (newScheduleStart - 1 day).
       This preserves all historical attendance and instructor data while
       removing them from active rotation. */
    function activateScheduleVersion(versionId){
      var version = (schedVersionsTuple[0] || []).find(function(v){ return v.id === versionId; });
      if (!version) return { ok: false, reason: 'Version not found' };
      var startYMD = version.startDate;
      var endYMD = version.endDate || null;
      if (!startYMD) return { ok: false, reason: 'Version has no start date' };

      var dayBeforeStart = toYMD(addDays(parseYMD(startYMD), -1));

      function classMatchKey(c){
        return [
          (c.name || '').toLowerCase().trim(),
          (c.location || '').toLowerCase().trim(),
          (c.dayOfWeek || '').toUpperCase().trim()
        ].join('|');
      }

      var versionKeys = {};
      (version.classes || []).forEach(function(vc){ versionKeys[classMatchKey(vc)] = vc; });

      setClasses(function(list){
        var seenInVersion = {};
        /* Pass 1: update or create from version */
        var updated = list.map(function(c){
          var key = classMatchKey(c);
          var vc = versionKeys[key];
          if (!vc) return c;
          seenInVersion[key] = true;
          /* Reactivate or update with version data */
          var copy = Object.assign({}, c);
          if (vc.time) copy.time = vc.time;
          if (vc.duration != null) copy.duration = vc.duration;
          if (vc.instructor) copy.instructor = vc.instructor;
          copy.seasonStart = startYMD;
          copy.seasonEnd = endYMD;
          copy.scheduleVersionId = versionId;
          return copy;
        });
        /* Pass 2: append classes from version that aren't in list yet */
        (version.classes || []).forEach(function(vc){
          var key = classMatchKey(vc);
          if (seenInVersion[key]) return;
          updated.push({
            id: uid(),
            name: vc.name,
            location: vc.location,
            dayOfWeek: vc.dayOfWeek,
            time: vc.time || '',
            duration: vc.duration || 60,
            instructor: vc.instructor || '',
            seasonStart: startYMD,
            seasonEnd: endYMD,
            scheduleVersionId: versionId,
            attendance: [],
            subAssignments: [],
            cancellations: [],
            createdAt: new Date().toISOString()
          });
        });
        /* Pass 3: classes that aren't in this version. If they were
           activated by an earlier schedule version, end them on
           dayBeforeStart. Standalone manually-created classes (no
           scheduleVersionId) are left alone unless seasonEnd is unset and
           the class is dropping off due to rotation. We only auto-end
           classes tied to a scheduleVersionId different from the new one. */
        return updated.map(function(c){
          var key = classMatchKey(c);
          if (versionKeys[key]) return c;
          /* Only auto-end if it was tied to a previous schedule version */
          if (!c.scheduleVersionId) return c;
          if (c.scheduleVersionId === versionId) return c;
          /* Already ended before the new version starts: leave alone */
          if (c.seasonEnd && c.seasonEnd < startYMD) return c;
          var copy = Object.assign({}, c);
          copy.seasonEnd = dayBeforeStart;
          return copy;
        });
      });

      /* Mark this version as activated */
      setScheduleVersions(function(list){
        return list.map(function(v){
          if (v.id !== versionId) return v;
          return Object.assign({}, v, {
            activatedAt: new Date().toISOString()
          });
        });
      });

      return { ok: true };
    }

    /* v2.6: auto-activation. On every render where today >= a version's
       startDate AND that version isn't already activated, activate it.
       Idempotent: activatedAt prevents repeat activation. */
    useEffect(function(){
      var todayY = todayStr();
      var pending = (schedVersionsTuple[0] || []).filter(function(v){
        return v.startDate && v.startDate <= todayY && !v.activatedAt;
      }).sort(function(a, b){ return (a.startDate || '') < (b.startDate || '') ? -1 : 1; });
      pending.forEach(function(v){ activateScheduleVersion(v.id); });
    }, [scheduleVersions]);

    var ctx = {
      trainers: trainers,
      clients: clients,
      classes: classes,
      closures: closures,
      wros: wros,
      session: session,
      setSession: setSession,
      upsertClient: upsertClient,

      addCancellation: addCancellation,

      addClosure: addClosure,
      removeClosure: removeClosure,
      upsertWRO: upsertWRO,
      claimWRO: claimWRO,

      deleteWRO: deleteWRO,
      referrals: referrals,
      upsertReferral: upsertReferral,
      deleteReferral: deleteReferral,
      addTrainer: addTrainer,
      removeTrainer: removeTrainer,
      toast: toast,
      pin: pin,
      setPin: setPin,
      /* v2 additions */
      items: items,
      upsertItem: upsertItem,
      deleteItem: deleteItem,
      queue: queue,
      upsertQueueEntry: upsertQueueEntry,
      deleteQueueEntry: deleteQueueEntry,
      claimQueueEntry: claimQueueEntry,

      contacts: contacts,

      deleteContact: deleteContact,
      /* v2.6 additions */
      scheduleVersions: scheduleVersions,
      saveScheduleVersion: saveScheduleVersion,
      deleteScheduleVersion: deleteScheduleVersion,
      activateScheduleVersion: activateScheduleVersion
    };

    var view;
    if (!session) {
      view = e(Login, { ctx: ctx });
    } else if (session.role === 'kiosk_wro') {
      view = e(KioskWROView, { ctx: ctx });

    return e('div', { className: 'app-shell' },

      e(ToastStack, { toasts: toasts })
    );
  }

  /* ============ PIN MODAL ============ */
  function PinModal(props){
    var digitsTuple = useState('');
    var digits = digitsTuple[0];
    var setDigits = digitsTuple[1];

    function press(n){
      if (digits.length >= 4) return;
      var next = digits + n;
      setDigits(next);
      if (next.length === 4) {
        setTimeout(function(){
          if (next === props.expected) {
            props.onSuccess();
          } else {
            props.onFail();
            setDigits('');
          }
        }, 180);
      }
    }
    function back(){ setDigits(digits.slice(0,-1)); }

    var dots = [0,1,2,3].map(function(i){
      return e('div', { key: i, className: 'pin-dot ' + (i < digits.length ? 'filled' : '') });
    });

    var keys = ['1','2','3','4','5','6','7','8','9','','0','⌫'];

    return e('div', { className: 'modal-overlay', onClick: props.onClose },
      e('div', { className: 'modal', onClick: function(ev){ ev.stopPropagation(); }, style: { maxWidth: '360px' } },
        e('div', { className: 'modal-header' },
          e('h2', null, 'Admin PIN'),

        ),
        e('div', { className: 'modal-body' },
          e('div', { className: 'pin-dots' }, dots),

            keys.map(function(k, i){
              if (k === '') return e('div', { key: i });

            })

  /* ============ SIGNATURE PAD ============ */
  function SignaturePad(props){
    /* props: label, onChange(base64|null), value (optional preset) */
    var canvasRef = useRef(null);
    var wrapRef = useRef(null);
    var drawingRef = useRef(false);
    var lastRef = useRef({ x:0, y:0 });
    var hasInkTuple = useState(false);
    var hasInk = hasInkTuple[0];
    var setHasInk = hasInkTuple[1];

    function setupCanvas(){
      var c = canvasRef.current;
      var wrap = wrapRef.current;
      if (!c || !wrap) return;
      var rect = wrap.getBoundingClientRect();
      var w = rect.width;
      var h = 180;
      var dpr = window.devicePixelRatio || 1;
      c.width = Math.floor(w * dpr);
      c.height = Math.floor(h * dpr);
      c.style.width = w + 'px';
      c.style.height = h + 'px';
      var ctx = c.getContext('2d');
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.lineWidth = 2.5;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.strokeStyle = '#1a2e4a';
      ctx.fillStyle = '#fff';
      ctx.fillRect(0,0,w,h);
    }

    useEffect(function(){
      setupCanvas();
      var handler = function(){ setupCanvas(); setHasInk(false); if (props.onChange) props.onChange(null); };
      window.addEventListener('resize', handler);
      return function(){ window.removeEventListener('resize', handler); };
    }, []);

    function getPos(ev){
      var c = canvasRef.current;
      var rect = c.getBoundingClientRect();
      var clientX, clientY;
      if (ev.touches && ev.touches.length) { clientX = ev.touches[0].clientX; clientY = ev.touches[0].clientY; }
      else { clientX = ev.clientX; clientY = ev.clientY; }
      return { x: clientX - rect.left, y: clientY - rect.top };
    }
    function start(ev){
      ev.preventDefault();
      drawingRef.current = true;
      lastRef.current = getPos(ev);
    }
    function move(ev){
      if (!drawingRef.current) return;
      ev.preventDefault();
      var p = getPos(ev);
      var ctx = canvasRef.current.getContext('2d');
      ctx.beginPath();
      ctx.moveTo(lastRef.current.x, lastRef.current.y);
      ctx.lineTo(p.x, p.y);
      ctx.stroke();
      lastRef.current = p;
      if (!hasInk) setHasInk(true);
    }
    function end(ev){
      if (!drawingRef.current) return;
      drawingRef.current = false;
      if (props.onChange) {
        try { props.onChange(canvasRef.current.toDataURL('image/png')); } catch(_) {}
      }
    }
    function clearPad(){
      setupCanvas();
      setHasInk(false);
      if (props.onChange) props.onChange(null);
    }

    return e('div', null,
      e('div', { ref: wrapRef, className: 'sig-box' },
        !hasInk && e('div', { className: 'sig-label' }, props.label || 'Signature'),
        e('canvas', {
          ref: canvasRef,
          onMouseDown: start, onMouseMove: move, onMouseUp: end, onMouseLeave: end,
          onTouchStart: start, onTouchMove: move, onTouchEnd: end
        })
      ),
      e('div', { className: 'sig-actions' },
        e('button', { className: 'btn btn-ghost btn-sm', onClick: clearPad }, 'Clear'),
        e('span', { style: { fontSize: '12px', color: hasInk ? 'var(--green)' : 'var(--slate-soft)', alignSelf: 'center' } },
          hasInk ? '✓ Captured' : 'Sign above'
        )
      )
    );
  }

  /* ============ TRAINER NOTIFICATION BAR (v2.6) ============
     Sign-in surface for available pickups across three categories:
     1. Open GX classes needing sub coverage (open sub assignments)
     2. New clients waiting for trainer assignment (PT clients with no
        assigned trainer, or queue entries in 'waiting' status)
     3. New WROs waiting to be picked up (state = 'pending')

     Only renders categories with items. If everything is zero, returns null
     so the bar doesn't take up space. Each item is tappable.

     SERVER NOTE: The "open" state is whatever this iPad sees in localStorage.
     Until hosted, two iPads can both show the same item as "open" and both
     trainers can claim it independently. Real-time uniqueness needs hosting. */
  function TrainerNotificationBar(props){
    var ctx = props.ctx;
    var trainerName = ctx.session.name;
    var onJumpToTab = props.onJumpToTab;

    /* Open sub coverage: classes with subAssignments where status is 'open'
       (originally assigned trainer dropped, no replacement claimed yet) */
    var openSubs = [];
    (ctx.classes || []).forEach(function(c){
      (c.subAssignments || []).forEach(function(s){
        if (subStatus(s) === 'open') {
          /* Skip if we know the original instructor is the current viewer
             (no point asking them to sub for themselves) */
          if (trainerNameMatches(trainerName, s.originalInstructor)) return;
          openSubs.push({ classId: c.id, className: c.name, subId: s.id, sub: s, klass: c });

        }
      },
        e('span', null, '\ud83d\udd14'),

        }

        ),

  /* ============ TRAINER TODAY VIEW (v2.6) ============
     Default landing page for trainers. Auto-detects today's date and
     surfaces:
     - The trainer's GX classes scheduled today
     - The trainer's PT sessions scheduled today
     - WROs scheduled for today (if any)
     - Pay-period summary
     Trainer doesn't need to navigate to find what's happening today. */
  function TrainerToday(props){
    var ctx = props.ctx;
    var trainerName = ctx.session.name;

    var todayYMD = todayStr();
    var todayDate = parseYMD(todayYMD);
    var todayDow = IDX_TO_DOW[todayDate.getDay()];

    /* Tap-to-open state. Mirrors the patterns in TrainerGX (ClassDetail
       swap), TrainerPT (ClientDetail swap), and TrainerLeads (PostWROModal
       overlay) so a card tap on Today reuses the existing flows. */
    var classDetailIdTuple = useState(null);
    var classDetailId = classDetailIdTuple[0]; var setClassDetailId = classDetailIdTuple[1];
    var clientDetailIdTuple = useState(null);
    var clientDetailId = clientDetailIdTuple[0]; var setClientDetailId = clientDetailIdTuple[1];
    var wroOpenTuple = useState(null);
    var wroOpen = wroOpenTuple[0]; var setWroOpen = wroOpenTuple[1];

    /* Today's class occurrences */
    var todayOccs = useMemo(function(){
      return occurrencesInWindow(ctx.classes, todayDate, todayDate, ctx.closures);
    }, [ctx.classes, ctx.closures, todayYMD]);

    /* Filter to classes I'm teaching today (primary instructor or subbing) */
    var myClassesToday = todayOccs.filter(function(o){
      var c = o.cls;
      if (!c) return false;
      /* Primary instructor */
      if (trainerNameMatches(trainerName, c.instructor)) return true;
      /* Sub assignment for this date */
      var sub = (c.subAssignments || []).find(function(s){
        return s.date === o.date && (subStatus(s) === 'claimed' || subStatus(s) === 'approved');
      });
      if (sub && trainerNameMatches(trainerName, sub.subInstructor || sub.claimedBy)) return true;
      return false;
    }).sort(function(a, b){ return (a.time || '') < (b.time || '') ? -1 : 1; });

    /* Today's PT sessions for this trainer, plus any pre-scheduled
       sessions that are past-due and still need sign-off. Trainer-name
       matching is tolerant: prefers s.trainerName when stamped (new
       scheduled sessions stamp this), falls back to client.trainerName
       for legacy session records that pre-date the field. */
    var ptSessionsToday = [];
    (ctx.clients || []).forEach(function(client){
      (client.sessions || []).forEach(function(s){
        var sessTrainer = s.trainerName || client.trainerName;
        if (!trainerNameMatches(trainerName, sessTrainer)) return;
        var isToday = s.date === todayYMD;
        var isOverdueScheduled = s.status === 'scheduled' && s.date < todayYMD;
        if (isToday || isOverdueScheduled) {
          ptSessionsToday.push({ client: client, session: s });
        }
      });
    });
    ptSessionsToday.sort(function(a, b){
      /* Overdue scheduled surface first (oldest first), then today's by time. */
      var aOverdue = a.session.status === 'scheduled' && a.session.date < todayYMD;
      var bOverdue = b.session.status === 'scheduled' && b.session.date < todayYMD;
      if (aOverdue !== bOverdue) return aOverdue ? -1 : 1;
      if (aOverdue && bOverdue) return a.session.date < b.session.date ? -1 : 1;
      return (a.session.time || '') < (b.session.time || '') ? -1 : 1;
    });

    /* WROs scheduled for today (orientation date) where I'm the claimer or specialist */
    var myWrosToday = (ctx.wros || []).filter(function(w){
      var orientYMD = (w.post && w.post.orientationDate) || w.date;
      if (orientYMD !== todayYMD) return false;
      if (w.claimedBy && trainerNameMatches(trainerName, w.claimedBy)) return true;
      if (w.post && trainerNameMatches(trainerName, w.post.specialistName)) return true;
      return false;
    });

    /* Pay-period summary */
    var summary = calcTrainerHours(trainerName, 0, ctx.clients, ctx.classes, ctx.items || [], ctx.wros || [], ctx.contacts || []);

    var todayCount = myClassesToday.length + ptSessionsToday.length + myWrosToday.length;

    /* Full-screen detail swaps. Same pattern as TrainerGX/TrainerPT: when
       a detail id is set, return the detail component instead of the
       Today list. Closing returns here without changing tabs. */
    if (classDetailId) {
      var clForDetail = ctx.classes.find(function(x){ return x.id === classDetailId; });
      if (!clForDetail) { setClassDetailId(null); return null; }
      return e(ClassDetail, { ctx: ctx, cls: clForDetail, onBack: function(){ setClassDetailId(null); }, canEdit: true });
    }
    if (clientDetailId) {
      var cliForDetail = ctx.clients.find(function(x){ return x.id === clientDetailId; });
      if (!cliForDetail) { setClientDetailId(null); return null; }
      return e(ClientDetail, { ctx: ctx, client: cliForDetail, onBack: function(){ setClientDetailId(null); }, canEdit: true });
    }

    return e('div', null,
      /* Today header - emphasizes the actual date */
      e('div', {
        style: {
          background: 'linear-gradient(135deg, var(--navy), #2a4a73)',
          color: '#fff',
          borderRadius: '12px',
          padding: '16px 18px',
          marginBottom: '14px'
        }
      },
        e('div', { style: { fontSize: '11px', textTransform: 'uppercase', letterSpacing: '0.08em', opacity: 0.85, marginBottom: '4px' } }, 'Today'),
        e('div', { style: { fontFamily: "'DM Serif Display', serif", fontSize: '26px', lineHeight: 1.1 } },
          todayDate.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' })
        ),
        e('div', { style: { fontSize: '13px', opacity: 0.8, marginTop: '6px' } },
          todayCount === 0 ? 'Nothing scheduled for you today' :
            todayCount + ' item' + (todayCount === 1 ? '' : 's') + ' on your schedule'
        )
      ),

      /* Pay-period chip (compact) */
      e('div', {
        style: {
          background: 'var(--cream-2)',
          border: '1.5px solid var(--border)',
          borderRadius: '10px',
          padding: '10px 14px',
          marginBottom: '14px',
          fontSize: '12px',
          color: 'var(--slate)',
          display: 'flex',

          e('div', { style: { fontSize: '10px', textTransform: 'uppercase', letterSpacing: '0.06em', color: 'var(--slate-soft)', marginBottom: '2px' } },
            'Pay period \u00b7 ' + summary.payPeriod.label

            summary.forwardFacing.total.toFixed(2) + ' fwd + ' +

  /* ============ NEW / EDIT CLIENT MODAL ============ */
  function NewClientModal(props){
    var ctx = props.ctx;
    var existing = props.client;
    var isEdit = !!existing;

    var formTuple = useState(function(){
      if (existing) {
        return {
          name: existing.name,
          phone: existing.phone || '',
          email: existing.email || '',
          location: existing.location,
          datePurchased: existing.datePurchased,
          pkgIdx: (function(){
            var existingPkgs = getPackages(existing);
            var firstPkg = existingPkgs[0];
            if (!firstPkg) return 2;
            var idx = PACKAGES.findIndex(function(p){ return p.sessions === firstPkg.sessions; });
            return idx === -1 ? 2 : idx;
          })(),
          paymentType: existing.paymentType || 'Card',
          teamMember: existing.teamMember || '',
          membershipVerified: !!existing.membershipVerified,
          membershipType: existing.membershipType || 'Non-Member',
          membershipEnd: existing.membershipEnd || '',
          trainerName: existing.trainerName,
          referralSource: existing.referralSource || ''
        };
      }
      var prefill = props.prefill || {};
      return {
        name: prefill.name || '',
        phone: prefill.phone || '',
        email: prefill.email || '',
        location: prefill.location || 'CMRC',
        datePurchased: todayStr(),
        pkgIdx: 2,
        paymentType: 'Card',
        teamMember: '',
        membershipVerified: false,
        membershipType: 'Non-Member',
        membershipEnd: '',
        trainerName: props.lockTrainer || ctx.trainers[0] || '',
        referralSource: prefill.referralSource || ''
      };
    });
    var form = formTuple[0];
    var setForm = formTuple[1];

    /* v2: PAR-Q+ (Physical Activity Readiness Questionnaire) state.
       Answers stored separately from the flat form to keep things clean.
       Standard 7-question version. Any 'yes' surfaces a flag banner; doesn't
       block creation since a PT/ATC/CSCS on the team is the right professional
       to clear it. The screening exists primarily as documented evidence
       that readiness was checked at intake. */
    var parQTuple = useState(function(){
      if (existing && existing.parQ) {
        return Object.assign({ q1: false, q2: false, q3: false, q4: false, q5: false, q6: false, q7: false, completed: false }, existing.parQ);
      }
      return { q1: false, q2: false, q3: false, q4: false, q5: false, q6: false, q7: false, completed: false };
    });
    var parQ = parQTuple[0];
    var setParQ = parQTuple[1];
    function setParQAnswer(k, v){ setParQ(function(p){ var n = Object.assign({}, p); n[k] = v; return n; }); }
    function markParQComplete(){
      setParQ(function(p){
        return Object.assign({}, p, {
          completed: true,
          completedAt: new Date().toISOString(),
          completedBy: (ctx.session && ctx.session.name) || 'admin'
        });
      });
    }
    var parQFlagCount = ['q1','q2','q3','q4','q5','q6','q7'].filter(function(k){ return parQ[k]; }).length;

    function update(k, v){ setForm(function(f){ var n = Object.assign({}, f); n[k] = v; return n; }); }

    function submit(){
      if (!form.name.trim()) { ctx.toast('Name is required', 'error'); return; }
      if (!form.trainerName) { ctx.toast('Trainer is required', 'error'); return; }
      var pkg = PACKAGES[form.pkgIdx];
      var pkgRecord = {
        sessions: pkg.sessions,
        price: pkg.price,
        type: pkg.type,
        amountPaid: pkg.price,
        purchaseDate: form.datePurchased,
        paymentType: form.paymentType,
        source: 'manual'
      };
      var out;
      if (isEdit) {
        /* Editing - preserve any additional packages, replace just the first one's metadata */
        var existingPkgs = getPackages(existing);
        var updatedPkgs = [pkgRecord].concat(existingPkgs.slice(1));
        out = Object.assign({}, existing, {
          name: form.name.trim(),
          phone: form.phone,
          email: form.email,
          location: form.location,
          datePurchased: form.datePurchased,
          packages: updatedPkgs,
          paymentType: form.paymentType,
          teamMember: form.teamMember,
          membershipVerified: form.membershipVerified,
          membershipType: form.membershipType,
          membershipEnd: form.membershipEnd,
          trainerName: form.trainerName,
          referralSource: form.referralSource || null,
          parQ: Object.assign({}, parQ, { flagCount: parQFlagCount })
        });
        delete out.pkg;
        delete out.amountPaid;
        delete out.purchaseDate;
      } else {
        out = {
          id: uid(),
          name: form.name.trim(),
          phone: form.phone,
          email: form.email,
          location: form.location,
          datePurchased: form.datePurchased,
          packages: [pkgRecord],
          paymentType: form.paymentType,
          teamMember: form.teamMember,
          membershipVerified: form.membershipVerified,
          membershipType: form.membershipType,
          membershipEnd: form.membershipEnd,
          trainerName: form.trainerName,
          referralSource: form.referralSource || null,
          parQ: Object.assign({}, parQ, { flagCount: parQFlagCount }),
          sessions: []
        };
      }
      props.onCreate(out);
    }

    return e('div', { className: 'modal-overlay', onClick: props.onClose },
      e('div', { className: 'modal', onClick: function(ev){ ev.stopPropagation(); } },
        e('div', { className: 'modal-header' },
          e('h2', null, isEdit ? 'Edit Client' : 'New Client'),
          e('button', { className: 'modal-close', onClick: props.onClose }, '×')
        ),
        e('div', { className: 'modal-body' },
          e('div', { className: 'field' },
            e('label', null, 'Full Name'),
            e('input', { value: form.name, onChange: function(ev){ update('name', ev.target.value); }, placeholder: 'First Last' })
          ),
          e('div', { className: 'row2' },
            e('div', { className: 'field' },
              e('label', null, 'Phone'),
              e('input', { value: form.phone, onChange: function(ev){ update('phone', ev.target.value); }, type: 'tel', placeholder: '(512) 555-1234' })
            ),
            e('div', { className: 'field' },
              e('label', null, 'Email'),
              e('input', { value: form.email, onChange: function(ev){ update('email', ev.target.value); }, type: 'email', placeholder: 'name@example.com' })
            )
          ),
          e('div', { className: 'row2' },
            e('div', { className: 'field' },
              e('label', null, 'Location'),
              e('select', { value: form.location, onChange: function(ev){ update('location', ev.target.value); } },
                LOCATIONS.map(function(l){ return e('option', { key: l, value: l }, l); })

            ),
            e('div', { className: 'field' },

            )
          ),
          e('div', { className: 'field' },
            e('label', null, 'Package'),
            e('div', { className: 'package-grid' },
              PACKAGES.map(function(p, i){
                return e('button', {

                },
                  e('div', { className: 'sessions' }, p.sessions),
                  e('div', { className: 'label' }, p.sessions === 1 ? 'session' : 'sessions'),
                  e('div', { className: 'price' }, formatMoney(p.price))
