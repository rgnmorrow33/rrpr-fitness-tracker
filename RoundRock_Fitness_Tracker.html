  function LeadDetailModal(props){
    var ctx = props.ctx;
    var lead = props.lead;
    var statusTuple = useState(null);
    var pendingStatus = statusTuple[0]; var setPendingStatus = statusTuple[1];
    var reassignTuple = useState(false);
    var reassignOpen = reassignTuple[0]; var setReassignOpen = reassignTuple[1];
    var reassignToTuple = useState('');
    var reassignTo = reassignToTuple[0]; var setReassignTo = reassignToTuple[1];

    var validNext = queueValidNextStatuses(lead.status || 'waiting');
    var aged = isQueueLeadAged(lead);
    var ageDays = queueLeadAgeDays(lead);
    var isAdmin = ctx.session && ctx.session.role === 'admin';
    var canViewAuditHistory = ctx.can('canViewAuditHistory');

    var auditOpenTuple = useState(false);
    var auditOpen = auditOpenTuple[0]; var setAuditOpen = auditOpenTuple[1];

    function actionLabel(s){
      if (s === 'assigned') return 'Assign / Claim';
      if (s === 'contacted') return 'Mark Contacted';
      if (s === 'consult_scheduled') return 'Schedule Consult';
      if (s === 'converted') return 'Mark Converted';
      if (s === 'lost') return 'Mark Lost';
      if (s === 'waiting') return 'Reopen';
      return s;
    }
    function actionColor(s){
      if (s === 'lost') return 'btn-amber';
      if (s === 'converted') return 'btn-teal';
      if (s === 'waiting') return 'btn-outline';
      return 'btn-navy';
    }

    function handleAction(s){
      if (s === 'assigned') {
        /* Admin must assign to a trainer, not pick up the lead themselves.
           Open the trainer picker (same UI as Reassign) instead of self-claim. */
        if (isAdmin) {
          setReassignOpen(true);
          return;
        }
        ctx.claimQueueEntry(lead.id, (ctx.session && ctx.session.name) || 'admin', ctx.session.role);
        ctx.toast('Lead claimed \u2713');
        return;
      }
      if (s === 'waiting') {
        ctx.transitionQueueEntry(lead.id, 'waiting', { by: (ctx.session && ctx.session.name) || 'admin', note: 'Reopened' });
        ctx.toast('Lead reopened \u2713');
        return;
      }
      setPendingStatus(s);
    }

    function doReassign(){
      if (!reassignTo) return;
      /* Initial assignment vs reassignment of an already-assigned lead. */
      if (!lead.assignedTo) {
        ctx.claimQueueEntry(lead.id, reassignTo, 'admin');
        ctx.toast('Lead assigned to ' + reassignTo + ' \u2713');
      } else {
        ctx.reassignQueueEntry(lead.id, reassignTo, (ctx.session && ctx.session.name) || 'admin');

            (lead.phone ? lead.phone : 'No phone') +

  function TimeCardView(props){

  /* ============ ADMIN TIME VIEW (admin and trainer) ============ */
  function AdminTimeView(props){
    var ctx = props.ctx;
    var isAdmin = !!props.isAdmin;
    var trainerName = props.trainerName || (ctx.session && ctx.session.name) || null;

    var modalTuple = useState(null); /* null | 'new' | item-object-for-edit */
    var modal = modalTuple[0]; var setModal = modalTuple[1];

    /* Session detail target opened from a source-session link on an item. */
    var sourceDetailTuple = useState(null);
    var sourceDetail = sourceDetailTuple[0]; var setSourceDetail = sourceDetailTuple[1];

    /* Lookup helper: find { client, session } for a given session id by
       scanning ctx.clients. Returns null when not found (e.g., session
       was deleted). */
    function findSessionById(sessId){
      if (!sessId) return null;
      var allClients = ctx.allClients || ctx.clients || [];
      for (var i = 0; i < allClients.length; i++) {
        var c = allClients[i];
        var match = (c.sessions || []).find(function(s){ return s.id === sessId; });
        if (match) return { client: c, session: match };
      }
      return null;
    }

    var filterTuple = useState('all'); /* all | mine | <type> */
    var filter = filterTuple[0]; var setFilter = filterTuple[1];

    var rangeTuple = useState('30'); /* days back: 7 | 30 | 90 | all */
    var range = rangeTuple[0]; var setRange = rangeTuple[1];

    var allItems = ctx.items || [];
    var visibleItems = allItems.filter(function(it){
      if (!isAdmin && trainerName) {
        if (!(it.assignees || []).some(function(n){ return trainerNameMatches(trainerName, n); })) return false;
      }
      if (filter === 'mine' && trainerName) {
        if (!(it.assignees || []).some(function(n){ return trainerNameMatches(trainerName, n); })) return false;
      } else if (filter !== 'all' && filter !== 'mine') {
        if (it.type !== filter) return false;
      }
      if (range !== 'all') {
        var days = parseInt(range, 10);
        var cutoff = addDays(new Date(), -days);
        var cutoffYMD = toYMD(cutoff);
        if (it.date < cutoffYMD) return false;
      }
      return true;
    }).sort(function(a, b){
      if (a.date !== b.date) return a.date < b.date ? 1 : -1;
      return (a.timeIn || '') < (b.timeIn || '') ? 1 : -1;
    });

    var totalHours = visibleItems.reduce(function(s, it){ return s + (it.hours || 0); }, 0);

    return e('div', null,
      e('div', { className: 'section-head' },
        e('div', null,
          e('h2', null, 'Admin Time' + (isAdmin ? '' : ' (My Items)')),
          e('div', { className: 'meta' },
            visibleItems.length + ' item' + (visibleItems.length === 1 ? '' : 's') +
            ' \u00b7 ' + totalHours.toFixed(2) + ' total hours'
          )
        ),
        e('button', { className: 'btn btn-teal', onClick: function(){ setModal('new'); } }, '+ Log Admin Time')
      ),
      e('div', { style: { display: 'flex', gap: '8px', flexWrap: 'wrap', marginBottom: '14px' } },
        e('select', {
          value: filter,
          onChange: function(ev){ setFilter(ev.target.value); },
          style: { width: 'auto', minWidth: '160px' }
        },
          e('option', { value: 'all' }, 'All types'),
          isAdmin && trainerName && e('option', { value: 'mine' }, 'Only mine'),
          ITEM_TYPES.map(function(t){ return e('option', { key: t, value: t }, t); })
        ),
        e('select', {
          value: range,
          onChange: function(ev){ setRange(ev.target.value); },
          style: { width: 'auto', minWidth: '140px' }
        },
          e('option', { value: '7' }, 'Last 7 days'),
          e('option', { value: '30' }, 'Last 30 days'),
          e('option', { value: '90' }, 'Last 90 days'),
          e('option', { value: 'all' }, 'All time')
        )
      ),
      visibleItems.length === 0
        ? e('div', { className: 'empty' },
            e('div', { className: 'icon' }, '\ud83d\udcdd'),
            e('h3', null, 'No admin time logged'),
            e('div', null, 'Tap "+ Log Admin Time" to record meetings, planning, programming, or community events.')
          )
        : e('div', null,
            visibleItems.map(function(it){
              var canEdit = isAdmin || (trainerName && trainerNameMatches(trainerName, it.createdBy));
              return e('div', {
                key: it.id,
                onClick: canEdit ? function(){ setModal(it); } : null,
                style: {
                  background: '#fff',
                  border: '1.5px solid var(--border)',
                  borderRadius: '12px',
                  padding: '14px 16px',
                  marginBottom: '10px',
                  cursor: canEdit ? 'pointer' : 'default'
                }
              },
                e('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: '10px' } },
                  e('div', { style: { flex: 1 } },
                    e('div', { style: { fontWeight: 600, fontSize: '15px', color: 'var(--navy)' } }, it.title),
                    e('div', { style: { fontSize: '13px', color: 'var(--slate)', marginTop: '4px' } },
                      formatShort(parseYMD(it.date)) + ' \u00b7 ' +
                      formatTime12(it.timeIn) + ' \u2013 ' + formatTime12(it.timeOut) + ' \u00b7 ' +
                      (it.type === 'Other' ? (it.customType || 'Other') : it.type)
                    ),
                    e('div', { style: { fontSize: '12px', color: 'var(--slate-soft)', marginTop: '4px' } },
                      'Assignees: ' + (it.assignees || []).join(', ')
                    ),
                    it.sourceSessionId && (function(){
                      var src = findSessionById(it.sourceSessionId);
                      if (!src) {
                        return e('div', { style: { fontSize: '12px', color: 'var(--slate-soft)', marginTop: '4px', fontStyle: 'italic' } },
                          '↪ from a deleted session'

                      }
                      return e('a', {
                        href: '#',
                        onClick: function(ev){
                          ev.preventDefault();
                          ev.stopPropagation();
                          setSourceDetail({ session: src.session, client: src.client });
                        },
                        style: {
                          fontSize: '12px',
                          color: 'var(--teal)',
                          marginTop: '4px',
                          display: 'inline-block',
                          textDecoration: 'none'
                        }
                      }, '↪ from ' + src.client.name + ' · ' + formatShort(parseYMD(src.session.date)));
                    })(),
                    it.note && e('div', { style: { fontSize: '13px', color: 'var(--navy-soft)', marginTop: '6px', fontStyle: 'italic' } }, it.note)
                  ),
                  e('div', { style: { textAlign: 'right' } },
                    e('div', { style: { fontSize: '20px', fontWeight: 700, color: 'var(--teal)', fontFamily: "'DM Serif Display', serif" } },
                      (it.hours || 0).toFixed(2)
                    ),
                    e('div', { style: { fontSize: '11px', color: 'var(--slate-soft)', textTransform: 'uppercase', letterSpacing: '0.05em' } }, 'hours')
                  )
                )
              );
            })
          ),
      modal && e(LogAdminTimeModal, {
        ctx: ctx,
        item: modal === 'new' ? null : modal,
        defaultAssignee: trainerName,
        onClose: function(){ setModal(null); }
      }),
      sourceDetail && e(SessionDetailModal, {
        ctx: ctx,
        session: sourceDetail.session,
        client: sourceDetail.client,
        onClose: function(){ setSourceDetail(null); }
      })
    );
  }

  /* ============ SUB APPROVAL PANEL ============ */
  function SubApprovalPanel(props){
    var ctx = props.ctx;
    var actionTargetTuple = useState(null); /* { sub, cls, action } */
    var actionTarget = actionTargetTuple[0]; var setActionTarget = actionTargetTuple[1];

    /* Find all subs in 'claimed' state across all classes */
    var pending = [];
    ctx.classes.forEach(function(c){
      (c.subAssignments || []).forEach(function(s){
        if (subStatus(s) === 'claimed') {
          pending.push({ sub: s, cls: c });
        }
      });
    });
    pending.sort(function(a, b){
      if (a.sub.date !== b.sub.date) return a.sub.date < b.sub.date ? -1 : 1;
      return (a.cls.startTime || '') < (b.cls.startTime || '') ? -1 : 1;
    });

    /* Recently denied / open subs that came back into the pool, last 7 days */
    var recentDenials = [];
    var cutoff = toYMD(addDays(new Date(), -7));
    ctx.classes.forEach(function(c){
      (c.subAssignments || []).forEach(function(s){
        if (s.deniedAt && s.date >= cutoff) {
          recentDenials.push({ sub: s, cls: c });
        }
      });
    });

    return e('div', null,
      e('div', { className: 'section-head' },
        e('div', null,
          e('h2', null, 'Pending Sub Approvals'),

                e('div', { style: { flex: 1, minWidth: '200px' } },
                  e('div', { style: { fontWeight: 600, fontSize: '15px', color: 'var(--navy)' } }, c.name),
                  e('div', { style: { fontSize: '13px', color: 'var(--slate)', marginTop: '4px' } },
                    formatShort(parseYMD(s.date)) + ' \u00b7 ' + formatTime12(c.startTime)
                  ),
                  e('div', { style: { fontSize: '13px', color: 'var(--slate)', marginTop: '4px' } },
                    e('b', null, c.instructor), ' \u2192 ',

                  ),
                  s.note && e('div', { style: { fontSize: '13px', color: 'var(--navy-soft)', marginTop: '6px', fontStyle: 'italic' } }, '\u201c' + s.note + '\u201d')
                ),
                e('div', { style: { display: 'flex', gap: '6px' } },
                  e('button', {
                    className: 'btn btn-sm',
                    style: { background: 'var(--green-bg)', color: 'var(--green)', fontWeight: 600 },

                  }, '\u2713 Approve'),

            }

  /* ============ ADMIN CONTACTS VIEW (v2.4) ============
     Aggregate dashboard for member contacts. Shows team-wide volume by
     trainer, type, and topic; surfaces health-related contacts as the
     potential PT-referral channel. Designed for the Rick narrative:
     "we had 847 community contacts last quarter, 62 of which were
     medical-adjacent and led to 4 PT referrals." */
  function AdminContactsView(props){
    var ctx = props.ctx;
    var contacts = ctx.contacts || [];

    /* Window selector: this period (default), last 14 days, last 30 days, all-time */
    var windowTuple = useState('period');
    var windowSel = windowTuple[0]; var setWindow = windowTuple[1];

    var nowPeriod = payPeriodForDate(new Date());
    var period = payPeriodByIndex(nowPeriod.index);

    function inWindow(c){
      if (windowSel === 'period') {
        return c.date >= period.startYMD && c.date <= period.endYMD;
      }
      if (windowSel === '14d') {
        var cutoff14 = toYMD(addDays(new Date(), -14));
        return c.date >= cutoff14;
      }
      if (windowSel === '30d') {
        var cutoff30 = toYMD(addDays(new Date(), -30));
        return c.date >= cutoff30;
      }
      return true;
    }

    var filtered = contacts.filter(inWindow);

    /* Aggregations */
    var byTrainer = {};
    var byType = { quick: 0, substantive: 0, educational: 0 };
    var byTopic = {};
    CONTACT_TOPICS.forEach(function(t){ byTopic[t] = 0; });

    filtered.forEach(function(c){
      var t = c.trainerName || 'Unknown';
      if (!byTrainer[t]) byTrainer[t] = { total: 0, byType: { quick: 0, substantive: 0, educational: 0 }, byTopic: {} };
      byTrainer[t].total++;
      if (byType[c.type] != null) {
        byType[c.type]++;
        byTrainer[t].byType[c.type]++;
      }
      if (c.topic) {
        byTopic[c.topic] = (byTopic[c.topic] || 0) + 1;
        byTrainer[t].byTopic[c.topic] = (byTrainer[t].byTopic[c.topic] || 0) + 1;
      }
    });

    /* Health-related contacts surface separately - the Rick stat. */
    var healthRelated = filtered.filter(function(c){ return c.topic === 'health'; });

    /* Trainer rows sorted by total */
    var trainerRows = Object.keys(byTrainer).map(function(name){
      return Object.assign({ name: name }, byTrainer[name]);
    }).sort(function(a, b){ return b.total - a.total; });

    /* Estimated total team minutes & hours (uncapped here - this is the
       team-wide picture, not a payroll line). */
    var teamMinutes = filtered.reduce(function(sum, c){
      return sum + (CONTACT_TYPE_MINUTES[c.type] || 0);
    }, 0);
    var teamHours = Math.round((teamMinutes / 60) * 10) / 10;

    function exportContactsCSV(){
      var rows = [['Date','Trainer','Type','Topic','Note']];
      filtered.slice().sort(function(a,b){ return a.date < b.date ? 1 : -1; }).forEach(function(c){
        rows.push([
          c.date,
          c.trainerName || '',
          CONTACT_TYPE_LABEL[c.type] || c.type || '',
          CONTACT_TOPIC_LABEL[c.topic] || c.topic || '',
          c.note || ''
        ]);
      });
      var body = rows.map(function(r){
        return r.map(csvEscape).join(',');
      }).join('\n');
      var blob = new Blob([body], { type: 'text/csv;charset=utf-8;' });
      var a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'RRPR_contacts_' + windowSel + '_' + todayStr() + '.csv';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }

    return e('div', null,
      e('div', { className: 'section-head' },
        e('div', null,
          e('h2', null, 'Member Contacts'),
          e('div', { className: 'meta' },
            'Quick floor interactions logged by trainers. Counts toward auto-admin time. Use this to show team-wide community engagement.'
          )
        ),
        e('button', {
          className: 'btn btn-outline btn-sm',
          onClick: exportContactsCSV,
          disabled: filtered.length === 0
        }, '\u2b07 Export CSV')
      ),

      /* Window selector */
      e('div', { style: { display: 'flex', gap: '6px', marginBottom: '14px', flexWrap: 'wrap' } },
        [{ v: 'period', l: 'Current pay period' }, { v: '14d', l: 'Last 14 days' }, { v: '30d', l: 'Last 30 days' }, { v: 'all', l: 'All time' }].map(function(o){
          var active = windowSel === o.v;
          return e('button', {
            key: o.v,
            onClick: function(){ setWindow(o.v); },
            style: {
              padding: '8px 14px', borderRadius: '999px',
              border: '1.5px solid ' + (active ? 'var(--navy)' : 'var(--border)'),
              background: active ? 'var(--navy)' : '#fff',
              color: active ? '#fff' : 'var(--slate)',
              fontWeight: 600, fontSize: '13px', cursor: 'pointer'
            }
          }, o.l);
        })
      ),

      /* Top-line stats */
      e('div', {
        style: {
          display: 'grid',
          gridTemplateColumns: 'repeat(auto-fit, minmax(140px, 1fr))',
          gap: '10px',
          marginBottom: '18px'

      },
        e('div', { style: { background: 'var(--cream-2)', border: '1.5px solid var(--border)', borderRadius: '12px', padding: '14px' } },
          e('div', { style: { fontSize: '11px', textTransform: 'uppercase', letterSpacing: '0.06em', color: 'var(--slate-soft)', marginBottom: '6px', fontWeight: 700 } }, 'Total contacts'),
          e('div', { style: { fontFamily: "'DM Serif Display', serif", fontSize: '32px', color: 'var(--navy)', lineHeight: 1 } }, filtered.length)
        ),
        e('div', { style: { background: 'var(--cream-2)', border: '1.5px solid var(--border)', borderRadius: '12px', padding: '14px' } },
          e('div', { style: { fontSize: '11px', textTransform: 'uppercase', letterSpacing: '0.06em', color: 'var(--slate-soft)', marginBottom: '6px', fontWeight: 700 } }, 'Team time'),
          e('div', { style: { fontFamily: "'DM Serif Display', serif", fontSize: '32px', color: 'var(--navy)', lineHeight: 1 } }, teamHours.toFixed(1)),
          e('div', { style: { fontSize: '11px', color: 'var(--slate-soft)', marginTop: '2px' } }, 'estimated hr')
        ),
        e('div', { style: { background: '#fff', border: '1.5px solid var(--red)', borderRadius: '12px', padding: '14px' } },
          e('div', { style: { fontSize: '11px', textTransform: 'uppercase', letterSpacing: '0.06em', color: 'var(--red)', marginBottom: '6px', fontWeight: 700 } }, 'Health-related'),
          e('div', { style: { fontFamily: "'DM Serif Display', serif", fontSize: '32px', color: 'var(--red)', lineHeight: 1 } }, healthRelated.length),
          e('div', { style: { fontSize: '11px', color: 'var(--slate-soft)', marginTop: '2px' } }, 'potential PT referrals')
        ),
        e('div', { style: { background: 'var(--cream-2)', border: '1.5px solid var(--border)', borderRadius: '12px', padding: '14px' } },
          e('div', { style: { fontSize: '11px', textTransform: 'uppercase', letterSpacing: '0.06em', color: 'var(--slate-soft)', marginBottom: '6px', fontWeight: 700 } }, 'Active loggers'),
          e('div', { style: { fontFamily: "'DM Serif Display', serif", fontSize: '32px', color: 'var(--navy)', lineHeight: 1 } }, trainerRows.length)
        )
      ),

      /* By type */
      filtered.length > 0 && e('div', { className: 'audit-section' },
        e('h3', null, 'By type'),
        e('div', { style: { display: 'flex', gap: '8px', flexWrap: 'wrap', marginTop: '8px' } },
          CONTACT_TYPES.map(function(t){
            var n = byType[t] || 0;
            var pct = filtered.length > 0 ? Math.round((n / filtered.length) * 100) : 0;
            var color = CONTACT_TYPE_COLOR[t];
            return e('div', {
              key: t,
              style: {
                background: '#fff',
                border: '1.5px solid ' + color,
                borderRadius: '10px',
                padding: '10px 14px',
                flex: '1 1 140px'
              }
            },
              e('div', { style: { fontSize: '11px', color: color, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.05em' } }, CONTACT_TYPE_LABEL[t]),
              e('div', { style: { fontSize: '24px', color: 'var(--navy)', fontWeight: 700, marginTop: '4px' } }, n),
              e('div', { style: { fontSize: '11px', color: 'var(--slate-soft)' } }, pct + '%')
            );
          })
        )
      ),

      /* By topic */
      filtered.length > 0 && e('div', { className: 'audit-section' },
        e('h3', null, 'By topic'),
        e('div', { style: { display: 'flex', gap: '8px', flexWrap: 'wrap', marginTop: '8px' } },
          CONTACT_TOPICS.map(function(t){
            var n = byTopic[t] || 0;
            if (n === 0) return null;
            var pct = filtered.length > 0 ? Math.round((n / filtered.length) * 100) : 0;
            var color = CONTACT_TOPIC_COLOR[t];
            return e('div', {
              key: t,
              style: {
                background: '#fff',
                border: '1.5px solid ' + color,
                borderRadius: '10px',

              e('div', { style: { fontSize: '24px', color: 'var(--navy)', fontWeight: 700, marginTop: '4px' } }, n),

  /* ============ SCHEDULE VERSIONS VIEW (v2.6) ============
     Admin view for uploading new GX schedule rotations with effective dates.
     CSV paste-in or row-by-row builder. When a version's startDate hits,
     classes are reconciled: matched classes update, new classes get created,
     and dropped classes get seasonEnd set (preserved as historical, not
     deleted). */
  function ScheduleVersionsView(props){
    var ctx = props.ctx;
    var versions = ctx.scheduleVersions || [];

    var modeTuple = useState('list');  // 'list' | 'new' | 'detail'
    var mode = modeTuple[0]; var setMode = modeTuple[1];
    var detailIdTuple = useState(null);
    var detailId = detailIdTuple[0]; var setDetailId = detailIdTuple[1];

    var nameTuple = useState('');
    var name = nameTuple[0]; var setName = nameTuple[1];
    var startTuple = useState(todayStr());
    var startDate = startTuple[0]; var setStartDate = startTuple[1];
    var endTuple = useState('');
    var endDate = endTuple[0]; var setEndDate = endTuple[1];
    var pasteTuple = useState('');
    var paste = pasteTuple[0]; var setPaste = pasteTuple[1];
    var parsedTuple = useState([]);
    var parsedClasses = parsedTuple[0]; var setParsedClasses = parsedTuple[1];
    var parseErrorTuple = useState('');
    var parseError = parseErrorTuple[0]; var setParseError = parseErrorTuple[1];

    /* Find currently active version (today is in its window) */
    var todayY = todayStr();
    var activeVersion = versions.filter(function(v){
      if (!v.startDate || v.startDate > todayY) return false;
      if (v.endDate && v.endDate < todayY) return false;
      return v.activatedAt;
    }).sort(function(a, b){ return (a.startDate || '') < (b.startDate || '') ? 1 : -1; })[0];

    /* CSV parser. Expected columns: Class Name, Day, Time, Location, Instructor, Duration (min)
       Header row is required for clarity. Day accepts MO/TU/WE/TH/FR/SA/SU or
       full names. Time can be 24h ("09:30") or 12h ("9:30 AM"). */
    function parsePaste(text){
      var lines = text.split(/\r?\n/).map(function(l){ return l.trim(); }).filter(function(l){ return l.length > 0; });
      if (lines.length === 0) { setParsedClasses([]); setParseError(''); return; }

      function parseRow(line){
        /* Allow comma OR tab separation */
        var sep = line.indexOf('\t') !== -1 ? '\t' : ',';
        return line.split(sep).map(function(s){ return s.replace(/^"|"$/g, '').trim(); });
      }

      var header = parseRow(lines[0]).map(function(s){ return s.toLowerCase(); });
      function colIdx(names){
        for (var i = 0; i < names.length; i++) {
          var idx = header.indexOf(names[i]);
          if (idx !== -1) return idx;
        }
        return -1;
      }
      var idxName = colIdx(['class name', 'name', 'class']);
      var idxDay = colIdx(['day', 'day of week', 'dayofweek']);
      var idxTime = colIdx(['time', 'start time', 'start']);
      var idxLoc = colIdx(['location', 'site', 'facility']);
      var idxInstr = colIdx(['instructor', 'teacher', 'lead']);
      var idxDur = colIdx(['duration', 'duration (min)', 'minutes', 'mins']);

      if (idxName === -1 || idxDay === -1 || idxTime === -1) {
        setParseError('Missing required columns. Need at least: Class Name, Day, Time. Got: ' + header.join(', '));
        setParsedClasses([]);
        return;
      }

      function normDay(s){ return normalizeDow(s) || ''; }
      function normTime(s){
        var t = (s || '').trim();
        var ampm = t.match(/(AM|PM|am|pm)$/);
        var hhmm = t.replace(/(AM|PM|am|pm)/, '').trim();
        var parts = hhmm.split(':');
        var h = parseInt(parts[0], 10);
        var m = parseInt(parts[1] || '0', 10);
        if (isNaN(h)) return '';
        if (ampm) {
          var pm = ampm[1].toUpperCase() === 'PM';
          if (pm && h < 12) h += 12;
          if (!pm && h === 12) h = 0;
        }
        return (h < 10 ? '0' : '') + h + ':' + (m < 10 ? '0' : '') + m;
      }

      var rows = [];
      var errors = [];
      for (var i = 1; i < lines.length; i++) {
        var r = parseRow(lines[i]);
        var className = r[idxName] || '';
        var day = normDay(r[idxDay]);
        var time = normTime(r[idxTime]);
        var location = idxLoc !== -1 ? (r[idxLoc] || '') : '';
        var instructor = idxInstr !== -1 ? (r[idxInstr] || '') : '';
        var dur = idxDur !== -1 ? parseInt(r[idxDur], 10) : 60;
        if (!className) { errors.push('Row ' + (i+1) + ': missing class name'); continue; }
        if (!day) { errors.push('Row ' + (i+1) + ': invalid day'); continue; }
        if (!time) { errors.push('Row ' + (i+1) + ': invalid time'); continue; }
        rows.push({
          name: className,
          dayOfWeek: day,
          time: time,
          location: location,
          instructor: instructor,
          duration: isNaN(dur) ? 60 : dur
        });
      }
      setParsedClasses(rows);
      setParseError(errors.length > 0 ? (errors.length + ' issue(s): ' + errors.slice(0, 3).join('; ')) : '');
    }

    function saveNew(){
      if (!name.trim()) { ctx.toast && ctx.toast('Name is required', 'error'); return; }
      if (!startDate) { ctx.toast && ctx.toast('Start date is required', 'error'); return; }
      if (parsedClasses.length === 0) { ctx.toast && ctx.toast('Paste in at least one class', 'error'); return; }
      var v = {
        id: uid(),
        name: name.trim(),
        startDate: startDate,
        endDate: endDate || null,
        classes: parsedClasses.slice(),
        createdAt: new Date().toISOString(),
        activatedAt: null
      };
      ctx.saveScheduleVersion(v);
      ctx.toast && ctx.toast('Schedule version saved \u2713', 'success');
      /* If the start date is today or earlier, the auto-activation effect
         will pick it up. If it's in the future, it will activate when
         the date arrives. */
      setName(''); setStartDate(todayStr()); setEndDate(''); setPaste(''); setParsedClasses([]);
      setMode('list');
    }

    function activateNow(versionId){
      if (!window.confirm('Activate this schedule now? Classes will be reconciled: existing classes update, new classes appear, and dropped classes get marked as ended (historical data preserved).')) return;
      var result = ctx.activateScheduleVersion(versionId);
      if (result.ok) {
        ctx.toast && ctx.toast('Schedule activated. Classes reconciled.', 'success');
      } else {
        ctx.toast && ctx.toast('Could not activate: ' + result.reason, 'error');
      }
    }

    function deleteVersion(versionId){
      if (!window.confirm('Delete this schedule version? This does NOT roll back any class reconciliation that already happened.')) return;
      ctx.deleteScheduleVersion(versionId);
      ctx.toast && ctx.toast('Version deleted', 'info');
      if (detailId === versionId) { setDetailId(null); setMode('list'); }
    }

    if (mode === 'new') {
      return e('div', null,
        e('div', { className: 'section-head' },
          e('div', null,
            e('h2', null, 'New Schedule Version'),
            e('div', { className: 'meta' }, 'Upload a new rotation. It auto-activates on the start date.')
          ),
          e('button', { className: 'btn btn-outline btn-sm', onClick: function(){ setMode('list'); } }, '\u2190 Back')
        ),
        e('div', { style: { display: 'grid', gap: '12px', maxWidth: '600px' } },
          e('div', null,
            e('label', { style: { display: 'block', fontSize: '12px', color: 'var(--slate)', marginBottom: '4px', fontWeight: 600 } }, 'Schedule name'),
            e('input', {
              type: 'text', value: name,
              onChange: function(ev){ setName(ev.target.value); },
              placeholder: 'e.g. Summer 2026',
              style: { width: '100%', padding: '10px 12px', fontSize: '14px', borderRadius: '8px', border: '1.5px solid var(--border)' }
            })
          ),
          e('div', { style: { display: 'flex', gap: '12px', flexWrap: 'wrap' } },
            e('div', { style: { flex: 1, minWidth: '140px' } },
              e('label', { style: { display: 'block', fontSize: '12px', color: 'var(--slate)', marginBottom: '4px', fontWeight: 600 } }, 'Start date'),
              e('input', {
                type: 'date', value: startDate,
                onChange: function(ev){ setStartDate(ev.target.value); },
                style: { width: '100%', padding: '10px 12px', fontSize: '14px', borderRadius: '8px', border: '1.5px solid var(--border)' }
              })
            ),
            e('div', { style: { flex: 1, minWidth: '140px' } },
              e('label', { style: { display: 'block', fontSize: '12px', color: 'var(--slate)', marginBottom: '4px', fontWeight: 600 } }, 'End date (optional)'),
              e('input', {
                type: 'date', value: endDate,
                onChange: function(ev){ setEndDate(ev.target.value); },
                style: { width: '100%', padding: '10px 12px', fontSize: '14px', borderRadius: '8px', border: '1.5px solid var(--border)' }
              })
            )
          ),
          e('div', null,
            e('label', { style: { display: 'block', fontSize: '12px', color: 'var(--slate)', marginBottom: '4px', fontWeight: 600 } }, 'Paste schedule (CSV with header row)'),
            e('div', { style: { fontSize: '11px', color: 'var(--slate-soft)', marginBottom: '6px', lineHeight: 1.4 } },
              'Required columns: Class Name, Day, Time. Optional: Location, Instructor, Duration (min). Days accept MO/TU/WE/TH/FR/SA/SU or full names. Times accept 24h or 12h with AM/PM.'
            ),
            e('textarea', {
              value: paste,
              onChange: function(ev){ setPaste(ev.target.value); parsePaste(ev.target.value); },
              placeholder: 'Class Name,Day,Time,Location,Instructor,Duration\nMorning Yoga,MO,06:00,CMRC,Heather,60\nAqua Aerobics,WE,09:30,CMRC,Kathy,45',
              rows: 8,
              style: { width: '100%', padding: '10px 12px', fontSize: '13px', fontFamily: 'monospace', borderRadius: '8px', border: '1.5px solid var(--border)', resize: 'vertical' }
            })
          ),
          parseError && e('div', {
            style: { padding: '8px 12px', background: '#fee', color: 'var(--red)', borderRadius: '8px', fontSize: '13px', border: '1px solid var(--red)' }
          }, '\u26a0 ' + parseError),
          parsedClasses.length > 0 && e('div', null,
            e('div', { style: { fontSize: '13px', color: 'var(--navy)', fontWeight: 600, marginBottom: '6px' } },
              '\u2713 Parsed ' + parsedClasses.length + ' class' + (parsedClasses.length === 1 ? '' : 'es')
            ),
            e('div', { style: { background: 'var(--cream-2)', borderRadius: '8px', padding: '10px 12px', maxHeight: '180px', overflow: 'auto' } },
              parsedClasses.map(function(c, i){
                return e('div', { key: i, style: { fontSize: '12px', color: 'var(--slate)', padding: '3px 0' } },
                  c.name + ' \u00b7 ' + c.dayOfWeek + ' ' + c.time +
                  (c.location ? (' \u00b7 ' + c.location) : '') +
                  (c.instructor ? (' \u00b7 ' + c.instructor) : '')
                );
              })
            )
          ),
          e('div', { style: { display: 'flex', gap: '8px' } },
            e('button', { className: 'btn btn-primary', onClick: saveNew }, 'Save schedule version'),
            e('button', { className: 'btn btn-outline', onClick: function(){ setMode('list'); } }, 'Cancel')
          )
        )
      );
    }

    if (mode === 'detail' && detailId) {
      var v = versions.find(function(x){ return x.id === detailId; });
      if (!v) { setDetailId(null); setMode('list'); return null; }
      var status = !v.activatedAt ? 'pending' :
                   (v.endDate && v.endDate < todayY) ? 'past' :
                   (v.startDate > todayY) ? 'future' : 'active';
      return e('div', null,
        e('div', { className: 'section-head' },
          e('div', null,
            e('h2', null, v.name),
            e('div', { className: 'meta' },
              v.startDate + (v.endDate ? (' \u2192 ' + v.endDate) : ' \u2192 ongoing') +
              ' \u00b7 ' + (v.classes || []).length + ' classes \u00b7 status: ' + status
            )
          ),
          e('button', { className: 'btn btn-outline btn-sm', onClick: function(){ setDetailId(null); setMode('list'); } }, '\u2190 Back')
        ),
        e('div', { style: { display: 'flex', gap: '8px', marginBottom: '14px', flexWrap: 'wrap' } },
          !v.activatedAt && e('button', { className: 'btn btn-gold', onClick: function(){ activateNow(v.id); } }, 'Activate now'),
          e('button', { className: 'btn btn-ghost', style: { color: 'var(--red)' }, onClick: function(){ deleteVersion(v.id); } }, 'Delete')
        ),
        e('div', { className: 'audit-section' },
          e('h3', null, 'Classes in this version'),
          (v.classes || []).map(function(c, i){
            return e('div', {
              key: i,
              style: {
                padding: '10px 12px',
                background: i % 2 === 0 ? 'var(--cream-2)' : '#fff',
                borderBottom: '1px solid var(--border)',
                fontSize: '13px'
              }
            },
              e('div', { style: { fontWeight: 600, color: 'var(--navy)' } }, c.name),
              e('div', { style: { color: 'var(--slate)', fontSize: '12px', marginTop: '2px' } },
                c.dayOfWeek + ' ' + c.time +
                ' \u00b7 ' + (c.location || 'no location') +
                ' \u00b7 ' + (c.instructor || 'unassigned') +
                ' \u00b7 ' + c.duration + ' min'
              )
            );
          })
        )
      );
    }

    return e('div', null,
      e('div', { className: 'section-head' },
        e('div', null,
          e('h2', null, 'Schedule Versions'),
          e('div', { className: 'meta' },
            'Upload rotating GX schedules with effective dates. Auto-activates on start date.'
          )
        ),
        e('button', { className: 'btn btn-gold', onClick: function(){ setMode('new'); } }, '+ New Schedule')
      ),

      /* Server note banner */
      e('div', {
        style: {
          background: 'var(--cream-2)',
          border: '1px solid var(--gold)',
          borderRadius: '8px',
          padding: '10px 14px',
          marginBottom: '14px',
          fontSize: '12px',
          color: 'var(--slate)',
          lineHeight: 1.5
        }
      },
        e('strong', { style: { color: 'var(--gold)' } }, 'Note: '),
        'Schedule versions are stored on this iPad. Until the app is hosted on a server, each iPad maintains its own schedule. Upload the same version on every iPad until then.'
      ),

      /* Active version highlight */
      activeVersion && e('div', {
        style: {
          background: 'linear-gradient(135deg, var(--teal-bg), #fff)',
          border: '2px solid var(--teal)',
          borderRadius: '12px',
          padding: '12px 16px',
          marginBottom: '14px',
          cursor: 'pointer'
        },
        onClick: function(){ setDetailId(activeVersion.id); setMode('detail'); }
      },
        e('div', { style: { fontSize: '11px', color: 'var(--teal)', fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.06em', marginBottom: '4px' } },
          '\u25CF Active now'
        ),
        e('div', { style: { fontSize: '16px', color: 'var(--navy)', fontWeight: 700 } }, activeVersion.name),
        e('div', { style: { fontSize: '12px', color: 'var(--slate)', marginTop: '4px' } },
          activeVersion.startDate + (activeVersion.endDate ? (' \u2192 ' + activeVersion.endDate) : ' \u2192 ongoing') +
          ' \u00b7 ' + (activeVersion.classes || []).length + ' classes'
        )
      ),

      versions.length === 0 ? e('div', { className: 'empty', style: { padding: '40px 20px' } },
        e('div', { className: 'icon' }, '\ud83d\uddd3'),
        e('h3', null, 'No schedule versions yet'),
        e('div', null, 'Upload a CSV to get started. New rotations replace old ones automatically based on start date.')
      ) : e('div', null,
        versions.slice().sort(function(a, b){ return (a.startDate || '') < (b.startDate || '') ? 1 : -1; }).map(function(v){
          if (activeVersion && v.id === activeVersion.id) return null;
          var status = !v.activatedAt ? 'pending' :
                       (v.endDate && v.endDate < todayY) ? 'past' :
                       (v.startDate > todayY) ? 'future' : 'active';
          var statusColor = status === 'past' ? 'var(--slate-soft)' :

          return e('div', {

              background: '#fff',

            }

              e('div', { style: { flex: 1, minWidth: '160px' } },
                e('div', { style: { fontWeight: 700, color: 'var(--navy)' } }, v.name),
                e('div', { style: { fontSize: '12px', color: 'var(--slate)', marginTop: '4px' } },

                }

          );

      )

  }

  /* ============ CONSULT QUEUE VIEW (admin) ============ */
  function ConsultQueueView(props){
    var ctx = props.ctx;
    var newOpenTuple = useState(false);
    var newOpen = newOpenTuple[0]; var setNewOpen = newOpenTuple[1];
    var statusFilterTuple = useState('open');
    var statusFilter = statusFilterTuple[0]; var setStatusFilter = statusFilterTuple[1];
    var leadDetailTuple = useState(null);
    var leadDetail = leadDetailTuple[0]; var setLeadDetail = leadDetailTuple[1];

    var allEntries = ctx.queue || [];
    /* v2.3: filter pills now match the broader state machine. 'open' is a
       virtual filter spanning waiting/assigned/contacted/consult_scheduled. */
    function inFilter(q){
      if (statusFilter === 'open') {
        return q.status !== 'converted' && q.status !== 'lost';
      }
      if (statusFilter === 'aged') return isQueueLeadAged(q);
      return q.status === statusFilter;
    }

    var visibleEntries = allEntries.filter(inFilter)
      .sort(function(a, b){
        /* Aged first within open filter */
        if (statusFilter === 'open' || statusFilter === 'aged') {
          var aAged = isQueueLeadAged(a) ? 0 : 1;
          var bAged = isQueueLeadAged(b) ? 0 : 1;
          if (aAged !== bAged) return aAged - bAged;
        }
        return (a.createdAt || '') < (b.createdAt || '') ? 1 : -1;
      });

    var stats = computePipelineStats(allEntries);
    var counts = {
      open: stats.open,
      waiting: stats.byStatus.waiting,
      assigned: stats.byStatus.assigned,
      contacted: stats.byStatus.contacted,
      consult_scheduled: stats.byStatus.consult_scheduled,
      converted: stats.byStatus.converted,
      lost: stats.byStatus.lost,
      aged: stats.aged
    };

    return e('div', null,
      e('div', { className: 'section-head' },
        e('div', null,
          e('h2', null, 'Consult Queue'),
          e('div', { className: 'meta' },
            counts.open + ' open \u00b7 ' +
            counts.aged + ' aged \u00b7 ' +
            counts.converted + ' converted \u00b7 ' +
            counts.lost + ' lost'
          )
        ),
        e('button', { className: 'btn btn-gold', onClick: function(){ setNewOpen(true); } }, '+ Add Lead')
      ),
      e('div', { style: { display: 'flex', gap: '6px', marginBottom: '14px', flexWrap: 'wrap' } },
        [
          { id: 'open', label: 'Open' },
          { id: 'aged', label: 'Aged' },
          { id: 'waiting', label: 'Waiting' },
          { id: 'assigned', label: 'Assigned' },
          { id: 'contacted', label: 'Contacted' },
          { id: 'consult_scheduled', label: 'Scheduled' },
          { id: 'converted', label: 'Converted' },
          { id: 'lost', label: 'Lost' }
        ].map(function(s){
          var active = statusFilter === s.id;
          var ct = counts[s.id] || 0;
          return e('button', {
            key: s.id,
            onClick: function(){ setStatusFilter(s.id); },
            style: {
              padding: '8px 14px',
              borderRadius: '999px',
              border: '1.5px solid ' + (active ? 'var(--gold)' : 'var(--border)'),
              background: active ? 'var(--gold)' : '#fff',
              color: active ? '#fff' : 'var(--slate)',
              fontWeight: 600,
              fontSize: '13px'
            }
          }, s.label + ' (' + ct + ')');
        })
      ),
      visibleEntries.length === 0
        ? e('div', { className: 'empty' },
            e('div', { className: 'icon' }, '\ud83d\udce5'),
            e('h3', null, 'Nothing here'),
            e('div', null, 'No leads match this filter.')
          )
        : visibleEntries.map(function(q){
            var aged = isQueueLeadAged(q);
            return e('div', {
              key: q.id,
              onClick: function(){ setLeadDetail(q); },
              style: {
                background: '#fff',
                border: '1.5px solid ' + (aged ? 'var(--red)' : 'var(--border)'),
                borderRadius: '12px',
                padding: '14px 16px',
                marginBottom: '10px',
                cursor: 'pointer'
              }
            },

  /* ============ ADMIN: PIPELINE VIEW (v2.3) ============
     The forward-facing Rick stat: pipeline in present tense, not retrospective.
     Shows status counts, conversion rate by source, aging report, and recent
     activity. */
  function PipelineView(props){
    var ctx = props.ctx;
    var leadDetailTuple = useState(null);
    var leadDetail = leadDetailTuple[0]; var setLeadDetail = leadDetailTuple[1];

    var queue = ctx.queue || [];
    var stats = computePipelineStats(queue);
    var medianTtc = medianTimeToConversionDays(queue);

    /* Aged leads list - the action queue */
    var agedLeads = queue.filter(isQueueLeadAged)
      .sort(function(a, b){ return (a.followUpBy || '') < (b.followUpBy || '') ? -1 : 1; });

    /* Recent activity (last 14 days of converted/lost) */
    var recentCutoff = toYMD(addDays(new Date(), -14));
    var recentClosed = queue.filter(function(q){
      if (q.status !== 'converted' && q.status !== 'lost') return false;
      var when = q.convertedAt || q.lostAt || '';
      return when.substring(0, 10) >= recentCutoff;
    }).sort(function(a, b){
      var aw = a.convertedAt || a.lostAt || '';
      var bw = b.convertedAt || b.lostAt || '';
      return aw < bw ? 1 : -1;
    });

    /* Status flow visualization data */
    var statusFlowOrder = ['waiting', 'assigned', 'contacted', 'consult_scheduled', 'converted', 'lost'];
    var maxStatusCount = Math.max.apply(null, statusFlowOrder.map(function(s){ return stats.byStatus[s] || 0; })) || 1;

    /* Sources sorted by total volume desc, only showing sources with at least one entry */
    var activeSources = QUEUE_SOURCES
      .filter(function(s){ return stats.bySource[s] && stats.bySource[s].total > 0; })
      .sort(function(a, b){ return stats.bySource[b].total - stats.bySource[a].total; });

    return e('div', null,
      e('div', { className: 'section-head' },
        e('div', null,
          e('h2', null, 'Pipeline'),
          e('div', { className: 'meta' },
            stats.open + ' open \u00b7 ' +
            stats.aged + ' aged \u00b7 ' +
            stats.byStatus.converted + ' converted total \u00b7 ' +
            stats.byStatus.lost + ' lost total'
          )
        )
      ),

      /* Hero stat cards */
      e('div', { className: 'stats-grid', style: { marginBottom: '20px' } },
        e('div', { className: 'stat-card' },
          e('div', { className: 'label' }, 'Open Pipeline'),
          e('div', { className: 'value' }, stats.open)
        ),
        e('div', { className: 'stat-card' + (stats.aged > 0 ? ' warn' : '') },
          e('div', { className: 'label' }, 'Aged'),
          e('div', { className: 'value' }, stats.aged)
        ),
        e('div', { className: 'stat-card' },
          e('div', { className: 'label' }, 'Total Converted'),
          e('div', { className: 'value' }, stats.byStatus.converted)
        ),
        e('div', { className: 'stat-card' },
          e('div', { className: 'label' }, 'Median Days to Convert'),
          e('div', { className: 'value' }, medianTtc != null ? medianTtc.toFixed(1) : '\u2014')
        )
      ),

      /* Status flow */
      e('div', { className: 'audit-section', style: { marginBottom: '18px' } },
        e('h3', null, 'Pipeline by status'),
        e('div', { style: { fontSize: '12px', color: 'var(--slate-soft)', marginBottom: '12px' } },
          'Open stages on the left, closed outcomes on the right. Bars are scaled to the largest count.'
        ),
        statusFlowOrder.map(function(s){
          var ct = stats.byStatus[s] || 0;
          var pct = (ct / maxStatusCount) * 100;
          return e('div', {
            key: s,
            style: {
              display: 'grid',
              gridTemplateColumns: '180px 1fr 60px',
              gap: '12px',
              alignItems: 'center',
              padding: '6px 0'
            }
          },
            e('div', { style: { fontSize: '13px', color: 'var(--navy)', fontWeight: 600 } }, QUEUE_STATUS_LABEL[s]),
            e('div', { style: { background: 'var(--cream-2)', height: '20px', borderRadius: '4px', overflow: 'hidden', position: 'relative' } },
              e('div', {
                style: {
                  width: pct + '%',
                  height: '100%',
                  background: QUEUE_STATUS_COLOR[s],
                  transition: 'width 0.3s'
                }
              })
            ),
            e('div', { style: { fontSize: '14px', color: 'var(--slate)', fontWeight: 600, textAlign: 'right' } }, ct)
          );
        })
      ),

      /* Conversion by source */
      activeSources.length > 0 && e('div', { className: 'audit-section', style: { marginBottom: '18px' } },
        e('h3', null, 'Conversion rate by source'),
        e('div', { style: { fontSize: '12px', color: 'var(--slate-soft)', marginBottom: '12px' } },
          'Conversion rate = converted / (converted + lost). Open leads excluded from the rate.'
        ),
        activeSources.map(function(src){
          var bs = stats.bySource[src];
          var hasRate = bs.conversionRate != null;
          var rateColor = !hasRate ? 'var(--slate)' :
                          bs.conversionRate >= 60 ? 'var(--green)' :
                          bs.conversionRate >= 30 ? 'var(--amber)' :
                          'var(--red)';
          return e('div', {
            key: src,
            style: {
              display: 'grid',
              gridTemplateColumns: '180px 1fr 80px',
              gap: '12px',
              alignItems: 'center',
              padding: '8px 0',
              borderBottom: '1px solid var(--border)'
            }
          },
            e('div', null,
              e('div', { style: { fontSize: '13px', color: 'var(--navy)', fontWeight: 600 } }, QUEUE_SOURCE_LABEL[src]),
              e('div', { style: { fontSize: '11px', color: 'var(--slate-soft)' } },
                bs.total + ' total \u00b7 ' +
                bs.converted + ' converted \u00b7 ' +
                bs.lost + ' lost'
              )
            ),
            e('div', { style: { background: 'var(--cream-2)', height: '14px', borderRadius: '4px', overflow: 'hidden', position: 'relative' } },
              hasRate && e('div', {
                style: {
                  width: bs.conversionRate + '%',
                  height: '100%',
                  background: rateColor,
                  transition: 'width 0.3s'
                }
              })
            ),
            e('div', { style: { fontSize: '14px', color: rateColor, fontWeight: 700, textAlign: 'right' } },
              hasRate ? (bs.conversionRate + '%') : '\u2014'
            )
          );
        })
      ),

      /* Aged leads action queue */
      agedLeads.length > 0 && e('div', { className: 'audit-section', style: { marginBottom: '18px' } },
        e('h3', { style: { color: 'var(--red)' } }, '\u26a0 Aged leads (' + agedLeads.length + ')'),
        e('div', { style: { fontSize: '12px', color: 'var(--slate-soft)', marginBottom: '12px' } },
          'Past their follow-up date and not yet contacted or closed. Close them or reach out.'
        ),
        agedLeads.map(function(q){
          return e('div', {
            key: q.id,
            onClick: function(){ setLeadDetail(q); },
            style: {
              padding: '10px 12px',
              marginBottom: '6px',
              borderLeft: '3px solid var(--red)',
              background: 'var(--cream-2)',
              borderRadius: '4px',
              cursor: 'pointer',
              display: 'flex',
              justifyContent: 'space-between',
              alignItems: 'center',
              gap: '12px'
            }
          },
            e('div', { style: { flex: 1 } },
              e('div', { style: { display: 'flex', alignItems: 'center', gap: '8px', flexWrap: 'wrap' } },
                e('div', { style: { fontSize: '14px', color: 'var(--navy)', fontWeight: 600 } }, q.name),
                /* v2.5: assigned chip */
                q.assignedTo && (q.status === 'assigned' || q.status === 'contacted' || q.status === 'consult_scheduled') && e('span', {
                  style: {
                    fontSize: '10px', padding: '2px 8px', borderRadius: '999px',
                    background: 'var(--teal-bg)', color: 'var(--teal)',
                    fontWeight: 700, border: '1px solid var(--teal)'
                  }
                }, '\ud83d\udc64 ' + q.assignedTo)
              ),
              e('div', { style: { fontSize: '11px', color: 'var(--slate)', marginTop: '2px' } },
                QUEUE_STATUS_LABEL[q.status] +
                (q.assignedTo ? '' : ' \u00b7 unassigned') +
                ' \u00b7 follow up was ' + formatShort(parseYMD(q.followUpBy)) +
                ' \u00b7 ' + queueLeadAgeDays(q) + 'd old'
              )
            ),
            e('span', {
              style: {
                fontSize: '11px', padding: '3px 9px', borderRadius: '999px',
                background: 'var(--red)', color: '#fff', fontWeight: 700
              }
            }, 'AGED')
          );
        })
      ),

      /* Recent closed (last 14 days) */
      recentClosed.length > 0 && e('div', { className: 'audit-section' },
        e('h3', null, 'Recent activity (last 14 days)'),
        recentClosed.map(function(q){
          var converted = q.status === 'converted';
          var when = q.convertedAt || q.lostAt;
          var ttc = q.createdAt && when
            ? Math.floor((new Date(when) - new Date(q.createdAt)) / (1000 * 60 * 60 * 24))
            : null;
          return e('div', {
            key: q.id,
            onClick: function(){ setLeadDetail(q); },
            style: {
              padding: '10px 12px',
              marginBottom: '6px',
              borderLeft: '3px solid ' + QUEUE_STATUS_COLOR[q.status],
              background: 'var(--cream-2)',
              borderRadius: '4px',
              cursor: 'pointer'
            }

            e('div', { style: { fontSize: '14px', color: 'var(--navy)', fontWeight: 600 } }, q.name),
            e('div', { style: { fontSize: '11px', color: 'var(--slate)', marginTop: '2px' } },
              (converted ? '\u2713 Converted' : '\u2717 Lost' + (q.lostReason ? ' (' + QUEUE_LOST_REASON_LABEL[q.lostReason] + ')' : '')) +
              ' \u00b7 ' + (q.assignedTo || 'unassigned') +
              ' \u00b7 ' + formatShort(parseYMD(when.substring(0, 10))) +
              (ttc != null ? (' \u00b7 ' + ttc + 'd to close') : '') +
              ' \u00b7 source: ' + QUEUE_SOURCE_SHORT[q.source]
            )

      leadDetail && e(LeadDetailModal, {

        lead: (ctx.queue || []).find(function(x){ return x.id === leadDetail.id; }) || leadDetail,
        onClose: function(){ setLeadDetail(null); }
      })
    );
  }

  /* ============ TRAINER LEADS VIEW ============ */
  function TrainerLeadsView(props){
    var ctx = props.ctx;
    var trainerName = ctx.session.name;
    var newOpenTuple = useState(false);
    var newOpen = newOpenTuple[0]; var setNewOpen = newOpenTuple[1];
    /* v2.2: completing a WRO opens the existing PostWROModal */
    var wroOpenTuple = useState(null);
    var wroOpen = wroOpenTuple[0]; var setWroOpen = wroOpenTuple[1];
    /* v2.3: lead detail modal */
    var leadDetailTuple = useState(null);
    var leadDetail = leadDetailTuple[0]; var setLeadDetail = leadDetailTuple[1];

    var allEntries = ctx.queue || [];
    /* Waiting = unclaimed pool */
    var waiting = allEntries.filter(function(q){ return q.status === 'waiting'; })
      .sort(function(a, b){
        /* Aged first, then oldest */
        var aAged = isQueueLeadAged(a) ? 0 : 1;
        var bAged = isQueueLeadAged(b) ? 0 : 1;
        if (aAged !== bAged) return aAged - bAged;
        return (a.createdAt || '') < (b.createdAt || '') ? 1 : -1;
      });
    /* v2.3: "mine" now includes all open statuses (assigned, contacted,
       consult_scheduled), not just assigned. Sorted with aged at top. */
    var mine = allEntries.filter(function(q){
      var open = q.status === 'assigned' || q.status === 'contacted' || q.status === 'consult_scheduled';
      return open && trainerNameMatches(trainerName, q.assignedTo);
    }).sort(function(a, b){
      var aAged = isQueueLeadAged(a) ? 0 : 1;
      var bAged = isQueueLeadAged(b) ? 0 : 1;
      if (aAged !== bAged) return aAged - bAged;
      return (a.assignedAt || a.createdAt || '') < (b.assignedAt || b.createdAt || '') ? 1 : -1;
    });
    /* v2.3: closed status-recent-history (converted/lost in last 14 days) */
    var recentClosedCutoff = toYMD(addDays(new Date(), -14));
    var myRecentClosed = allEntries.filter(function(q){
      var closed = q.status === 'converted' || q.status === 'lost';
      if (!closed || !trainerNameMatches(trainerName, q.assignedTo)) return false;
      var when = q.convertedAt || q.lostAt;
      if (!when) return false;
      return when.substring(0, 10) >= recentClosedCutoff;
    }).sort(function(a, b){
      var aw = a.convertedAt || a.lostAt || '';
      var bw = b.convertedAt || b.lostAt || '';
      return aw < bw ? 1 : -1;
    });

    /* v2.2: Pending WROs - now in v2.5 split by state.
       - Available: nobody has claimed yet (state = pending)
       - In progress mine: I claimed it but haven't filled the post-form
       - In progress others: someone else has it (read-only)
       - Recently completed: my last 7 days */
    var allWros = ctx.wros || [];
    var openWros = allWros.filter(function(w){
      return w.preCompleted !== false && !w.postCompleted;
    });
    var availableWros = openWros.filter(function(w){ return wroState(w) === 'pending'; })
      .sort(function(a, b){
        if (a.date !== b.date) return a.date < b.date ? 1 : -1;
        return (a.createdAt || '') < (b.createdAt || '') ? 1 : -1;
      });
    var myInProgressWros = openWros.filter(function(w){
      return wroState(w) === 'in_progress' && trainerNameMatches(trainerName, w.claimedBy);
    }).sort(function(a, b){ return (a.claimedAt || '') < (b.claimedAt || '') ? 1 : -1; });
    var othersInProgressWros = openWros.filter(function(w){
      return wroState(w) === 'in_progress' && !trainerNameMatches(trainerName, w.claimedBy);
    }).sort(function(a, b){ return (a.claimedAt || '') < (b.claimedAt || '') ? 1 : -1; });
    var pendingWros = openWros;  // kept for the meta count

    var cutoffYMD = toYMD(addDays(new Date(), -7));
    var myRecentWros = allWros.filter(function(w){
      return w.postCompleted && w.post &&
        trainerNameMatches(trainerName, w.post.specialistName) &&
        (w.post.orientationDate || w.date) >= cutoffYMD;
    }).sort(function(a, b){
      var ad = a.post.orientationDate || a.date;
      var bd = b.post.orientationDate || b.date;
      return ad < bd ? 1 : -1;
    });

    function leadRow(q, opts){
      opts = opts || {};
      var aged = isQueueLeadAged(q);
      return e('div', {
        key: q.id,
        onClick: function(){ setLeadDetail(q); },
        style: {
          background: opts.background || '#fff',
          border: '1.5px solid ' + (aged ? 'var(--red)' : (opts.border || 'var(--gold)')),
          borderRadius: '12px',
          padding: '12px 14px',
          marginBottom: '8px',
          cursor: 'pointer'
        }
      },
        e('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: '10px' } },
          e('div', { style: { flex: 1 } },
            e('div', { style: { display: 'flex', alignItems: 'center', gap: '8px', flexWrap: 'wrap' } },
              e('div', { style: { fontWeight: 600, color: 'var(--navy)' } }, q.name),
              q.status && q.status !== 'waiting' && e('span', {
                style: {
                  fontSize: '10px', padding: '2px 8px', borderRadius: '999px',
                  background: QUEUE_STATUS_COLOR[q.status], color: '#fff',
                  fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.04em'
                }
              }, QUEUE_STATUS_LABEL[q.status]),
              /* v2.5: assigned-trainer chip when an active status owns it */
              q.assignedTo && (q.status === 'assigned' || q.status === 'contacted' || q.status === 'consult_scheduled') && e('span', {
                style: {
                  fontSize: '11px', padding: '2px 9px', borderRadius: '999px',
                  background: 'var(--teal-bg)', color: 'var(--teal)',
                  fontWeight: 700, border: '1.5px solid var(--teal)'
                }
              }, '\ud83d\udc64 ' + q.assignedTo),
              q.source && e('span', {
                style: {
                  fontSize: '10px', padding: '2px 8px', borderRadius: '999px',
                  background: 'var(--cream-2)', color: 'var(--slate)',
                  fontWeight: 600, border: '1px solid var(--border)'
                }
              }, QUEUE_SOURCE_SHORT[q.source] || q.source),
              aged && e('span', {
                style: {
                  fontSize: '10px', padding: '2px 8px', borderRadius: '999px',
                  background: 'var(--red)', color: '#fff', fontWeight: 700
                }
              }, '\u26a0 AGED')
            ),
            e('div', { style: { fontSize: '13px', color: 'var(--slate)', marginTop: '4px' } },
              (q.phone || 'No phone') + (q.email ? (' \u00b7 ' + q.email) : '')
            ),
            q.note && e('div', { style: { fontSize: '13px', color: 'var(--navy-soft)', marginTop: '6px', fontStyle: 'italic' } }, '\u201c' + q.note + '\u201d'),
            q.followUpBy && e('div', { style: { fontSize: '11px', color: aged ? 'var(--red)' : 'var(--slate-soft)', marginTop: '6px' } },
              'Follow up by ' + formatShort(parseYMD(q.followUpBy))
            ),
            q.packageInfo && e('div', { style: { fontSize: '12px', color: 'var(--teal)', marginTop: '4px', fontWeight: 600 } },
              'Pre-paid: ' + q.packageInfo.sessions + '-session ' + q.packageInfo.type
            )
          ),
          opts.button
        )
      );
    }

    return e('div', null,
      e('div', { className: 'section-head' },
        e('div', null,
          e('h2', null, 'Leads'),
          e('div', { className: 'meta' },
            waiting.length + ' queue waiting \u00b7 ' +
            mine.length + ' queue assigned to me \u00b7 ' +
            pendingWros.length + ' WRO' + (pendingWros.length === 1 ? '' : 's') + ' to complete'
          )
        ),
        e('button', { className: 'btn btn-gold', onClick: function(){ setNewOpen(true); } }, '+ Add Lead')
      ),

      /* My queue assignments (now spanning all open statuses) */
      mine.length > 0 && e('div', { style: { marginBottom: '20px' } },
        e('h3', { style: { fontSize: '15px', color: 'var(--slate)', marginBottom: '10px' } }, 'My pipeline (assigned, contacted, scheduled)'),
        mine.map(function(q){ return leadRow(q, { background: 'var(--teal-bg)', border: 'var(--teal)' }); })
      ),

      /* WROs - three sections by state (v2.5) */
      availableWros.length > 0 && e('div', { style: { marginBottom: '20px' } },
        e('h3', {
          style: {
            fontSize: '15px', color: 'var(--gold)', marginBottom: '4px',
            display: 'flex', alignItems: 'center', gap: '6px'
          }
        }, '\ud83c\udfcb\ufe0f WROs available to pick up (' + availableWros.length + ')'),
        e('div', { style: { fontSize: '12px', color: 'var(--slate-soft)', marginBottom: '10px', lineHeight: 1.4 } },
          'Members signed up; nobody has claimed these yet. Tap "I\'ll take it" to mark it as yours, or go straight to "Complete" if you\'re finishing the form right now.'
        ),
        availableWros.map(function(w){
          return e('div', {
            key: w.id,
            style: {
              background: '#fff',
              border: '1.5px solid var(--gold)',
              borderRadius: '12px',
              padding: '12px 14px',
              marginBottom: '8px'
            }
          },
            e('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: '10px', flexWrap: 'wrap' } },
              e('div', { style: { flex: 1, minWidth: '180px' } },
                e('div', { style: { display: 'flex', alignItems: 'center', gap: '8px', flexWrap: 'wrap' } },
                  e('div', { style: { fontWeight: 600, color: 'var(--navy)' } }, w.participantName),
                  e('span', {
                    style: {
                      fontSize: '10px', padding: '2px 8px', borderRadius: '999px',
                      background: WRO_STATE_COLOR.pending, color: '#fff',
                      fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.04em'
                    }
                  }, WRO_STATE_BADGE.pending)

  /* ============ ADMIN DASHBOARD ============ */
  function AdminDashboard(props){
    var ctx = props.ctx;
    /* v2.1: two-level navigation. domain is the top-level filter
       (pt | gx | both); tab is the specific view inside that domain.
       Default: PT domain, Today view (most common landing). */
    var domainTuple = useState('pt');
    var domain = domainTuple[0];
    var setDomain = domainTuple[1];

    var tabTuple = useState('today');
    var tab = tabTuple[0];
    var setTab = tabTuple[1];

    var clientDetailTuple = useState(null);
    var clientDetailId = clientDetailTuple[0];
    var setClientDetailId = clientDetailTuple[1];

    var classDetailTuple = useState(null);
    var classDetailId = classDetailTuple[0];
    var setClassDetailId = classDetailTuple[1];

    /* Tab definitions per domain. Order matters: first item in each list
       is the default landing tab when the domain switches. */
    var DOMAIN_TABS = {
      pt: [
        { id: 'today',     label: 'Today' },
        { id: 'pipeline',  label: 'Pipeline' },
        { id: 'clients',   label: 'PT Clients' },
        { id: 'queue',     label: 'Queue' },
        { id: 'wros',      label: 'WROs' },
        { id: 'referrals', label: 'Referrals' }
      ],
      gx: [
        { id: 'today',           label: 'Today' },
        { id: 'classes',         label: 'Group Classes' },
        { id: 'fill_rate',       label: 'Fill Rate' },
        { id: 'schedule_versions', label: 'Schedule Versions' },
        { id: 'sub_approvals',   label: 'Sub Approvals' }
      ],
      both: [
        { id: 'audit',       label: 'Audit' },
        { id: 'schedule',    label: 'Schedule' },
        { id: 'admin_time',  label: 'Admin Time' },
        { id: 'contacts',    label: 'Contacts' },
        { id: 'instructors', label: 'Manage Team' },
        { id: 'maintenance', label: 'Maintenance' }
      ]
    };

    /* When the domain changes, snap tab to the first valid tab for that
       domain unless the current tab is also valid in the new domain. */
    function changeDomain(newDomain){
      setDomain(newDomain);
      var validTabs = DOMAIN_TABS[newDomain].map(function(t){ return t.id; });
      if (validTabs.indexOf(tab) === -1) {
        setTab(validTabs[0]);
      }
    }

    if (clientDetailId) {
      var cl = ctx.clients.find(function(c){ return c.id === clientDetailId; });
      if (!cl) { setClientDetailId(null); return null; }
      return e(ClientDetail, { ctx: ctx, client: cl, onBack: function(){ setClientDetailId(null); }, canEdit: true });
    }
    if (classDetailId) {
      var clz = ctx.classes.find(function(c){ return c.id === classDetailId; });
      if (!clz) { setClassDetailId(null); return null; }
      return e(ClassDetail, { ctx: ctx, cls: clz, onBack: function(){ setClassDetailId(null); }, canEdit: true });
    }

    /* Stats */
    var totalSessions = ctx.clients.reduce(function(s,c){ return s + (c.sessions || []).length; }, 0);
    var revenue = ctx.clients.reduce(function(s,c){ return s + (c.amountPaid || 0); }, 0);
    var needRenewal = ctx.clients.filter(function(c){ return sessionsRemaining(c) <= 2; }).length;
    var gxSessions = ctx.classes.reduce(function(s,c){ return s + (c.attendance || []).length; }, 0);

    /* Today view in PT or GX domain shows a domain-filtered version. */
    var tabView;
    if (tab === 'today') {
      tabView = e(TodayView, {
        ctx: ctx,
        domain: domain,  /* v2.1: 'pt' hides GX, 'gx' hides PT, 'both' shows all */
        onClientClick: function(id){ setClientDetailId(id); },
        onClassClick: function(id){ setClassDetailId(id); }
      });
    } else if (tab === 'clients') {
      tabView = e(AdminAllClients, { ctx: ctx, onClientClick: function(id){ setClientDetailId(id); } });
    } else if (tab === 'classes') {
      tabView = e(AdminAllClasses, { ctx: ctx, onClassClick: function(id){ setClassDetailId(id); } });
    } else if (tab === 'wros') {
      tabView = e(AdminWROsView, { ctx: ctx });
    } else if (tab === 'referrals') {
      tabView = e(AdminReferralsView, { ctx: ctx, onClientClick: function(id){ setClientDetailId(id); } });
    } else if (tab === 'queue') {
      tabView = e(ConsultQueueView, { ctx: ctx });
    } else if (tab === 'pipeline') {
      tabView = e(PipelineView, { ctx: ctx });
    } else if (tab === 'admin_time') {
      tabView = e(AdminTimeView, { ctx: ctx, isAdmin: true });
    } else if (tab === 'contacts') {
      tabView = e(AdminContactsView, { ctx: ctx });
    } else if (tab === 'schedule_versions') {
      tabView = e(ScheduleVersionsView, { ctx: ctx });
    } else if (tab === 'sub_approvals') {
      tabView = e(SubApprovalPanel, { ctx: ctx });
    } else if (tab === 'audit') {
      tabView = e(AuditView, { ctx: ctx, onClassClick: function(id){ setClassDetailId(id); } });
    } else if (tab === 'schedule') {
      tabView = e(AdminScheduleView, {
        ctx: ctx,
        onOpenClient: function(id){ setClientDetailId(id); },
        onOpenClass: function(id){ setClassDetailId(id); }
      });
    } else if (tab === 'fill_rate') {
      tabView = e(AdminGXFillRate, { ctx: ctx });
    } else if (tab === 'maintenance') {
      tabView = e(AdminMaintenance, { ctx: ctx });
    } else {
      tabView = e(AdminManageInstructors, { ctx: ctx });
    }

    /* Badges */
    var queueWaiting = (ctx.queue || []).filter(function(q){ return q.status === 'waiting'; }).length;
    /* v2.3: aged leads bubble up as a pipeline alert */
    var agedLeadsCount = (ctx.queue || []).filter(isQueueLeadAged).length;
    var pendingSubCount = 0;
    ctx.classes.forEach(function(c){
      (c.subAssignments || []).forEach(function(s){ if (subStatus(s) === 'claimed') pendingSubCount++; });
    });
    var pendingReferrals = (ctx.referrals || []).filter(function(r){ return r.status === 'pending'; }).length;

    /* Per-tab badge counts */
    var TAB_BADGES = {
      queue: queueWaiting,
      pipeline: agedLeadsCount,
      sub_approvals: pendingSubCount,
      referrals: pendingReferrals
    };

    return e('div', null,
      e('div', { className: 'header' },
        e('div', null,
          e('h1', null, 'Front Desk'),
          e('div', { className: 'sub' }, 'Round Rock Parks and Recreation')
        ),
        e('div', { className: 'header-right' },
          e(NotificationsBell, { ctx: ctx }),
          e('span', { className: 'header-pill' }, 'Admin'),
          e('button', { className: 'logout-btn', onClick: function(){ ctx.setSession(null); } }, 'Sign out')
        )
      ),
      e('div', { className: 'content' },
        e('div', { className: 'stats-grid' },
          e('div', { className: 'stat-card' },
            e('div', { className: 'label' }, 'Total PT Clients'),
            e('div', { className: 'value' }, ctx.clients.length)
          ),
          e('div', { className: 'stat-card' },
            e('div', { className: 'label' }, 'PT Sessions Logged'),
            e('div', { className: 'value' }, totalSessions)
          ),
          e('div', { className: 'stat-card' },
            e('div', { className: 'label' }, 'Total Revenue'),
            e('div', { className: 'value' }, formatMoney(revenue))
          ),
          e('div', { className: 'stat-card' + (needRenewal > 0 ? ' warn' : '') },
            e('div', { className: 'label' }, 'Need Renewal'),
            e('div', { className: 'value' }, needRenewal)
          ),
          e('div', { className: 'stat-card' },
            e('div', { className: 'label' }, 'Group Classes'),
            e('div', { className: 'value' }, ctx.classes.length)
          ),
          e('div', { className: 'stat-card' },
            e('div', { className: 'label' }, 'GX Sessions Logged'),
            e('div', { className: 'value' }, gxSessions)
          )
        ),
        /* Top-level domain filter (PT / GX / Both) */
        e('div', {
          style: {
            display: 'flex',
            gap: '6px',
            padding: '4px',
            background: 'var(--cream-2)',
            borderRadius: '999px',
            marginBottom: '10px'
          }
        },
          [
            { id: 'pt',   label: '\ud83c\udfcb\ufe0f Personal Training', sub: 'PT clients, queue, referrals' },
            { id: 'gx',   label: '\ud83c\udfc3 Group Exercise',       sub: 'classes, sub approvals' },
            { id: 'both', label: '\u2696\ufe0f Operations',           sub: 'audit, admin time, WROs, team' }
          ].map(function(d){
            var active = domain === d.id;
            /* Aggregate badges for the domain */
            var badge = 0;
            if (d.id === 'pt') badge = queueWaiting + pendingReferrals + agedLeadsCount;
            if (d.id === 'gx') badge = pendingSubCount;
            return e('button', {
              key: d.id,
              type: 'button',
              onClick: function(){ changeDomain(d.id); },
              title: d.sub,
              style: {
                flex: 1,
                padding: '12px 14px',
                borderRadius: '999px',
                border: 'none',
                background: active ? 'var(--navy)' : 'transparent',
                color: active ? '#fff' : 'var(--slate)',
                fontWeight: active ? 700 : 600,
                fontSize: '14px',
                cursor: 'pointer',
                whiteSpace: 'nowrap',
                position: 'relative'
              }
            }, d.label + (badge > 0 ? ' (' + badge + ')' : ''));
          })
        ),
        /* Subtabs filtered to the active domain */
        e('div', { className: 'admin-tabs' },
          DOMAIN_TABS[domain].map(function(t){
            var badge = TAB_BADGES[t.id] || 0;
            return e('button', {
              key: t.id,
              className: tab === t.id ? 'active' : '',
              onClick: function(){ setTab(t.id); }
            }, t.label + (badge > 0 ? ' (' + badge + ')' : ''));
          })
        ),
        tabView
      )
    );
  }

  /* ============ ADMIN: All Clients ============ */
  function AdminAllClients(props){
    var ctx = props.ctx;
    var searchTuple = useState('');
    var search = searchTuple[0];
    var setSearch = searchTuple[1];

    var filterLocTuple = useState('');
    var filterLoc = filterLocTuple[0];
    var setFilterLoc = filterLocTuple[1];

    /* Package-alert filter: '' (off), 'last_session', or 'stale'. */
    var alertFilterTuple = useState('');
    var alertFilter = alertFilterTuple[0];
    var setAlertFilter = alertFilterTuple[1];

    var showDeletedTuple = useState(false);
    var showDeleted = showDeletedTuple[0];
    var setShowDeleted = showDeletedTuple[1];

    var newOpenTuple = useState(false);
    var newOpen = newOpenTuple[0];
    var setNewOpen = newOpenTuple[1];

    var importOpenTuple = useState(false);
    var importOpen = importOpenTuple[0];
    var setImportOpen = importOpenTuple[1];

    var canRestoreDeleted = ctx.can('canRestoreDeleted');

    /* Counts for the alert chips (computed against full client set) */
    var alertCounts = (function(){
      var ls = 0, st = 0;
      ctx.clients.forEach(function(c){
        var f = clientPackageFlags(c);
        if (f.lastSessionFlag) ls++;
        if (f.staleFlag) st++;
      });
      return { last_session: ls, stale: st };
    })();

    var sourceList = showDeleted ? (ctx.allClients || []) : ctx.clients;

        var f = clientPackageFlags(c);
        if (alertFilter === 'last_session' && !f.lastSessionFlag) return false;
        if (alertFilter === 'stale' && !f.staleFlag) return false;

    }).sort(function(a,b){ return a.name.localeCompare(b.name); });

    function exportPTClientsCSV(){
      var rows = [];

        'Client Name','Phone','Email','Active Package Type','Sessions Purchased',
