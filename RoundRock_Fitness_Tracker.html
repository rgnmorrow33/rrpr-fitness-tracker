  /* ============ CSV IMPORT MODAL (RecTrac → app) ============
     Two phases: paste/upload CSV, then map columns and confirm import. */
  function ImportClientsModal(props){
    var ctx = props.ctx;
    var stepTuple = useState(1); /* 1=paste, 2=map+preview, 3=done */
    var step = stepTuple[0];
    var setStep = stepTuple[1];

    var rawTuple = useState('');
    var raw = rawTuple[0];
    var setRaw = rawTuple[1];

    var parsedTuple = useState({ headers: [], rows: [] });
    var parsed = parsedTuple[0];
    var setParsed = parsedTuple[1];

    var mappingTuple = useState({});
    var mapping = mappingTuple[0];
    var setMapping = mappingTuple[1];

    /* Bulk-import uses the CMRC list as the agnostic default. Per the
       Phase 2 product call, bulk import is admin's responsibility - this
       picker stays facility-agnostic; per-row location still comes from
       the CSV. Drops the consultation row so the default fallback is
       always a real package. */
    var BULK_IMPORT_PACKAGES = PT_PACKAGES_BY_FACILITY.CMRC.filter(function(p){ return p.sessions > 0; });

    var defaultsTuple = useState({
      packageType: BULK_IMPORT_PACKAGES[3].type, /* 10-session most common */
      location: 'CMRC',
      trainerName: '' /* unassigned by default */
    });
    var defaults = defaultsTuple[0];
    var setDefaults = defaultsTuple[1];

    var selectedTuple = useState({});
    var selected = selectedTuple[0];
    var setSelected = selectedTuple[1];

    var resultTuple = useState({ created: 0, reups: 0, queued: 0, skipped: 0 });
    var result = resultTuple[0];
    var setResult = resultTuple[1];

    /* Robust CSV parser that handles quoted fields */
    function parseCSV(text){
      var lines = [];
      var cur = [];
      var field = '';
      var inQuotes = false;
      for (var i = 0; i < text.length; i++) {
        var ch = text[i];
        if (inQuotes) {
          if (ch === '"') {
            if (text[i+1] === '"') { field += '"'; i++; }
            else { inQuotes = false; }
          } else {
            field += ch;
          }
        } else {
          if (ch === '"') { inQuotes = true; }
          else if (ch === ',') { cur.push(field); field = ''; }
          else if (ch === '\n' || ch === '\r') {
            if (ch === '\r' && text[i+1] === '\n') i++;
            cur.push(field); field = '';
            if (cur.length > 1 || (cur.length === 1 && cur[0] !== '')) lines.push(cur);
            cur = [];
          } else { field += ch; }
        }
      }
      if (field !== '' || cur.length > 0) { cur.push(field); lines.push(cur); }
      return lines;
    }

    /* Try to auto-detect column mapping by header name patterns */
    function autoDetect(headers){
      var m = {};
      headers.forEach(function(h, idx){
        var lh = h.toLowerCase().trim();
        if (!m.firstName && /^first\s*name$|^fname$/.test(lh)) m.firstName = idx;
        if (!m.lastName && /^last\s*name$|^lname$|^surname$/.test(lh)) m.lastName = idx;
        if (!m.fullName && (/^full\s*name$|^name$|^customer\s*name$|^member\s*name$|^patron\s*name$|^pass\s*member$/.test(lh))) m.fullName = idx;
        if (!m.email && /e[\-\s]?mail/.test(lh)) m.email = idx;
        if (!m.phone && /^(phone|cell|mobile|telephone)$/.test(lh.replace(/[#:]/g,''))) m.phone = idx;
        if (!m.dob && /^(dob|date\s*of\s*birth|birth\s*date)$/.test(lh)) m.dob = idx;
        if (!m.purchaseDate && /(purchase|registr|trans|sale|sold|date)/.test(lh) && /(date)/.test(lh)) m.purchaseDate = idx;
        if (!m.packageDescription && /(package|product|item|description|class|activity|pass\s*code)/.test(lh)) m.packageDescription = idx;
        if (!m.amountPaid && /(amount|paid|total|fee|price|charge)/.test(lh)) m.amountPaid = idx;
        if (!m.location && /(facility|location|site|center|centre)/.test(lh)) m.location = idx;
        if (!m.membershipType && /membership/.test(lh)) m.membershipType = idx;
        /* v2: RecTrac ID is the unique customer key. RecTrac column is just 'ID'. */
        if (!m.rectracMemberId && /^(id|member\s*id|rectrac\s*id|customer\s*id|patron\s*id)$/.test(lh)) m.rectracMemberId = idx;
        /* v2: Tran Type drives Purchase vs Renewal routing */
        if (!m.tranType && /^tran\s*type$|^transaction\s*type$/.test(lh)) m.tranType = idx;
        /* v2: Trainer column (future RecTrac enhancement) */
        if (!m.trainerName && /^trainer$|^instructor$|^coach/.test(lh)) m.trainerName = idx;
      });
      return m;
    }

    function handleFileUpload(ev){
      var f = ev.target.files && ev.target.files[0];
      if (!f) return;
      var reader = new FileReader();
      reader.onload = function(e){ setRaw(e.target.result); };
      reader.readAsText(f);
    }

    function processRaw(){
      var trimmed = (raw || '').trim();
      if (!trimmed) { ctx.toast('Paste or upload a CSV first', 'error'); return; }
      var lines = parseCSV(trimmed);
      if (lines.length < 2) { ctx.toast('CSV needs a header row + at least one data row', 'error'); return; }
      var headers = lines[0].map(function(h){ return (h || '').trim(); });
      var rows = lines.slice(1).filter(function(r){ return r.some(function(c){ return (c || '').trim(); }); });
      setParsed({ headers: headers, rows: rows });
      var detected = autoDetect(headers);
      setMapping(detected);
      var sel = {};
      rows.forEach(function(_, i){ sel[i] = true; });
      setSelected(sel);
      setStep(2);
    }

    /* Detect package from a description string */
    function detectPackage(desc){
      if (!desc) return BULK_IMPORT_PACKAGES.find(function(p){ return p.type === defaults.packageType; });
      var lower = desc.toLowerCase();
      var sessionMatch = lower.match(/(\d+)\s*[-\s]*(session|pack|class|visit)/);
      if (sessionMatch) {
        var n = parseInt(sessionMatch[1], 10);
        var found = BULK_IMPORT_PACKAGES.find(function(p){ return p.sessions === n; });
        if (found) return found;
      }
      /* Single session fallback */
      if (/single|drop[-\s]?in|1[-\s]session/.test(lower)) {
        return BULK_IMPORT_PACKAGES.find(function(p){ return p.sessions === 1; });
      }
      return BULK_IMPORT_PACKAGES.find(function(p){ return p.type === defaults.packageType; });
    }

    function buildClientFromRow(row){
      function val(field){
        if (mapping[field] == null) return '';
        return (row[mapping[field]] || '').trim();
      }
      var name = val('fullName');
      if (!name) {
        var fn = val('firstName');
        var ln = val('lastName');
        name = (fn + ' ' + ln).trim();
      }
      if (!name) return null;

      var pkg = detectPackage(val('packageDescription'));
      var amountPaidStr = val('amountPaid').replace(/[^0-9.\-]/g, '');
      var amountPaid = amountPaidStr ? parseFloat(amountPaidStr) : pkg.price;
      var purchaseDate = val('purchaseDate') || todayStr();
      try {
        var d = new Date(purchaseDate);
        if (!isNaN(d.getTime())) purchaseDate = d.toISOString().substring(0, 10);
      } catch(_) {}

      var loc = val('location') || defaults.location;
      if (LOCATIONS.indexOf(loc) === -1) loc = defaults.location;

      /* v2: capture RecTrac ID (primary match key), Tran Type, and trainer
         if the export includes them. */
      var rectracId = val('rectracMemberId');
      var tranType = val('tranType').toLowerCase();
      var trainerFromRow = val('trainerName');

      return {
        id: uid(),
        name: name,
        email: val('email'),
        phone: val('phone'),
        dob: val('dob') || null,
        rectracMemberId: rectracId || null,
        tranType: tranType || null,
        location: loc,
        membershipType: val('membershipType') || 'Non-Member',
        trainerName: trainerFromRow || defaults.trainerName || ctx.trainers[0],
        packages: [{
          sessions: pkg.sessions,
          price: pkg.price,
          type: pkg.type,
          amountPaid: amountPaid,
          purchaseDate: purchaseDate,
          paymentType: 'Card',
          source: 'rectrac_import'
        }],
        paymentType: 'Card',
        sessions: [],
        source: 'rectrac_import',
        createdAt: new Date().toISOString()
      };
    }

    /* Returns { kind, candidate, match? } where kind is one of:
         'invalid'        - missing name, can't process
         'duplicate'      - already imported (matched client + matching purchase date + sessions)
         'reup'           - matched client; new package will be appended
         'new_to_queue'   - no match, Purchase tran type: route to consult queue (v2)
         'new_to_client'  - no match, no/unknown tran type: create client directly (legacy path) */
    function classifyRow(row){
      var candidate = buildClientFromRow(row);
      if (!candidate) return { kind: 'invalid' };
      var matchInfo = findMatchingClient(ctx.clients, candidate);
      if (matchInfo) {
        var newPkg = candidate.packages[0];
        var existingPkgs = getPackages(matchInfo.match);
        var alreadyImported = existingPkgs.some(function(p){
          return p.purchaseDate === newPkg.purchaseDate && p.sessions === newPkg.sessions;
        });
        if (alreadyImported) {
          return { kind: 'duplicate', candidate: candidate, match: matchInfo.match, matchInfo: matchInfo };
        }
        return { kind: 'reup', candidate: candidate, match: matchInfo.match, matchInfo: matchInfo };
      }
      /* No match. v2 routing: if Tran Type is 'Purchase' (or no Tran Type column
         was mapped, treat as Purchase by default), route to the consult queue
         instead of creating a client directly. Lets the team triage and assign
         a trainer before the client record exists. */
      var tt = (candidate.tranType || '').toLowerCase();
      if (tt === 'renewal') {
        /* Renewal with no match is weird - usually means the original is missing.
           Fall back to creating directly so the data isn't lost. */
        return { kind: 'new_to_client', candidate: candidate };
      }
      return { kind: 'new_to_queue', candidate: candidate };
    }

    function doImport(){
      var created = 0, reups = 0, queued = 0, skipped = 0;
      parsed.rows.forEach(function(row, i){
        if (!selected[i]) return;
        var classified = classifyRow(row);
        if (classified.kind === 'invalid' || classified.kind === 'duplicate') { skipped++; return; }
        if (classified.kind === 'reup') {
          var newPkg = Object.assign({}, classified.candidate.packages[0], { source: 'rectrac_reup' });
          var updated = addPackageToClient(classified.match, newPkg);
          /* Make sure the matched client has the RecTrac ID stored for next time */
          if (classified.candidate.rectracMemberId && !updated.rectracMemberId) {
            updated.rectracMemberId = classified.candidate.rectracMemberId;
          }
          var added = (updated.packages || [])[((updated.packages || []).length - 1)];
          ctx.auditedUpsertClient(updated, 'package_added', {
            target_id: added && added.id,
            before: null,
            after: added
          });
          reups++;
        } else if (classified.kind === 'new_to_queue') {
          /* v2: route new purchases into the consult queue */
          var c = classified.candidate;
          var pkg = c.packages[0];
          var queueEntry = {
            id: uid(),
            name: c.name,
            phone: c.phone || null,
            email: c.email || null,
            note: null,
            addedBy: (ctx.session && ctx.session.name) || 'admin',
            date: todayStr(),
            status: 'waiting',
            source: 'rectrac_import',
            rectracMemberId: c.rectracMemberId || null,
            packageInfo: {
              sessions: pkg.sessions,
              price: pkg.price,
              type: pkg.type,
              location: c.location
            },
            assignedTo: null,
            assignedAt: null,
            assignedBy: null,
            convertedToClientId: null,
            createdAt: new Date().toISOString()
          };
          ctx.upsertQueueEntry(queueEntry);
          queued++;
        } else {
          ctx.auditedUpsertClient(classified.candidate, 'create');
          created++;
        }
      });
      setResult({ created: created, reups: reups, queued: queued, skipped: skipped });
      setStep(3);
    }

    function reset(){
      setStep(1);
      setRaw('');
      setParsed({ headers: [], rows: [] });
      setMapping({});
      setSelected({});
      setResult({ created: 0, reups: 0, queued: 0, skipped: 0 });
    }

    var FIELD_DEFS = [
      { key: 'fullName', label: 'Full Name', help: 'OR first + last' },
      { key: 'firstName', label: 'First Name', help: 'used if no Full Name' },
      { key: 'lastName', label: 'Last Name', help: 'used if no Full Name' },
      { key: 'email', label: 'Email' },
      { key: 'phone', label: 'Phone' },
      { key: 'dob', label: 'Date of Birth' },
      { key: 'purchaseDate', label: 'Purchase Date' },
      { key: 'packageDescription', label: 'Package Description', help: 'sessions auto-detect' },
      { key: 'amountPaid', label: 'Amount Paid' },
      { key: 'location', label: 'Location', help: 'CMRC or Baca' },
      { key: 'membershipType', label: 'Membership Type' },
      /* v2 fields: ID is the primary match key, Tran Type drives queue routing */
      { key: 'rectracMemberId', label: 'RecTrac ID', help: 'unique customer key (column "ID")' },
      { key: 'tranType', label: 'Tran Type', help: 'Purchase or Renewal' },
      { key: 'trainerName', label: 'Trainer', help: 'if RecTrac captures it' }
    ];

    var body, footer;
    if (step === 1) {
      body = e('div', null,
        e('div', { className: 'banner teal', style: { marginBottom: '14px', fontSize: '13px' } },
          'Upload or paste a RecTrac registration export (CSV). New purchases route to the consult queue (admin assigns a trainer); renewals append to the matching client. Map RecTrac ID for highest-confidence matching. Duplicate rows are skipped.'
        ),
        e('div', { className: 'field' },
          e('label', null, 'Upload CSV file'),
          e('input', { type: 'file', accept: '.csv,text/csv', onChange: handleFileUpload })
        ),
        e('div', { style: { fontSize: '13px', color: 'var(--slate)', textAlign: 'center', margin: '14px 0' } }, 'or'),
        e('div', { className: 'field' },
          e('label', null, 'Paste CSV contents'),
          e('textarea', {
            value: raw,
            onChange: function(ev){ setRaw(ev.target.value); },
            placeholder: 'First Name,Last Name,Email,Purchase Date,Package,Amount Paid\nJane,Doe,jane@example.com,2026-04-22,10-Session PT Package,330',
            style: { minHeight: '160px', resize: 'vertical', fontFamily: 'monospace', fontSize: '12px' }
          })
        )
      );
      footer = e('div', { className: 'modal-footer' },
        e('button', { className: 'btn btn-ghost', onClick: props.onClose }, 'Cancel'),
        e('button', { className: 'btn btn-primary', onClick: processRaw }, 'Continue →')
      );
    } else if (step === 2) {
      var mappedRowCount = parsed.rows.length;
      var selectedCount = Object.keys(selected).filter(function(k){ return selected[k]; }).length;
      var hasNameMapping = mapping.fullName != null || (mapping.firstName != null && mapping.lastName != null);

      body = e('div', null,
        e('div', { className: 'banner ' + (hasNameMapping ? 'green' : 'amber'), style: { marginBottom: '14px', fontSize: '13px' } },
          hasNameMapping
            ? '✓ Name column detected. Review the column mapping below, then preview and import.'
            : '⚠ Map either Full Name OR both First Name + Last Name before importing.'
        ),

        e('h3', { style: { fontSize: '15px', marginBottom: '8px' } }, 'Column Mapping'),
        e('div', { style: { display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '8px', marginBottom: '16px' } },
          FIELD_DEFS.map(function(f){
            return e('div', { key: f.key, className: 'field', style: { marginBottom: 0 } },
              e('label', { style: { fontSize: '12px' } }, f.label, f.help && e('span', { style: { color: 'var(--slate-soft)', fontWeight: 400 } }, ' · ' + f.help)),
              e('select', {
                value: mapping[f.key] != null ? mapping[f.key] : '',

  /* ============ ADMIN: All Classes ============ */
  function AdminAllClasses(props){
    var ctx = props.ctx;
    var newOpenTuple = useState(false);
    var newOpen = newOpenTuple[0];
    var setNewOpen = newOpenTuple[1];

    /* v2.2: filter by season status */
    var filterTuple = useState('active'); /* active | upcoming | ended | all */
    var filter = filterTuple[0];
    var setFilter = filterTuple[1];

    var showDeletedTuple = useState(false);
    var showDeleted = showDeletedTuple[0];
    var setShowDeleted = showDeletedTuple[1];

    var canRestoreDeleted = ctx.can('canRestoreDeleted');

    var counts = { active: 0, upcoming: 0, ended: 0, all: ctx.classes.length };
    ctx.classes.forEach(function(c){
      counts[classSeasonStatus(c)]++;
    });
    var deletedClassesCount = (ctx.allClasses || []).filter(function(c){ return !!c.deleted_at; }).length;

    var sourceList = showDeleted ? (ctx.allClasses || []) : ctx.classes;
    var visible = sourceList
      .filter(function(c){
        if (showDeleted && !c.deleted_at) return false;
        return filter === 'all' || classSeasonStatus(c) === filter;
      })
      .slice()
      .sort(function(a,b){ return a.name.localeCompare(b.name); });

    function exportGXClassesCSV(){
      /* Default window is the current pay period. */
      var period = payPeriodForDate(new Date());
      var occs = occurrencesInWindow(ctx.classes, period.start, period.end, ctx.closures);
      var byClassId = {};
      occs.forEach(function(o){
        var id = o.cls.id;
        if (!byClassId[id]) byClassId[id] = { occCount: 0, attTotal: 0 };
        byClassId[id].occCount++;
        if (o.attendance) byClassId[id].attTotal += (o.attendance.headcount || 0);
      });
      var rows = [];
      rows.push([
        'Class Name','Day of Week','Time','Instructor','Capacity',
        'Occurrences in Window','Total Attendance','Avg Attendance','Fill Rate %'
      ].join(','));
      visible.forEach(function(c){
        var stats = byClassId[c.id] || { occCount: 0, attTotal: 0 };
        var avg = stats.occCount > 0 ? Math.round((stats.attTotal / stats.occCount) * 10) / 10 : '';
        var fill = '';
        if (c.capacity && stats.occCount > 0) {
          fill = Math.round((stats.attTotal / (c.capacity * stats.occCount)) * 100);
        }
        rows.push([
          csvEscape(c.name),
          csvEscape(c.dayOfWeek || ''),
          csvEscape(c.startTime || ''),
          csvEscape(c.instructor || ''),
          csvEscape(c.capacity == null ? '' : c.capacity),
          csvEscape(stats.occCount),
          csvEscape(stats.attTotal),
          csvEscape(avg === '' ? '' : avg),
          csvEscape(fill === '' ? '' : fill)
        ].join(','));
      });
      var blob = new Blob([rows.join('\n')], { type: 'text/csv;charset=utf-8' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = 'RRPR_gx_classes_' + todayStr().replace(/-/g, '') + '.csv';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(function(){ URL.revokeObjectURL(url); }, 500);
      ctx.toast('Classes CSV exported \u2713');
    }

    return e('div', null,
      e('div', { className: 'section-head' },
        e('div', null,
          e('h2', null, 'Group Classes'),
          e('div', { className: 'meta' },
            counts.active + ' active \u00b7 ' +
            counts.upcoming + ' upcoming \u00b7 ' +
            counts.ended + ' ended \u00b7 ' +
            counts.all + ' total'
          )
        ),
        e('div', { style: { display: 'flex', gap: '8px', flexWrap: 'wrap' } },
          e('button', { className: 'btn btn-ghost btn-sm', onClick: exportGXClassesCSV, title: 'Export classes with attendance/fill stats over the current pay period' }, '\u2193 Export CSV'),
          e('button', { className: 'btn btn-teal', onClick: function(){ setNewOpen(true); } }, '+ New Class')
        )
      ),
      e('div', { style: { display: 'flex', gap: '6px', marginBottom: '14px', flexWrap: 'wrap', alignItems: 'center' } },
        ['active', 'upcoming', 'ended', 'all'].map(function(s){
          var active = filter === s;
          var ct = counts[s];
          return e('button', {
            key: s,
            onClick: function(){ setFilter(s); },
            style: {
              padding: '8px 14px', borderRadius: '999px',
              border: '1.5px solid ' + (active ? 'var(--navy)' : 'var(--border)'),
              background: active ? 'var(--navy)' : '#fff',
              color: active ? '#fff' : 'var(--slate)',
              fontWeight: 600, fontSize: '13px',
              textTransform: 'capitalize'
            }
          }, s + ' (' + ct + ')');
        }),
        canRestoreDeleted && deletedClassesCount > 0 && e('button', {
          onClick: function(){ setShowDeleted(!showDeleted); },
          style: {
            padding: '8px 14px', borderRadius: '999px',
            border: '1.5px solid ' + (showDeleted ? 'var(--red)' : 'var(--border)'),
            background: showDeleted ? 'var(--red)' : '#fff',
            color: showDeleted ? '#fff' : 'var(--slate)',
            fontWeight: 600, fontSize: '13px',
            marginLeft: 'auto'
          }
        }, (showDeleted ? '✓ ' : '') + 'Show deleted (' + deletedClassesCount + ')')
      ),
      visible.length === 0
        ? e('div', { className: 'empty' },
            e('div', { className: 'icon' }, '\ud83c\udfc3'),
            e('h3', null, 'No ' + filter + ' classes'),
            e('div', null, filter === 'active' ? 'Tap "+ New Class" to set up the first class.' : 'No classes match this filter.')
          )
        : visible.map(function(c){
            return e(ClassCard, { key: c.id, cls: c, onClick: function(){ props.onClassClick(c.id); } });
          }),
      newOpen && e(NewClassModal, {
        ctx: ctx,
        onClose: function(){ setNewOpen(false); },
        onCreate: function(cl){
          ctx.auditedUpsertClass(cl, 'create');
          setNewOpen(false);
          ctx.toast('Class created \u2713');
        }
      })
    );
  }

  /* ============ ADMIN: GX Fill Rate analytics ============
     Sortable per-class fill stats over a configurable date window. Default
     window is last 90 days. Reuses occurrencesInWindow for occurrence count
     and attendance roll-up. */
  function AdminGXFillRate(props){
    var ctx = props.ctx;

    /* Window preset: last_30 | last_90 | pay_period | custom */
    var presetTuple = useState('last_90');
    var preset = presetTuple[0]; var setPreset = presetTuple[1];

    /* Custom range (only used when preset === 'custom'). */
    var todayY = todayStr();
    var customStartTuple = useState(toYMD(addDays(parseYMD(todayY), -90)));
    var customStart = customStartTuple[0]; var setCustomStart = customStartTuple[1];
    var customEndTuple = useState(todayY);
    var customEnd = customEndTuple[0]; var setCustomEnd = customEndTuple[1];

    var instructorTuple = useState('');
    var instructorFilter = instructorTuple[0]; var setInstructorFilter = instructorTuple[1];

    var sortColTuple = useState('fill');
    var sortCol = sortColTuple[0]; var setSortCol = sortColTuple[1];
    var sortDirTuple = useState('desc');
    var sortDir = sortDirTuple[0]; var setSortDir = sortDirTuple[1];

    /* Resolve window dates */
    var windowStart, windowEnd;
    if (preset === 'last_30') {
      windowEnd = parseYMD(todayY);
      windowStart = addDays(windowEnd, -30);
    } else if (preset === 'last_90') {
      windowEnd = parseYMD(todayY);
      windowStart = addDays(windowEnd, -90);
    } else if (preset === 'pay_period') {
      var period = payPeriodForDate(new Date());
      windowStart = period.start;
      windowEnd = period.end;
    } else {
      windowStart = parseYMD(customStart) || parseYMD(todayY);
      windowEnd = parseYMD(customEnd) || parseYMD(todayY);
    }

    var occs = occurrencesInWindow(ctx.classes, windowStart, windowEnd, ctx.closures);

    /* Roll up per class */
    var byClassId = {};
    occs.forEach(function(o){
      var id = o.cls.id;
      if (!byClassId[id]) byClassId[id] = { cls: o.cls, occCount: 0, attTotal: 0 };
      byClassId[id].occCount++;
      if (o.attendance) byClassId[id].attTotal += (o.attendance.headcount || 0);
    });

    var rows = Object.keys(byClassId).map(function(id){
      var rec = byClassId[id];
      var c = rec.cls;
      var avg = rec.occCount > 0 ? rec.attTotal / rec.occCount : 0;
      var fill = (c.capacity && rec.occCount > 0)
        ? (rec.attTotal / (c.capacity * rec.occCount)) * 100
        : null;
      return {
        cls: c,
        name: c.name,
        dayTime: (c.dayOfWeek || '') + (c.startTime ? (' ' + formatTime12(c.startTime)) : ''),
        instructor: c.instructor || '',
        capacity: c.capacity,
        occCount: rec.occCount,
        attTotal: rec.attTotal,
        avg: avg,
        fill: fill
      };
    });

    /* Instructor filter */
    if (instructorFilter) {
      rows = rows.filter(function(r){ return r.instructor === instructorFilter; });
    }

    /* Sort */
    rows.sort(function(a, b){
      var av, bv;
      if (sortCol === 'name') { av = a.name.toLowerCase(); bv = b.name.toLowerCase(); }
      else if (sortCol === 'instructor') { av = a.instructor.toLowerCase(); bv = b.instructor.toLowerCase(); }
      else if (sortCol === 'capacity') { av = a.capacity || 0; bv = b.capacity || 0; }
      else if (sortCol === 'occCount') { av = a.occCount; bv = b.occCount; }
      else if (sortCol === 'attTotal') { av = a.attTotal; bv = b.attTotal; }
      else if (sortCol === 'avg') { av = a.avg; bv = b.avg; }
      else { av = a.fill == null ? -1 : a.fill; bv = b.fill == null ? -1 : b.fill; }
      if (av < bv) return sortDir === 'asc' ? -1 : 1;
      if (av > bv) return sortDir === 'asc' ? 1 : -1;
      return 0;
    });

    function toggleSort(col){
      if (sortCol === col) {
        setSortDir(sortDir === 'asc' ? 'desc' : 'asc');
      } else {
        setSortCol(col);
        setSortDir(col === 'name' || col === 'instructor' ? 'asc' : 'desc');
      }
    }
    function sortIndicator(col){
      if (sortCol !== col) return '';
      return sortDir === 'asc' ? ' ▲' : ' ▼';
    }
    function fillCellStyle(fill){
      if (fill == null) return { color: 'var(--slate)' };
      if (fill >= 80) return { color: 'var(--green)', fontWeight: 700 };
      if (fill >= 25) return { color: 'var(--amber)', fontWeight: 700 };
      return { color: 'var(--red)', fontWeight: 700 };
    }

    /* Distinct instructors for the filter dropdown */
    var instructorOptions = (function(){
      var seen = {};
      ctx.classes.forEach(function(c){ if (c.instructor) seen[c.instructor] = true; });
      return Object.keys(seen).sort();
    })();

    var presets = [
      { id: 'last_30', label: 'Last 30 days' },
      { id: 'last_90', label: 'Last 90 days' },
      { id: 'pay_period', label: 'Current pay period' },
      { id: 'custom', label: 'Custom range' }
    ];

    return e('div', null,
      e('div', { className: 'section-head' },
        e('div', null,
          e('h2', null, 'Fill Rate'),
          e('div', { className: 'meta' },
            toYMD(windowStart) + ' to ' + toYMD(windowEnd) +
            ' · ' + occs.length + ' occurrence' + (occs.length === 1 ? '' : 's')
          )
        )
      ),
      /* Window preset chips */
      e('div', { style: { display: 'flex', gap: '6px', marginBottom: '10px', flexWrap: 'wrap' } },
        presets.map(function(p){
          var active = preset === p.id;
          return e('button', {
            key: p.id,
            onClick: function(){ setPreset(p.id); },
            style: {
              padding: '6px 12px', borderRadius: '999px',
              border: '1.5px solid ' + (active ? 'var(--navy)' : 'var(--border)'),
              background: active ? 'var(--navy)' : '#fff',
              color: active ? '#fff' : 'var(--slate)',
              fontWeight: 600, fontSize: '12px',
              cursor: 'pointer'
            }
          }, p.label);
        })
      ),
      /* Custom range inputs (only when preset is custom) */
      preset === 'custom' && e('div', { style: { display: 'flex', gap: '10px', marginBottom: '10px' } },
        e('div', { className: 'field', style: { flex: 1, marginBottom: 0 } },
          e('label', null, 'Start'),
          e('input', { type: 'date', value: customStart, onChange: function(ev){ setCustomStart(ev.target.value); } })
        ),
        e('div', { className: 'field', style: { flex: 1, marginBottom: 0 } },
          e('label', null, 'End'),
          e('input', { type: 'date', value: customEnd, onChange: function(ev){ setCustomEnd(ev.target.value); } })
        )
      ),
      /* Instructor filter */
      e('div', { style: { marginBottom: '14px' } },
        e('label', { style: { fontSize: '12px', color: 'var(--slate)', marginRight: '8px' } }, 'Instructor:'),
        e('select', {
          value: instructorFilter,
          onChange: function(ev){ setInstructorFilter(ev.target.value); },
          style: { maxWidth: '200px' }
        },
          e('option', { value: '' }, 'All instructors'),
          instructorOptions.map(function(t){ return e('option', { key: t, value: t }, t); })
        )
      ),
      /* Table */
      rows.length === 0
        ? e('div', { className: 'empty' },
            e('div', { className: 'icon' }, '🏃'),
            e('h3', null, 'No data'),
            e('div', null, 'No classes in this window. Try expanding the date range.')
          )
        : e('div', {
            style: {
              background: '#fff',
              border: '1.5px solid var(--border)',
              borderRadius: '12px',
              overflow: 'hidden',
              overflowX: 'auto'
            }
          },
            e('table', { style: { width: '100%', borderCollapse: 'collapse', fontSize: '13px' } },
              e('thead', null,
                e('tr', { style: { background: 'var(--cream-2)' } },
                  [
                    { id: 'name', label: 'Class' },
                    { id: 'dayTime', label: 'Day / Time' },
                    { id: 'instructor', label: 'Instructor' },
                    { id: 'capacity', label: 'Cap' },
                    { id: 'occCount', label: 'Occ' },
                    { id: 'attTotal', label: 'Total Att' },
                    { id: 'avg', label: 'Avg' },
                    { id: 'fill', label: 'Fill %' }
                  ].map(function(col){
                    return e('th', {
                      key: col.id,
                      onClick: col.id === 'dayTime' ? null : function(){ toggleSort(col.id); },
                      style: {
                        padding: '10px 12px',
                        textAlign: 'left',
                        fontSize: '11px',
                        textTransform: 'uppercase',
                        letterSpacing: '0.05em',
                        color: 'var(--slate)',
                        cursor: col.id === 'dayTime' ? 'default' : 'pointer',
                        whiteSpace: 'nowrap'
                      }
                    }, col.label + sortIndicator(col.id));
                  })
                )
              ),
              e('tbody', null,
                rows.map(function(r){
                  return e('tr', { key: r.cls.id, style: { borderTop: '1px solid var(--border)' } },
                    e('td', { style: { padding: '10px 12px', fontWeight: 600, color: 'var(--navy)' } }, r.name),
                    e('td', { style: { padding: '10px 12px', color: 'var(--slate)' } }, r.dayTime),
                    e('td', { style: { padding: '10px 12px', color: 'var(--slate)' } }, r.instructor || '—'),
                    e('td', { style: { padding: '10px 12px', color: 'var(--slate)', textAlign: 'right' } }, r.capacity == null ? '—' : r.capacity),
                    e('td', { style: { padding: '10px 12px', color: 'var(--slate)', textAlign: 'right' } }, r.occCount),
                    e('td', { style: { padding: '10px 12px', color: 'var(--slate)', textAlign: 'right' } }, r.attTotal),
                    e('td', { style: { padding: '10px 12px', color: 'var(--slate)', textAlign: 'right' } }, r.avg.toFixed(1)),
                    e('td', { style: Object.assign({ padding: '10px 12px', textAlign: 'right' }, fillCellStyle(r.fill)) },
                      r.fill == null ? '—' : (Math.round(r.fill) + '%')
                    )
                  );
                })
              )
            )
          )
    );
  }

  /* ============ AUDIT HISTORY MODAL ============
     Admin-only viewer for the audit_log array on a record. Reverse
     chronological. No filtering or pagination yet (cap at 100 entries
     prunes oldest, so the list always fits). */
  function AuditHistoryModal(props){
    var entries = (props.entries || []).slice().sort(function(a, b){
      return (a.ts || '') < (b.ts || '') ? 1 : -1;
    });
    var labelFor = props.label || 'Record';

    function formatChangeValue(v){
      if (v == null) return '∅';
      if (typeof v === 'string') return '"' + v + '"';
      if (typeof v === 'number' || typeof v === 'boolean') return String(v);
      try { return JSON.stringify(v); } catch(_){ return String(v); }
    }
    function actionLabel(action){
      var map = {
        create: 'Created',
        update: 'Updated',
        soft_delete: 'Soft-deleted',
        restore: 'Restored',
        hard_delete: 'Hard-deleted',
        package_added: 'Added package',
        package_edited: 'Edited package',
        package_deleted: 'Soft-deleted package',
        package_restored: 'Restored package',
        package_hard_deleted: 'Hard-deleted package',
        lead_status_change: 'Lead status changed',
        lead_reassigned: 'Lead reassigned',
        recovery_logged: 'Logged service recovery'
      };
      return map[action] || action;
    }

    return e('div', { className: 'modal-overlay' },
      e('div', { className: 'modal', onClick: function(ev){ ev.stopPropagation(); }, style: { maxWidth: '640px' } },
        e('div', { className: 'modal-header' },
          e('h2', null, 'Audit History'),
          e('button', { className: 'modal-close', onClick: props.onClose }, '×')
        ),
        e('div', { className: 'modal-body' },
          e('div', { style: { fontSize: '13px', color: 'var(--slate)', marginBottom: '14px' } },
            labelFor, ' · ', entries.length, ' ', entries.length === 1 ? 'entry' : 'entries',
            entries.length >= 100 ? ' (capped at 100, oldest pruned)' : ''
          ),
          entries.length === 0
            ? e('div', { className: 'empty' }, e('div', null, 'No audit entries yet.'))
            : entries.map(function(en){
                var ts = en.ts ? new Date(en.ts) : null;
                var dateStr = ts ? formatDate(ts.toISOString().slice(0, 10)) : '—';
                var timeStr = ts ? ts.toTimeString().slice(0, 5) : '';
                return e('div', {
                  key: en.id,
                  style: {
                    padding: '10px 12px',
                    marginBottom: '8px',
                    background: 'var(--cream-2)',
                    borderRadius: '8px',
                    borderLeft: '3px solid var(--teal)'
                  }
                },
                  e('div', { style: { fontSize: '12px', color: 'var(--slate)', marginBottom: '4px' } },
                    dateStr + ' · ' + timeStr + ' · ' + (en.actor || 'unknown')
                  ),
                  e('div', { style: { fontWeight: 600, fontSize: '14px', color: 'var(--navy)' } },
                    actionLabel(en.action)
                  ),
                  en.changes && Object.keys(en.changes).length > 0 && e('ul', {
                    style: { fontSize: '12px', color: 'var(--slate)', margin: '6px 0 0 0', paddingLeft: '18px' }
                  },
                    Object.keys(en.changes).map(function(k){
                      var ch = en.changes[k];
                      return e('li', { key: k },
                        k + ': ', formatChangeValue(ch.from), ' → ', formatChangeValue(ch.to)
                      );
                    })
                  ),
                  /* For specialized package actions, show the full before or
                     after snapshot since changes is null. */
                  !en.changes && en.after && (en.action === 'package_added' || en.action === 'create') && e('ul', {
                    style: { fontSize: '12px', color: 'var(--slate)', margin: '6px 0 0 0', paddingLeft: '18px' }
                  },
                    Object.keys(en.after).slice(0, 8).map(function(k){
                      if (AUDIT_NOISE_KEYS.indexOf(k) !== -1) return null;
                      return e('li', { key: k }, k + ': ', formatChangeValue(en.after[k]));
                    })
                  )
                );
              })
        ),
        e('div', { className: 'modal-footer' },
          e('button', { className: 'btn btn-primary', onClick: props.onClose }, 'Close')
        )
      )
    );
  }

  /* ============ EDIT TRAINER MODAL ============
     Admin-only: edit name, role, is_active on a trainers row. Local
     trainers state is just an array of name strings (see translate.trainers
     fromSupabase), so this modal reaches past the storage adapter to
     fetch and write the full row directly. Subscription handlers pick up
     the change and reload.

     Step 1: form. Step 2: cascade preview (only when name changed).
     Cascade walks every place a trainer name can appear:
       - clients.trainer_name (flat)
       - clients.sessions[].trainerName (jsonb nested)
       - classes.instructor (flat)
       - classes.sub_assignments[].{originalInstructor,subInstructor,claimedBy} (jsonb)
       - classes.attendance[].instructor (jsonb)
       - wros.trainer_name (flat)
       - member_contacts.trainer_name (flat)
       - admin_items.assignees[] (jsonb array of names)
       - referrals.referred_by (flat)
       - leads.assigned_to (flat)
       - leads.status_history[].by (jsonb)
       - schedule_versions.data.classes[].instructor (jsonb)

     Errors halt and surface inline. The trainer record itself is updated
     before cascades run, so a mid-cascade failure leaves the trainer
     renamed with stale references. Acceptable per spec; admin can retry. */
  function EditTrainerModal(props){
    var ctx = props.ctx;
    var originalName = props.trainerName;

    var loadingTuple = useState(true);
    var loading = loadingTuple[0]; var setLoading = loadingTuple[1];

    var originalTuple = useState(null);
    var original = originalTuple[0]; var setOriginal = originalTuple[1];

    var nameTuple = useState(originalName || '');
    var name = nameTuple[0]; var setName = nameTuple[1];
    var roleTuple = useState('trainer');
    var role = roleTuple[0]; var setRole = roleTuple[1];
    var roleTierTuple = useState('trainer');
    var roleTier = roleTierTuple[0]; var setRoleTier = roleTierTuple[1];
    var pinTuple = useState('');
    var pin = pinTuple[0]; var setPin = pinTuple[1];
    var pinSetTuple = useState(false); /* whether the row already has a pin */
    var pinAlreadySet = pinSetTuple[0]; var setPinAlreadySet = pinSetTuple[1];
    var activeTuple = useState(true);
    var active = activeTuple[0]; var setActive = activeTuple[1];

    /* 1 = form, 2 = cascade preview */
    var stepTuple = useState(1);
    var step = stepTuple[0]; var setStep = stepTuple[1];

    var errorTuple = useState(null);
    var error = errorTuple[0]; var setError = errorTuple[1];
    var savingTuple = useState(false);
    var saving = savingTuple[0]; var setSaving = savingTuple[1];

    var cascadeCountsTuple = useState(null);
    var cascadeCounts = cascadeCountsTuple[0]; var setCascadeCounts = cascadeCountsTuple[1];

    var auditOpenTuple = useState(false);
    var auditOpen = auditOpenTuple[0]; var setAuditOpen = auditOpenTuple[1];

    var canViewAuditHistory = ctx.can('canViewAuditHistory');

    /* Fetch the full trainer row on mount. */
    useEffect(function(){
      if (!supabaseClient) {
        setError('Supabase client not initialized');
        setLoading(false);
        return;
      }
      supabaseClient.from('trainers').select('*').eq('name', originalName).maybeSingle()
        .then(function(res){
          if (res.error) throw res.error;
          if (!res.data) throw new Error('Trainer not found in Supabase: ' + originalName);
          setOriginal(res.data);
          setName(res.data.name);
          setRole(res.data.role || 'trainer');
          setRoleTier(res.data.role_tier || 'trainer');
          setPinAlreadySet(!!res.data.pin);
          setActive(res.data.is_active !== false);
          setLoading(false);
        })
        .catch(function(err){
          setError(err && err.message ? err.message : 'Could not load trainer record');
          setLoading(false);
        });
    }, []);

    var nameTrimmed = (name || '').trim();
    var nameDifferent = !!original && nameTrimmed !== original.name;
    var pinTrimmed = (pin || '').trim();
    var pinDirty = !!original && pinTrimmed.length > 0;
    var dirty = !!original && (
      nameTrimmed !== original.name ||
      roleTier !== (original.role_tier || 'trainer') ||
      active !== (original.is_active !== false) ||
      pinDirty
    );

    function validateForm(){
      if (!nameTrimmed) return 'Name required';
      if (nameTrimmed.length > 80) return 'Name must be 80 characters or less';
      if (nameDifferent) {
        var conflict = (ctx.trainers || []).some(function(n){
          return n.toLowerCase() === nameTrimmed.toLowerCase() && n !== originalName;
        });
        if (conflict) return 'Another active trainer has this name';
      }
      if (pinTrimmed && !/^\d{4}$/.test(pinTrimmed)) return 'PIN must be 4 digits';
      return null;
    }

    /* Count records that reference oldName across every cascade target.
       Flat columns use head:true count queries. jsonb fields fetch and
       walk in JS (no efficient containment count without an RPC). */
    function countCascade(oldName){
      function flatCount(table, column){
        return supabaseClient.from(table).select('id', { count: 'exact', head: true }).eq(column, oldName)
          .then(function(res){ if (res.error) throw res.error; return res.count || 0; });
      }
      var classesJsonbP = supabaseClient.from('classes').select('id, sub_assignments, attendance')
        .then(function(res){
          if (res.error) throw res.error;
          var sub = 0, att = 0;
          (res.data || []).forEach(function(c){
            (c.sub_assignments || []).forEach(function(s){
              if (s && (s.originalInstructor === oldName || s.subInstructor === oldName || s.claimedBy === oldName)) sub++;
            });
            (c.attendance || []).forEach(function(a){
              if (a && a.instructor === oldName) att++;
            });
          });
          return { sub: sub, att: att };
        });
      var clientsSessionsP = supabaseClient.from('clients').select('id, sessions')
        .then(function(res){
          if (res.error) throw res.error;
          var n = 0;
          (res.data || []).forEach(function(client){
            (client.sessions || []).forEach(function(s){
              if (s && s.trainerName === oldName) n++;
            });
          });
          return n;
        });
      var adminItemsP = supabaseClient.from('admin_items').select('id, assignees')
        .then(function(res){
          if (res.error) throw res.error;
          var n = 0;
          (res.data || []).forEach(function(it){
            if ((it.assignees || []).indexOf(oldName) !== -1) n++;
          });
          return n;
        });
      var leadsHistoryP = supabaseClient.from('leads').select('id, status_history')
        .then(function(res){
          if (res.error) throw res.error;
          var n = 0;
          (res.data || []).forEach(function(l){
            (l.status_history || []).forEach(function(h){
              if (h && h.by === oldName) n++;
            });
          });
          return n;
        });
      var schedVersionsP = supabaseClient.from('schedule_versions').select('id, data')
        .then(function(res){
          if (res.error) throw res.error;
          var n = 0;
          (res.data || []).forEach(function(v){
            ((v.data && v.data.classes) || []).forEach(function(c){
              if (c && c.instructor === oldName) n++;
            });
          });
          return n;
        });

      return Promise.all([
        flatCount('classes', 'instructor'),
        flatCount('wros', 'trainer_name'),
        flatCount('member_contacts', 'trainer_name'),
        flatCount('referrals', 'referred_by'),
        flatCount('leads', 'assigned_to'),
        flatCount('clients', 'trainer_name'),
        classesJsonbP,
        clientsSessionsP,
        adminItemsP,
        leadsHistoryP,
        schedVersionsP
      ]).then(function(r){
        return {
          classesFlat:    r[0],
          wros:           r[1],
          memberContacts: r[2],
          referrals:      r[3],
          leadsFlat:      r[4],
          clientsFlat:    r[5],
          classesSub:     r[6].sub,
          classesAtt:     r[6].att,
          clientsSessions: r[7],
          adminItems:     r[8],
          leadsHistory:   r[9],
          schedVersions:  r[10]
        };
      });
    }

    /* Run the cascade. Sequential to keep error reporting clean and
       avoid hammering the realtime channel. Each step throws on error. */
    function runCascade(oldName, newName){
      var nowIso = new Date().toISOString();
      function flatUpdate(table, column){
        var patch = {};
        patch[column] = newName;
        patch.updated_at = nowIso;
        return supabaseClient.from(table).update(patch).eq(column, oldName)
          .then(function(res){ if (res.error) throw res.error; });
      }
      /* For classes the table doesn't have updated_at column for the
         flat instructor change either. Be defensive: if a table lacks
         updated_at, the update still goes through; Supabase ignores the
         column? No - it errors on unknown column. Safer to omit for
         tables we don't know have updated_at. classes does, per the
         existing translate.classes ['createdAt','created_at'] hint. */
      return flatUpdate('classes', 'instructor')
        .then(function(){ return flatUpdate('wros', 'trainer_name'); })
        .then(function(){ return flatUpdate('member_contacts', 'trainer_name'); })
        .then(function(){ return flatUpdate('referrals', 'referred_by'); })
        .then(function(){ return flatUpdate('leads', 'assigned_to'); })
        .then(function(){ return flatUpdate('clients', 'trainer_name'); })
        .then(function(){
          /* classes jsonb: rewrite sub_assignments and attendance per row */
          return supabaseClient.from('classes').select('id, sub_assignments, attendance')
            .then(function(res){
              if (res.error) throw res.error;
              var dirty = (res.data || []).filter(function(c){
                var hitSub = (c.sub_assignments || []).some(function(s){
                  return s && (s.originalInstructor === oldName || s.subInstructor === oldName || s.claimedBy === oldName);
                });
                var hitAtt = (c.attendance || []).some(function(a){ return a && a.instructor === oldName; });
                return hitSub || hitAtt;
              });
              if (dirty.length === 0) return;
              var chain = Promise.resolve();
              dirty.forEach(function(c){
                chain = chain.then(function(){
                  var newSub = (c.sub_assignments || []).map(function(s){
                    if (!s) return s;
                    var copy = Object.assign({}, s);
                    if (copy.originalInstructor === oldName) copy.originalInstructor = newName;
                    if (copy.subInstructor === oldName) copy.subInstructor = newName;
                    if (copy.claimedBy === oldName) copy.claimedBy = newName;
                    return copy;
                  });
                  var newAtt = (c.attendance || []).map(function(a){
                    if (!a) return a;
                    var copy = Object.assign({}, a);
                    if (copy.instructor === oldName) copy.instructor = newName;
                    return copy;
                  });
                  return supabaseClient.from('classes')
                    .update({ sub_assignments: newSub, attendance: newAtt, updated_at: nowIso })
                    .eq('id', c.id)
                    .then(function(r){ if (r.error) throw r.error; });
                });
              });
              return chain;
            });
        })
        .then(function(){
          /* clients sessions jsonb */
          return supabaseClient.from('clients').select('id, sessions')
            .then(function(res){
              if (res.error) throw res.error;
              var dirty = (res.data || []).filter(function(client){
                return (client.sessions || []).some(function(s){ return s && s.trainerName === oldName; });
              });
              if (dirty.length === 0) return;
              var chain = Promise.resolve();
              dirty.forEach(function(client){
                chain = chain.then(function(){
                  var newSessions = (client.sessions || []).map(function(s){
                    if (!s || s.trainerName !== oldName) return s;
                    return Object.assign({}, s, { trainerName: newName });
                  });
                  return supabaseClient.from('clients')
                    .update({ sessions: newSessions, updated_at: nowIso })
                    .eq('id', client.id)
                    .then(function(r){ if (r.error) throw r.error; });
                });
              });
              return chain;
            });
        })
        .then(function(){
          /* admin_items assignees */
          return supabaseClient.from('admin_items').select('id, assignees')
            .then(function(res){
              if (res.error) throw res.error;
              var dirty = (res.data || []).filter(function(it){
                return (it.assignees || []).indexOf(oldName) !== -1;
              });
              if (dirty.length === 0) return;
              var chain = Promise.resolve();
              dirty.forEach(function(it){
                chain = chain.then(function(){
                  var newAssignees = (it.assignees || []).map(function(n){
                    return n === oldName ? newName : n;
                  });
                  return supabaseClient.from('admin_items')
                    .update({ assignees: newAssignees, updated_at: nowIso })
                    .eq('id', it.id)
                    .then(function(r){ if (r.error) throw r.error; });
                });
              });
              return chain;
            });
        })
        .then(function(){
          /* leads status_history */
          return supabaseClient.from('leads').select('id, status_history')
            .then(function(res){
              if (res.error) throw res.error;
              var dirty = (res.data || []).filter(function(l){
                return (l.status_history || []).some(function(h){ return h && h.by === oldName; });
              });
              if (dirty.length === 0) return;
              var chain = Promise.resolve();
              dirty.forEach(function(l){
                chain = chain.then(function(){
                  var newHistory = (l.status_history || []).map(function(h){
                    if (!h || h.by !== oldName) return h;
                    return Object.assign({}, h, { by: newName });
                  });
                  return supabaseClient.from('leads')
                    .update({ status_history: newHistory, updated_at: nowIso })
                    .eq('id', l.id)
                    .then(function(r){ if (r.error) throw r.error; });
                });
              });
              return chain;
            });
        })
        .then(function(){
          /* schedule_versions data.classes[].instructor */
          return supabaseClient.from('schedule_versions').select('id, data')
            .then(function(res){
              if (res.error) throw res.error;
              var dirty = (res.data || []).filter(function(v){
                return ((v.data && v.data.classes) || []).some(function(c){ return c && c.instructor === oldName; });
              });
              if (dirty.length === 0) return;
              var chain = Promise.resolve();
              dirty.forEach(function(v){
                chain = chain.then(function(){
                  var newData = Object.assign({}, v.data || {});
                  newData.classes = (newData.classes || []).map(function(c){
                    if (!c || c.instructor !== oldName) return c;
                    return Object.assign({}, c, { instructor: newName });
                  });
                  return supabaseClient.from('schedule_versions')
                    .update({ data: newData, updated_at: nowIso })
                    .eq('id', v.id)
                    .then(function(r){ if (r.error) throw r.error; });
                });
              });
              return chain;
            });
        });
    }

    function writeTrainerRecord(){
      var nowIso = new Date().toISOString();
      /* Legacy `role` column kept in sync with `role_tier` so older code
         paths reading the old column don't drift. */
      var update = {
        name: nameTrimmed,
        role: roleTier,
        role_tier: roleTier,
        is_active: active,
        updated_at: nowIso
      };
      /* Only write pin when admin entered a new one. Otherwise leave the
         existing value untouched. Plaintext for now per the project posture. */
      if (pinTrimmed) update.pin = pinTrimmed;
      if (nameDifferent) {
        var prev = original.previous_names || [];
        update.previous_names = prev.concat([{ name: original.name, renamed_at: nowIso }]);
      }
      /* Append an audit_log entry alongside the update. The diff is computed
         over the original Supabase row (loaded into `original`) and the
         in-flight `update` patch projected onto it. */
      var afterShape = Object.assign({}, original, update);
      var stamped = appendAuditEntry(
        { audit_log: original.audit_log || [] },
        ctx.session,
        'update',
        {
          entity_type: 'trainer',
          target_id: original.id,
          before: { name: original.name, role_tier: original.role_tier, is_active: original.is_active, pin: original.pin ? '••••' : null },
          after:  { name: afterShape.name, role_tier: afterShape.role_tier, is_active: afterShape.is_active, pin: pinTrimmed ? '••••' : (original.pin ? '••••' : null) }
        }
      );
      update.audit_log = stamped.audit_log;
      return supabaseClient.from('trainers').update(update).eq('id', original.id)
        .then(function(res){ if (res.error) throw res.error; });
    }

    function softDeleteTrainerRecord(){
      var nowIso = new Date().toISOString();
      var actor = (ctx.currentUserName && ctx.currentUserName()) || 'unknown';
      var stamped = appendAuditEntry(
        { audit_log: original.audit_log || [] },
        ctx.session,
        'soft_delete',
        {
          entity_type: 'trainer',
          target_id: original.id,
          before: { name: original.name, is_active: original.is_active, deleted_at: original.deleted_at || null },
          after:  { name: original.name, is_active: original.is_active, deleted_at: nowIso }
        }
      );
      return supabaseClient.from('trainers').update({
        deleted_at: nowIso,
        deleted_by: actor,
        audit_log: stamped.audit_log,
        updated_at: nowIso
      }).eq('id', original.id).then(function(res){ if (res.error) throw res.error; });
    }

    function handleSaveStep1(){
      var err = validateForm();
      if (err) { setError(err); return; }
      setError(null);
      if (!nameDifferent) {
        /* Direct write, skip preview */
        setSaving(true);
        writeTrainerRecord()
          .then(function(){
            setSaving(false);
            ctx.toast('Updated ' + nameTrimmed);
            props.onClose();
          })
          .catch(function(err){
            setSaving(false);
            setError(err && err.message ? err.message : 'Save failed');
          });
        return;
      }
      /* Name changed: count cascade, go to preview. */
      setSaving(true);
      countCascade(original.name)
        .then(function(counts){
          setCascadeCounts(counts);
          setStep(2);
          setSaving(false);
        })
        .catch(function(err){
          setSaving(false);
          setError(err && err.message ? err.message : 'Could not count cascade impact');
        });
    }

    function handleConfirmRename(){
      setError(null);
      setSaving(true);
      writeTrainerRecord()
        .then(function(){ return runCascade(original.name, nameTrimmed); })
        .then(function(){
          setSaving(false);
          ctx.toast('Renamed to ' + nameTrimmed);
          props.onClose();
        })
        .catch(function(err){
          setSaving(false);
          setError(err && err.message ? err.message : 'Cascade failed - trainer record may be updated but references are stale. Retry from this modal.');
        });
    }

    var cascadeRows = [];
    if (cascadeCounts) {
      var rows = [
        ['classes (instructor)', cascadeCounts.classesFlat],
        ['class sub assignments', cascadeCounts.classesSub],
        ['class attendance records', cascadeCounts.classesAtt],
        ['clients (assigned trainer)', cascadeCounts.clientsFlat],
        ['client session records', cascadeCounts.clientsSessions],
        ['WROs', cascadeCounts.wros],
        ['member contacts', cascadeCounts.memberContacts],
        ['admin items (assignees)', cascadeCounts.adminItems],
        ['referrals', cascadeCounts.referrals],
        ['leads (assigned)', cascadeCounts.leadsFlat],
        ['lead status history entries', cascadeCounts.leadsHistory],
        ['schedule versions', cascadeCounts.schedVersions]
      ];
      cascadeRows = rows.filter(function(r){ return r[1] > 0; });
    }
    var cascadeTotal = cascadeRows.reduce(function(s, r){ return s + r[1]; }, 0);

    /* Render */
    return e('div', { className: 'modal-overlay' },

  /* ============ ADMIN: Maintenance ============
     Hidden admin tools, primarily a one-shot device-reset for the
     localStorage-to-Supabase cutover. Behind a confirm dialog so it can
     stay in the UI long-term. */
  function AdminMaintenance(props){
    var ctx = props.ctx;
    var KNOWN_KEYS = [
      'cmrc_trainers_v4',
      'cmrc_clients_v3',
      'cmrc_classes_v2',
      'cmrc_closures_v2',
      'cmrc_wros_v1',
      'cmrc_pt_referrals_v1',
      'cmrc_items_v1',
      'cmrc_queue_v1',
      'cmrc_contacts_v1',
      'cmrc_schedule_versions_v1',
      'admin_pin_v1',
      'rrpr_session_v1',
      /* Old pt_* keys retained here so a "Clear local data" still wipes any
         that linger from a device that never reloaded post-migration. */
      'pt_trainers_v4',
      'pt_clients_v3'
    ];
    function clearLocalData(){
      var ok = window.confirm(
        'This wipes localStorage on this iPad. Used at Supabase cutover. ' +
        'Sub coverage and offline data will be lost on this device. ' +
        'Other devices unaffected. Continue?'
      );
      if (!ok) return;
      KNOWN_KEYS.forEach(function(k){
        try { localStorage.removeItem(k); } catch(_){}
      });
      window.location.reload();
    }
    return e('div', null,
      e('div', { className: 'section-head' },
        e('div', null,
          e('h2', null, 'Maintenance'),
          e('div', { className: 'meta' }, 'Admin-only device tools')
        )
      ),

        style: {
          background: '#fff',
          border: '1.5px solid var(--border)',

          borderRadius: '12px',
          padding: '14px 16px',
          marginBottom: '14px'
        }
      },
        e('h3', { style: { fontSize: '15px', marginTop: 0, marginBottom: '6px', color: 'var(--navy)' } }, 'Clear local data on this device'),
        e('div', { style: { fontSize: '13px', color: 'var(--slate)', marginBottom: '12px', lineHeight: 1.5 } },
          'Wipes every cmrc_* and pt_* localStorage key on this iPad plus ' +
          'the admin PIN. Used at Supabase cutover so the device starts ' +
          'fresh against the cloud-of-record. Other devices are not affected.'
        ),
        e('button', {
          className: 'btn btn-ghost btn-sm',
          style: { color: 'var(--red)', borderColor: 'var(--red)' },
          onClick: clearLocalData
        }, 'Clear all local data on this device')
      ),
      e('div', {
        style: {
          background: 'var(--cream-2)',
          border: '1.5px solid var(--border)',

          padding: '12px 14px',
          fontSize: '12px',

        }
      },

        e('div', null, 'Mode: ', e('b', null, (typeof window !== 'undefined' && window.STORAGE_MODE) || 'unknown')),
        e('div', null, 'Supabase client: ', e('b', null, (typeof window !== 'undefined' && window.supabaseClient) ? 'connected' : 'not initialized'))
      )
    );
  }

  /* ============ ADMIN: Manage Team ============ */
  function AdminManageInstructors(props){
    var ctx = props.ctx;
    var nameTuple = useState('');
    var name = nameTuple[0];
    var setName = nameTuple[1];

    var pinInputTuple = useState('');
    var pinInput = pinInputTuple[0];
    var setPinInput = pinInputTuple[1];

    /* Which trainer is currently being edited (null = closed). */
    var editingTuple = useState(null);
    var editingTrainer = editingTuple[0];
    var setEditingTrainer = editingTuple[1];

    var reconcilingTuple = useState(false);
    var reconciling = reconcilingTuple[0];
    var setReconciling = reconcilingTuple[1];

    /* Profiles in local state without an id are unsaved (loadAll always
       hydrates id from Supabase). This banner surfaces them so admin can
       trigger a save retry instead of being blocked by the existing-name
       check on Add. */
    var unsavedProfiles = (ctx.trainerProfiles || []).filter(function(p){ return !p.id; });

    function add(){
      if (ctx.addTrainer(name)) {
        ctx.toast('Team member added ✓');
        setName('');
      }
    }
    function remove(n){
      var hasClients = ctx.clients.some(function(c){ return c.trainerName === n; });
      var hasClasses = ctx.classes.some(function(c){ return c.instructor === n; });
      if (hasClients || hasClasses) {
        if (!window.confirm(n + ' still has clients and/or classes assigned. Remove anyway? Their clients and classes will remain but may appear without a valid team member until reassigned.')) return;
      } else {
        if (!window.confirm('Remove ' + n + '?')) return;
      }
      ctx.removeTrainer(n);
      ctx.toast('Team member removed', 'error');
    }
    function reconcileNow(){
      if (reconciling) return;
      setReconciling(true);
      /* Re-run storage.trainers.save with the full local profile list. The
         dirty-check ref was nulled by the previous save error, so this
         attempt is guaranteed to fire. */
      window.storage.trainers.save(ctx.trainerProfiles)
        .then(function(){
          setReconciling(false);
          ctx.toast('Reconciled ✓ - reloading from Supabase');
          /* Trigger a reload to bring back ids on the new rows */
          if (typeof window !== 'undefined' && window.location && window.location.reload) {
            setTimeout(function(){ window.location.reload(); }, 500);
          }
        })
        .catch(function(err){
          setReconciling(false);
          ctx.toast('Reconcile failed: ' + (err && err.message ? err.message : 'unknown error'), 'error');
        });
    }
    function updatePin(){
      if (!/^\d{4}$/.test(pinInput)) { ctx.toast('PIN must be 4 digits', 'error'); return; }
      ctx.setPin(pinInput);
      ctx.toast('Front Desk PIN updated ✓');
      setPinInput('');
    }

    return e('div', null,
      e('h2', { style: { fontSize: '26px', marginBottom: '14px' } }, 'Manage Team'),
      unsavedProfiles.length > 0 && e('div', { className: 'banner amber', style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '14px' } },
        e('div', null,
          e('div', { style: { fontWeight: 600 } },
            unsavedProfiles.length + ' team member' + (unsavedProfiles.length === 1 ? '' : 's') + ' in local view but not saved to Supabase'
          ),
          e('div', { style: { fontSize: '12px', color: 'var(--slate)', marginTop: '4px' } },
            unsavedProfiles.map(function(p){ return p.name; }).join(', ')
          )
        ),
        e('button', {
          className: 'btn btn-primary btn-sm',
          onClick: reconcileNow,
          disabled: reconciling
        }, reconciling ? 'Reconciling…' : 'Reconcile to Supabase')
      ),
      e('div', { style: { background: '#fff', padding: '18px', borderRadius: '14px', border: '1px solid var(--border)', marginBottom: '18px' } },
        e('div', { className: 'field' },
          e('label', null, 'Add team member'),
          e('div', { style: { display: 'flex', gap: '10px' } },
            e('input', { value: name, onChange: function(ev){ setName(ev.target.value); }, placeholder: 'Full name', onKeyDown: function(ev){ if (ev.key === 'Enter') add(); } }),
            e('button', { className: 'btn btn-primary', onClick: add }, 'Add')
          ),
          e('div', { style: { fontSize: '11px', color: 'var(--slate-soft)', marginTop: '4px' } },
            'Defaults to trainer tier with no PIN. Use Edit on the row to set a PIN and role tier.'
          )
        )
      ),
      e('div', { style: { background: '#fff', padding: '18px', borderRadius: '14px', border: '1px solid var(--border)', marginBottom: '18px' } },
        e('h3', { style: { fontSize: '16px', marginBottom: '10px' } }, 'Current team (' + ctx.trainers.length + ')'),
        ctx.trainers.map(function(n){
          var c = ctx.clients.filter(function(x){ return x.trainerName === n; }).length;
          var cl = ctx.classes.filter(function(x){ return x.instructor === n; }).length;
          return e('div', { key: n, className: 'list-row' },
            e('div', null,
              e('div', { style: { fontWeight: 600 } }, n),
              e('div', { style: { fontSize: '12px', color: 'var(--slate)' } }, c + ' clients · ' + cl + ' classes')
            ),
            e('div', { style: { display: 'flex', gap: '6px' } },
              e('button', {
                className: 'btn btn-ghost btn-sm',
                onClick: function(){ setEditingTrainer(n); },
                title: 'Edit name, role, active status'
              }, '✏ Edit'),
              e('button', {
                className: 'btn btn-ghost btn-sm',
                style: { color: 'var(--red)' },
                onClick: function(){ remove(n); }
              }, 'Remove')
            )
          );
        })
      ),
      editingTrainer && e(EditTrainerModal, {
        ctx: ctx,
        trainerName: editingTrainer,
        onClose: function(){ setEditingTrainer(null); }
      }),
      /* TODO: remove next sprint once per-user PINs are set for everyone. */
      e('div', { style: { background: '#fff', padding: '18px', borderRadius: '14px', border: '1px solid var(--border)' } },
        e('h3', { style: { fontSize: '16px', marginBottom: '10px' } }, 'Front Desk PIN (legacy)'),
        e('div', { style: { fontSize: '13px', color: 'var(--slate)', marginBottom: '10px' } },
          'Single shared PIN for the "Front desk?" link on the sign-in screen. Per-user PINs live in each team member\'s Edit modal. This shared PIN goes away once everyone has their own.'
        ),
        e('div', { className: 'field' },
          e('label', null, 'Set new 4-digit PIN'),
          e('div', { style: { display: 'flex', gap: '10px' } },
            e('input', {
              value: pinInput,
              onChange: function(ev){ setPinInput(ev.target.value.replace(/\D/g,'').slice(0,4)); },
              inputMode: 'numeric',
              type: 'password',
              placeholder: '••••',
              maxLength: 4
            }),
            e('button', { className: 'btn btn-primary', onClick: updatePin }, 'Save')
          )
        )
      )
    );
  }

  /* ============ WEIGHT ROOM ORIENTATION (WRO) ============ */
  function NewWROModal(props){
    /* PRE-orientation intake. Member fills out before the orientation.
       The full informed-consent / liability waiver is signed in person AT
       the orientation by the lead fitness specialist. */
    var ctx = props.ctx;
    var existing = props.existing; // resuming a draft pre-form
    var stepTuple = useState(1);
    var step = stepTuple[0];
    var setStep = stepTuple[1];

    var formTuple = useState(function(){
      if (existing) return existing;
      return {
        // Section 1: About you
        participantName: '',
        dob: '',
        phone: '',
        email: '',
        bestContactMethod: 'Phone',
        bestContactTime: '',
        // Section 2: What brings you in
        goals: [],
        goalsOther: '',
        experienceLevel: 'new',
        // Section 3: What you want to learn
        tourInterests: [],
        equipmentSpecific: '',
        // Section 4: Anything we should know
        healthFlags: '',
        prefersInPersonHealthDiscussion: false,
        // Section 5: Follow-up interests
        followupInterests: [],
        trainerPreference: '',
        scheduleAvailability: '',
        // Logistical
        date: todayStr(),
        location: 'CMRC',
        signature: null
      };
    });
    var form = formTuple[0];
    var setForm = formTuple[1];
    function update(k, v){ setForm(function(f){ var n = Object.assign({}, f); n[k] = v; return n; }); }
    function toggleArray(k, v){
      setForm(function(f){
        var arr = (f[k] || []).slice();
        var i = arr.indexOf(v);
        if (i === -1) arr.push(v); else arr.splice(i, 1);
        var n = Object.assign({}, f); n[k] = arr; return n;
      });
    }

    var sigTuple = useState(form.signature || null);
    var sig = sigTuple[0];
    var setSig = sigTuple[1];

    function step1Errors(){
      return intakeFieldErrors({ name: form.participantName, phone: form.phone, email: form.email });
    }
    function step1Valid(){ return !hasErrors(step1Errors()); }
    var step1Errs = step1Errors();
    function step2Valid(){ return form.goals.length > 0 || form.goalsOther.trim().length > 0; }
    /* Steps 3 and 4 are optional content - anything goes including nothing. */
    function step5Valid(){ return form.followupInterests.length > 0; }
    function step6Valid(){ return !!sig; }

    function finish(){
      var w = {
        id: existing && existing.id ? existing.id : uid(),
        // Snapshot the form at signing
        participantName: form.participantName.trim(),
        dob: form.dob,
        phone: form.phone,
        email: form.email,
        bestContactMethod: form.bestContactMethod,
        bestContactTime: form.bestContactTime,
        goals: form.goals,
        goalsOther: form.goalsOther,
        experienceLevel: form.experienceLevel,
        tourInterests: form.tourInterests,
        equipmentSpecific: form.equipmentSpecific,
        healthFlags: form.healthFlags,
        prefersInPersonHealthDiscussion: form.prefersInPersonHealthDiscussion,
        followupInterests: form.followupInterests,
        trainerPreference: form.trainerPreference,
        scheduleAvailability: form.scheduleAvailability,
        date: form.date,
        location: form.location,
        signature: sig,
        // Stage flags
        preCompletedAt: new Date().toISOString(),
        postCompleted: false,
        post: null,
        convertedToClientId: null,
        createdAt: new Date().toISOString()
      };
      props.onSave(w);
    }

          e('div', { className: 'field' },
            e('label', null, 'Date of Birth'),
            e('input', { type: 'date', value: form.dob, onChange: function(ev){ update('dob', ev.target.value); } })
          ),
          e('div', { className: 'field' },
            e('label', null, 'Phone'),

              value: form.phone, onChange: function(ev){ update('phone', ev.target.value); },

  /* Post-orientation specialist form. Filled out by the fitness specialist
