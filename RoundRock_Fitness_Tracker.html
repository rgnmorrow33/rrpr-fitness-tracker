<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="RRPR Tracker" />
<title>Round Rock Parks and Recreation - Fitness Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --navy: #1a2e4a;
    --navy-soft: #223a5c;
    --gold: #c9a84c;
    --gold-soft: #e0c578;
    --cream: #faf8f3;
    --cream-2: #f3efe4;
    --slate: #4a5568;
    --slate-soft: #718096;
    --green: #2d6a4f;
    --green-bg: #e5f1ea;
    --amber: #b45309;
    --amber-bg: #fdf3e3;
    --red: #b91c1c;
    --red-bg: #fde7e7;
    --teal: #0d7377;
    --teal-bg: #e2f1f2;
    --border: #e5ddc8;
    --shadow: 0 2px 8px rgba(26,46,74,0.08);
    --shadow-lg: 0 8px 32px rgba(26,46,74,0.18);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--cream);
    color: var(--navy);
    font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 16px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
    -webkit-text-size-adjust: 100%;
    min-height: 100vh;
  }
  #root { min-height: 100vh; }
  button {
    font-family: inherit;
    font-size: 16px;
    cursor: pointer;
    border: none;
    background: none;
    color: inherit;
    padding: 0;
  }
  input, select, textarea {
    font-family: inherit;
    font-size: 16px !important;
    color: var(--navy);
    background: #fff;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    width: 100%;
    outline: none;
    transition: border-color 0.15s;
  }
  input:focus, select:focus, textarea:focus {
    border-color: var(--gold);
  }
  h1, h2, h3, h4 {
    font-family: 'DM Serif Display', Georgia, serif;
    font-weight: 400;
    margin: 0;
    color: var(--navy);
    letter-spacing: -0.01em;
  }
  .app-shell {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0;
    min-height: 100vh;
  }
  .header {
    background: var(--navy);
    color: var(--cream);
    padding: 18px 22px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 40;
    padding-top: calc(18px + env(safe-area-inset-top));
  }
  .header h1 {
    color: var(--cream);
    font-size: 22px;
    margin: 0;
  }
  .header .sub {
    font-size: 13px;
    color: var(--gold-soft);
    margin-top: 2px;
  }
  .header-right { display: flex; align-items: center; gap: 14px; }
  .header-pill {
    background: rgba(201,168,76,0.18);
    color: var(--gold-soft);
    padding: 6px 12px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 500;
  }
  .logout-btn {
    background: rgba(255,255,255,0.08);
    color: var(--cream);
    padding: 8px 14px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 500;
  }
  .content {
    padding: 22px;
    padding-bottom: 100px;
  }

  /* Login */
  .login-wrap {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 40px 24px;
    padding-top: calc(40px + env(safe-area-inset-top));
    background: linear-gradient(180deg, var(--navy) 0%, var(--navy-soft) 100%);
    color: var(--cream);
  }
  .login-head {
    text-align: center;
    margin-bottom: 32px;
  }
  .login-head .brand {
    font-family: 'DM Serif Display', serif;
    font-size: 34px;
    color: var(--gold);
    letter-spacing: 0.02em;
  }
  .login-head .tag {
    font-size: 14px;
    color: var(--gold-soft);
    opacity: 0.9;
    margin-top: 4px;
  }
  .login-head h2 {
    color: var(--cream);
    font-size: 24px;
    margin-top: 24px;
    font-style: italic;
  }
  .trainer-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 14px;
    max-width: 820px;
    margin: 0 auto;
    width: 100%;
  }
  .trainer-tile {
    background: var(--cream);
    color: var(--navy);
    border-radius: 14px;
    padding: 22px 18px;
    text-align: center;
    font-weight: 600;
    font-size: 16px;
    min-height: 96px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: var(--shadow);
    transition: transform 0.1s, box-shadow 0.15s;
    border: 2px solid transparent;
  }
  .trainer-tile:active {
    transform: scale(0.97);
    border-color: var(--gold);
  }
  .login-admin {
    text-align: center;
    margin-top: 36px;
  }
  .login-admin button {
    color: var(--gold-soft);
    font-size: 15px;
    padding: 12px 20px;
    text-decoration: underline;
    text-underline-offset: 3px;
  }

  /* PIN modal */
  .pin-dots {
    display: flex;
    gap: 14px;
    justify-content: center;
    margin: 18px 0 24px;
  }
  .pin-dot {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 2px solid var(--navy);
    background: #fff;
    transition: background 0.1s;
  }
  .pin-dot.filled { background: var(--navy); }
  .keypad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }
  .keypad button {
    background: var(--cream-2);
    color: var(--navy);
    font-size: 26px;
    font-weight: 500;
    padding: 20px 0;
    border-radius: 12px;
  }
  .keypad button:active { background: var(--gold-soft); }

  /* Modals */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(26,46,74,0.55);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 20px;
    -webkit-backdrop-filter: blur(4px);
    backdrop-filter: blur(4px);
  }
  .modal {
    background: var(--cream);
    border-radius: 18px;
    max-width: 560px;
    width: 100%;
    max-height: 92vh;
    overflow-y: auto;
    box-shadow: var(--shadow-lg);
    -webkit-overflow-scrolling: touch;
  }
  .modal-header {
    padding: 22px 24px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .modal-header h2 { font-size: 22px; }
  .modal-close {
    font-size: 26px;
    color: var(--slate);
    padding: 4px 12px;
    line-height: 1;
  }
  .modal-body { padding: 18px 24px 24px; }
  .modal-footer {
    padding: 16px 24px;
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    border-top: 1px solid var(--border);
    background: rgba(255,255,255,0.5);
    position: sticky;
    bottom: 0;
  }

  /* Forms */
  .field { margin-bottom: 14px; }
  .field label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--slate);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .checkbox-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px;
    background: #fff;
    border: 1.5px solid var(--border);
    border-radius: 10px;
  }
  .checkbox-row input[type=checkbox] {
    width: 20px;
    height: 20px;
    accent-color: var(--navy);
    margin: 0;
  }
  .checkbox-row label {
    margin: 0;
    font-size: 14px;
    text-transform: none;
    letter-spacing: 0;
    color: var(--navy);
    font-weight: 500;
  }

  /* Package tiles */
  .package-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-top: 4px;
  }
  .pkg-tile {
    background: #fff;
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 14px 8px;
    text-align: center;
    transition: all 0.15s;
  }
  .pkg-tile .sessions {
    font-family: 'DM Serif Display', serif;
    font-size: 24px;
    color: var(--navy);
    line-height: 1;
  }
  .pkg-tile .label {
    font-size: 11px;
    color: var(--slate);
    text-transform: uppercase;
    margin-top: 4px;
    letter-spacing: 0.05em;
  }
  .pkg-tile .price {
    font-size: 15px;
    color: var(--gold);
    font-weight: 600;
    margin-top: 6px;
  }
  .pkg-tile.selected {
    border-color: var(--gold);
    background: var(--cream-2);
    box-shadow: 0 0 0 3px rgba(201,168,76,0.15);
  }

  /* Buttons */
  .btn {
    padding: 12px 20px;
    border-radius: 10px;
    font-weight: 600;
    font-size: 15px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: filter 0.1s;
  }
  .btn:active { filter: brightness(0.92); }
  .btn-primary { background: var(--navy); color: var(--cream); }
  .btn-gold { background: var(--gold); color: var(--navy); }
  .btn-ghost { background: transparent; color: var(--slate); }
  .btn-danger { background: var(--red); color: #fff; }
  .btn-outline { background: transparent; color: var(--navy); border: 1.5px solid var(--border); }
  .btn-teal { background: var(--teal); color: #fff; }
  .btn-green { background: var(--green); color: #fff; }
  .btn-amber { background: var(--amber); color: #fff; }
  .btn-sm { padding: 8px 14px; font-size: 14px; }
  .btn[disabled] { opacity: 0.45; pointer-events: none; }

  /* Cards / client list */
  .section-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .section-head h2 {
    font-size: 26px;
  }
  .section-head .meta {
    font-size: 13px;
    color: var(--slate);
  }
  .client-card {
    background: #fff;
    border-radius: 14px;
    padding: 16px 18px;
    margin-bottom: 12px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    transition: transform 0.1s;
  }
  .client-card:active { transform: scale(0.995); }
  .client-card .top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 10px;
    gap: 12px;
  }
  .client-card .name {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    color: var(--navy);
    line-height: 1.15;
  }
  .client-card .sub {
    font-size: 13px;
    color: var(--slate);
    margin-top: 4px;
  }
  .pill {
    display: inline-block;
    font-size: 11px;
    padding: 3px 9px;
    border-radius: 999px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .pill-cmrc { background: var(--navy); color: var(--cream); }
  .pill-baca { background: var(--gold); color: var(--navy); }
  .pill-green { background: var(--green-bg); color: var(--green); }
  .pill-amber { background: var(--amber-bg); color: var(--amber); }
  .pill-red { background: var(--red-bg); color: var(--red); }
  .pill-teal { background: var(--teal-bg); color: var(--teal); }
  .progress-wrap {
    height: 8px;
    background: var(--cream-2);
    border-radius: 999px;
    overflow: hidden;
    margin-top: 10px;
  }
  .progress-bar {
    height: 100%;
    border-radius: 999px;
    transition: width 0.3s;
  }
  .progress-footer {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    margin-top: 6px;
    color: var(--slate);
  }
  .progress-footer .remaining { font-weight: 600; color: var(--navy); }

  /* Bottom nav */
  .bottom-nav {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    background: #fff;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-around;
    padding: 8px 0;
    padding-bottom: calc(8px + env(safe-area-inset-bottom));
    box-shadow: 0 -4px 18px rgba(26,46,74,0.08);
    z-index: 30;
  }
  .bottom-nav button {
    flex: 1;
    padding: 10px 4px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    color: var(--slate);
    font-size: 12px;
    font-weight: 500;
  }
  .bottom-nav button.active { color: var(--navy); font-weight: 700; }
  .bottom-nav button.gx.active { color: var(--teal); }
  .bottom-nav .icon { font-size: 22px; }

  /* Stats strip */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 10px;
    margin-bottom: 18px;
  }
  .stat-card {
    background: #fff;
    border-radius: 12px;
    padding: 14px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
  }
  .stat-card .label {
    font-size: 11px;
    color: var(--slate);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 600;
  }
  .stat-card .value {
    font-family: 'DM Serif Display', serif;
    font-size: 28px;
    color: var(--navy);
    line-height: 1.1;
    margin-top: 4px;
  }
  .stat-card.warn .value { color: var(--amber); }
  .stat-card.warn { border-color: var(--amber); background: var(--amber-bg); }

  /* Banners */
  .banner {
    padding: 14px 16px;
    border-radius: 10px;
    margin-bottom: 14px;
    font-size: 14px;
    font-weight: 500;
    line-height: 1.4;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .banner.amber { background: var(--amber-bg); color: var(--amber); border-left: 4px solid var(--amber); }
  .banner.red { background: var(--red-bg); color: var(--red); border-left: 4px solid var(--red); }
  .banner.green { background: var(--green-bg); color: var(--green); border-left: 4px solid var(--green); }
  .banner.teal { background: var(--teal-bg); color: var(--teal); border-left: 4px solid var(--teal); }

  /* Session log table */
  .log-table {
    background: #fff;
    border-radius: 12px;
    border: 1px solid var(--border);
    overflow: hidden;
    margin-top: 12px;
  }
  .log-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr auto;
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    align-items: center;
    gap: 8px;
    font-size: 14px;
  }
  .log-row:last-child { border-bottom: none; }
  .log-row.header {
    background: var(--cream-2);
    font-weight: 700;
    font-size: 12px;
    text-transform: uppercase;
    color: var(--slate);
    letter-spacing: 0.05em;
  }
  .sig-thumb {
    max-width: 80px;
    max-height: 36px;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 4px;
  }
  .sig-needed-btn {
    background: var(--amber);
    color: #fff;
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
  }

  /* Signature canvas */
  .sig-box {
    background: #fff;
    border: 2px dashed var(--slate-soft);
    border-radius: 10px;
    overflow: hidden;
    position: relative;
    touch-action: none;
  }
  .sig-box canvas {
    display: block;
    width: 100%;
    height: 180px;
    touch-action: none;
  }
  .sig-label {
    position: absolute;
    top: 10px;
    left: 14px;
    font-size: 12px;
    color: var(--slate-soft);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 600;
    pointer-events: none;
  }
  .sig-actions {
    display: flex;
    justify-content: space-between;
    margin-top: 8px;
  }

  /* Audit */
  .audit-section {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
  }
  .audit-section h3 {
    font-size: 20px;
    margin-bottom: 4px;
  }
  .audit-section .section-sub {
    font-size: 13px;
    color: var(--slate);
    margin-bottom: 14px;
  }
  .audit-controls {
    background: var(--cream-2);
    border-radius: 12px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 18px;
    font-size: 14px;
  }
  .audit-controls .pill-btn {
    background: #fff;
    padding: 8px 14px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 600;
    color: var(--slate);
    border: 1px solid var(--border);
  }
  .audit-controls .pill-btn.active {
    background: var(--navy);
    color: var(--cream);
    border-color: var(--navy);
  }
  .audit-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .audit-table th, .audit-table td {
    text-align: left;
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
  }
  .audit-table th {
    font-size: 11px;
    color: var(--slate);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 700;
    background: var(--cream-2);
  }
  .audit-table tr:last-child td { border-bottom: none; }
  .audit-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }
  .audit-bar .label {
    flex: 0 0 160px;
    font-size: 13px;
    color: var(--navy);
    font-weight: 500;
  }
  .audit-bar .track {
    flex: 1;
    height: 10px;
    background: var(--cream-2);
    border-radius: 999px;
    overflow: hidden;
  }
  .audit-bar .fill {
    height: 100%;
    background: var(--navy);
    border-radius: 999px;
  }
  .audit-bar .value {
    flex: 0 0 80px;
    text-align: right;
    font-size: 13px;
    color: var(--navy);
    font-weight: 600;
  }
  .audit-flag {
    background: var(--red-bg);
    color: var(--red);
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.04em;
  }
  .audit-ok {
    background: var(--green-bg);
    color: var(--green);
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.04em;
  }
  .audit-day-group {
    margin-bottom: 14px;
  }
  .audit-day-group .day-head {
    font-family: 'DM Serif Display', serif;
    font-size: 16px;
    color: var(--navy);
    margin-bottom: 6px;
    padding-bottom: 4px;
    border-bottom: 2px solid var(--gold);
  }
  .audit-day-group .day-row {
    display: grid;
    grid-template-columns: 100px 1fr auto;
    gap: 10px;
    font-size: 13px;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
    align-items: baseline;
  }
  .audit-day-group .day-row:last-child { border-bottom: none; }
  .audit-day-group .day-row .time { color: var(--slate); font-variant-numeric: tabular-nums; }
  .audit-subtabs {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }
  .audit-subtabs button {
    padding: 8px 14px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 600;
    background: var(--cream-2);
    color: var(--slate);
    border: 1px solid var(--border);
  }
  .audit-subtabs button.active {
    background: var(--navy);
    color: var(--cream);
    border-color: var(--navy);
  }

  /* Admin dashboard */
  .admin-tabs {
    display: flex;
    gap: 6px;
    padding: 4px;
    background: var(--cream-2);
    border-radius: 12px;
    margin-bottom: 18px;
    overflow-x: auto;
  }
  .admin-tabs button {
    flex: 1;
    min-width: max-content;
    padding: 10px 14px;
    font-weight: 600;
    font-size: 14px;
    border-radius: 8px;
    color: var(--slate);
    white-space: nowrap;
  }
  .admin-tabs button.active {
    background: var(--navy);
    color: var(--cream);
  }
  .trainer-block {
    background: #fff;
    border-radius: 14px;
    padding: 16px 18px;
    margin-bottom: 14px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
  }

<div id="root"></div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<!-- Supabase JS client. Loaded for forward-compat with the storage adapter
     in session 1. Not initialized while STORAGE_MODE === 'localStorage'. -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
/* Round Rock Parks and Recreation Fitness Tracker - single file, no build step */
(function(){
  var e = React.createElement;
  var useState = React.useState;
  var useEffect = React.useEffect;
  var useRef = React.useRef;
  var useMemo = React.useMemo;
  var useCallback = React.useCallback;

  /* ============ STORAGE MODE + ADAPTER ============
     Session 2a: Supabase plumbing wired in. STORAGE_MODE remains
     'localStorage' so behavior is unchanged; flipping the flag locally
     lets dev-test the full Supabase round-trip without committing the
     cutover. Session 2b will flip the flag and add real-time subs.

     Architecture:
       - translate.X: per-entity {toSupabase, fromSupabase}. Identity
         passthrough where no rename is needed; custom for WROs (5-flat +
         data jsonb), schedule_versions (flat + data jsonb), trainers
         and adminPin (settings-row).
       - storage.X: {load, save} that branches on STORAGE_MODE.
       - Local-only fields (followUpBy, rectracMemberId, packageInfo,
         lostAt) are dropped on writes to Supabase. They round-trip via
         localStorage but disappear after a Supabase load. Trade-off
         flagged in spec.

     Note on leads/queue: the adapter exposes 'leads' but the on-disk
     localStorage key remains cmrc_queue_v1 (no migration). Sub coverage
     is not in localStorage; it lives on class.subAssignments. */
  var STORAGE_MODE = 'supabase'; /* 'localStorage' | 'supabase' */
  var SUPABASE_URL = 'https://ofezaezijafglyjmisgz.supabase.co';
  var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9mZXphZXppamFmZ2x5am1pc2d6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MzQyODEsImV4cCI6MjA5MzMxMDI4MX0.CpbBGnkqISfeA_hsRF3A9mmG2d5bOOV5czDs3Dh45Kc';
  var supabaseClient = (STORAGE_MODE === 'supabase' && typeof supabase !== 'undefined')
    ? supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
    : null;

  /* Current sign-in name accessor. Used by translators that need to
     populate a created_by column when no local equivalent exists.
     Updated by App via a useEffect on session change. */
  var _appSessionName = null;
  function getAppSessionName(){ return _appSessionName || 'system'; }
  function setAppSessionName(name){ _appSessionName = name || null; }

  /* Generic camelCase ↔ snake_case translator builder. Identity passthrough
     for keys not in the map. Always sets updated_at on toSupabase; never
     sets created_at (DB default fires on insert, untouched on update).
     drop[] are local-only fields stripped on write. */
  /* True-uuid generator used at the Supabase boundary. Throws when
     crypto.randomUUID isn't available rather than falling back to a
     non-uuid string (which would later fail the uuid-typed id columns
     with a confusing "invalid input syntax for uuid" error). uid() at
     line ~1899 still has a safe fallback for client-side ids that never
     touch Supabase. */
  function freshUuid(){
    if (typeof crypto !== 'undefined' && typeof crypto.randomUUID === 'function') {
      return crypto.randomUUID();
    }
    throw new Error('crypto.randomUUID is not available - cannot generate uuid for Supabase row');
  }

  function makeFieldTranslator(map, opts){
    var camelToSnake = {};
    var snakeToCamel = {};
    map.forEach(function(pair){
      camelToSnake[pair[0]] = pair[1];
      snakeToCamel[pair[1]] = pair[0];
    });
    /* Copy with .slice() so push() below doesn't mutate the caller's array. */
    var drop = ((opts && opts.drop) || []).slice();
    /* createdAt always dropped on write so DB controls created_at. */
    if (drop.indexOf('createdAt') === -1) drop.push('createdAt');
    return {
      toSupabase: function(o){
        var out = { id: o.id || freshUuid() };
        Object.keys(o).forEach(function(k){
          if (k === 'id') return;
          if (drop.indexOf(k) !== -1) return;
          var snake = camelToSnake.hasOwnProperty(k) ? camelToSnake[k] : k;
          out[snake] = o[k];
        });
        out.updated_at = new Date().toISOString();
        return out;
      },
      fromSupabase: function(row){
        var out = {};
        Object.keys(row).forEach(function(k){
          var camel = snakeToCamel.hasOwnProperty(k) ? snakeToCamel[k] : k;
          out[camel] = row[k];
        });
        return out;
      }
    };
  }

  var translate = {
    clients: makeFieldTranslator([
      ['datePurchased', 'date_purchased'],
      ['paymentType', 'payment_type'],
      ['teamMember', 'team_member'],
      ['membershipVerified', 'membership_verified'],
      ['membershipType', 'membership_type'],
      ['membershipEnd', 'membership_end'],
      ['trainerName', 'trainer_name'],
      ['referralSource', 'referral_source'],
      ['parQ', 'par_q'],
      ['fromQueueId', 'from_queue_id'],
      ['lastPackageAddedAt', 'last_package_added_at'],
      ['auditLog', 'audit_log'],
      ['deletedAt', 'deleted_at'],
      ['deletedBy', 'deleted_by'],
      ['createdAt', 'created_at']
    ]),

    classes: makeFieldTranslator([
      ['dayOfWeek', 'day_of_week'],
      ['startTime', 'start_time'],
      ['endTime', 'end_time'],
      ['classType', 'class_type'],
      ['isPremium', 'is_premium'],
      ['subAssignments', 'sub_assignments'],
      ['seasonStart', 'season_start'],
      ['seasonEnd', 'season_end'],
      ['scheduleVersionId', 'schedule_version_id'],
      ['duration', 'duration_minutes'],
      ['auditLog', 'audit_log'],
      ['deletedAt', 'deleted_at'],
      ['deletedBy', 'deleted_by'],
      ['createdAt', 'created_at']
    ]),

    contacts: makeFieldTranslator([
      ['loggedAt', 'logged_at'],
      ['trainerName', 'trainer_name']
    ]),

    adminItems: makeFieldTranslator([
      ['customType', 'custom_type'],
      ['timeIn', 'time_in'],
      ['timeOut', 'time_out'],
      ['createdBy', 'created_by'],
      ['sourceSessionId', 'source_session_id'],
      ['createdAt', 'created_at']
    ]),

    referrals: makeFieldTranslator([
      ['clientId', 'client_id'],
      ['clientName', 'client_name'],
      ['referredBy', 'referred_by'],
      ['createdAt', 'created_at']
    ]),

    closures: makeFieldTranslator([
      ['createdAt', 'created_at']
    ]),

    leads: makeFieldTranslator([
      ['assignedTo', 'assigned_to'],
      ['convertedAt', 'converted_at'],
      ['statusHistory', 'status_history'],
      ['note', 'notes'],
      ['convertedToClientId', 'converted_to_client_id'],
      ['sourceTag', 'source_tag'],
      ['consultDate', 'consult_date'],
      ['interestArea', 'interest_area'],
      ['addedBy', 'added_by'],
      ['assignedAt', 'assigned_at'],
      ['assignedBy', 'assigned_by'],
      ['lostReason', 'lost_reason'],
      ['fromWroId', 'from_wro_id'],
      ['auditLog', 'audit_log'],
      ['createdAt', 'created_at']
    ], { drop: [
      /* Local-only fields (no Supabase column). Round-trip via localStorage
         only; absent on the in-memory record after a Supabase load. */
      'followUpBy', 'rectracMemberId', 'packageInfo', 'lostAt'
    ]}),

    /* Trainers: real table in Supabase (id, name, role, role_tier, pin,
       is_active). The in-memory shape is now a profile object array
       (id, name, role, role_tier, pin, is_active). ctx.trainers stays a
       string[] of names for backward compat - it's derived from profiles
       at the App level. ctx.trainerProfiles exposes the full shape. */
    trainers: {
      toSupabase: function(profile){
        var row = {
          /* Always send a uuid - the trainers.id column is uuid NOT NULL.
             Existing profiles keep their id; locally-added profiles get
             a fresh uuid stamped at the boundary. */
          id: profile.id || freshUuid(),
          name: profile.name,
          role: profile.role || 'trainer',
          role_tier: profile.role_tier || 'trainer',
          pin: profile.pin || null,
          is_active: profile.is_active !== false,
          deleted_at: profile.deleted_at || null,
          deleted_by: profile.deleted_by || null,
          updated_at: new Date().toISOString()
        };
        if (profile.audit_log !== undefined) row.audit_log = profile.audit_log || [];
        return row;
      },
      fromSupabase: function(row){
        return {
          id: row.id || null,
          name: row.name,
          role: row.role || 'trainer',
          role_tier: row.role_tier || 'trainer',
          pin: row.pin || null,
          is_active: row.is_active !== false,
          deleted_at: row.deleted_at || null,
          deleted_by: row.deleted_by || null,
          audit_log: row.audit_log || []
        };
      }
    },

    /* AdminPin: same settings-row pattern. */
    adminPin: {
      toSupabase: function(p){ return p; },
      fromSupabase: function(v){ return v; }
    },

    /* Schedule versions: flat columns (id, label, effective_date,
       is_active, created_by, created_at) plus a data jsonb. The local
       'classes' array nests under data.classes. endDate and activatedAt
       have no flat columns and live in data too. */
    scheduleVersions: {
      toSupabase: function(v){
        return {
          id: v.id || uid(),
          label: v.name || null,
          effective_date: v.startDate || null,
          is_active: !!v.activatedAt,
          created_by: v.createdBy || getAppSessionName(),
          data: {
            endDate: v.endDate || null,
            activatedAt: v.activatedAt || null,
            classes: v.classes || []
          },
          updated_at: new Date().toISOString()
        };
      },
      fromSupabase: function(row){
        var d = row.data || {};
        return {
          id: row.id,
          name: row.label,
          startDate: row.effective_date,
          endDate: d.endDate || null,
          classes: d.classes || [],
          activatedAt: d.activatedAt || null,
          createdAt: row.created_at,
          createdBy: row.created_by
        };
      }
    },

    /* WROs: 5 flat columns (trainer_name, client_name, date, notes,
       signature_data) plus data jsonb for everything else. The post
       sub-object's specialistName and postNotes get promoted to the flat
       columns on write and re-merged on read. post is ALWAYS reconstructed
       as an object on fromSupabase, even when all its fields are null. */
    wros: {
      toSupabase: function(w){
        var rest = {};
        Object.keys(w).forEach(function(k){
          if (k === 'id' || k === 'participantName' || k === 'date' || k === 'signature') return;
          if (k === 'post') {
            if (w.post) {
              var postCopy = Object.assign({}, w.post);
              delete postCopy.specialistName;
              delete postCopy.postNotes;
              rest.post = postCopy;
            } else {
              rest.post = null;
            }
            return;
          }
          rest[k] = w[k];
        });
        return {
          id: w.id || uid(),
          trainer_name: (w.post && w.post.specialistName) || null,
          client_name: w.participantName || null,
          date: w.date || null,
          notes: (w.post && w.post.postNotes) || null,
          signature_data: w.signature || null,
          data: rest,
          updated_at: new Date().toISOString()
        };
      },
      fromSupabase: function(row){
        var d = row.data || {};
        var out = Object.assign({}, d);
        out.id = row.id;
        out.participantName = row.client_name;
        out.date = row.date;
        out.signature = row.signature_data;
        /* post always an object - components access wro.post.specialistName
           without null-guarding wro.post itself. */
        out.post = Object.assign({}, d.post || {}, {
          specialistName: row.trainer_name,
          postNotes: row.notes
        });
        return out;
      }
    },

    /* Notifications: trainer-targeted messages. Inserts come from server-side
       triggers (Phase 3); client only PATCHes read_at. Custom translator
       because the table has no updated_at column - makeFieldTranslator would
       auto-stamp one and break the upsert. */
    notifications: {
      toSupabase: function(n){
        var out = { id: n.id || freshUuid() };
        if (n.targetTrainerId !== undefined) out.target_trainer_id = n.targetTrainerId;
        if (n.type !== undefined) out.type = n.type;
        if (n.payload !== undefined) out.payload = n.payload || {};
        if (n.readAt !== undefined) out.read_at = n.readAt;
        return out;
      },
      fromSupabase: function(row){
        return {
          id: row.id,
          targetTrainerId: row.target_trainer_id,
          type: row.type,
          payload: row.payload || {},
          readAt: row.read_at,
          createdAt: row.created_at
        };
      }
    }
  };

  /* Entity factory: localStorage-key + Supabase-table + translator =
     {load, save}. Save is upsert-everything (idempotent, simple). Diff
     strategy is a session 2b optimization. */
  function makeEntity(localKey, supabaseTable, translator){
    return {
      load: function(){
        if (STORAGE_MODE === 'supabase') {
          return supabaseClient.from(supabaseTable).select('*')
            .order('created_at', { ascending: true })
            .then(function(res){
              if (res.error) throw res.error;
              return (res.data || []).map(translator.fromSupabase);
            });
        }
        try {
          var raw = localStorage.getItem(localKey);
          return Promise.resolve(raw ? JSON.parse(raw) : null);
        } catch (err) {
          return Promise.resolve(null);
        }
      },
      save: function(arr){
        if (STORAGE_MODE === 'supabase') {
          var rows = (arr || []).map(translator.toSupabase);
          if (rows.length === 0) return Promise.resolve();
          return supabaseClient.from(supabaseTable).upsert(rows, { onConflict: 'id' })
            .then(function(res){ if (res.error) throw res.error; });
        }
        try {
          localStorage.setItem(localKey, JSON.stringify(arr));
          return Promise.resolve();
        } catch (err) {
          return Promise.reject(err);
        }
      }
    };
  }

  /* Settings-row factory: trainers list and adminPin live in a single
     row of the settings table, keyed by name. The whole value is stored
     in a 'value' column. */
  function makeSettingsRow(localKey, settingsKey){
    return {
      load: function(){
        if (STORAGE_MODE === 'supabase') {
          return supabaseClient.from('settings').select('value')
            .eq('key', settingsKey).maybeSingle()
            .then(function(res){
              if (res.error) throw res.error;
              return res.data ? res.data.value : null;
            });
        }
        try {
          var raw = localStorage.getItem(localKey);
          return Promise.resolve(raw ? JSON.parse(raw) : null);
        } catch (err) {
          return Promise.resolve(null);
        }
      },
      save: function(v){
        if (STORAGE_MODE === 'supabase') {
          return supabaseClient.from('settings').upsert({
            key: settingsKey,
            value: v,
            updated_at: new Date().toISOString()
          }, { onConflict: 'key' }).then(function(res){
            if (res.error) throw res.error;
          });
        }
        try {
          localStorage.setItem(localKey, JSON.stringify(v));
          return Promise.resolve();
        } catch (err) {
          return Promise.reject(err);
        }
      }
    };
  }

  /* Custom trainers storage: upsert local names by name (requires
     trainers_name_unique constraint), then soft-delete (set is_active=false)
     on any server rows whose name isn't in the local list. No DELETE
     statements - the row always survives, only is_active toggles. This
     replaced an earlier replace-all pattern that was racey under sub
     events and could nuke rows mid-save. Diff-based add/remove is a
     2c+ optimization. */
  var trainersStorage = {
    load: function(){
      if (STORAGE_MODE === 'supabase') {
        return supabaseClient.from('trainers').select('*')
          .eq('is_active', true)
          .order('name', { ascending: true })
          .then(function(res){
            if (res.error) throw res.error;
            return (res.data || []).map(translate.trainers.fromSupabase);
          });
      }
      try {
        var raw = localStorage.getItem('cmrc_trainers_v4');
        if (!raw) return Promise.resolve(null);
        var parsed = JSON.parse(raw);
        /* Legacy localStorage may hold a string[] of names. Normalize to
           profile objects with safe defaults. */
        if (Array.isArray(parsed) && parsed.length > 0 && typeof parsed[0] === 'string') {
          parsed = parsed.map(function(name){
            return { id: null, name: name, role: 'trainer', role_tier: 'trainer', pin: null, is_active: true };
          });
        }
        return Promise.resolve(parsed);
      } catch (err) {
        return Promise.resolve(null);
      }
    },
    save: function(arr){
      if (STORAGE_MODE === 'supabase') {
        var profiles = (arr || []).slice();
        /* Step 1: upsert local profiles by name. Includes pin and
           role_tier per the v3 schema. New rows get inserted (DB generates
           id); existing rows get is_active=true and pin/role_tier refreshed. */
        var step1;
        if (profiles.length > 0) {
          var rows = profiles.map(translate.trainers.toSupabase);
          step1 = supabaseClient.from('trainers').upsert(rows, { onConflict: 'name' })
            .then(function(res){ if (res.error) throw res.error; });
        } else {
          step1 = Promise.resolve();
        }
        /* Step 2: soft-delete any server rows whose name is not in the
           local list. Two-step (select then update by id) avoids fragile
           NOT IN list-encoding. */
        var localNames = profiles.map(function(p){ return p.name; });
        return step1.then(function(){
          return supabaseClient.from('trainers').select('id, name')
            .then(function(res){
              if (res.error) throw res.error;
              var toDeactivate = (res.data || [])
                .filter(function(r){ return localNames.indexOf(r.name) === -1; })
                .map(function(r){ return r.id; });
              if (toDeactivate.length === 0) return;
              return supabaseClient.from('trainers')
                .update({ is_active: false, updated_at: new Date().toISOString() })
                .in('id', toDeactivate)
                .then(function(res2){ if (res2.error) throw res2.error; });
            });
        });
      }
      try {
        localStorage.setItem('cmrc_trainers_v4', JSON.stringify(arr));
        return Promise.resolve();
      } catch (err) {
        return Promise.reject(err);
      }
    }
  };

  /* Notifications storage: per-trainer scoped reads, single-row PATCHes,
     and a filtered realtime subscription. Diverges from makeEntity (which
     is replace-all) because notifications are server-authored: the client
     never bulk-saves, only marks rows read. localStorage mode is a no-op
     shim - notifications are server-pushed, dev mode runs without them. */
  var notificationsStorage = {
    listForTrainer: function(trainerId, limit){
      if (limit == null) limit = 50;
      if (STORAGE_MODE === 'supabase') {
        return supabaseClient.from('notifications').select('*')
          .eq('target_trainer_id', trainerId)
          .order('created_at', { ascending: false })
          .limit(limit)
          .then(function(res){
            if (res.error) throw res.error;
            return (res.data || []).map(translate.notifications.fromSupabase);
          });
      }
      return Promise.resolve([]);
    },
    markRead: function(id){
      if (STORAGE_MODE === 'supabase') {
        return supabaseClient.from('notifications')
          .update({ read_at: new Date().toISOString() })
          .eq('id', id)
          .then(function(res){ if (res.error) throw res.error; });
      }
      return Promise.resolve();
    },
    markAllRead: function(trainerId){
      if (STORAGE_MODE === 'supabase') {
        return supabaseClient.from('notifications')
          .update({ read_at: new Date().toISOString() })
          .eq('target_trainer_id', trainerId)
          .is('read_at', null)
          .then(function(res){ if (res.error) throw res.error; });
      }
      return Promise.resolve();
    },
    /* Returns an unsubscribe fn. Server-side filter so other trainers'
       inserts never hit this client. Separate channel from 'app-changes'
       (which is unfiltered and shared across the entity tables). */
    subscribeForTrainer: function(trainerId, onInsert){
      if (STORAGE_MODE !== 'supabase' || !supabaseClient) {
        return function(){};
      }
      var channel = supabaseClient.channel('notifications-' + trainerId);
      channel.on('postgres_changes',
        { event: 'INSERT', schema: 'public', table: 'notifications',
          filter: 'target_trainer_id=eq.' + trainerId },
        function(payload){
          try { onInsert(translate.notifications.fromSupabase(payload.new)); }
          catch(err){ console.error('Notification insert handler failed:', err); }
        });
      channel.subscribe();
      return function(){
        try { supabaseClient.removeChannel(channel); } catch(_){}
      };
    },
    /* Phase 3: emit helpers used by trigger hooks. Fire-and-forget; never
       throw, never block the caller's primary action. Failures log to
       console - the bell can miss a row without the underlying class /
       sub state being wrong. localStorage mode is a no-op (matches the
       rest of this storage). */
    emit: function(targetTrainerId, type, payload){
      if (!targetTrainerId) return Promise.resolve();
      if (STORAGE_MODE !== 'supabase') return Promise.resolve();
      return supabaseClient.from('notifications').insert({
        target_trainer_id: targetTrainerId,
        type: type,
        payload: payload || {}
      }).then(function(res){
        if (res.error) console.error('Notification emit failed:', res.error);
      }).catch(function(err){
        console.error('Notification emit threw:', err);
      });
    },
    emitMany: function(rows){
      var clean = (rows || []).filter(function(r){ return r && r.target_trainer_id; });
      if (clean.length === 0) return Promise.resolve();
      if (STORAGE_MODE !== 'supabase') return Promise.resolve();
      return supabaseClient.from('notifications').insert(clean.map(function(r){
        return {
          target_trainer_id: r.target_trainer_id,
          type: r.type,
          payload: r.payload || {}
        };
      })).then(function(res){
        if (res.error) console.error('Notification emitMany failed:', res.error);
      }).catch(function(err){
        console.error('Notification emitMany threw:', err);
      });
    }
  };

  /* One-time localStorage key migration. The two pt_* keys date back to
     before the cmrc_* convention was settled. STORAGE_MODE is supabase in
     production so this rarely fires, but iPads that ever ran in
     localStorage mode could have data under the old key. Copies old → new
     when only the old key is present, then removes the old key. */
  (function migrateLocalStorageKeys(){
    if (typeof localStorage === 'undefined') return;
    var renames = [
      ['pt_trainers_v4', 'cmrc_trainers_v4'],
      ['pt_clients_v3',  'cmrc_clients_v3']
    ];
    renames.forEach(function(pair){
      var oldKey = pair[0]; var newKey = pair[1];
      try {
        var oldVal = localStorage.getItem(oldKey);
        if (oldVal == null) return;
        var newVal = localStorage.getItem(newKey);
        if (newVal == null) localStorage.setItem(newKey, oldVal);
        localStorage.removeItem(oldKey);

  /* Find the closest equivalent template in a different facility's list,
     matching by sessions count. Falls back to the 10-session default,
     then the first non-consult template. */
  function reSelectTemplate(prevTemplate, newList){
    if (!prevTemplate) return newList[Math.min(4, newList.length - 1)];
    var bySessions = newList.find(function(t){ return t.sessions === prevTemplate.sessions; });
    if (bySessions) return bySessions;
    var ten = newList.find(function(t){ return t.sessions === 10; });
    if (ten) return ten;
    return newList.find(function(t){ return t.sessions > 0; }) || newList[0];
  }

  /* UUID v4 generator. Uses crypto.randomUUID() in modern browsers
     (everywhere we run). Fallback only kicks in for ancient environments

     columns - intentional, surfaces the missing-API issue loudly. */
  function uid(){
    if (typeof crypto !== 'undefined' && typeof crypto.randomUUID === 'function') {

  /* Returns the array of packages a client has purchased.
     Backward compatible with old single-pkg shape. */
  /* Default-exclude soft-deleted packages. Pass { includeDeleted: true } to
     surface them (used by the admin Package History "Show deleted" toggle). */
  function getPackages(client, opts){
    if (!client) return [];
    var includeDeleted = !!(opts && opts.includeDeleted);
    if (Array.isArray(client.packages) && client.packages.length > 0) {
      return includeDeleted
        ? client.packages
        : client.packages.filter(function(p){ return !p.deleted_at; });
    }
    if (client.pkg) {
      /* Wrap legacy single-package shape into the new array form */
      return [{
        sessions: client.pkg.sessions,
        price: client.pkg.price,
        type: client.pkg.type,
        amountPaid: client.amountPaid != null ? client.amountPaid : client.pkg.price,
        purchaseDate: client.purchaseDate || client.createdAt || todayStr(),
        paymentType: client.paymentType || null,
        source: client.source || 'manual'
      }];
    }
    return [];
  }
  function totalSessionsPurchased(client){
    return getPackages(client).reduce(function(sum, p){ return sum + (p.sessions || 0); }, 0);
  }
  function totalPaid(client){
    return getPackages(client).reduce(function(sum, p){ return sum + (p.amountPaid != null ? p.amountPaid : (p.price || 0)); }, 0);
  }
  function sessionsRemaining(client){
    if (!client) return 0;
    var purchased = totalSessionsPurchased(client);
    /* Excused absences do not consume a session per policy.
       Attended sessions, late cancels, and no-shows do (the latter two
       are billed at 50% but still count against the package). */
    var consumed = (client.sessions || []).filter(function(s){
      return s.status !== 'excused';
    }).length;
    return Math.max(0, purchased - consumed);
  }
  function progressPct(client){
    if (!client) return 0;
    var purchased = totalSessionsPurchased(client);
    if (purchased === 0) return 0;
    var consumed = (client.sessions || []).filter(function(s){ return s.status !== 'excused'; }).length;
    return Math.min(100, Math.round((consumed / purchased) * 100));
  }

    return pkgs.map(function(p){ return p.sessions; }).join('+') + ' = ' + totalSessionsPurchased(client) + ' sess';
  }

  /* ============ AUDIT LOG HELPERS ============
     appendAuditEntry stamps an audit entry on a record and returns a copy.
     Capped at 100 entries; oldest are pruned when the cap is exceeded.
     Noise-field filter prevents transient operational data from polluting
     the diff: signatures, attendance arrays, and timestamps are excluded
     so the audit log reads as a clear "structural mutation" history. */
  var AUDIT_NOISE_KEYS = [
    'audit_log', 'updated_at', 'created_at', 'createdAt', 'updatedAt',
    'previous_names', 'sessions', 'attendance', 'sub_assignments', 'subAssignments',
    'cancellations'
  ];

  function diffRecords(before, after){
    if (!before || !after) return null;
    var seen = {};
    var changes = {};
    Object.keys(before).forEach(function(k){ seen[k] = true; });
    Object.keys(after).forEach(function(k){ seen[k] = true; });
    Object.keys(seen).forEach(function(k){
      if (AUDIT_NOISE_KEYS.indexOf(k) !== -1) return;
      var b = before[k];
      var a = after[k];
      var bs, as;
      try { bs = JSON.stringify(b); } catch(_){ bs = String(b); }
      try { as = JSON.stringify(a); } catch(_){ as = String(a); }
      if (bs !== as) changes[k] = { from: b, to: a };
    });
    return Object.keys(changes).length > 0 ? changes : null;
  }

  function appendAuditEntry(record, session, action, opts){
    opts = opts || {};
    var changes = (opts.changes !== undefined)
      ? opts.changes
      : ((action === 'update' || action === 'package_edited') ? diffRecords(opts.before, opts.after) : null);
    var entry = {
      id: uid(),
      ts: new Date().toISOString(),
      actor: (session && (session.trainer_name || session.name)) || 'unknown',
      actor_id: (session && session.trainer_id) || null,
      action: action,
      entity_type: opts.entity_type || null,
      target_id: opts.target_id || null,
      before: opts.before == null ? null : opts.before,
      after: opts.after == null ? null : opts.after,
      changes: changes
    };
    var log = (record.audit_log || []).concat([entry]);
    if (log.length > 100) log = log.slice(log.length - 100);
    return Object.assign({}, record, { audit_log: log });
  }
  /* Match logic: prefer email (unique), then name+DOB, then name only */
  function findMatchingClient(clients, candidate){
    if (!candidate) return null;
    /* v2: RecTrac member ID is the primary match key (highest confidence)
       when the import source provides one. Falls back to legacy chain for
       manual imports that lack a member ID. */
    var cMemberId = (candidate.rectracMemberId || '').trim();
    if (cMemberId) {
      var byId = clients.find(function(x){ return (x.rectracMemberId || '').trim() === cMemberId; });
      if (byId) return { match: byId, confidence: 'high', reason: 'RecTrac ID match' };
    }
    var cEmail = (candidate.email || '').toLowerCase().trim();
    var cName = (candidate.name || '').toLowerCase().trim();
    var cDob = (candidate.dob || '').trim();
    if (cEmail) {
      var byEmail = clients.find(function(x){ return (x.email || '').toLowerCase().trim() === cEmail; });
      if (byEmail) return { match: byEmail, confidence: 'high', reason: 'email match' };
    }
    if (cDob && cName) {
      var byNameDob = clients.find(function(x){
        return (x.name || '').toLowerCase().trim() === cName && (x.dob || '').trim() === cDob;
      });
      if (byNameDob) return { match: byNameDob, confidence: 'high', reason: 'name + DOB match' };
    }
    if (cName) {
      var byName = clients.find(function(x){ return (x.name || '').toLowerCase().trim() === cName; });
      if (byName) return { match: byName, confidence: 'medium', reason: 'name match (verify)' };
    }
    return null;
  }
  function addPackageToClient(client, newPkg){
    /* Use the raw packages array, not getPackages() - the latter filters
       out soft-deleted entries and reassigning the result would silently
       drop them from the client record. */
    var pkgs = (client.packages || []).slice();
    pkgs.push(newPkg);
    var updated = Object.assign({}, client, {
      packages: pkgs,
      lastPackageAddedAt: new Date().toISOString()
    });
    /* Strip the legacy single-package shape so we don't have two sources of truth */
    delete updated.pkg;
    delete updated.amountPaid;
    delete updated.purchaseDate;
    delete updated.paymentType;
    return updated;
  }

  /* Field-level intake validation. Applied only on new submits going

  function isValidEmail(s){ return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test((s || '').trim()); }
  function phoneDigitCount(s){ return ((s || '').match(/\d/g) || []).length; }
  function intakeFieldErrors(form){
    var errors = {};
    var name = (form.name || form.participantName || '').trim();
    var phone = (form.phone || '').trim();
    var email = (form.email || '').trim();
    if (!name) errors.name = 'Name is required';

      errors.email = 'At least one contact method (email or phone) is required';
    } else {
      if (email && !isValidEmail(email)) errors.email = 'Email must be a valid email address';
      if (phone && phoneDigitCount(phone) < 10) errors.phone = 'Phone must be at least 10 digits';
    }

  function hasErrors(errors){
    if (!errors) return false;

  function parseYMD(s){
    if (!s) return null;
    var parts = s.split('-');
    if (parts.length !== 3) return null;
    return new Date(parseInt(parts[0],10), parseInt(parts[1],10)-1, parseInt(parts[2],10));
  }
  function toYMD(d){
    var m = String(d.getMonth()+1).padStart(2,'0');
    var day = String(d.getDate()).padStart(2,'0');
    return d.getFullYear() + '-' + m + '-' + day;
  }
  function addDays(d, n){
    var out = new Date(d.getTime());
    out.setDate(out.getDate() + n);
    return out;
  }
  function formatShort(d){
    return d.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });
  }
  function formatTime12(t){
    if (!t) return '';
    var parts = t.split(':');
    var h = parseInt(parts[0],10);
    var m = parts[1] || '00';
    var ampm = h >= 12 ? 'PM' : 'AM';
    var h12 = h % 12; if (h12 === 0) h12 = 12;
    return h12 + ':' + m + ' ' + ampm;
  }
  function minutesBetween(start, end){
    if (!start || !end) return 0;
    var s = start.split(':'); var e = end.split(':');
    var sm = parseInt(s[0],10)*60 + parseInt(s[1],10);
    var em = parseInt(e[0],10)*60 + parseInt(e[1],10);
    return Math.max(0, em - sm);
  }
  /* Prefer c.duration (minutes) when set - that's what CSV schedule-paste
     classes carry. Fall back to startTime/endTime difference for seed and
     manually-created classes. */
  function _classMinutes(c){
    if (typeof c.duration === 'number' && c.duration > 0) return c.duration;
    return minutesBetween(c.startTime, c.endTime);
  }
  function classDurationHours(c){
    return _classMinutes(c) / 60;
  }
  /* GX class hours rule (v2.1): a "1-hour class" in this department actually
     runs 50-60 minutes on the schedule. Per Reagan's call: anything in the
     50-60 minute band counts as a full 1.0 hour for time-card purposes.
     Shorter (e.g., 30-min express) = 0.5. Longer (e.g., 90-min workshop) = 1.5.

  /* Given a class list and a date window, return every scheduled occurrence

    var closureMap = {};

    var endMs = endDate.getTime();

      var closure = closureMap[ymd] || null;
      classes.forEach(function(c){
        if (normalizeDow(c.dayOfWeek) !== dow) return;
        /* v2.2: respect optional season window. seasonStart/seasonEnd are
           inclusive YMD strings. Classes without dates are perpetual. This
           preserves attendance history when a class ends seasonally or
           permanently - just set seasonEnd, don't delete. */
        if (c.seasonStart && ymd < c.seasonStart) return;
        if (c.seasonEnd && ymd > c.seasonEnd) return;
        var att = (c.attendance || []).find(function(a){ return a.date === ymd; });
        var cancellation = (c.cancellations || []).find(function(x){ return x.date === ymd; });
        var assignedSub = getAssignedSubForDate(c, ymd);
        var scheduledInstructor = assignedSub ? assignedSub.subInstructor : c.instructor;
        var actualInstructor = att ? att.instructor : null;
        var wasSub = !!(att && att.instructor && att.instructor !== c.instructor);
        result.push({
          date: ymd,
          dateObj: new Date(cursor.getTime()),
          cls: c,
          logged: !!att,
          headcount: att ? att.headcount : null,
          attendance: att || null,
          cancellation: cancellation || null,
          closure: closure,
          isClosed: !!closure,
          isCancelled: !!cancellation,
          assignedSub: assignedSub,
          scheduledInstructor: scheduledInstructor,
          actualInstructor: actualInstructor,

      });
      cursor = addDays(cursor, 1);

    return result.sort(function(a,b){

      return (a.cls.startTime || '') < (b.cls.startTime || '') ? -1 : 1;
