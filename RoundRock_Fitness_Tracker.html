  /* ============ LOG SESSION MODAL ============ */
  /* Pre-schedule a future session. Creates a placeholder with status
     'scheduled' that consumes a slot against the package cap and shows up
     on the trainer's Today view on the booked date (and as overdue if the
     date passes without sign-off). The trainer signs off later via
     LogSessionModal in edit mode, which flips the status to a final
     outcome. Hard-blocks scheduling when the package has 0 remaining;
     warns when this is the last session. */
  function ScheduleSessionModal(props){
    var ctx = props.ctx;
    var client = props.client;
    var remaining = props.remaining;

    var now = new Date();
    var hh = String(now.getHours()).padStart(2,'0');
    var mm = String(now.getMinutes()).padStart(2,'0');

    var dateTuple = useState(todayStr());
    var date = dateTuple[0]; var setDate = dateTuple[1];
    var timeTuple = useState(hh + ':' + mm);
    var time = timeTuple[0]; var setTime = timeTuple[1];
    var noteTuple = useState('');
    var note = noteTuple[0]; var setNote = noteTuple[1];

    function save(){
      if (!date) { ctx.toast('Date is required', 'error'); return; }
      if (!time) { ctx.toast('Time is required', 'error'); return; }
      if (remaining <= 0) { ctx.toast('No sessions remaining in package', 'error'); return; }
      var sess = {
        id: uid(),
        date: date,
        time: time,
        status: 'scheduled',
        note: note || null,
        trainerName: client.trainerName,
        scheduledBy: (ctx.session && ctx.session.name) || null,
        scheduledAt: new Date().toISOString()
      };
      props.onSchedule(sess);
    }

    return e('div', { className: 'modal-overlay', onClick: props.onClose },
      e('div', { className: 'modal', onClick: function(ev){ ev.stopPropagation(); } },
        e('div', { className: 'modal-header' },
          e('h3', null, 'Schedule Session'),
          e('button', { className: 'modal-close', onClick: props.onClose }, '×')
        ),
        e('div', { className: 'modal-body' },
          e('div', { style: { fontSize: '14px', color: 'var(--slate)', marginBottom: '14px' } },
            'Pre-booking a session for ', e('b', null, client.name), '.'
          ),
          remaining === 1 && e('div', { className: 'banner amber' },
            '⚠ This is the LAST session in their package. Discuss renewal at sign-off.'
          ),
          e('div', { className: 'row2' },
            e('div', { className: 'field' },
              e('label', null, 'Date'),
              e('input', { type: 'date', value: date, onChange: function(ev){ setDate(ev.target.value); } })
            ),
            e('div', { className: 'field' },
              e('label', null, 'Time'),
              e('input', { type: 'time', value: time, onChange: function(ev){ setTime(ev.target.value); } })
            )
          ),
          e('div', { className: 'field' },
            e('label', null, 'Note (optional)'),
            e('input', {
              type: 'text', value: note,
              onChange: function(ev){ setNote(ev.target.value); },
              placeholder: 'e.g. focus on lower body'
            })
          ),
          e('div', { style: { fontSize: '12px', color: 'var(--slate)', marginTop: '8px' } },
            remaining + ' session' + (remaining === 1 ? '' : 's') + ' remaining after this is consumed.'
          )
        ),
        e('div', { className: 'modal-footer' },
          e('button', { className: 'btn btn-ghost', onClick: props.onClose }, 'Cancel'),
          e('button', { className: 'btn btn-primary', onClick: save, disabled: !date || !time || remaining <= 0 }, 'Schedule')
        )
      )
    );
  }

  function LogSessionModal(props){
    var ctx = props.ctx;
    var now = new Date();
    var hh = String(now.getHours()).padStart(2,'0');
    var mm = String(now.getMinutes()).padStart(2,'0');

    /* When editing an existing session (sign-off of a pre-scheduled
       placeholder), prefill date/time/note from the existing record. */
    var existing = props.existingSession || null;

    var stepTuple = useState(1); /* 1: status+date, 2: trainer sig (attended), 3: client sig (attended) */
    var step = stepTuple[0];
    var setStep = stepTuple[1];

    var statusTuple = useState('attended');
    var status = statusTuple[0];
    var setStatus = statusTuple[1];

    var dateTuple = useState(existing ? existing.date : todayStr());
    var date = dateTuple[0];
    var setDate = dateTuple[1];

    var timeTuple = useState(existing && existing.time ? existing.time : (hh + ':' + mm));
    var time = timeTuple[0];
    var setTime = timeTuple[1];

    var noteTuple = useState(existing && existing.note ? existing.note : '');
    var note = noteTuple[0];
    var setNote = noteTuple[1];

    /* v2.1: PT session duration picker. 1 hour or 30 minutes.
       Default to 1 hour. Only affects forward hours when status='attended'. */
    var durationTuple = useState(1);
    var duration = durationTuple[0];
    var setDuration = durationTuple[1];

    var trainerSigTuple = useState(null);
    var trainerSig = trainerSigTuple[0];
    var setTrainerSig = trainerSigTuple[1];

    var clientSigTuple = useState(null);
    var clientSig = clientSigTuple[0];
    var setClientSig = clientSigTuple[1];

    function finish(skipClientSig){
      var sess = {
        id: uid(),
        date: date,
        time: time,
        status: status,
        note: note || null,
        /* v2.1: trainer-selected duration (1 hour or 30 minutes).
           Only counts toward calcTrainerHours when status === 'attended'. */
        durationHours: duration,
        trainerSig: status === 'attended' ? trainerSig : null,
        clientSig: status === 'attended' && !skipClientSig ? clientSig : null

        e('button', {
          className: 'btn btn-primary',

    return e('div', { className: 'modal-overlay', onClick: props.onClose },
      e('div', { className: 'modal', onClick: function(ev){ ev.stopPropagation(); } },
        e('div', { className: 'modal-header' },
          e('h2', null, 'Log Session'),

  /* ============ CLASS CARD ============ */
  function ClassCard(props){
    var c = props.cls;
    var att = c.attendance || [];
    var total = att.length;
    var sum = att.reduce(function(s,a){ return s + (a.headcount || 0); }, 0);
    var avg = total ? Math.round(sum / total) : 0;
    var cap = c.capacity;
    var fill = (cap && avg) ? Math.round((avg / cap) * 100) : null;
    var typeColor = CLASS_TYPE_COLOR[c.classType] || 'var(--teal)';

    /* v2.2: season status. Ended classes get a strike-through styling and
       a status pill so they're visible in lists but clearly retired. */
    var seasonStatus = classSeasonStatus(c);

  /* ============ LOG ATTENDANCE MODAL ============ */
  function LogAttendanceModal(props){
    var ctx = props.ctx;
    var now = new Date();
    var hh = String(now.getHours()).padStart(2,'0');
    var mm = String(now.getMinutes()).padStart(2,'0');

    var initialDate = props.initialDate || todayStr();
    var dateTuple = useState(initialDate);
    var date = dateTuple[0];
    var setDate = dateTuple[1];

    var timeTuple = useState(props.cls.startTime || (hh + ':' + mm));
    var time = timeTuple[0];
    var setTime = timeTuple[1];

    var headcountTuple = useState('');
    var headcount = headcountTuple[0];
    var setHeadcount = headcountTuple[1];

    /* Initial instructor: forced (props.forceInstructor) > assigned sub for date >
       current trainer (if logged in) > class's regular instructor */
    var instructorTuple = useState(function(){
      if (props.forceInstructor) return props.forceInstructor;
      var sub = getAssignedSubForDate(props.cls, initialDate);
      if (sub) return sub.subInstructor;
      if (ctx.session && ctx.session.role === 'trainer') return ctx.session.name;
      return props.cls.instructor;
    });
    var instructor = instructorTuple[0];
    var setInstructor = instructorTuple[1];

    /* When the date changes, if a sub is assigned for that date, auto-pick that instructor */
    useEffect(function(){
      var sub = getAssignedSubForDate(props.cls, date);
      if (sub) setInstructor(sub.subInstructor);
    }, [date]);

    var isSubbing = instructor && instructor !== props.cls.instructor;
    var assignedSub = getAssignedSubForDate(props.cls, date);

    function submit(){
      var n = parseInt(headcount, 10);
      if (isNaN(n) || n < 0) { ctx.toast('Enter a valid headcount', 'error'); return; }
      var att = {
        id: uid(),
        date: date,
        time: time,
        headcount: n,
        instructor: instructor,
        /* v2: actualInstructor mirrors instructor; calcTrainerHours reads it
           by either name. durationHours snapshots the class window so future
           class-time edits don't retroactively change paid hours.
           v2.1: applies gxClassHours rule (50-60 min = 1 hour, else actual). */
        actualInstructor: instructor,
        durationHours: gxClassHours(props.cls)
      };

      /* v2: if logging attendance with a different instructor than the regular,
         make sure a sub assignment record exists in the claimed state for
         admin review. Pre-assigned subs (already 'claimed' or 'approved') are
         left alone. Open or missing records are upgraded to claimed. */
      var isSub = instructor && instructor !== props.cls.instructor;
      if (isSub) {
        var existing = getAssignedSubForDate(props.cls, date);
        var existingStatus = existing ? subStatus(existing) : null;
        if (!existing || existingStatus === 'open') {
          ctx.addSubAssignment(props.cls.id, {
            id: existing ? existing.id : uid(),
            date: date,
            subInstructor: instructor,
            originalInstructor: props.cls.instructor,
            note: existing ? existing.note : null,
            status: 'claimed',
            claimedBy: instructor,
            claimedAt: new Date().toISOString(),
            approvedBy: null,

  /* Item types for manual admin time logging.

     'Other' surfaces a custom field. */
  var ITEM_TYPES = ['Program Creation', 'Meeting', 'Programming', 'Admin Task', 'Training', 'Community Event', 'Other'];

  /* Default duration in minutes per item type (used to auto-fill timeOut). */
  var ITEM_TYPE_DEFAULT_MINUTES = {
    'Program Creation': 30,
    'Meeting': 60,
    'Programming': 60,
    'Admin Task': 30,
    'Training': 60,
    'Community Event': 120,
    'Other': 60

  /* ============ LOG ADMIN TIME MODAL ============ */
  function LogAdminTimeModal(props){
    var ctx = props.ctx;
    var existing = props.item || null;
    var defaultAssignee = props.defaultAssignee || (ctx.session && ctx.session.name) || '';

    var titleTuple = useState(existing ? existing.title : '');
    var title = titleTuple[0]; var setTitle = titleTuple[1];
    var typeTuple = useState(existing ? existing.type : 'Program Creation');
    var type = typeTuple[0]; var setType = typeTuple[1];
    var customTypeTuple = useState(existing ? (existing.customType || '') : '');
    var customType = customTypeTuple[0]; var setCustomType = customTypeTuple[1];
    var dateTuple = useState(existing ? existing.date : todayStr());
    var date = dateTuple[0]; var setDate = dateTuple[1];
    var inTuple = useState(existing ? existing.timeIn : '');
    var timeIn = inTuple[0]; var setTimeIn = inTuple[1];
    var outTuple = useState(existing ? existing.timeOut : '');
    var timeOut = outTuple[0]; var setTimeOut = outTuple[1];
    var assigneesTuple = useState(existing ? (existing.assignees || []) : (defaultAssignee ? [defaultAssignee] : []));
    var assignees = assigneesTuple[0]; var setAssignees = assigneesTuple[1];
    var noteTuple = useState(existing ? (existing.note || '') : '');
    var note = noteTuple[0]; var setNote = noteTuple[1];

    var hours = hoursFromTimes(timeIn, timeOut);

    /* v2.1: when the type changes (e.g., user picks 'Program Creation'),
       and the user has set a timeIn but no timeOut, auto-fill timeOut
       using the type's default duration. Doesn't touch existing items
       on edit. */
    function changeType(newType){
      setType(newType);
      if (existing) return;
      if (!timeIn) return;
      if (timeOut) return;
      var mins = ITEM_TYPE_DEFAULT_MINUTES[newType];
      if (!mins) return;
      var parts = timeIn.split(':');
      if (parts.length !== 2) return;
      var totalMins = parseInt(parts[0], 10) * 60 + parseInt(parts[1], 10) + mins;
      if (totalMins >= 24 * 60) return;
      var hh = String(Math.floor(totalMins / 60)).padStart(2, '0');
      var mm = String(totalMins % 60).padStart(2, '0');
      setTimeOut(hh + ':' + mm);
    }

    /* When timeIn is set first and type already chosen, auto-fill timeOut
       too (helps Program Creation flow: pick type, set start, done). */
    function changeTimeIn(newTimeIn){
      setTimeIn(newTimeIn);
      if (existing) return;
      if (timeOut) return;
      if (!newTimeIn) return;
      var mins = ITEM_TYPE_DEFAULT_MINUTES[type];
      if (!mins) return;
      var parts = newTimeIn.split(':');
      if (parts.length !== 2) return;
      var totalMins = parseInt(parts[0], 10) * 60 + parseInt(parts[1], 10) + mins;
      if (totalMins >= 24 * 60) return;
      var hh = String(Math.floor(totalMins / 60)).padStart(2, '0');
      var mm = String(totalMins % 60).padStart(2, '0');
      setTimeOut(hh + ':' + mm);
    }

    function toggleAssignee(name){
      setAssignees(function(list){
        if (list.indexOf(name) === -1) return list.concat([name]);
        return list.filter(function(x){ return x !== name; });
      });
    }

    function submit(){
      if (!title.trim()) { ctx.toast('Title is required', 'error'); return; }
      if (!timeIn || !timeOut) { ctx.toast('Time in and time out are required', 'error'); return; }
      if (hours <= 0) { ctx.toast('Time out must be after time in', 'error'); return; }
      if (!assignees.length) { ctx.toast('At least one assignee is required', 'error'); return; }
      if (type === 'Other' && !customType.trim()) { ctx.toast('Custom type is required when type is Other', 'error'); return; }
      var item = {
        id: existing ? existing.id : uid(),
        title: title.trim(),
        type: type,
        customType: type === 'Other' ? customType.trim() : null,
        date: date,
        timeIn: timeIn,
        timeOut: timeOut,
        hours: hours,
        assignees: assignees.slice(),
        note: note.trim() || null,
        createdBy: existing ? existing.createdBy : ((ctx.session && ctx.session.name) || 'admin'),
        createdAt: existing ? existing.createdAt : new Date().toISOString()
      };
      ctx.upsertItem(item);
      ctx.toast(existing ? 'Admin time updated \u2713' : 'Admin time logged \u2713');
      props.onClose();
    }

    return e('div', { className: 'modal-backdrop', onClick: props.onClose },
      e('div', { className: 'modal', onClick: function(ev){ ev.stopPropagation(); } },
        e('div', { className: 'modal-head' },
          e('h3', null, existing ? 'Edit Admin Time' : 'Log Admin Time'),
          e('button', { className: 'modal-close', onClick: props.onClose }, '\u00d7')
        ),
        e('div', { className: 'modal-body' },
          e('div', { className: 'field' },
            e('label', null, 'Title'),
            e('input', { type: 'text', value: title, placeholder: 'e.g. Q3 program planning', onChange: function(ev){ setTitle(ev.target.value); } })
          ),
          e('div', { className: 'field' },
            e('label', null, 'Type'),
            e('select', { value: type, onChange: function(ev){ changeType(ev.target.value); } },
              ITEM_TYPES.map(function(t){ return e('option', { key: t, value: t }, t); })
            )
          ),
          type === 'Other' && e('div', { className: 'field' },
            e('label', null, 'Custom type'),
            e('input', { type: 'text', value: customType, onChange: function(ev){ setCustomType(ev.target.value); } })
          ),
          e('div', { className: 'field' },
            e('label', null, 'Date'),
            e('input', { type: 'date', value: date, onChange: function(ev){ setDate(ev.target.value); } })
          ),
          e('div', { style: { display: 'flex', gap: '10px' } },
            e('div', { className: 'field', style: { flex: 1 } },
              e('label', null, 'Time in'),
              e('input', { type: 'time', value: timeIn, onChange: function(ev){ changeTimeIn(ev.target.value); } })
            ),
            e('div', { className: 'field', style: { flex: 1 } },
              e('label', null, 'Time out'),
              e('input', { type: 'time', value: timeOut, onChange: function(ev){ setTimeOut(ev.target.value); } })
            )
          ),
          e('div', { style: { fontSize: '13px', color: hours > 0 ? 'var(--teal)' : 'var(--slate)', marginBottom: '14px' } },
            hours > 0 ? ('Calculated: ' + hours.toFixed(2) + ' hours') : 'Enter time in and time out'
          ),
          e('div', { className: 'field' },
            e('label', null, 'Assignees (each gets full hours credited, not divided)'),
            e('div', { style: { display: 'flex', flexWrap: 'wrap', gap: '6px' } },
              ctx.trainers.map(function(t){
                var picked = assignees.indexOf(t) !== -1;
                return e('button', {
                  key: t,
                  type: 'button',
                  onClick: function(){ toggleAssignee(t); },
                  style: {
                    border: '1.5px solid ' + (picked ? 'var(--teal)' : 'var(--border)'),
                    background: picked ? 'var(--teal-bg)' : '#fff',
                    color: picked ? 'var(--teal)' : 'var(--navy)',
                    padding: '8px 12px',
                    borderRadius: '999px',
                    fontSize: '13px',
                    fontWeight: picked ? 600 : 500
                  }
                }, (picked ? '\u2713 ' : '') + t);
              })
            )
          ),
          e('div', { className: 'field' },
            e('label', null, 'Note (optional)'),
            e('textarea', { rows: 2, value: note, onChange: function(ev){ setNote(ev.target.value); } })
          )
        ),
        e('div', { className: 'modal-footer' },
          existing && e('button', {
            className: 'btn btn-ghost',
            style: { color: 'var(--red)', marginRight: 'auto' },
            onClick: function(){
              if (confirm('Delete this admin time entry?')) {
                ctx.deleteItem(existing.id);
                ctx.toast('Admin time deleted');
                props.onClose();
              }
            }
          }, 'Delete'),
          e('button', { className: 'btn btn-ghost', onClick: props.onClose }, 'Cancel'),
          e('button', { className: 'btn btn-teal', onClick: submit }, existing ? 'Save Changes' : 'Log Time')
        )
      )
    );
  }

  /* ============ TIME CARD VIEW (trainer) ============
     Shows the trainer their full pay-period breakdown: every PT session,
     every GX class, every sub class, every admin item, with rolling
     subtotals and category totals. Replaces the simple Admin tab.
     Lets the trainer pick previous / current / next pay period to verify
     numbers before payroll. */
  function TimeCardView(props){
    var ctx = props.ctx;
    var trainerName = ctx.session.name;

    /* 0 = current period, -1 = previous (just closed), +1 = next */
    var offsetTuple = useState(0);
    var offset = offsetTuple[0]; var setOffset = offsetTuple[1];

    var modalTuple = useState(null); /* null | 'new' | item-object */
    var modal = modalTuple[0]; var setModal = modalTuple[1];

    var card = calcTrainerHours(trainerName, offset, ctx.clients, ctx.classes, ctx.items || [], ctx.wros || [], ctx.contacts || []);
    /* PT section pools 1:1 sessions and orientations together (per Selisa's
       pattern). Each entry carries a 'kind' so the label can disambiguate. */
    var pt = card.forwardFacing.ptSessions
      .concat(card.forwardFacing.orientations || [])
      .slice()
      .sort(function(a, b){
        if (a.date !== b.date) return a.date < b.date ? -1 : 1;
        return 0;
      });
    var gx = card.forwardFacing.gxClasses.slice().sort(function(a, b){
      if (a.date !== b.date) return a.date < b.date ? -1 : 1;
      return 0;
    });
    var subs = card.forwardFacing.subCoverage.slice().sort(function(a, b){
      if (a.date !== b.date) return a.date < b.date ? -1 : 1;
      return 0;
    });
    var manual = card.manualAdmin.items.slice().sort(function(a, b){
      if (a.date !== b.date) return a.date < b.date ? -1 : 1;
      return (a.timeIn || '') < (b.timeIn || '') ? -1 : 1;
    });

    /* Helper to render one entry row with rolling-total tracking. */
    function entryRow(opts){
      return e('div', {
        key: opts.key,
        onClick: opts.onClick || null,
        style: {
          display: 'flex',
          justifyContent: 'space-between',
          alignItems: 'center',
          padding: '10px 14px',
          borderBottom: '1px solid var(--border)',
          fontSize: '13px',
          cursor: opts.onClick ? 'pointer' : 'default',
          background: opts.onClick ? '#fff' : 'transparent'
        }
      },
        e('div', { style: { flex: 1 } },
          e('div', { style: { fontWeight: 500, color: 'var(--navy)' } }, opts.title),
          opts.subtitle && e('div', { style: { fontSize: '11px', color: 'var(--slate-soft)', marginTop: '2px' } }, opts.subtitle)
        ),
        e('div', { style: { display: 'flex', alignItems: 'baseline', gap: '12px' } },
          e('div', { style: { fontWeight: 600, color: 'var(--teal)', fontSize: '14px' } }, '+' + opts.hours.toFixed(2)),
          e('div', { style: { fontSize: '11px', color: 'var(--slate-soft)', minWidth: '52px', textAlign: 'right' } }, '= ' + opts.running.toFixed(2))
        )
      );
    }

    /* Compute a rolling running-total per entry within each section. */
    function withRunning(entries){
      var running = 0;
      return entries.map(function(en){
        running = Math.round((running + en.hours) * 100) / 100;
        return Object.assign({}, en, { running: running });
      });
    }
    var ptRolling = withRunning(pt);
    var gxRolling = withRunning(gx);
    var subRolling = withRunning(subs);
    var manualRolling = withRunning(manual);

    function section(heading, rolling, emptyMsg, totalLabel, totalValue, headingColor){
      headingColor = headingColor || 'var(--navy)';
      return e('div', {
        style: {
          background: '#fff',
          border: '1.5px solid var(--border)',
          borderRadius: '12px',
          marginBottom: '14px',
          overflow: 'hidden'
        }
      },
        e('div', {
          style: {
            padding: '10px 14px',
            background: 'var(--cream-2)',
            borderBottom: '1px solid var(--border)',
            display: 'flex',
            justifyContent: 'space-between',
            alignItems: 'baseline'
          }
        },

          e('div', { style: { fontSize: '13px', color: headingColor, fontWeight: 700 } }, totalLabel + ': ' + totalValue.toFixed(2) + ' hr')
        ),
        rolling.length === 0
          ? e('div', { style: { padding: '14px', fontStyle: 'italic', color: 'var(--slate-soft)', fontSize: '13px' } }, emptyMsg)
          : rolling.map(function(en, i){
              return entryRow({
                key: en.key || i,
                title: en.title,
                subtitle: en.subtitle,
                hours: en.hours,
                running: en.running,
                onClick: en.onClick
              });
            })
      );
    }

    return e('div', null,
      /* Pay period selector */
      e('div', {
        style: {
          display: 'flex',
          gap: '6px',
          marginBottom: '14px',
          background: 'var(--cream-2)',
          padding: '4px',
          borderRadius: '999px'
        }
      },
        [{ v: -1, l: 'Previous' }, { v: 0, l: 'Current' }, { v: 1, l: 'Next' }].map(function(o){
          var active = offset === o.v;
          return e('button', {
            key: o.v,
            type: 'button',
            onClick: function(){ setOffset(o.v); },
            style: {
              flex: 1,
              padding: '8px',
              borderRadius: '999px',
              border: 'none',
              background: active ? 'var(--teal)' : 'transparent',
              color: active ? '#fff' : 'var(--slate)',
              fontWeight: active ? 700 : 500,
              fontSize: '13px',
              cursor: 'pointer'
            }
          }, o.l);
        })
      ),

      /* Period header */
      e('div', {
        style: {
          background: 'var(--navy)',
          color: '#fff',
          padding: '14px 16px',
          borderRadius: '12px',
          marginBottom: '16px'
        }
      },
        e('div', { style: { fontSize: '11px', textTransform: 'uppercase', letterSpacing: '0.06em', opacity: 0.7, marginBottom: '4px' } },
          'Pay period'
        ),
        e('div', { style: { fontSize: '16px', fontWeight: 700 } }, card.payPeriod.label),
        e('div', { style: { fontSize: '12px', opacity: 0.8, marginTop: '4px' } },
          'Pay day: ' + formatShort(card.payPeriod.payDay)
        )
      ),

      /* Section: Personal Training (1:1 sessions + WRO orientations) */
      section(
        '\ud83c\udfcb\ufe0f Personal Training',
        ptRolling.map(function(s){
          var isOrient = s.kind === 'orientation';
          return {
            title: s.clientName + (isOrient ? '  \u00b7  Weight Room Orientation' : ''),
            subtitle: formatShort(parseYMD(s.date)) +
              (isOrient
                ? ' \u00b7 ' + s.hours.toFixed(2) + ' hr orientation'
                : (s.hours === 0.5 ? ' \u00b7 30 min' : ' \u00b7 1 hour')),
            hours: s.hours,
            running: s.running
          };
        }),

  /* ============ ADMIN TIME VIEW (admin and trainer) ============ */
  function AdminTimeView(props){
    var ctx = props.ctx;
    var isAdmin = !!props.isAdmin;
    var trainerName = props.trainerName || (ctx.session && ctx.session.name) || null;

    var modalTuple = useState(null); /* null | 'new' | item-object-for-edit */
    var modal = modalTuple[0]; var setModal = modalTuple[1];

    var filterTuple = useState('all'); /* all | mine | <type> */
    var filter = filterTuple[0]; var setFilter = filterTuple[1];

    var rangeTuple = useState('30'); /* days back: 7 | 30 | 90 | all */
    var range = rangeTuple[0]; var setRange = rangeTuple[1];

    var allItems = ctx.items || [];
    var visibleItems = allItems.filter(function(it){
      if (!isAdmin && trainerName) {
        if (!(it.assignees || []).some(function(n){ return trainerNameMatches(trainerName, n); })) return false;
      }
      if (filter === 'mine' && trainerName) {
        if (!(it.assignees || []).some(function(n){ return trainerNameMatches(trainerName, n); })) return false;
      } else if (filter !== 'all' && filter !== 'mine') {
        if (it.type !== filter) return false;
      }
      if (range !== 'all') {
        var days = parseInt(range, 10);
        var cutoff = addDays(new Date(), -days);
        var cutoffYMD = toYMD(cutoff);
        if (it.date < cutoffYMD) return false;
      }
      return true;
    }).sort(function(a, b){
      if (a.date !== b.date) return a.date < b.date ? 1 : -1;
      return (a.timeIn || '') < (b.timeIn || '') ? 1 : -1;
    });

    var totalHours = visibleItems.reduce(function(s, it){ return s + (it.hours || 0); }, 0);

    return e('div', null,
      e('div', { className: 'section-head' },
        e('div', null,
          e('h2', null, 'Admin Time' + (isAdmin ? '' : ' (My Items)')),
          e('div', { className: 'meta' },
            visibleItems.length + ' item' + (visibleItems.length === 1 ? '' : 's') +
            ' \u00b7 ' + totalHours.toFixed(2) + ' total hours'
          )
        ),
        e('button', { className: 'btn btn-teal', onClick: function(){ setModal('new'); } }, '+ Log Admin Time')
      ),
      e('div', { style: { display: 'flex', gap: '8px', flexWrap: 'wrap', marginBottom: '14px' } },
        e('select', {
          value: filter,
          onChange: function(ev){ setFilter(ev.target.value); },
          style: { width: 'auto', minWidth: '160px' }
        },
          e('option', { value: 'all' }, 'All types'),
          isAdmin && trainerName && e('option', { value: 'mine' }, 'Only mine'),
          ITEM_TYPES.map(function(t){ return e('option', { key: t, value: t }, t); })
        ),
        e('select', {
          value: range,
          onChange: function(ev){ setRange(ev.target.value); },
          style: { width: 'auto', minWidth: '140px' }
        },
          e('option', { value: '7' }, 'Last 7 days'),
          e('option', { value: '30' }, 'Last 30 days'),
          e('option', { value: '90' }, 'Last 90 days'),
          e('option', { value: 'all' }, 'All time')
        )
      ),
      visibleItems.length === 0
        ? e('div', { className: 'empty' },
            e('div', { className: 'icon' }, '\ud83d\udcdd'),
            e('h3', null, 'No admin time logged'),
            e('div', null, 'Tap "+ Log Admin Time" to record meetings, planning, programming, or community events.')
          )
        : e('div', null,
            visibleItems.map(function(it){
              var canEdit = isAdmin || (trainerName && trainerNameMatches(trainerName, it.createdBy));
              return e('div', {
                key: it.id,
                onClick: canEdit ? function(){ setModal(it); } : null,
                style: {
                  background: '#fff',
                  border: '1.5px solid var(--border)',
                  borderRadius: '12px',
                  padding: '14px 16px',
                  marginBottom: '10px',
                  cursor: canEdit ? 'pointer' : 'default'

  /* ============ SUB APPROVAL PANEL ============ */
  function SubApprovalPanel(props){
    var ctx = props.ctx;
    var actionTargetTuple = useState(null); /* { sub, cls, action } */
    var actionTarget = actionTargetTuple[0]; var setActionTarget = actionTargetTuple[1];

    /* Find all subs in 'claimed' state across all classes */
    var pending = [];
    ctx.classes.forEach(function(c){
      (c.subAssignments || []).forEach(function(s){
        if (subStatus(s) === 'claimed') {
          pending.push({ sub: s, cls: c });
        }
      });
    });
    pending.sort(function(a, b){
      if (a.sub.date !== b.sub.date) return a.sub.date < b.sub.date ? -1 : 1;
      return (a.cls.startTime || '') < (b.cls.startTime || '') ? -1 : 1;
    });

    /* Recently denied / open subs that came back into the pool, last 7 days */
    var recentDenials = [];
    var cutoff = toYMD(addDays(new Date(), -7));
    ctx.classes.forEach(function(c){
      (c.subAssignments || []).forEach(function(s){
        if (s.deniedAt && s.date >= cutoff) {
          recentDenials.push({ sub: s, cls: c });
        }
      });
    });

    return e('div', null,
      e('div', { className: 'section-head' },
        e('div', null,
          e('h2', null, 'Pending Sub Approvals'),
          e('div', { className: 'meta' },
            pending.length + ' awaiting decision' + (recentDenials.length ? (' \u00b7 ' + recentDenials.length + ' recently denied') : '')
          )
        )
      ),
      pending.length === 0
        ? e('div', { className: 'empty' },
            e('div', { className: 'icon' }, '\u2705'),
            e('h3', null, 'All caught up'),
            e('div', null, 'No subs are waiting for approval right now.')
          )
        : pending.map(function(item){
            var s = item.sub; var c = item.cls;
            return e('div', {
              key: s.id,
              style: {
                background: '#fff',
                border: '1.5px solid var(--amber)',
                borderRadius: '12px',
                padding: '14px 16px',
                marginBottom: '10px'
              }
            },
              e('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: '10px', flexWrap: 'wrap' } },
                e('div', { style: { flex: 1, minWidth: '200px' } },
                  e('div', { style: { fontWeight: 600, fontSize: '15px', color: 'var(--navy)' } }, c.name),
                  e('div', { style: { fontSize: '13px', color: 'var(--slate)', marginTop: '4px' } },
                    formatShort(parseYMD(s.date)) + ' \u00b7 ' + formatTime12(c.startTime)
                  ),
                  e('div', { style: { fontSize: '13px', color: 'var(--slate)', marginTop: '4px' } },
                    e('b', null, c.instructor), ' \u2192 ',
                    e('b', { style: { color: 'var(--teal)' } }, s.subInstructor || s.claimedBy || 'Unclaimed')
                  ),
                  s.note && e('div', { style: { fontSize: '13px', color: 'var(--navy-soft)', marginTop: '6px', fontStyle: 'italic' } }, '\u201c' + s.note + '\u201d')
                ),
                e('div', { style: { display: 'flex', gap: '6px' } },
                  e('button', {
                    className: 'btn btn-sm',
                    style: { background: 'var(--green-bg)', color: 'var(--green)', fontWeight: 600 },
                    onClick: function(){ setActionTarget({ sub: s, cls: c, action: 'approve' }); }
                  }, '\u2713 Approve'),
                  e('button', {
                    className: 'btn btn-sm',
                    style: { background: 'var(--red-bg)', color: 'var(--red)', fontWeight: 600 },
                    onClick: function(){ setActionTarget({ sub: s, cls: c, action: 'deny' }); }
                  }, '\u2715 Deny')
                )
              )
            );
          }),
      recentDenials.length > 0 && e('div', { style: { marginTop: '24px' } },
        e('h3', { style: { fontSize: '15px', color: 'var(--slate)', marginBottom: '10px' } }, 'Recently denied (last 7 days)'),
        recentDenials.map(function(item){
          var s = item.sub; var c = item.cls;
          return e('div', {
            key: s.id,
            style: {
              background: 'var(--cream-2)',
              border: '1px solid var(--border)',
              borderRadius: '10px',
              padding: '10px 12px',
              marginBottom: '6px',
              fontSize: '13px',
              color: 'var(--slate)'
            }
          },
            e('div', null,
              e('b', null, c.name),
              ' \u00b7 ' + formatShort(parseYMD(s.date)) + ' \u00b7 returned to open'
            ),
            s.denyReason && e('div', { style: { fontSize: '12px', marginTop: '3px' } }, 'Reason: ' + s.denyReason)
          );
        })
      ),
      actionTarget && e(SubApprovalActionModal, {
        ctx: ctx,
        sub: actionTarget.sub,
        cls: actionTarget.cls,
        action: actionTarget.action,
        onClose: function(){ setActionTarget(null); }
      })
    );

    var ctx = props.ctx;
    var contacts = ctx.contacts || [];

    /* Window selector: this period (default), last 14 days, last 30 days, all-time */
    var windowTuple = useState('period');
    var windowSel = windowTuple[0]; var setWindow = windowTuple[1];

    var nowPeriod = payPeriodForDate(new Date());
    var period = payPeriodByIndex(nowPeriod.index);

    function inWindow(c){
      if (windowSel === 'period') {
        return c.date >= period.startYMD && c.date <= period.endYMD;
      }
      if (windowSel === '14d') {
        var cutoff14 = toYMD(addDays(new Date(), -14));
        return c.date >= cutoff14;
      }
      if (windowSel === '30d') {
        var cutoff30 = toYMD(addDays(new Date(), -30));
        return c.date >= cutoff30;
      }
      return true;
    }

    var filtered = contacts.filter(inWindow);

    /* Aggregations */
    var byTrainer = {};
    var byType = { quick: 0, substantive: 0, educational: 0 };
    var byTopic = {};
    CONTACT_TOPICS.forEach(function(t){ byTopic[t] = 0; });

    filtered.forEach(function(c){
      var t = c.trainerName || 'Unknown';
      if (!byTrainer[t]) byTrainer[t] = { total: 0, byType: { quick: 0, substantive: 0, educational: 0 }, byTopic: {} };
      byTrainer[t].total++;
      if (byType[c.type] != null) {
        byType[c.type]++;
        byTrainer[t].byType[c.type]++;
      }
      if (c.topic) {
        byTopic[c.topic] = (byTopic[c.topic] || 0) + 1;
        byTrainer[t].byTopic[c.topic] = (byTrainer[t].byTopic[c.topic] || 0) + 1;
      }
    });

    /* Health-related contacts surface separately - the Rick stat. */
    var healthRelated = filtered.filter(function(c){ return c.topic === 'health'; });

    /* Trainer rows sorted by total */
    var trainerRows = Object.keys(byTrainer).map(function(name){
      return Object.assign({ name: name }, byTrainer[name]);
    }).sort(function(a, b){ return b.total - a.total; });

    /* Estimated total team minutes & hours (uncapped here - this is the
       team-wide picture, not a payroll line). */
    var teamMinutes = filtered.reduce(function(sum, c){
      return sum + (CONTACT_TYPE_MINUTES[c.type] || 0);
    }, 0);
    var teamHours = Math.round((teamMinutes / 60) * 10) / 10;

    function exportCSV(){
      var rows = [['Date','Trainer','Type','Topic','Note']];
      filtered.slice().sort(function(a,b){ return a.date < b.date ? 1 : -1; }).forEach(function(c){
        rows.push([
          c.date,
          c.trainerName || '',
          CONTACT_TYPE_LABEL[c.type] || c.type || '',
          CONTACT_TOPIC_LABEL[c.topic] || c.topic || '',
          c.note || ''
        ]);
      });
      var csv = rows.map(function(r){
        return r.map(function(cell){
          var s = String(cell == null ? '' : cell);
          if (s.indexOf(',') !== -1 || s.indexOf('"') !== -1 || s.indexOf('\n') !== -1) {
            s = '"' + s.replace(/"/g, '""') + '"';
          }
          return s;
        }).join(',');
      }).join('\n');
      var blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      var a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'RRPR_contacts_' + windowSel + '_' + todayStr() + '.csv';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }

    return e('div', null,
      e('div', { className: 'section-head' },
        e('div', null,
          e('h2', null, 'Member Contacts'),
          e('div', { className: 'meta' },
            'Quick floor interactions logged by trainers. Counts toward auto-admin time. Use this to show team-wide community engagement.'
          )
        ),
        e('button', {
          className: 'btn btn-outline btn-sm',
          onClick: exportCSV,
          disabled: filtered.length === 0
        }, '\u2b07 Export CSV')
      ),

      /* Window selector */
      e('div', { style: { display: 'flex', gap: '6px', marginBottom: '14px', flexWrap: 'wrap' } },

          var active = windowSel === o.v;

            key: o.v,

              padding: '8px 14px', borderRadius: '999px',

            }
          }, o.l);
        })
      ),

      /* Top-line stats */
      e('div', {
        style: {
          display: 'grid',
          gridTemplateColumns: 'repeat(auto-fit, minmax(140px, 1fr))',
          gap: '10px',
          marginBottom: '18px'
        }
      },
        e('div', { style: { background: 'var(--cream-2)', border: '1.5px solid var(--border)', borderRadius: '12px', padding: '14px' } },
          e('div', { style: { fontSize: '11px', textTransform: 'uppercase', letterSpacing: '0.06em', color: 'var(--slate-soft)', marginBottom: '6px', fontWeight: 700 } }, 'Total contacts'),
          e('div', { style: { fontFamily: "'DM Serif Display', serif", fontSize: '32px', color: 'var(--navy)', lineHeight: 1 } }, filtered.length)
        ),
        e('div', { style: { background: 'var(--cream-2)', border: '1.5px solid var(--border)', borderRadius: '12px', padding: '14px' } },
          e('div', { style: { fontSize: '11px', textTransform: 'uppercase', letterSpacing: '0.06em', color: 'var(--slate-soft)', marginBottom: '6px', fontWeight: 700 } }, 'Team time'),
          e('div', { style: { fontFamily: "'DM Serif Display', serif", fontSize: '32px', color: 'var(--navy)', lineHeight: 1 } }, teamHours.toFixed(1)),
          e('div', { style: { fontSize: '11px', color: 'var(--slate-soft)', marginTop: '2px' } }, 'estimated hr')
        ),
        e('div', { style: { background: '#fff', border: '1.5px solid var(--red)', borderRadius: '12px', padding: '14px' } },
          e('div', { style: { fontSize: '11px', textTransform: 'uppercase', letterSpacing: '0.06em', color: 'var(--red)', marginBottom: '6px', fontWeight: 700 } }, 'Health-related'),
          e('div', { style: { fontFamily: "'DM Serif Display', serif", fontSize: '32px', color: 'var(--red)', lineHeight: 1 } }, healthRelated.length),
          e('div', { style: { fontSize: '11px', color: 'var(--slate-soft)', marginTop: '2px' } }, 'potential PT referrals')
        ),
        e('div', { style: { background: 'var(--cream-2)', border: '1.5px solid var(--border)', borderRadius: '12px', padding: '14px' } },
          e('div', { style: { fontSize: '11px', textTransform: 'uppercase', letterSpacing: '0.06em', color: 'var(--slate-soft)', marginBottom: '6px', fontWeight: 700 } }, 'Active loggers'),
          e('div', { style: { fontFamily: "'DM Serif Display', serif", fontSize: '32px', color: 'var(--navy)', lineHeight: 1 } }, trainerRows.length)
        )
      ),

      /* By type */
      filtered.length > 0 && e('div', { className: 'audit-section' },
        e('h3', null, 'By type'),
        e('div', { style: { display: 'flex', gap: '8px', flexWrap: 'wrap', marginTop: '8px' } },
          CONTACT_TYPES.map(function(t){
            var n = byType[t] || 0;
            var pct = filtered.length > 0 ? Math.round((n / filtered.length) * 100) : 0;
            var color = CONTACT_TYPE_COLOR[t];
            return e('div', {
              key: t,
              style: {
                background: '#fff',
                border: '1.5px solid ' + color,
                borderRadius: '10px',
                padding: '10px 14px',
                flex: '1 1 140px'
              }
            },
              e('div', { style: { fontSize: '11px', color: color, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.05em' } }, CONTACT_TYPE_LABEL[t]),
              e('div', { style: { fontSize: '24px', color: 'var(--navy)', fontWeight: 700, marginTop: '4px' } }, n),
              e('div', { style: { fontSize: '11px', color: 'var(--slate-soft)' } }, pct + '%')
            );
          })
        )
      ),

      /* By topic */
      filtered.length > 0 && e('div', { className: 'audit-section' },
        e('h3', null, 'By topic'),
        e('div', { style: { display: 'flex', gap: '8px', flexWrap: 'wrap', marginTop: '8px' } },
          CONTACT_TOPICS.map(function(t){
            var n = byTopic[t] || 0;
            if (n === 0) return null;
            var pct = filtered.length > 0 ? Math.round((n / filtered.length) * 100) : 0;
            var color = CONTACT_TOPIC_COLOR[t];
            return e('div', {
              key: t,
              style: {
                background: '#fff',
                border: '1.5px solid ' + color,
                borderRadius: '10px',
                padding: '10px 14px',
                flex: '1 1 140px'
              }
            },
              e('div', { style: { fontSize: '11px', color: color, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.05em' } }, CONTACT_TOPIC_LABEL[t]),
              e('div', { style: { fontSize: '24px', color: 'var(--navy)', fontWeight: 700, marginTop: '4px' } }, n),
              e('div', { style: { fontSize: '11px', color: 'var(--slate-soft)' } }, pct + '%')
            );
          }).filter(Boolean)
        )
      ),

      /* By trainer */
      trainerRows.length > 0 && e('div', { className: 'audit-section' },
        e('h3', null, 'By trainer'),
        e('div', { style: { fontSize: '12px', color: 'var(--slate)', marginBottom: '10px' } },
          'Sorted by volume. Hover the row for breakdown.'
        ),
        trainerRows.map(function(t){
          var pct = filtered.length > 0 ? Math.round((t.total / filtered.length) * 100) : 0;
          return e('div', {
            key: t.name,
            style: {
              background: '#fff',
              border: '1px solid var(--border)',
              borderRadius: '10px',
              padding: '12px 14px',
              marginBottom: '8px'
            }
          },
            e('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: '6px' } },
              e('div', { style: { fontWeight: 700, color: 'var(--navy)', fontSize: '14px' } }, t.name),
              e('div', { style: { display: 'flex', gap: '12px', alignItems: 'baseline' } },
                e('div', { style: { fontSize: '20px', fontWeight: 700, color: 'var(--teal)' } }, t.total),
                e('div', { style: { fontSize: '11px', color: 'var(--slate-soft)' } }, pct + '%')
              )
            ),
            /* Type breakdown chips */
            e('div', { style: { display: 'flex', gap: '6px', flexWrap: 'wrap', fontSize: '11px' } },
              CONTACT_TYPES.map(function(type){
                var n = t.byType[type] || 0;
                if (n === 0) return null;
                var color = CONTACT_TYPE_COLOR[type];
                return e('span', {
                  key: type,
                  style: { color: color, fontWeight: 600 }
                }, n + ' ' + CONTACT_TYPE_LABEL[type].toLowerCase());
              }).filter(Boolean).reduce(function(arr, item, i){
                if (i > 0) arr.push(e('span', { key: 'sep' + i, style: { color: 'var(--slate-soft)' } }, ' \u00b7 '));
                arr.push(item);
                return arr;
              }, [])
            ),
            /* Health flag if any */
            (t.byTopic.health > 0) && e('div', { style: { fontSize: '11px', color: 'var(--red)', fontWeight: 600, marginTop: '4px' } },
              t.byTopic.health + ' health-related'
            )
          );
        })
      ),

      /* Recent contacts log */
      filtered.length > 0 && e('div', { className: 'audit-section' },
        e('h3', null, 'Recent contacts (most recent first)'),
        filtered.slice().sort(function(a,b){
          if (a.date !== b.date) return a.date < b.date ? 1 : -1;
          return (a.loggedAt || '') < (b.loggedAt || '') ? 1 : -1;
        }).slice(0, 30).map(function(c){
          var typeColor = CONTACT_TYPE_COLOR[c.type];
          var topicColor = CONTACT_TOPIC_COLOR[c.topic];
          return e('div', {
            key: c.id,
            style: {
              padding: '8px 12px',
              borderBottom: '1px solid var(--border)',
              fontSize: '13px'
            }
          },
            e('div', { style: { display: 'flex', justifyContent: 'space-between', gap: '8px' } },
              e('div', { style: { color: 'var(--navy)', fontWeight: 600 } },
                c.trainerName + ' \u00b7 ' + formatShort(parseYMD(c.date))
              ),
              e('div', { style: { display: 'flex', gap: '6px' } },
                e('span', {
                  style: {
                    background: typeColor, color: '#fff', padding: '2px 8px', borderRadius: '999px',
                    fontSize: '10px', fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.04em'
                  }
                }, CONTACT_TYPE_LABEL[c.type]),
                e('span', {
                  style: {
                    border: '1.5px solid ' + topicColor, color: topicColor,
                    padding: '2px 8px', borderRadius: '999px',
                    fontSize: '10px', fontWeight: 700
                  }
                }, CONTACT_TOPIC_LABEL[c.topic])
              )
            ),
            c.note && e('div', { style: { fontSize: '12px', color: 'var(--slate)', marginTop: '4px', fontStyle: 'italic' } },
              '\u201c' + c.note + '\u201d'
            )
          );
        }),
        filtered.length > 30 && e('div', { style: { padding: '10px', fontSize: '12px', color: 'var(--slate-soft)', fontStyle: 'italic', textAlign: 'center' } },
          'Showing 30 of ' + filtered.length + '. Export CSV for the full list.'
        )
      ),

      filtered.length === 0 && e('div', { className: 'empty', style: { padding: '40px 20px' } },
        e('div', { className: 'icon' }, '\ud83e\udd1d'),
        e('h3', null, 'No contacts logged in this window'),
        e('div', null, 'Trainers log contacts via the floating + Contact button on their dashboard.')
      )
    );
  }

  /* ============ SCHEDULE VERSIONS VIEW (v2.6) ============
     Admin view for uploading new GX schedule rotations with effective dates.
     CSV paste-in or row-by-row builder. When a version's startDate hits,
     classes are reconciled: matched classes update, new classes get created,
     and dropped classes get seasonEnd set (preserved as historical, not
     deleted). */
  function ScheduleVersionsView(props){
    var ctx = props.ctx;
    var versions = ctx.scheduleVersions || [];

    var modeTuple = useState('list');  // 'list' | 'new' | 'detail'
    var mode = modeTuple[0]; var setMode = modeTuple[1];
    var detailIdTuple = useState(null);
    var detailId = detailIdTuple[0]; var setDetailId = detailIdTuple[1];

    var nameTuple = useState('');
    var name = nameTuple[0]; var setName = nameTuple[1];
    var startTuple = useState(todayStr());
    var startDate = startTuple[0]; var setStartDate = startTuple[1];
    var endTuple = useState('');
    var endDate = endTuple[0]; var setEndDate = endTuple[1];
    var pasteTuple = useState('');
    var paste = pasteTuple[0]; var setPaste = pasteTuple[1];
    var parsedTuple = useState([]);
    var parsedClasses = parsedTuple[0]; var setParsedClasses = parsedTuple[1];
    var parseErrorTuple = useState('');
    var parseError = parseErrorTuple[0]; var setParseError = parseErrorTuple[1];

    /* Find currently active version (today is in its window) */
    var todayY = todayStr();
    var activeVersion = versions.filter(function(v){
      if (!v.startDate || v.startDate > todayY) return false;
      if (v.endDate && v.endDate < todayY) return false;
      return v.activatedAt;
    }).sort(function(a, b){ return (a.startDate || '') < (b.startDate || '') ? 1 : -1; })[0];

    /* CSV parser. Expected columns: Class Name, Day, Time, Location, Instructor, Duration (min)
       Header row is required for clarity. Day accepts MO/TU/WE/TH/FR/SA/SU or
       full names. Time can be 24h ("09:30") or 12h ("9:30 AM"). */
    function parsePaste(text){
      var lines = text.split(/\r?\n/).map(function(l){ return l.trim(); }).filter(function(l){ return l.length > 0; });
      if (lines.length === 0) { setParsedClasses([]); setParseError(''); return; }

      function parseRow(line){
        /* Allow comma OR tab separation */
        var sep = line.indexOf('\t') !== -1 ? '\t' : ',';
        return line.split(sep).map(function(s){ return s.replace(/^"|"$/g, '').trim(); });
      }

      var header = parseRow(lines[0]).map(function(s){ return s.toLowerCase(); });
      function colIdx(names){
        for (var i = 0; i < names.length; i++) {
          var idx = header.indexOf(names[i]);
          if (idx !== -1) return idx;
        }
        return -1;
      }
      var idxName = colIdx(['class name', 'name', 'class']);
      var idxDay = colIdx(['day', 'day of week', 'dayofweek']);
      var idxTime = colIdx(['time', 'start time', 'start']);
      var idxLoc = colIdx(['location', 'site', 'facility']);
      var idxInstr = colIdx(['instructor', 'teacher', 'lead']);
      var idxDur = colIdx(['duration', 'duration (min)', 'minutes', 'mins']);

      if (idxName === -1 || idxDay === -1 || idxTime === -1) {
        setParseError('Missing required columns. Need at least: Class Name, Day, Time. Got: ' + header.join(', '));
        setParsedClasses([]);
        return;
      }

      function normDay(s){ return normalizeDow(s) || ''; }
      function normTime(s){
        var t = (s || '').trim();
        var ampm = t.match(/(AM|PM|am|pm)$/);
        var hhmm = t.replace(/(AM|PM|am|pm)/, '').trim();
        var parts = hhmm.split(':');
        var h = parseInt(parts[0], 10);
        var m = parseInt(parts[1] || '0', 10);
        if (isNaN(h)) return '';
        if (ampm) {
          var pm = ampm[1].toUpperCase() === 'PM';
          if (pm && h < 12) h += 12;
          if (!pm && h === 12) h = 0;
        }
        return (h < 10 ? '0' : '') + h + ':' + (m < 10 ? '0' : '') + m;
      }

      var rows = [];
      var errors = [];
      for (var i = 1; i < lines.length; i++) {
        var r = parseRow(lines[i]);
        var className = r[idxName] || '';
        var day = normDay(r[idxDay]);
        var time = normTime(r[idxTime]);
        var location = idxLoc !== -1 ? (r[idxLoc] || '') : '';
        var instructor = idxInstr !== -1 ? (r[idxInstr] || '') : '';
        var dur = idxDur !== -1 ? parseInt(r[idxDur], 10) : 60;
        if (!className) { errors.push('Row ' + (i+1) + ': missing class name'); continue; }
        if (!day) { errors.push('Row ' + (i+1) + ': invalid day'); continue; }
        if (!time) { errors.push('Row ' + (i+1) + ': invalid time'); continue; }
        rows.push({
          name: className,
          dayOfWeek: day,
          time: time,
          location: location,
          instructor: instructor,
          duration: isNaN(dur) ? 60 : dur
        });
      }
      setParsedClasses(rows);
      setParseError(errors.length > 0 ? (errors.length + ' issue(s): ' + errors.slice(0, 3).join('; ')) : '');
    }

    function saveNew(){
      if (!name.trim()) { ctx.toast && ctx.toast('Name is required', 'error'); return; }
      if (!startDate) { ctx.toast && ctx.toast('Start date is required', 'error'); return; }
      if (parsedClasses.length === 0) { ctx.toast && ctx.toast('Paste in at least one class', 'error'); return; }
      var v = {
        id: uid(),
        name: name.trim(),
        startDate: startDate,
        endDate: endDate || null,
        classes: parsedClasses.slice(),
        createdAt: new Date().toISOString(),
        activatedAt: null
      };
      ctx.saveScheduleVersion(v);
      ctx.toast && ctx.toast('Schedule version saved \u2713', 'success');
      /* If the start date is today or earlier, the auto-activation effect
         will pick it up. If it's in the future, it will activate when
         the date arrives. */
      setName(''); setStartDate(todayStr()); setEndDate(''); setPaste(''); setParsedClasses([]);
      setMode('list');
    }

    function activateNow(versionId){
      if (!window.confirm('Activate this schedule now? Classes will be reconciled: existing classes update, new classes appear, and dropped classes get marked as ended (historical data preserved).')) return;
      var result = ctx.activateScheduleVersion(versionId);
      if (result.ok) {
        ctx.toast && ctx.toast('Schedule activated. Classes reconciled.', 'success');
      } else {
        ctx.toast && ctx.toast('Could not activate: ' + result.reason, 'error');
      }
    }

    function deleteVersion(versionId){
      if (!window.confirm('Delete this schedule version? This does NOT roll back any class reconciliation that already happened.')) return;
      ctx.deleteScheduleVersion(versionId);
      ctx.toast && ctx.toast('Version deleted', 'info');
      if (detailId === versionId) { setDetailId(null); setMode('list'); }
    }

    if (mode === 'new') {
      return e('div', null,
        e('div', { className: 'section-head' },
          e('div', null,
            e('h2', null, 'New Schedule Version'),
            e('div', { className: 'meta' }, 'Upload a new rotation. It auto-activates on the start date.')
          ),
          e('button', { className: 'btn btn-outline btn-sm', onClick: function(){ setMode('list'); } }, '\u2190 Back')
        ),
        e('div', { style: { display: 'grid', gap: '12px', maxWidth: '600px' } },
          e('div', null,
            e('label', { style: { display: 'block', fontSize: '12px', color: 'var(--slate)', marginBottom: '4px', fontWeight: 600 } }, 'Schedule name'),
            e('input', {
              type: 'text', value: name,
              onChange: function(ev){ setName(ev.target.value); },
              placeholder: 'e.g. Summer 2026',
              style: { width: '100%', padding: '10px 12px', fontSize: '14px', borderRadius: '8px', border: '1.5px solid var(--border)' }
            })
          ),
          e('div', { style: { display: 'flex', gap: '12px', flexWrap: 'wrap' } },
            e('div', { style: { flex: 1, minWidth: '140px' } },
              e('label', { style: { display: 'block', fontSize: '12px', color: 'var(--slate)', marginBottom: '4px', fontWeight: 600 } }, 'Start date'),
              e('input', {
                type: 'date', value: startDate,
                onChange: function(ev){ setStartDate(ev.target.value); },
                style: { width: '100%', padding: '10px 12px', fontSize: '14px', borderRadius: '8px', border: '1.5px solid var(--border)' }
              })
            ),
            e('div', { style: { flex: 1, minWidth: '140px' } },
              e('label', { style: { display: 'block', fontSize: '12px', color: 'var(--slate)', marginBottom: '4px', fontWeight: 600 } }, 'End date (optional)'),
              e('input', {
                type: 'date', value: endDate,
                onChange: function(ev){ setEndDate(ev.target.value); },
                style: { width: '100%', padding: '10px 12px', fontSize: '14px', borderRadius: '8px', border: '1.5px solid var(--border)' }
              })
            )
          ),
          e('div', null,
            e('label', { style: { display: 'block', fontSize: '12px', color: 'var(--slate)', marginBottom: '4px', fontWeight: 600 } }, 'Paste schedule (CSV with header row)'),
            e('div', { style: { fontSize: '11px', color: 'var(--slate-soft)', marginBottom: '6px', lineHeight: 1.4 } },
              'Required columns: Class Name, Day, Time. Optional: Location, Instructor, Duration (min). Days accept MO/TU/WE/TH/FR/SA/SU or full names. Times accept 24h or 12h with AM/PM.'
            ),
            e('textarea', {
              value: paste,
              onChange: function(ev){ setPaste(ev.target.value); parsePaste(ev.target.value); },
              placeholder: 'Class Name,Day,Time,Location,Instructor,Duration\nMorning Yoga,MO,06:00,CMRC,Heather,60\nAqua Aerobics,WE,09:30,CMRC,Kathy,45',
              rows: 8,
              style: { width: '100%', padding: '10px 12px', fontSize: '13px', fontFamily: 'monospace', borderRadius: '8px', border: '1.5px solid var(--border)', resize: 'vertical' }
            })

  /* ============ CONSULT QUEUE VIEW (admin) ============ */
  function ConsultQueueView(props){
    var ctx = props.ctx;
    var newOpenTuple = useState(false);
    var newOpen = newOpenTuple[0]; var setNewOpen = newOpenTuple[1];
    var statusFilterTuple = useState('open');
    var statusFilter = statusFilterTuple[0]; var setStatusFilter = statusFilterTuple[1];
    var leadDetailTuple = useState(null);
    var leadDetail = leadDetailTuple[0]; var setLeadDetail = leadDetailTuple[1];

    var allEntries = ctx.queue || [];
    /* v2.3: filter pills now match the broader state machine. 'open' is a
       virtual filter spanning waiting/assigned/contacted/consult_scheduled. */
    function inFilter(q){
      if (statusFilter === 'open') {
        return q.status !== 'converted' && q.status !== 'lost';
      }
      if (statusFilter === 'aged') return isQueueLeadAged(q);
      return q.status === statusFilter;
    }

    var visibleEntries = allEntries.filter(inFilter)
      .sort(function(a, b){
        /* Aged first within open filter */
        if (statusFilter === 'open' || statusFilter === 'aged') {
          var aAged = isQueueLeadAged(a) ? 0 : 1;
          var bAged = isQueueLeadAged(b) ? 0 : 1;
          if (aAged !== bAged) return aAged - bAged;
        }
        return (a.createdAt || '') < (b.createdAt || '') ? 1 : -1;
      });

    var stats = computePipelineStats(allEntries);
    var counts = {
      open: stats.open,
      waiting: stats.byStatus.waiting,
      assigned: stats.byStatus.assigned,
      contacted: stats.byStatus.contacted,
      consult_scheduled: stats.byStatus.consult_scheduled,
      converted: stats.byStatus.converted,
      lost: stats.byStatus.lost,
      aged: stats.aged
    };

    return e('div', null,
      e('div', { className: 'section-head' },
        e('div', null,
          e('h2', null, 'Consult Queue'),
          e('div', { className: 'meta' },
            counts.open + ' open \u00b7 ' +
            counts.aged + ' aged \u00b7 ' +
            counts.converted + ' converted \u00b7 ' +
            counts.lost + ' lost'

        e('button', { className: 'btn btn-gold', onClick: function(){ setNewOpen(true); } }, '+ Add Lead')
      ),
      e('div', { style: { display: 'flex', gap: '6px', marginBottom: '14px', flexWrap: 'wrap' } },
        [
          { id: 'open', label: 'Open' },
          { id: 'aged', label: 'Aged' },
          { id: 'waiting', label: 'Waiting' },
          { id: 'assigned', label: 'Assigned' },
          { id: 'contacted', label: 'Contacted' },
          { id: 'consult_scheduled', label: 'Scheduled' },
          { id: 'converted', label: 'Converted' },
          { id: 'lost', label: 'Lost' }
        ].map(function(s){
          var active = statusFilter === s.id;
          var ct = counts[s.id] || 0;
          return e('button', {
            key: s.id,
            onClick: function(){ setStatusFilter(s.id); },
            style: {
              padding: '8px 14px',
              borderRadius: '999px',
              border: '1.5px solid ' + (active ? 'var(--gold)' : 'var(--border)'),
              background: active ? 'var(--gold)' : '#fff',
              color: active ? '#fff' : 'var(--slate)',
              fontWeight: 600,
              fontSize: '13px'
            }
          }, s.label + ' (' + ct + ')');
        })
      ),
      visibleEntries.length === 0
        ? e('div', { className: 'empty' },
            e('div', { className: 'icon' }, '\ud83d\udce5'),
            e('h3', null, 'Nothing here'),
            e('div', null, 'No leads match this filter.')
          )
        : visibleEntries.map(function(q){
            var aged = isQueueLeadAged(q);
            return e('div', {
              key: q.id,
              onClick: function(){ setLeadDetail(q); },
              style: {
                background: '#fff',
                border: '1.5px solid ' + (aged ? 'var(--red)' : 'var(--border)'),
                borderRadius: '12px',
                padding: '14px 16px',
                marginBottom: '10px',
                cursor: 'pointer'
              }
            },
              e('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: '10px', flexWrap: 'wrap' } },
                e('div', { style: { flex: 1, minWidth: '200px' } },
                  e('div', { style: { display: 'flex', alignItems: 'center', gap: '8px', flexWrap: 'wrap' } },
                    e('div', { style: { fontWeight: 600, fontSize: '15px', color: 'var(--navy)' } }, q.name),
                    e('span', {
                      style: {
                        fontSize: '10px', padding: '3px 9px', borderRadius: '999px',
                        background: QUEUE_STATUS_COLOR[q.status] || 'var(--slate)',
                        color: '#fff', fontWeight: 700,
                        textTransform: 'uppercase', letterSpacing: '0.04em'
                      }
                    }, QUEUE_STATUS_LABEL[q.status] || q.status),
                    /* v2.5: prominent assigned-trainer chip when status implies someone owns it */
                    q.assignedTo && (q.status === 'assigned' || q.status === 'contacted' || q.status === 'consult_scheduled') && e('span', {
                      style: {
                        fontSize: '11px', padding: '3px 10px', borderRadius: '999px',
                        background: 'var(--teal-bg)', color: 'var(--teal)',

                      }
                    }, '\ud83d\udc64 ', q.assignedTo),
                    aged && e('span', {

                      }
                    }, '\u26a0 AGED')
                  ),
                  e('div', { style: { fontSize: '13px', color: 'var(--slate)', marginTop: '4px' } },
                    (q.phone || 'No phone') + (q.email ? (' \u00b7 ' + q.email) : '')
                  ),
                  e('div', { style: { fontSize: '12px', color: 'var(--slate-soft)', marginTop: '4px' } },
                    'Source: ' + (QUEUE_SOURCE_LABEL[q.source] || q.source || 'Unknown') +
                    (q.sourceTag ? (' (' + q.sourceTag + ')') : '') +
                    ' \u00b7 Added by ' + (q.addedBy || 'unknown') +

                  /* assignedTo subline kept for converted/lost where the chip is suppressed */
                  q.assignedTo && (q.status === 'converted' || q.status === 'lost' || q.status === 'waiting') && e('div', { style: { fontSize: '12px', color: 'var(--slate)', marginTop: '6px' } },
                    'Was assigned to ' + q.assignedTo
                  ),
                  q.followUpBy && e('div', { style: { fontSize: '11px', color: aged ? 'var(--red)' : 'var(--slate-soft)', marginTop: '4px' } },
                    'Follow up by ' + formatShort(parseYMD(q.followUpBy))
                  ),
                  q.lostReason && e('div', { style: { fontSize: '12px', color: 'var(--slate)', marginTop: '4px', fontStyle: 'italic' } },
                    'Lost: ' + QUEUE_LOST_REASON_LABEL[q.lostReason]
                  )
                )
              )
            );
          }),
      newOpen && e(NewQueueEntryModal, {
        ctx: ctx,
        onClose: function(){ setNewOpen(false); }
      }),
      leadDetail && e(LeadDetailModal, {
        ctx: ctx,
        lead: (ctx.queue || []).find(function(x){ return x.id === leadDetail.id; }) || leadDetail,
        onClose: function(){ setLeadDetail(null); }
      })
    );
  }

  /* ============ ADMIN: PIPELINE VIEW (v2.3) ============
     The forward-facing Rick stat: pipeline in present tense, not retrospective.
     Shows status counts, conversion rate by source, aging report, and recent
     activity. */
  function PipelineView(props){
    var ctx = props.ctx;
    var leadDetailTuple = useState(null);
    var leadDetail = leadDetailTuple[0]; var setLeadDetail = leadDetailTuple[1];

    var queue = ctx.queue || [];
    var stats = computePipelineStats(queue);
    var medianTtc = medianTimeToConversionDays(queue);

    /* Aged leads list - the action queue */
    var agedLeads = queue.filter(isQueueLeadAged)
      .sort(function(a, b){ return (a.followUpBy || '') < (b.followUpBy || '') ? -1 : 1; });

    /* Recent activity (last 14 days of converted/lost) */
    var recentCutoff = toYMD(addDays(new Date(), -14));
    var recentClosed = queue.filter(function(q){
      if (q.status !== 'converted' && q.status !== 'lost') return false;
      var when = q.convertedAt || q.lostAt || '';
      return when.substring(0, 10) >= recentCutoff;
    }).sort(function(a, b){
      var aw = a.convertedAt || a.lostAt || '';
      var bw = b.convertedAt || b.lostAt || '';
      return aw < bw ? 1 : -1;
    });

    /* Status flow visualization data */
    var statusFlowOrder = ['waiting', 'assigned', 'contacted', 'consult_scheduled', 'converted', 'lost'];
    var maxStatusCount = Math.max.apply(null, statusFlowOrder.map(function(s){ return stats.byStatus[s] || 0; })) || 1;

    /* Sources sorted by total volume desc, only showing sources with at least one entry */
    var activeSources = QUEUE_SOURCES
      .filter(function(s){ return stats.bySource[s] && stats.bySource[s].total > 0; })
      .sort(function(a, b){ return stats.bySource[b].total - stats.bySource[a].total; });

    return e('div', null,
      e('div', { className: 'section-head' },
        e('div', null,
          e('h2', null, 'Pipeline'),
          e('div', { className: 'meta' },
            stats.open + ' open \u00b7 ' +
            stats.aged + ' aged \u00b7 ' +
            stats.byStatus.converted + ' converted total \u00b7 ' +
            stats.byStatus.lost + ' lost total'
          )
        )
      ),

      /* Hero stat cards */
      e('div', { className: 'stats-grid', style: { marginBottom: '20px' } },
        e('div', { className: 'stat-card' },
          e('div', { className: 'label' }, 'Open Pipeline'),
          e('div', { className: 'value' }, stats.open)
        ),
        e('div', { className: 'stat-card' + (stats.aged > 0 ? ' warn' : '') },
          e('div', { className: 'label' }, 'Aged'),
          e('div', { className: 'value' }, stats.aged)
        ),
        e('div', { className: 'stat-card' },
          e('div', { className: 'label' }, 'Total Converted'),
          e('div', { className: 'value' }, stats.byStatus.converted)
        ),
        e('div', { className: 'stat-card' },
          e('div', { className: 'label' }, 'Median Days to Convert'),
          e('div', { className: 'value' }, medianTtc != null ? medianTtc.toFixed(1) : '\u2014')
        )
      ),

      /* Status flow */
      e('div', { className: 'audit-section', style: { marginBottom: '18px' } },
        e('h3', null, 'Pipeline by status'),
        e('div', { style: { fontSize: '12px', color: 'var(--slate-soft)', marginBottom: '12px' } },
          'Open stages on the left, closed outcomes on the right. Bars are scaled to the largest count.'
        ),
        statusFlowOrder.map(function(s){
          var ct = stats.byStatus[s] || 0;
          var pct = (ct / maxStatusCount) * 100;
          return e('div', {
            key: s,
            style: {
              display: 'grid',
              gridTemplateColumns: '180px 1fr 60px',
              gap: '12px',
              alignItems: 'center',
              padding: '6px 0'
            }
          },
            e('div', { style: { fontSize: '13px', color: 'var(--navy)', fontWeight: 600 } }, QUEUE_STATUS_LABEL[s]),

              e('div', {
                style: {
                  width: pct + '%',
                  height: '100%',
                  background: QUEUE_STATUS_COLOR[s],
                  transition: 'width 0.3s'
                }

            e('div', { style: { fontSize: '14px', color: 'var(--slate)', fontWeight: 600, textAlign: 'right' } }, ct)

            }

            e('div', null,
              e('div', { style: { fontSize: '13px', color: 'var(--navy)', fontWeight: 600 } }, QUEUE_SOURCE_LABEL[src]),
              e('div', { style: { fontSize: '11px', color: 'var(--slate-soft)' } },
                bs.total + ' total \u00b7 ' +

  /* ============ TRAINER LEADS VIEW ============ */
  function TrainerLeadsView(props){
    var ctx = props.ctx;
    var trainerName = ctx.session.name;
    var newOpenTuple = useState(false);
    var newOpen = newOpenTuple[0]; var setNewOpen = newOpenTuple[1];
    /* v2.2: completing a WRO opens the existing PostWROModal */
    var wroOpenTuple = useState(null);
    var wroOpen = wroOpenTuple[0]; var setWroOpen = wroOpenTuple[1];
    /* v2.3: lead detail modal */
    var leadDetailTuple = useState(null);
    var leadDetail = leadDetailTuple[0]; var setLeadDetail = leadDetailTuple[1];

    var allEntries = ctx.queue || [];
    /* Waiting = unclaimed pool */
    var waiting = allEntries.filter(function(q){ return q.status === 'waiting'; })
      .sort(function(a, b){
        /* Aged first, then oldest */
        var aAged = isQueueLeadAged(a) ? 0 : 1;
        var bAged = isQueueLeadAged(b) ? 0 : 1;
        if (aAged !== bAged) return aAged - bAged;
        return (a.createdAt || '') < (b.createdAt || '') ? 1 : -1;
      });
    /* v2.3: "mine" now includes all open statuses (assigned, contacted,
       consult_scheduled), not just assigned. Sorted with aged at top. */
    var mine = allEntries.filter(function(q){
      var open = q.status === 'assigned' || q.status === 'contacted' || q.status === 'consult_scheduled';
      return open && trainerNameMatches(trainerName, q.assignedTo);
    }).sort(function(a, b){
      var aAged = isQueueLeadAged(a) ? 0 : 1;
      var bAged = isQueueLeadAged(b) ? 0 : 1;
      if (aAged !== bAged) return aAged - bAged;
      return (a.assignedAt || a.createdAt || '') < (b.assignedAt || b.createdAt || '') ? 1 : -1;
    });
    /* v2.3: closed status-recent-history (converted/lost in last 14 days) */
    var recentClosedCutoff = toYMD(addDays(new Date(), -14));
    var myRecentClosed = allEntries.filter(function(q){
      var closed = q.status === 'converted' || q.status === 'lost';
      if (!closed || !trainerNameMatches(trainerName, q.assignedTo)) return false;
      var when = q.convertedAt || q.lostAt;
      if (!when) return false;
      return when.substring(0, 10) >= recentClosedCutoff;
    }).sort(function(a, b){
      var aw = a.convertedAt || a.lostAt || '';
      var bw = b.convertedAt || b.lostAt || '';
      return aw < bw ? 1 : -1;
    });

    /* v2.2: Pending WROs - now in v2.5 split by state.
       - Available: nobody has claimed yet (state = pending)
       - In progress mine: I claimed it but haven't filled the post-form
       - In progress others: someone else has it (read-only)
       - Recently completed: my last 7 days */
    var allWros = ctx.wros || [];
    var openWros = allWros.filter(function(w){
      return w.preCompleted !== false && !w.postCompleted;
    });
    var availableWros = openWros.filter(function(w){ return wroState(w) === 'pending'; })
      .sort(function(a, b){
        if (a.date !== b.date) return a.date < b.date ? 1 : -1;
        return (a.createdAt || '') < (b.createdAt || '') ? 1 : -1;

    var myInProgressWros = openWros.filter(function(w){
      return wroState(w) === 'in_progress' && trainerNameMatches(trainerName, w.claimedBy);
    }).sort(function(a, b){ return (a.claimedAt || '') < (b.claimedAt || '') ? 1 : -1; });
    var othersInProgressWros = openWros.filter(function(w){

  /* ============ ADMIN DASHBOARD ============ */
  function AdminDashboard(props){
    var ctx = props.ctx;
    /* v2.1: two-level navigation. domain is the top-level filter
       (pt | gx | both); tab is the specific view inside that domain.
       Default: PT domain, Today view (most common landing). */
    var domainTuple = useState('pt');
    var domain = domainTuple[0];
    var setDomain = domainTuple[1];

    var tabTuple = useState('today');
    var tab = tabTuple[0];
    var setTab = tabTuple[1];

    var clientDetailTuple = useState(null);
    var clientDetailId = clientDetailTuple[0];
    var setClientDetailId = clientDetailTuple[1];

    var classDetailTuple = useState(null);
    var classDetailId = classDetailTuple[0];
    var setClassDetailId = classDetailTuple[1];

    /* Tab definitions per domain. Order matters: first item in each list
       is the default landing tab when the domain switches. */
    var DOMAIN_TABS = {
      pt: [
        { id: 'today',     label: 'Today' },
        { id: 'pipeline',  label: 'Pipeline' },
        { id: 'clients',   label: 'PT Clients' },
        { id: 'queue',     label: 'Queue' },
        { id: 'wros',      label: 'WROs' },
        { id: 'referrals', label: 'Referrals' }
      ],
      gx: [
        { id: 'today',           label: 'Today' },
        { id: 'classes',         label: 'Group Classes' },
        { id: 'schedule_versions', label: 'Schedule Versions' },
        { id: 'sub_approvals',   label: 'Sub Approvals' }
      ],
      both: [
        { id: 'audit',       label: 'Audit' },
        { id: 'admin_time',  label: 'Admin Time' },
        { id: 'contacts',    label: 'Contacts' },
        { id: 'instructors', label: 'Manage Team' }
      ]
    };

    /* When the domain changes, snap tab to the first valid tab for that
       domain unless the current tab is also valid in the new domain. */
    function changeDomain(newDomain){
      setDomain(newDomain);
      var validTabs = DOMAIN_TABS[newDomain].map(function(t){ return t.id; });
      if (validTabs.indexOf(tab) === -1) {
        setTab(validTabs[0]);
      }
    }

    if (clientDetailId) {
      var cl = ctx.clients.find(function(c){ return c.id === clientDetailId; });
      if (!cl) { setClientDetailId(null); return null; }
      return e(ClientDetail, { ctx: ctx, client: cl, onBack: function(){ setClientDetailId(null); }, canEdit: true });
    }
    if (classDetailId) {
      var clz = ctx.classes.find(function(c){ return c.id === classDetailId; });
      if (!clz) { setClassDetailId(null); return null; }
      return e(ClassDetail, { ctx: ctx, cls: clz, onBack: function(){ setClassDetailId(null); }, canEdit: true });
    }

    /* Stats */
    var totalSessions = ctx.clients.reduce(function(s,c){ return s + (c.sessions || []).length; }, 0);
    var revenue = ctx.clients.reduce(function(s,c){ return s + (c.amountPaid || 0); }, 0);
    var needRenewal = ctx.clients.filter(function(c){ return sessionsRemaining(c) <= 2; }).length;
    var gxSessions = ctx.classes.reduce(function(s,c){ return s + (c.attendance || []).length; }, 0);

    /* Today view in PT or GX domain shows a domain-filtered version. */
    var tabView;
    if (tab === 'today') {
