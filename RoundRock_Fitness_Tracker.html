  function PostWROModal(props){
    var ctx = props.ctx;
    var w = props.wro;
    var existing = w.post || {};

    /* v2.5: auto-claim on modal open if the form is incomplete and the
       trainer hasn't already claimed it. This way the team can see who's
       working on it even if the trainer leaves the form mid-flow. */
    useEffect(function(){
      if (w.postCompleted) return;
      var claimer = ctx.currentUserName && ctx.currentUserName();
      if (!claimer) return;
      if (w.claimedBy && trainerNameMatches(claimer, w.claimedBy)) return;
      ctx.claimWRO && ctx.claimWRO(w.id, claimer);
    }, [w.id]);

    var formTuple = useState(function(){
      var me = ctx.currentUserName && ctx.currentUserName();
      return {
        specialistName: existing.specialistName || me || ctx.trainers[0] || '',
        orientationDate: existing.orientationDate || todayStr(),
        /* v2.2: time-in / time-out for trainer hour credit. Defaults to a
           1-hour orientation block. Trainer can override with shorter or
           longer values. */
        timeIn: existing.timeIn || '10:00',
        timeOut: existing.timeOut || '11:00',
        confirmedGoals: existing.confirmedGoals || '',
        observedFlags: existing.observedFlags || '',
        recommendations: existing.recommendations || [],
        conversionOutcomes: existing.conversionOutcomes || [],
        notes: existing.notes || ''
      };
    });
    var form = formTuple[0];
    var setForm = formTuple[1];
    function update(k, v){ setForm(function(f){ var n = Object.assign({}, f); n[k] = v; return n; }); }
    function toggleArray(k, v){
      setForm(function(f){
        var arr = (f[k] || []).slice();
        var i = arr.indexOf(v);
        if (i === -1) arr.push(v); else arr.splice(i, 1);
        var n = Object.assign({}, f); n[k] = arr; return n;
      });
    }

    function checkRow(checked, onChange, label){
      return e('div', {
        onClick: onChange,
        style: {
          display: 'flex', alignItems: 'center', gap: '10px',
          padding: '8px 12px', marginBottom: '6px',
          background: checked ? 'var(--cream-2)' : '#fff',
          border: '1.5px solid ' + (checked ? 'var(--gold)' : 'var(--border)'),
          borderRadius: '10px', cursor: 'pointer', fontSize: '14px'
        }
      },
        e('div', {
          style: {
            width: '18px', height: '18px', borderRadius: '4px',
            border: '2px solid ' + (checked ? 'var(--gold)' : 'var(--slate-soft)'),
            background: checked ? 'var(--gold)' : '#fff',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            color: '#fff', fontSize: '12px', fontWeight: 700, flexShrink: 0
          }
        }, checked ? '✓' : ''),
        e('div', { style: { flex: 1 } }, label)
      );
    }

    function submit(){
      if (!form.specialistName) { ctx.toast('Specialist name is required', 'error'); return; }
      if (!form.confirmedGoals.trim()) { ctx.toast('Top 1-2 goals confirmed in conversation', 'error'); return; }
      if (!form.timeIn || !form.timeOut) { ctx.toast('Time in and time out are required', 'error'); return; }
      var hrs = hoursFromTimes(form.timeIn, form.timeOut);
      if (hrs <= 0) { ctx.toast('Time out must be after time in', 'error'); return; }
      var post = Object.assign({}, form, {
        durationHours: hrs,
        completedAt: new Date().toISOString()
      });
      props.onSave(Object.assign({}, w, { post: post, postCompleted: true }));
    }

    return e('div', { className: 'modal-overlay' },
      e('div', { className: 'modal', onClick: function(ev){ ev.stopPropagation(); } },
        e('div', { className: 'modal-header' },
          e('h2', null, 'Specialist Form · ' + w.participantName),
          e('button', { className: 'modal-close', onClick: props.onClose }, '×')
        ),
        e('div', { className: 'modal-body' },
          e('div', { className: 'banner teal', style: { marginBottom: '14px', fontSize: '13px' } },
            'FITNESS SPECIALIST USE ONLY. Complete after orientation. Returns to lead fitness for tracking.'
          ),
          e('div', { className: 'row2' },
            e('div', { className: 'field' },
              e('label', null, 'Specialist'),
              e('select', { value: form.specialistName, onChange: function(ev){ update('specialistName', ev.target.value); } },
                ctx.trainers.map(function(t){ return e('option', { key: t, value: t }, t); })
              )
            ),
            e('div', { className: 'field' },
              e('label', null, 'Date of orientation'),
              e('input', { type: 'date', value: form.orientationDate, onChange: function(ev){ update('orientationDate', ev.target.value); } })
            )
          ),
          /* v2.2: time-in / time-out for trainer hour credit on the timecard. */
          e('div', { className: 'row2' },
            e('div', { className: 'field' },
              e('label', null, 'Time in'),
              e('input', { type: 'time', value: form.timeIn, onChange: function(ev){ update('timeIn', ev.target.value); } })
            ),
            e('div', { className: 'field' },
              e('label', null, 'Time out'),
              e('input', { type: 'time', value: form.timeOut, onChange: function(ev){ update('timeOut', ev.target.value); } })
            )
          ),
          (form.timeIn && form.timeOut) && e('div', { style: { fontSize: '12px', color: 'var(--teal)', marginBottom: '12px', marginTop: '-6px' } },
            'Hours credited to ' + form.specialistName + ': ' +
            hoursFromTimes(form.timeIn, form.timeOut).toFixed(2) + ' hr (PT category on timecard)'
          ),
          e('div', { className: 'field' },
            e('label', null, 'Top 1-2 goals confirmed in conversation *'),
            e('textarea', {
              value: form.confirmedGoals,
              onChange: function(ev){ update('confirmedGoals', ev.target.value); },
              placeholder: 'Brief. What did they actually say they wanted?',
              style: { minHeight: '70px', resize: 'vertical' }
            })
          ),
          e('div', { className: 'field' },
            e('label', null, 'Movement or health flags observed (if any)'),
            e('textarea', {
              value: form.observedFlags,
              onChange: function(ev){ update('observedFlags', ev.target.value); },
              placeholder: 'Optional. Anything that might warrant a PT referral or modified programming.',
              style: { minHeight: '70px', resize: 'vertical' }
            })
          ),
          e('div', { className: 'field' },
            e('label', null, 'Recommendations made (check all that apply)'),
            WRO_RECOMMENDATIONS.map(function(r){
              return e('div', { key: r }, checkRow(form.recommendations.indexOf(r) !== -1, function(){ toggleArray('recommendations', r); }, r));
            })
          ),
          e('div', { className: 'field' },
            e('label', null, 'Conversion outcome'),
            WRO_CONVERSION_OUTCOMES.map(function(o){
              return e('div', { key: o }, checkRow(form.conversionOutcomes.indexOf(o) !== -1, function(){ toggleArray('conversionOutcomes', o); }, o));
            })
          ),
          e('div', { className: 'field' },
            e('label', null, 'Notes / follow-up plan'),
            e('textarea', {
              value: form.notes,
              onChange: function(ev){ update('notes', ev.target.value); },
              placeholder: 'Optional.',
              style: { minHeight: '90px', resize: 'vertical' }
            })
          )
        ),
        e('div', { className: 'modal-footer' },
          e('button', { className: 'btn btn-ghost', onClick: props.onClose }, 'Cancel'),
          e('button', { className: 'btn btn-primary', onClick: submit }, w.postCompleted ? 'Save Changes' : 'Complete Specialist Form')
        )
      )
    );
  }

  /* ============ TODAY VIEW (Front Desk Home) ============ */
  function TodayView(props){
    var ctx = props.ctx;
    /* v2.1: domain filter from admin dashboard. 'pt' hides GX sections,
       'gx' hides PT sections, 'both' (or undefined) shows everything. */
    var domain = props.domain || 'both';
    var showPT = domain === 'pt' || domain === 'both';
    var showGX = domain === 'gx' || domain === 'both';

    var todayYMD = todayStr();
    var todayDate = parseYMD(todayYMD);
    var todayDow = IDX_TO_DOW[todayDate.getDay()];

    /* Pay period header */
    var pp = payPeriodForDate(todayDate);
    var dayInPeriod = Math.floor((todayDate - pp.start) / (24*60*60*1000)) + 1;

    /* Today's classes (using occurrence builder, scoped to today) */
    var todayOccs = useMemo(function(){
      return occurrencesInWindow(ctx.classes, todayDate, todayDate, ctx.closures);
    }, [ctx.classes, ctx.closures, todayYMD]);

    /* Search */
    var searchTuple = useState('');
    var search = searchTuple[0];
    var setSearch = searchTuple[1];
    var searchResults = search.trim().length > 1
      ? ctx.clients.filter(function(c){
          var q = search.toLowerCase();
          return (c.name || '').toLowerCase().indexOf(q) !== -1
              || (c.phone || '').toLowerCase().indexOf(q) !== -1
              || (c.email || '').toLowerCase().indexOf(q) !== -1
              || (c.trainerName || '').toLowerCase().indexOf(q) !== -1;
        }).slice(0, 8)
      : [];

    /* Renewal alerts (≤2 sessions remaining), sorted by remaining ascending */
    var renewals = ctx.clients
      .map(function(c){ return { c: c, r: sessionsRemaining(c) }; })
      .filter(function(x){ return x.r <= 2; })
      .sort(function(a,b){ return a.r - b.r; });

    /* Cold clients - paid for sessions but haven't been seen in 21+ days */
    var coldClients = ctx.clients
      .filter(function(c){ return isClientCold(c); })
      .map(function(c){ return { c: c, days: daysSinceLastSeen(c) }; })
      .sort(function(a,b){ return b.days - a.days; });

    /* WROs today */
    var todayYMDStr = todayYMD;
    var wrosToday = (ctx.wros || []).filter(function(w){ return w.date === todayYMDStr; });

    /* Open PT referrals (pending or contacted) */
    var openReferrals = (ctx.referrals || []).filter(function(r){
      return r.status === 'pending' || r.status === 'contacted';
    }).sort(function(a,b){
      var ua = a.urgency === 'urgent' ? 0 : a.urgency === 'priority' ? 1 : 2;
      var ub = b.urgency === 'urgent' ? 0 : b.urgency === 'priority' ? 1 : 2;
      if (ua !== ub) return ua - ub;
      return a.createdAt < b.createdAt ? 1 : -1;
    });

    var clientsWithStrikes = ctx.clients

  /* ============ CLOSURES MANAGER MODAL ============ */
  function ClosuresManagerModal(props){
    var ctx = props.ctx;
    var dateTuple = useState(todayStr());
    var date = dateTuple[0];
    var setDate = dateTuple[1];
    var reasonTuple = useState('Holiday');
    var reason = reasonTuple[0];
    var setReason = reasonTuple[1];

    function add(){
      if (!date) { ctx.toast('Pick a date', 'error'); return; }
      ctx.addClosure({ date: date, reason: reason || 'Closed' });
      ctx.toast('Closure added ✓');
      setDate(todayStr());
      setReason('Holiday');
    }
    function remove(d){
      if (!window.confirm('Remove closure for ' + formatShort(parseYMD(d)) + '?')) return;
      ctx.removeClosure(d);
      ctx.toast('Closure removed', 'error');
    }

    var sorted = (ctx.closures || []).slice().sort(function(a,b){ return a.date < b.date ? -1 : 1; });

    return e('div', { className: 'modal-overlay' },
      e('div', { className: 'modal', onClick: function(ev){ ev.stopPropagation(); } },
        e('div', { className: 'modal-header' },
          e('h2', null, 'Facility Closure Dates'),

    var classes = ctx.classes;

    /* Pay-period selector. Default = previous (just-closed) period - most useful audit context. */
    var nowPeriod = payPeriodForDate(new Date());
    var selectedIdxTuple = useState(nowPeriod.index - 1);
    var selectedIdx = selectedIdxTuple[0];
    var setSelectedIdx = selectedIdxTuple[1];

    var subTuple = useState('summary'); /* summary | period | next */
    var sub = subTuple[0];
    var setSub = subTuple[1];

    var hoursModeTuple = useState('scheduled');
    var hoursMode = hoursModeTuple[0];
    var setHoursMode = hoursModeTuple[1];

    var closuresOpenTuple = useState(false);
    var closuresOpen = closuresOpenTuple[0];
    var setClosuresOpen = closuresOpenTuple[1];

    var cancelTargetTuple = useState(null); /* { cls, date } */
    var cancelTarget = cancelTargetTuple[0];
    var setCancelTarget = cancelTargetTuple[1];

    /* After a cancellation is saved, prompt for service recovery (optional)
       so the instructor can describe what they did during that slot. */
    var cancelRecoveryTuple = useState(null); /* { cls, cancellationId, durationHours } */
    var cancelRecovery = cancelRecoveryTuple[0];
    var setCancelRecovery = cancelRecoveryTuple[1];

    var period = payPeriodByIndex(selectedIdx);
    var nextPeriod = payPeriodByIndex(selectedIdx + 1);

    var periodOcc = useMemo(function(){
      return occurrencesInWindow(classes, period.start, period.end, ctx.closures);
    }, [classes, ctx.closures, selectedIdx]);
    var nextOcc = useMemo(function(){
      return occurrencesInWindow(classes, nextPeriod.start, nextPeriod.end, ctx.closures);
    }, [classes, ctx.closures, selectedIdx]);

    /* ---- summary stats over selected period ---- */
    var scheduledCount = periodOcc.length;
    var loggedCount = periodOcc.filter(function(o){ return o.logged; }).length;
    var cancelledCount = periodOcc.filter(function(o){ return o.isCancelled; }).length;
    var unloggedCount = periodOcc.filter(function(o){ return !o.logged && !o.isCancelled; }).length;
    var logRate = (scheduledCount - cancelledCount) > 0
      ? Math.round((loggedCount / (scheduledCount - cancelledCount)) * 100)
      : 0;
    var totalHeadcount = periodOcc.reduce(function(s,o){ return s + (o.headcount || 0); }, 0);
    var avgHeadcount = loggedCount ? (totalHeadcount / loggedCount).toFixed(1) : '0';
    var scheduledHours = periodOcc.filter(function(o){ return !o.isCancelled; }).reduce(function(s,o){ return s + classDurationHours(o.cls); }, 0);

    /* ---- sub activity ---- */
    var subsLogged = periodOcc.filter(function(o){ return o.wasSub; });
    var subsAssigned = periodOcc.filter(function(o){ return o.assignedSub; });
    var subsUpcoming = nextOcc.filter(function(o){ return o.assignedSub; });
    var subPairs = {};
    subsLogged.forEach(function(o){
      var key = o.actualInstructor + ' \u2192 ' + o.cls.instructor;
      subPairs[key] = (subPairs[key] || 0) + 1;
    });
    var subPairRows = Object.keys(subPairs).sort(function(a,b){ return subPairs[b] - subPairs[a]; });

    /* ---- instructor hours (selected period) - two modes ---- */
    var instructorHours = {};
    if (hoursMode === 'scheduled') {
      periodOcc.forEach(function(o){
        if (o.isCancelled) return;
        var inst = o.scheduledInstructor || '\u2014';
        instructorHours[inst] = (instructorHours[inst] || 0) + classDurationHours(o.cls);
      });
    } else {
      periodOcc.forEach(function(o){
        if (!o.logged) return;
        var inst = o.actualInstructor || o.cls.instructor;
        instructorHours[inst] = (instructorHours[inst] || 0) + classDurationHours(o.cls);
      });
    }
    var instructorRows = Object.keys(instructorHours).sort(function(a,b){ return instructorHours[b] - instructorHours[a]; });
    var maxInstHours = instructorRows.length ? instructorHours[instructorRows[0]] : 0;

    /* ---- room usage ---- */
    var roomUsage = {};
    periodOcc.forEach(function(o){
      if (o.isCancelled) return;
      var key = o.cls.location + ' \u00b7 ' + (o.cls.room || 'Unspecified');
      roomUsage[key] = (roomUsage[key] || 0) + classDurationHours(o.cls);
    });
    var roomRows = Object.keys(roomUsage).sort(function(a,b){ return roomUsage[b] - roomUsage[a]; });
    var maxRoomHours = roomRows.length ? roomUsage[roomRows[0]] : 0;

    /* ---- class-type mix ---- */
    var typeCounts = {};
    periodOcc.forEach(function(o){
      if (o.isCancelled) return;
      var k = o.cls.classType || 'Unspecified';
      typeCounts[k] = (typeCounts[k] || 0) + 1;
    });
    var typeRows = Object.keys(typeCounts).sort(function(a,b){ return typeCounts[b] - typeCounts[a]; });

    /* ---- capacity utilization ---- */
    var capRows = classes.map(function(c){
      var windowAtt = (c.attendance || []).filter(function(a){
        var d = parseYMD(a.date);
        return d && d >= period.start && d <= period.end;
      });
      if (windowAtt.length === 0) return null;
      var sum = windowAtt.reduce(function(s,a){ return s + (a.headcount || 0); }, 0);
      var avg = sum / windowAtt.length;
      var fill = c.capacity ? Math.round((avg / c.capacity) * 100) : null;
      return { cls: c, avg: avg, sessions: windowAtt.length, fill: fill };
    }).filter(Boolean).sort(function(a,b){
      if (a.fill != null && b.fill != null) return b.fill - a.fill;
      return b.avg - a.avg;
    });

    /* ---- location split ---- */
    var locHours = { CMRC: 0, Baca: 0 };
    periodOcc.forEach(function(o){
      if (o.isCancelled) return;
      locHours[o.cls.location] = (locHours[o.cls.location] || 0) + classDurationHours(o.cls);
    });

    /* ---- premium split ---- */
    var premiumOcc = periodOcc.filter(function(o){ return o.cls.isPremium && !o.isCancelled; });
    var premiumLogged = premiumOcc.filter(function(o){ return o.logged; });
    var premiumHeadcount = premiumLogged.reduce(function(s,o){ return s + (o.headcount || 0); }, 0);

    /* ---- unlogged occurrences (audit flags) ---- */
    var unlogged = periodOcc.filter(function(o){ return !o.logged && !o.isCancelled; });

    /* ---- group by date ---- */
    var periodByDate = {};
    periodOcc.forEach(function(o){
      if (!periodByDate[o.date]) periodByDate[o.date] = [];
      periodByDate[o.date].push(o);
    });
    var periodDates = Object.keys(periodByDate).sort();

    var nextByDate = {};
    nextOcc.forEach(function(o){
      if (!nextByDate[o.date]) nextByDate[o.date] = [];
      nextByDate[o.date].push(o);
    });
    var nextDates = Object.keys(nextByDate).sort();

    /* ---- CSV export (full audit) ---- */
    function exportScheduleAuditCSV(){
      var rows = [];
      rows.push(['Section','Date','Day','Time','Class','Location','Room','Regular Instructor','Scheduled Instructor','Actual Instructor','Was Sub','Capacity','Headcount','Fill %','Logged','Cancelled','Cancellation Reason','Class Type','Premium','Sub Note'].join(','));
      function row(section, o){
        var c = o.cls;
        var fill = (c.capacity && o.headcount != null) ? Math.round((o.headcount / c.capacity) * 100) : '';
        var date = parseYMD(o.date);
        rows.push([
          section,
          o.date,
          date ? IDX_TO_DOW[date.getDay()] : '',
          formatTime12(c.startTime) + '\u2013' + formatTime12(c.endTime),
          csvEscape(c.name || ''),
          c.location || '',
          csvEscape(c.room || ''),
          csvEscape(c.instructor || ''),
          csvEscape(o.scheduledInstructor || ''),
          csvEscape(o.actualInstructor || ''),
          o.wasSub ? 'Y' : '',
          c.capacity != null ? c.capacity : '',
          o.headcount != null ? o.headcount : '',
          fill,
          o.logged ? 'Y' : 'N',
          o.isCancelled ? 'Y' : 'N',
          csvEscape((o.cancellation && o.cancellation.reason) || ''),
          csvEscape(c.classType || ''),
          c.isPremium ? 'Y' : 'N',
          csvEscape((o.assignedSub && o.assignedSub.note) || '')
        ].join(','));
      }
      periodOcc.forEach(function(o){ row('Period ' + period.startYMD + ' to ' + period.endYMD, o); });
      nextOcc.forEach(function(o){ row('Next ' + nextPeriod.startYMD + ' to ' + nextPeriod.endYMD, o); });
      var blob = new Blob([rows.join('\n')], { type: 'text/csv;charset=utf-8' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = 'RRPR_audit_' + period.startYMD + '_to_' + period.endYMD + '.csv';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(function(){ URL.revokeObjectURL(url); }, 500);
      ctx.toast('Audit CSV exported \u2713');
    }

    /* ---- Payroll CSV (per-instructor for selected period) ---- */
    function exportPayrollCSV(){
      var rows = [];
      /* v2 columns: forward / auto admin / manual / total per trainer.
         Legacy columns kept for continuity with prior payroll spreadsheets. */
      rows.push([
        'Pay Period','Pay Day','Instructor',
        'Hours (Scheduled w/ Subs)','Hours (Logged Delivery)','Classes Logged',
        'Sub Hours Worked','Sub Hours Out (covered for them)',
        'PT Hours','GX Hours','Sub Hours (approved)',
        'Forward Hours','Auto Admin Hours','Manual Admin Hours','Total Hours'
      ].join(','));
      var schedHrs = {}; var delivHrs = {}; var subHrsIn = {}; var subHrsOut = {}; var classesLogged = {};
      periodOcc.forEach(function(o){
        if (o.isCancelled) return;
        var dur = classDurationHours(o.cls);
        var sched = o.scheduledInstructor || '\u2014';
        schedHrs[sched] = (schedHrs[sched] || 0) + dur;
        if (o.logged) {
          var actual = o.actualInstructor || o.cls.instructor;
          delivHrs[actual] = (delivHrs[actual] || 0) + dur;
          classesLogged[actual] = (classesLogged[actual] || 0) + 1;
          if (o.wasSub) {
            subHrsIn[actual] = (subHrsIn[actual] || 0) + dur;
            subHrsOut[o.cls.instructor] = (subHrsOut[o.cls.instructor] || 0) + dur;
          }
        }
      });

      /* v2: pull per-trainer breakdowns from calcTrainerHours so the CSV
         matches the on-screen Trainer Hours Breakdown panel exactly. */
      var offset = selectedIdx - nowPeriod.index;
      var v2Rows = {};
      ctx.trainers.forEach(function(t){
        v2Rows[t] = calcTrainerHours(t, offset, ctx.clients, ctx.classes, ctx.items || [], ctx.wros || [], ctx.contacts || []);
      });

      var allInst = {};
      Object.keys(schedHrs).forEach(function(k){ allInst[k] = true; });
      Object.keys(delivHrs).forEach(function(k){ allInst[k] = true; });
      Object.keys(v2Rows).forEach(function(k){
        var r = v2Rows[k];
        if (r.grandTotal > 0) allInst[k] = true;
      });
      Object.keys(allInst).sort().forEach(function(name){
        var v2 = v2Rows[name] || calcTrainerHours(name, offset, ctx.clients, ctx.classes, ctx.items || [], ctx.wros || [], ctx.contacts || []);
        rows.push([
          payPeriodLabel(period),
          formatShort(period.payDay),
          '"' + name.replace(/"/g,'""') + '"',
          (schedHrs[name] || 0).toFixed(2),
          (delivHrs[name] || 0).toFixed(2),
          classesLogged[name] || 0,
          (subHrsIn[name] || 0).toFixed(2),
          (subHrsOut[name] || 0).toFixed(2),
          v2.forwardFacing.ptHours.toFixed(2),
          v2.forwardFacing.gxHours.toFixed(2),
          v2.forwardFacing.subHours.toFixed(2),
          v2.forwardFacing.total.toFixed(2),
          v2.autoAdmin.hours.toFixed(2),
          v2.manualAdmin.hours.toFixed(2),
          v2.grandTotal.toFixed(2)
        ].join(','));
      });
      var blob = new Blob([rows.join('\n')], { type: 'text/csv;charset=utf-8' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = 'RRPR_payroll_' + period.startYMD + '_to_' + period.endYMD + '.csv';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(function(){ URL.revokeObjectURL(url); }, 500);
      ctx.toast('Payroll CSV exported \u2713');
    }

    var statusLabel = isCurrent ? 'Current (in progress)'

          e('div', { className: 'label' }, 'Cancelled'),
          e('div', { className: 'value' }, cancelledCount)
        ),
        e('div', { className: 'stat-card' },
          e('div', { className: 'label' }, 'Subs (Logged)'),
          e('div', { className: 'value' }, subsLogged.length)
        ),
        e('div', { className: 'stat-card' },
          e('div', { className: 'label' }, 'Scheduled Hours'),
          e('div', { className: 'value' }, scheduledHours.toFixed(1))
        ),
        e('div', { className: 'stat-card' },
          e('div', { className: 'label' }, 'Total Attendees'),
          e('div', { className: 'value' }, totalHeadcount)
        ),
        e('div', { className: 'stat-card' },
          e('div', { className: 'label' }, 'Avg per Class'),

      /* Unlogged flags */

              e('th', null, 'Date'),

              e('th', null, 'Instructor'),
              e('th', null, 'Location'),
              e('th', null, 'Action')
            )
          ),
          e('tbody', null,
            unlogged.map(function(o){

                  }, 'Mark Cancelled')

            })
          )
        )
      ),

      /* Instructor hours */
      e('div', { className: 'audit-section' },
        e('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', flexWrap: 'wrap', gap: '8px', marginBottom: '4px' } },
          e('h3', null, 'Hours per Instructor'),
          e('div', { style: { display: 'flex', gap: '4px', background: 'var(--cream-2)', padding: '3px', borderRadius: '999px' } },
            e('button', {
              className: 'pill-btn' + (hoursMode === 'scheduled' ? ' active' : ''),

            e('button', {

        ),
        e('div', { className: 'section-sub' },
          hoursMode === 'scheduled'

            : 'Selected pay period. Only counts logged sessions, credited to the actual instructor on record.'
        ),
        instructorRows.length === 0

          : instructorRows.map(function(name){

              return e('div', { key: name, className: 'audit-bar' },

      ),

      e('div', { className: 'audit-section' },
        e('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', flexWrap: 'wrap', gap: '8px', marginBottom: '4px' } },

              e('div', { style: { fontFamily: 'DM Serif Display', fontSize: '24px', color: 'var(--amber)' } }, subsLogged.length)

            e('table', { className: 'audit-table' },
              e('thead', null,
                e('tr', null,
                  e('th', null, 'Sub'),
                  e('th', null, 'Covered For'),

                )
              ),

                    e('td', null, formatShort(o.dateObj)),
                    e('td', null, o.cls.name + ' \u00b7 ' + formatTime12(o.cls.startTime)),
                    e('td', null, o.assignedSub.subInstructor),
                    e('td', null, o.cls.instructor),
                    e('td', null, o.assignedSub.note || '')
                  );
                })
              )
            )
          )
        ),

      /* Location + room usage */
      e('div', { className: 'audit-section' },
        e('h3', null, 'Location & Room Usage'),
        e('div', { className: 'section-sub' }, 'Scheduled hours per room (cancelled classes excluded).'),
        e('div', { style: { display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '12px', marginBottom: '16px' } },
          e('div', { style: { padding: '12px', background: 'var(--cream-2)', borderRadius: '10px' } },
            e('div', { style: { fontSize: '11px', color: 'var(--slate)', textTransform: 'uppercase', fontWeight: 700, letterSpacing: '0.05em' } }, 'CMRC'),
            e('div', { style: { fontFamily: 'DM Serif Display', fontSize: '26px', color: 'var(--navy)' } }, locHours.CMRC.toFixed(1) + ' hr')
          ),
          e('div', { style: { padding: '12px', background: 'var(--cream-2)', borderRadius: '10px' } },
            e('div', { style: { fontSize: '11px', color: 'var(--slate)', textTransform: 'uppercase', fontWeight: 700, letterSpacing: '0.05em' } }, 'Baca'),
            e('div', { style: { fontFamily: 'DM Serif Display', fontSize: '26px', color: 'var(--gold)' } }, locHours.Baca.toFixed(1) + ' hr')
          )
        ),
        roomRows.map(function(k){
          var hrs = roomUsage[k];
          var pct = maxRoomHours ? (hrs / maxRoomHours) * 100 : 0;
          return e('div', { key: k, className: 'audit-bar' },
            e('div', { className: 'label' }, k),
            e('div', { className: 'track' },
              e('div', { className: 'fill', style: { width: pct + '%', background: 'var(--gold)' } })
            ),
            e('div', { className: 'value' }, hrs.toFixed(1) + ' hr')
          );
        })
      ),

      /* Class type mix */
      typeRows.length > 0 && e('div', { className: 'audit-section' },
        e('h3', null, 'Class Type Mix'),
        e('div', { className: 'section-sub' }, 'Share of scheduled classes by category.'),
        typeRows.map(function(t){
          var cnt = typeCounts[t];
          var totalNonCancelled = scheduledCount - cancelledCount;
          var pct = totalNonCancelled ? Math.round((cnt / totalNonCancelled) * 100) : 0;
          var c = CLASS_TYPE_COLOR[t] || 'var(--slate)';
          return e('div', { key: t, className: 'audit-bar' },
            e('div', { className: 'label' }, t),
            e('div', { className: 'track' },
              e('div', { className: 'fill', style: { width: pct + '%', background: c } })
            ),
            e('div', { className: 'value' }, cnt + ' \u00b7 ' + pct + '%')
          );
        })
      ),

      /* Capacity utilization */
      capRows.length > 0 && e('div', { className: 'audit-section' },
        e('h3', null, 'Capacity Utilization'),
        e('div', { className: 'section-sub' }, 'Average attendance vs capacity. Only classes with logged sessions in this period.'),
        e('table', { className: 'audit-table' },
          e('thead', null,
            e('tr', null,
              e('th', null, 'Class'),
              e('th', null, 'Instructor'),
              e('th', null, 'Day'),
              e('th', null, 'Logs'),
              e('th', null, 'Avg'),
              e('th', null, 'Cap'),
              e('th', null, 'Fill')
            )
          ),
          e('tbody', null,
            capRows.map(function(r){
              var fillColor = r.fill == null ? 'var(--slate)' :
                r.fill >= 80 ? 'var(--green)' :
                r.fill >= 50 ? 'var(--amber)' : 'var(--red)';
              return e('tr', { key: r.cls.id },
                e('td', null, r.cls.name + (r.cls.isPremium ? ' (Premium)' : '')),
                e('td', null, r.cls.instructor),
                e('td', null, r.cls.dayOfWeek + ' ' + formatTime12(r.cls.startTime)),
                e('td', null, r.sessions),
                e('td', null, r.avg.toFixed(1)),
                e('td', null, r.cls.capacity != null ? r.cls.capacity : '\u2014'),
                e('td', { style: { color: fillColor, fontWeight: 700 } },
                  r.fill != null ? (r.fill + '%') : '\u2014')
              );
            })
          )
        )
      ),

      /* Premium */
      premiumOcc.length > 0 && e('div', { className: 'audit-section' },
        e('h3', null, 'Premium Classes (Fee-Based)'),
        e('div', { className: 'section-sub' }, 'Lost-leader visibility for fee-based programming.'),
        e('div', { style: { display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: '10px' } },
          e('div', { style: { padding: '12px', background: 'var(--amber-bg)', borderRadius: '10px' } },
            e('div', { style: { fontSize: '11px', color: 'var(--amber)', textTransform: 'uppercase', fontWeight: 700 } }, 'Scheduled'),
            e('div', { style: { fontFamily: 'DM Serif Display', fontSize: '24px', color: 'var(--amber)' } }, premiumOcc.length)
          ),
          e('div', { style: { padding: '12px', background: 'var(--amber-bg)', borderRadius: '10px' } },
            e('div', { style: { fontSize: '11px', color: 'var(--amber)', textTransform: 'uppercase', fontWeight: 700 } }, 'Logged'),
            e('div', { style: { fontFamily: 'DM Serif Display', fontSize: '24px', color: 'var(--amber)' } }, premiumLogged.length)
          ),
          e('div', { style: { padding: '12px', background: 'var(--amber-bg)', borderRadius: '10px' } },
            e('div', { style: { fontSize: '11px', color: 'var(--amber)', textTransform: 'uppercase', fontWeight: 700 } }, 'Attendance'),
            e('div', { style: { fontFamily: 'DM Serif Display', fontSize: '24px', color: 'var(--amber)' } }, premiumHeadcount)
          )
        )
      )
    );

    var periodView = e('div', null,
      e('div', { className: 'audit-section' },
        e('h3', null, 'Pay Period \u2014 ' + payPeriodLabel(period)),
        e('div', { className: 'section-sub' },
          scheduledCount + ' scheduled \u00b7 ' + loggedCount + ' logged (' + logRate + '%) \u00b7 ' +
          cancelledCount + ' cancelled \u00b7 ' +
          subsLogged.length + ' sub' + (subsLogged.length !== 1 ? 's' : '')
        ),
        periodDates.length === 0
          ? e('div', { style: { color: 'var(--slate)', fontStyle: 'italic' } }, 'No classes in this period.')
          : periodDates.map(function(d){
              var occs = periodByDate[d];
              var dObj = parseYMD(d);
              var firstOcc = occs[0];
              var dayClosed = firstOcc.isClosed;
              return e('div', { key: d, className: 'audit-day-group' },
                e('div', { className: 'day-head' }, formatShort(dObj) +
                  (dayClosed ? ' \u00b7 CLOSED (' + (firstOcc.closure.reason || '') + ')' : '')
                ),
                occs.map(function(o){
                  var instructorLabel = o.actualInstructor || o.scheduledInstructor || o.cls.instructor;
                  return e('div', { key: o.cls.id, className: 'day-row' },
                    e('div', { className: 'time' }, formatTime12(o.cls.startTime)),
                    e('div', null,
                      e('b', null, o.cls.name),
                      e('span', { style: { color: 'var(--slate)', fontSize: '12px', marginLeft: '6px' } },
                        '\u00b7 ' + instructorLabel + ' \u00b7 ' + o.cls.location + ' ' + (o.cls.room || '')),
                      o.wasSub && e('div', { style: { fontSize: '11px', color: 'var(--amber)', fontWeight: 700, marginTop: '2px' } },
                        '\ud83d\udd01 sub for ' + o.cls.instructor)
                    ),
                    e('div', null,
                      o.isCancelled
                        ? e('span', { style: { background: 'var(--red)', color: '#fff', padding: '2px 8px', borderRadius: '999px', fontSize: '11px', fontWeight: 700 } },
                            'CANCELLED' + (o.cancellation.reason ? ': ' + o.cancellation.reason : ''))
                        : o.logged
                          ? e('span', { className: 'audit-ok' }, (o.headcount != null ? o.headcount : '') + ' \u2713')
                          : e('button', {
                              className: 'sig-needed-btn',
                              style: { background: 'var(--red)' },
                              onClick: function(ev){ ev.stopPropagation(); markCancelled(o.cls, o.date); }
                            }, 'NO LOG \u00b7 cancel?')
                    )
                  );
                })
              );
            })
      )
    );

    var nextView = e('div', null,
      e('div', { className: 'audit-section' },
        e('h3', null, 'Next Pay Period \u2014 ' + payPeriodLabel(nextPeriod)),
        e('div', { className: 'section-sub' },
          nextOcc.length + ' classes scheduled \u00b7 ' +
          subsUpcoming.length + ' sub' + (subsUpcoming.length !== 1 ? 's' : '') + ' assigned \u00b7 ' +
          'pay day ' + formatShort(nextPeriod.payDay)
        ),
        nextDates.length === 0
          ? e('div', { style: { color: 'var(--slate)', fontStyle: 'italic' } }, 'No classes scheduled.')
          : nextDates.map(function(d){
              var occs = nextByDate[d];
              var dObj = parseYMD(d);
              var firstOcc = occs[0];
              var dayClosed = firstOcc.isClosed;
              return e('div', { key: d, className: 'audit-day-group' },
                e('div', { className: 'day-head' }, formatShort(dObj) +
                  (dayClosed ? ' \u00b7 CLOSED (' + (firstOcc.closure.reason || '') + ')' : '')
                ),
                occs.map(function(o){
                  return e('div', { key: o.cls.id, className: 'day-row' },
                    e('div', { className: 'time' }, formatTime12(o.cls.startTime)),
                    e('div', null,
                      e('b', null, o.cls.name),
                      e('span', { style: { color: 'var(--slate)', fontSize: '12px', marginLeft: '6px' } },
                        '\u00b7 ' + (o.assignedSub ? o.assignedSub.subInstructor : o.cls.instructor) + ' \u00b7 ' + o.cls.location + ' ' + (o.cls.room || '')),
                      o.assignedSub && e('div', { style: { fontSize: '11px', color: 'var(--amber)', fontWeight: 700, marginTop: '2px' } },
                        '\ud83d\udd01 covering for ' + o.cls.instructor +
                        (o.assignedSub.note ? ' \u00b7 ' + o.assignedSub.note : ''))
                    ),
                    e('div', { style: { fontSize: '12px', color: 'var(--slate)' } },
                      (o.cls.capacity != null ? 'cap ' + o.cls.capacity : '') +
                      (o.cls.isPremium ? ' \u00b7 $' : '')
                    )
                  );
                })
              );
            })
      )
    );

    return e('div', null,
      e('div', { className: 'section-head' },
        e('div', null,
          e('h2', null, 'Bi-Weekly Audit'),
          e('div', { className: 'meta' },
            payPeriodLabel(period) + ' \u00b7 ' + statusLabel + ' \u00b7 pay day ' + formatShort(period.payDay)
          )
        ),
        e('div', { style: { display: 'flex', gap: '6px', flexWrap: 'wrap' } },
          e('button', { className: 'btn btn-outline btn-sm', onClick: function(){ setClosuresOpen(true); } },
            'Closures (' + (ctx.closures || []).length + ')'),
          e('button', { className: 'btn btn-outline btn-sm', onClick: exportScheduleAuditCSV }, '\u2193 CSV')
        )
      ),
      e('div', { className: 'audit-controls' },
        e('span', { style: { fontWeight: 600, color: 'var(--slate)' } }, 'Pay period:'),
        e('select', {
          value: String(selectedIdx),
          onChange: function(ev){ setSelectedIdx(parseInt(ev.target.value, 10)); },
          style: { maxWidth: '260px' }
        },
          periodOptions.map(function(p){
            var label;
            if (p.index === nowPeriod.index) label = 'Current: ' + payPeriodLabelWithPayDay(p);
            else if (p.index === nowPeriod.index - 1) label = 'Previous: ' + payPeriodLabelWithPayDay(p);
            else if (p.index > nowPeriod.index) label = 'Next: ' + payPeriodLabelWithPayDay(p);
            else label = payPeriodLabelWithPayDay(p);
            return e('option', { key: p.index, value: String(p.index) }, label);
          })
        ),
        e('button', {
          className: 'pill-btn',
          onClick: function(){ setSelectedIdx(nowPeriod.index - 1); }
        }, 'Previous'),
        e('button', {
          className: 'pill-btn',
          onClick: function(){ setSelectedIdx(nowPeriod.index); }
        }, 'Current')
      ),
      e('div', { className: 'audit-subtabs' },
        e('button', { className: sub === 'summary' ? 'active' : '', onClick: function(){ setSub('summary'); } }, 'Summary'),
        e('button', { className: sub === 'period' ? 'active' : '', onClick: function(){ setSub('period'); } }, 'This Period'),
        e('button', { className: sub === 'next' ? 'active' : '', onClick: function(){ setSub('next'); } }, 'Next Period')
      ),
      sub === 'summary' ? summaryView : sub === 'period' ? periodView : nextView,

      closuresOpen && e(ClosuresManagerModal, {
        ctx: ctx,
        onClose: function(){ setClosuresOpen(false); }
      }),
      cancelTarget && e(CancelClassModal, {
        ctx: ctx,
        cls: cancelTarget.cls,
        date: cancelTarget.date,
        onClose: function(){ setCancelTarget(null); },
        onSave: function(c){
          var cls = cancelTarget.cls;
          ctx.addCancellation(cls.id, c);
          setCancelTarget(null);
          ctx.toast('Class marked cancelled \u2713');
          /* Chain into the service recovery prompt with class-duration auto-match. */
          setCancelRecovery({ cls: cls, cancellationId: c.id, durationHours: classDurationHours(cls) });
        }
      }),
      cancelRecovery && e(ServiceRecoveryModal, {
        ctx: ctx,
        durationHours: cancelRecovery.durationHours,
        sourceLabel: 'Cancelled class',
        onClose: function(){ setCancelRecovery(null); },
        onSave: function(recovery){
          ctx.updateCancellation(cancelRecovery.cls.id, cancelRecovery.cancellationId, { serviceRecovery: recovery });
          setCancelRecovery(null);
          ctx.toast('Recovery logged \u2713');
        }
      })
    );
  }


  /* ============ MOUNT ============ */
  var root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(e(App));
})();
</script>
</body>
</html>
