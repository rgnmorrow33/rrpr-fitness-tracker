    var c = String(candidate).toLowerCase().trim();
    if (t === c) return true;
    var tFirst = t.split(' ')[0];
    var cFirst = c.split(' ')[0];
    return tFirst === cFirst && tFirst.length >= 3;
  }

  /* Pull a duration off an attendance entry. If the attendance row has its
     own durationHours, trust it (snapshotted at log time). Otherwise fall
     back to the gxClassHours rule (50-60 min = 1 hour, else actual). */
  function attendanceDurationHours(cls, att){
    if (att && typeof att.durationHours === 'number' && att.durationHours > 0) {
      return att.durationHours;
    }
    return gxClassHours(cls);
  }

  /* Single source of truth for trainer hours per pay period.
     Returns the full breakdown documented in the v2 handoff:
       forwardFacing: { ptSessions, ptHours, gxClasses, gxHours,
                        subCoverage, subHours, total }
       autoAdmin: { hours, breakdown: { ptAdmin, gxAdmin, subAdmin } }
       manualAdmin: { items, hours }
       grandTotal
       subLosses (informational, not deducted)
     payPeriodOffset is relative to the current period:
       0 = current, -1 = previous (just closed), +1 = next */
  /* Display-only rounding for hour totals. Snaps to nearest 0.25 so
     trainers see clean quarter-hour totals on chips, summaries, and the
     time card. Underlying stored hours stay precise. */
  function displayHrs(n){
    var v = (typeof n === 'number' && isFinite(n)) ? n : 0;
    return (Math.round(v * 4) / 4).toFixed(2);
  }

  /* Single-week (Sun-Sat) scheduled vs logged dashboard for a trainer.
     Parallel to calcTrainerHours but window-flexible and focused on the
     forward-facing GX/PT split needed by the dashboard. Recomputed on
     every render so subscription updates flow through naturally. */
  function calcWeeklyDashboard(trainerName, weekStart, weekEnd, ctx){
    var startYMD = toYMD(weekStart);
    var endYMD = toYMD(weekEnd);

    /* GX scheduled: walk class occurrences. Sub coverage shifts the count
       to whoever's actually expected (assignedSub if present, else the
       primary instructor). Cancelled occurrences contribute recovery hours
       only when recovery is logged. */
    var occs = occurrencesInWindow(ctx.classes, weekStart, weekEnd, ctx.closures);
    var gxScheduled = 0;
    occs.forEach(function(o){
      if (o.isClosed) return;
      var expected = (o.assignedSub && (o.assignedSub.subInstructor || o.assignedSub.claimedBy)) || o.cls.instructor;
      if (!trainerNameMatches(trainerName, expected)) return;
      if (o.isCancelled) {
        var rec = o.cancellation && o.cancellation.serviceRecovery;
        if (rec && typeof rec.durationHours === 'number' && rec.durationHours > 0) {
          gxScheduled += rec.durationHours;
        }
        return;
      }
      gxScheduled += gxClassHours(o.cls);
    });

    /* PT scheduled: every session in the window assigned to this trainer,
       regardless of status. The slot is committed work even if it ended
       up no_show / late_cancel / excused. */
    var ptScheduled = 0;
    (ctx.clients || []).forEach(function(client){
      (client.sessions || []).forEach(function(s){
        if (!s.date || s.date < startYMD || s.date > endYMD) return;
        var sessTrainer = s.trainerName || client.trainerName;
        if (!trainerNameMatches(trainerName, sessTrainer)) return;
        var dur = (typeof s.durationHours === 'number' && s.durationHours > 0) ? s.durationHours : 1;
        ptScheduled += dur;
      });
    });

    /* GX logged: attendance records in window where this trainer was the
       actual instructor (primary or sub). Mirrors calcTrainerHours rules. */
    var gxLogged = 0;
    (ctx.classes || []).forEach(function(c){
      (c.attendance || []).forEach(function(a){
        if (a.cancelled) return;
        if (!a.date || a.date < startYMD || a.date > endYMD) return;
        var actual = a.actualInstructor || a.instructor || c.instructor;
        if (!trainerNameMatches(trainerName, actual)) return;
        gxLogged += attendanceDurationHours(c, a);
      });
    });

    /* PT logged: only attended sessions count as logged forward-facing
       hours (matches calcTrainerHours.ptHours rule). */
    var ptLogged = 0;
    (ctx.clients || []).forEach(function(client){
      (client.sessions || []).forEach(function(s){
        if (s.status !== 'attended') return;
        if (!s.date || s.date < startYMD || s.date > endYMD) return;
        var sessTrainer = s.trainerName || client.trainerName;
        if (!trainerNameMatches(trainerName, sessTrainer)) return;
        var dur = (typeof s.durationHours === 'number' && s.durationHours > 0) ? s.durationHours : 1;
        ptLogged += dur;
      });
    });

    /* Other logged (supplemental): auto-admin + manual admin + contacts +
       service recovery. Computed inline so the dashboard doesn't depend
       on calcTrainerHours' pay-period semantics. */
    var autoAdmin = autoAdminHours(gxLogged + ptLogged);
    var manualAdmin = 0;
    (ctx.items || []).forEach(function(it){
      if (!it.date || it.date < startYMD || it.date > endYMD) return;
      var matches = (it.assignees || []).some(function(n){ return trainerNameMatches(trainerName, n); });
      if (!matches) return;
      manualAdmin += (typeof it.hours === 'number' ? it.hours : 0);
    });
    var myContacts = [];
    (ctx.contacts || []).forEach(function(ct){
      if (!ct.date || ct.date < startYMD || ct.date > endYMD) return;
      if (!trainerNameMatches(trainerName, ct.trainerName)) return;
      myContacts.push(ct);
    });
    var contactH = contactsAdminHours(myContacts);
    var recoveryH = 0;
    (ctx.clients || []).forEach(function(client){
      (client.sessions || []).forEach(function(s){
        var r = s.serviceRecovery;
        if (!r || typeof r.durationHours !== 'number' || r.durationHours <= 0) return;
        if (!s.date || s.date < startYMD || s.date > endYMD) return;
        var loggedBy = r.loggedBy || client.trainerName;
        if (!trainerNameMatches(trainerName, loggedBy)) return;
        recoveryH += r.durationHours;
      });
    });
    (ctx.classes || []).forEach(function(cls){
      (cls.cancellations || []).forEach(function(x){
        var r = x.serviceRecovery;
        if (!r || typeof r.durationHours !== 'number' || r.durationHours <= 0) return;
        if (!x.date || x.date < startYMD || x.date > endYMD) return;
        var loggedBy = r.loggedBy || cls.instructor;
        if (!trainerNameMatches(trainerName, loggedBy)) return;
        recoveryH += r.durationHours;
      });
    });
    /* Contacts not included in otherLogged - shown only as a hint count
       below the bars, not summed into the on-the-floor footnote. */
    var otherLogged = autoAdmin + manualAdmin + recoveryH;
    var contactsCount = myContacts.length;

    function r2(n){ return Math.round(n * 100) / 100; }
    return {
      scheduled: {
        gx: r2(gxScheduled),
        pt: r2(ptScheduled),
        total: r2(gxScheduled + ptScheduled)
      },
      logged: {
        gx: r2(gxLogged),
        pt: r2(ptLogged),
        other: r2(otherLogged),
        contactsCount: contactsCount,
        total: r2(gxLogged + ptLogged)
      }
    };
  }

  /* Shared weekly hours dashboard panel. Renders Sun-Sat single-week
     scheduled vs logged with two progress bars (GX, PT) plus a small
     supplemental footnote for other-logged. Derives the window from
     today; recomputes on every render so subscription updates flow
     through naturally. Used in TrainerToday and TimeCardView. */
  function WeeklyHoursDashboard(props){
    var ctx = props.ctx;
    var trainerName = props.trainerName;
    var todayDate = parseYMD(todayStr());
    var weekStartDate = (function(){
      var d = new Date(todayDate.getTime());
      d.setHours(0, 0, 0, 0);
      d.setDate(d.getDate() - d.getDay());
      return d;
    })();
    var weekEndDate = addDays(weekStartDate, 6);
    var dash = calcWeeklyDashboard(trainerName, weekStartDate, weekEndDate, ctx);
    var remaining = Math.max(0, dash.scheduled.total - dash.logged.total);
    var isLastDay = todayDate.getDay() === 6;
    var remainingColor = remaining <= 0
      ? 'var(--green)'
      : (isLastDay ? 'var(--amber)' : 'var(--slate)');

    function bar(label, logged, scheduled){
      var pct = scheduled > 0 ? Math.min(100, Math.round((logged / scheduled) * 100)) : 0;
      var atOrAbove = scheduled > 0 && logged >= scheduled;
      var fillColor = atOrAbove ? 'var(--green)' : 'var(--teal)';
      return e('div', { style: { marginBottom: '8px' } },
        e('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', fontSize: '12px', marginBottom: '4px' } },
          e('span', { style: { fontWeight: 700, color: 'var(--navy)' } }, label),
          e('span', { style: { color: 'var(--slate)' } },
            displayHrs(logged) + ' / ' + displayHrs(scheduled) + ' hr · ' + pct + '%'
          )
        ),
        e('div', { style: { background: 'var(--cream-2)', borderRadius: '999px', height: '8px', overflow: 'hidden' } },
          e('div', { style: {
            background: fillColor,
            height: '100%',
            width: pct + '%',
            transition: 'width 0.3s ease'
          } })
        )
      );
    }
    var rangeLabel = weekStartDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) +
      ' - ' + weekEndDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

    return e('div', {
      style: {
        background: '#fff',
        border: '1.5px solid var(--border)',
        borderRadius: '12px',
        padding: '14px 16px',
        marginBottom: '14px'
      }
    },
      e('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', flexWrap: 'wrap', gap: '8px', marginBottom: '10px' } },
        e('div', null,
          e('div', { style: { fontSize: '11px', textTransform: 'uppercase', letterSpacing: '0.06em', color: 'var(--slate-soft)', fontWeight: 700 } },
            'This week'
          ),
          e('div', { style: { fontSize: '13px', color: 'var(--slate)', marginTop: '2px' } }, rangeLabel)
        ),
        e('div', { style: { textAlign: 'right' } },
          e('div', { style: { fontSize: '12px', color: 'var(--slate)' } },
            'Scheduled ' + displayHrs(dash.scheduled.total) + ' · Logged ' + displayHrs(dash.logged.total)
          ),
          e('div', { style: { fontSize: '14px', color: remainingColor, fontWeight: 700, marginTop: '2px' } },
            remaining <= 0 ? '✓ Caught up' : (displayHrs(remaining) + ' hr remaining')
          )
        )
      ),
      bar('GX', dash.logged.gx, dash.scheduled.gx),
      bar('PT', dash.logged.pt, dash.scheduled.pt),
      dash.logged.other > 0 && e('div', { style: { fontSize: '11px', color: 'var(--slate-soft)', marginTop: '6px', fontStyle: 'italic' } },
        '+ ' + displayHrs(dash.logged.other) + ' hr admin / recovery logged'
      ),
      dash.logged.contactsCount > 0 && e('div', { style: { fontSize: '11px', color: 'var(--slate-soft)', marginTop: '2px', fontStyle: 'italic' } },
        dash.logged.contactsCount + ' member contact' + (dash.logged.contactsCount === 1 ? '' : 's') + ' logged'
      )
    );
  }

  function calcTrainerHours(trainerName, payPeriodOffset, clients, classes, items, wros, contacts){
    var nowPeriod = payPeriodForDate(new Date());
    var period = payPeriodByIndex(nowPeriod.index + (payPeriodOffset || 0));
    var startYMD = period.startYMD;
    var endYMD = period.endYMD;

    /* PT sessions: attended only, in window. Late cancel / no show / excused
       are not forward-facing time. durationHours defaults to 1 for legacy. */
    var ptSessions = [];
    var ptHours = 0;
    clients.forEach(function(c){
      if (!trainerNameMatches(trainerName, c.trainerName)) return;
      (c.sessions || []).forEach(function(s){
        if (s.status !== 'attended') return;
        if (!s.date || s.date < startYMD || s.date > endYMD) return;
        var dur = (typeof s.durationHours === 'number' && s.durationHours > 0) ? s.durationHours : 1;
        ptSessions.push({ clientId: c.id, clientName: c.name, date: s.date, hours: dur, kind: 'session' });
        ptHours += dur;
      });
    });

    /* v2.2: Weight Room Orientations completed by this trainer credit toward
       PT hours. Use the post-form's orientationDate as the date and the
       computed durationHours (from time in/out). */
    var orientations = [];
    var orientationHours = 0;
    (wros || []).forEach(function(w){
      if (!w.postCompleted || !w.post) return;
      var sp = w.post.specialistName;
      if (!trainerNameMatches(trainerName, sp)) return;
      var dt = w.post.orientationDate || w.date;
      if (!dt || dt < startYMD || dt > endYMD) return;
      var dur = (typeof w.post.durationHours === 'number' && w.post.durationHours > 0)
        ? w.post.durationHours : 1;
      orientations.push({
        wroId: w.id,
        clientName: w.participantName,
        date: dt,
        hours: dur,
        kind: 'orientation'
      });
      orientationHours += dur;
    });

    /* GX classes: split between regular instruction and sub coverage. */
    var gxClasses = [];
    var gxHours = 0;
    var subCoverage = [];
    var subHours = 0;
    classes.forEach(function(c){
      (c.attendance || []).forEach(function(a){
        if (a.cancelled) return;
        if (!a.date || a.date < startYMD || a.date > endYMD) return;
        var dur = attendanceDurationHours(c, a);
        var actual = a.actualInstructor || a.instructor || c.instructor;
        /* Use trainerNameMatches not raw !== so name-format variation
           (full vs first-name, case, whitespace) doesn't misclassify a
           trainer's own attendance as sub coverage. The raw check used to
           push these into the sub-coverage path where the auto-created
           'claimed' assignment then got filtered out for not being
           'approved' - net zero hours for the actual instructor. */
        var wasSub = actual && !trainerNameMatches(actual, c.instructor);
        if (wasSub) {
          if (!trainerNameMatches(trainerName, actual)) return;
          /* Sub coverage credit only counts if the sub assignment is approved.
             If no assignment record exists (on-the-fly cover), treat as approved. */
          var assignment = (c.subAssignments || []).find(function(s){
            var sName = s.subInstructor || s.claimedBy;
            return s.date === a.date && trainerNameMatches(actual, sName);
          });
          var status = assignment ? subStatus(assignment) : 'approved';
          if (status !== 'approved') return;
          subCoverage.push({ classId: c.id, className: c.name, date: a.date, hours: dur });
          subHours += dur;
        } else {
          if (!trainerNameMatches(trainerName, c.instructor)) return;
          gxClasses.push({ classId: c.id, className: c.name, date: a.date, hours: dur });
          gxHours += dur;
        }
      });
    });

    /* Sub losses: classes the trainer was scheduled for that someone else
       covered (approved). Informational only, not deducted from total. */
    var subLosses = [];
    classes.forEach(function(c){
      if (!trainerNameMatches(trainerName, c.instructor)) return;
      (c.subAssignments || []).forEach(function(s){
        if (!s.date || s.date < startYMD || s.date > endYMD) return;
        if (subStatus(s) !== 'approved') return;
        var att = (c.attendance || []).find(function(a){ return a.date === s.date; });
        if (!att || att.cancelled) return;
        var dur = attendanceDurationHours(c, att);
        subLosses.push({ classId: c.id, className: c.name, date: s.date, hours: dur });
      });
    });

    /* PT category total: 1:1 sessions + orientations roll up together
       (per Selisa's pattern: WROs count as PT hours on the timecard). */
    var ptCategoryHours = ptHours + orientationHours;
    var forwardTotal = ptCategoryHours + gxHours + subHours;
    var autoAdmin = autoAdminHours(forwardTotal);

    /* Manual admin items: every assignee gets the FULL hours credited
       (not divided). A 1.5-hour meeting with two assignees = 1.5 each. */
    var myItems = [];
    var manualAdminH = 0;
    (items || []).forEach(function(it){
      if (!it.date || it.date < startYMD || it.date > endYMD) return;
      var matches = (it.assignees || []).some(function(n){ return trainerNameMatches(trainerName, n); });
      if (!matches) return;
      myItems.push(it);
      manualAdminH += (typeof it.hours === 'number' ? it.hours : 0);
    });

    /* v2.4: member contacts. Filter to this trainer + this period. Roll up
       counts by type and topic, compute capped admin hours. */
    var myContacts = [];
    var contactsByType = { quick: 0, substantive: 0, educational: 0 };
    var contactsByTopic = {};
    (contacts || []).forEach(function(ct){
      if (!ct.date || ct.date < startYMD || ct.date > endYMD) return;
      if (!trainerNameMatches(trainerName, ct.trainerName)) return;
      myContacts.push(ct);
      if (contactsByType[ct.type] != null) contactsByType[ct.type]++;
      if (ct.topic) contactsByTopic[ct.topic] = (contactsByTopic[ct.topic] || 0) + 1;
    });
    var contactAdminH = contactsAdminHours(myContacts);
    var contactsRawMinutes = myContacts.reduce(function(sum, c){
      return sum + (CONTACT_TYPE_MINUTES[c.type] || 0);
    }, 0);
    var contactsCapped = (contactsRawMinutes / 60) > CONTACT_ADMIN_CAP_HOURS;

    /* Service recovery hours: optional admin time logged for no_show /
       late_cancel sessions and cancelled class occurrences. Same admin
       bucket as manualAdmin (paid, not forward-facing) but tracked
       separately for time card visibility. Credit goes to recovery.loggedBy
       when set, falling back to the client's primary trainer (sessions) or
       the class instructor (cancellations) for legacy records. */
    var recoveryEntries = [];
    var recoveryHours = 0;
    clients.forEach(function(c){
      (c.sessions || []).forEach(function(s){
        var r = s.serviceRecovery;
        if (!r || !(typeof r.durationHours === 'number') || r.durationHours <= 0) return;
        if (!s.date || s.date < startYMD || s.date > endYMD) return;
        var loggedBy = r.loggedBy || c.trainerName;
        if (!trainerNameMatches(trainerName, loggedBy)) return;
        recoveryEntries.push({
          kind: 'session',
          sourceId: s.id,
          sourceClientId: c.id,
          sourceClientName: c.name,
          sourceLabel: c.name + ' · ' + (s.status === 'no_show' ? 'no-show' : s.status === 'late_cancel' ? 'late cancel' : s.status),
          date: s.date,
          hours: r.durationHours,
          description: r.description || (r.note || ''),
          loggedBy: loggedBy
        });
        recoveryHours += r.durationHours;
      });
    });
    classes.forEach(function(cls){
      (cls.cancellations || []).forEach(function(x){
        var r = x.serviceRecovery;
        if (!r || !(typeof r.durationHours === 'number') || r.durationHours <= 0) return;
        if (!x.date || x.date < startYMD || x.date > endYMD) return;
        var loggedBy = r.loggedBy || cls.instructor;
        if (!trainerNameMatches(trainerName, loggedBy)) return;
        recoveryEntries.push({
          kind: 'class_cancellation',
          sourceId: x.id,
          sourceClassId: cls.id,
          sourceClassName: cls.name,
          sourceLabel: cls.name + ' · cancelled (' + (x.reason || 'no reason') + ')',
          date: x.date,
          hours: r.durationHours,
          description: r.description || '',
          loggedBy: loggedBy
        });
        recoveryHours += r.durationHours;
      });
    });

    return {
      trainer: trainerName,
      payPeriod: {
        start: period.startYMD,
        end: period.endYMD,
        label: payPeriodLabel(period),
        payDay: period.payDay
      },
      forwardFacing: {
        ptSessions: ptSessions,
        ptHours: Math.round(ptHours * 100) / 100,
        orientations: orientations,
        orientationHours: Math.round(orientationHours * 100) / 100,
        ptCategoryHours: Math.round(ptCategoryHours * 100) / 100,
        gxClasses: gxClasses,
        gxHours: Math.round(gxHours * 100) / 100,
        subCoverage: subCoverage,
        subHours: Math.round(subHours * 100) / 100,
        total: Math.round(forwardTotal * 100) / 100
      },
      autoAdmin: {
        hours: autoAdmin,
        breakdown: {
          ptAdmin: autoAdminHours(ptCategoryHours),
          gxAdmin: autoAdminHours(gxHours),
          subAdmin: autoAdminHours(subHours)
        }
      },
      manualAdmin: {
        items: myItems,
        hours: Math.round(manualAdminH * 100) / 100
      },
      contacts: {
        items: myContacts,
        count: myContacts.length,
        byType: contactsByType,
        byTopic: contactsByTopic,
        rawMinutes: contactsRawMinutes,
        hours: contactAdminH,
        capped: contactsCapped,
        cap: CONTACT_ADMIN_CAP_HOURS
      },
      serviceRecovery: {
        entries: recoveryEntries,
        hours: Math.round(recoveryHours * 100) / 100
      },
      /* Contacts roll up as a separate paid-but-not-on-the-floor bucket; not
         summed into the time-on-the-floor grand total. card.contacts.hours
         is still surfaced in the contacts section for visibility. */
      grandTotal: Math.round((forwardTotal + autoAdmin + manualAdminH + recoveryHours) * 100) / 100,
      subLosses: subLosses
    };
  }

  /* ============ APP ROOT ============ */
  function App(){
    /* Storage adapter refactor (session 1):
       - Initial state holds seeds (used briefly while the loading screen is
         up; never displayed since `loading` short-circuits the render).
       - On mount, Promise.all loads all entities in parallel via the storage
         adapter. Each successful load overwrites state. Loading flips false
         when all complete (or fail).
       - Per-entity save effects fire on state change but are gated on
         !loading so they don't write seeds back over real data during the
         initial load window.
       - In session 2 the localStorage branch swaps for Supabase calls; this
         component shape doesn't change. */
    /* Profiles array (id, name, role, role_tier, pin, is_active). The
       string-array form ctx.trainers expects gets derived from this just
       below the ctx assembly. Seeded from SEED_TRAINERS as bare names with
       trainer-tier defaults; Supabase load replaces these on mount. */
    var trainerProfilesTuple = useState(function(){
      return SEED_TRAINERS.map(function(name){
        return { id: null, name: name, role: 'trainer', role_tier: 'trainer', pin: null, is_active: true };
      });
    });
    var trainerProfiles = trainerProfilesTuple[0];
    var setTrainerProfiles = trainerProfilesTuple[1];

    var clientsTuple = useState(buildSeedClients());
    var clients = clientsTuple[0];
    var setClients = clientsTuple[1];

    var classesTuple = useState(buildSeedClasses());
    var classes = classesTuple[0];
    var setClasses = classesTuple[1];

    var closuresTuple = useState(SEED_CLOSURES_2026.slice());
    var closures = closuresTuple[0];
    var setClosures = closuresTuple[1];

    var wrosTuple = useState([]);
    var wros = wrosTuple[0];
    var setWros = wrosTuple[1];

    var referralsTuple = useState([]);
    var referrals = referralsTuple[0];
    var setReferrals = referralsTuple[1];

    /* v2: manual admin time entries (Items) */
    var itemsTuple = useState([]);
    var items = itemsTuple[0];
    var setItems = itemsTuple[1];

    /* v2: leads / consult pipeline. Adapter API is storage.leads; the
       on-disk localStorage key remains cmrc_queue_v1 (no data migration). */
    var queueTuple = useState([]);
    var queue = queueTuple[0];
    var setQueue = queueTuple[1];

    /* v2.4: member contacts - quick log of floor interactions */
    var contactsTuple = useState([]);
    var contacts = contactsTuple[0];
    var setContacts = contactsTuple[1];

    /* v2.6: schedule versions - rolling GX schedules with effective dates.
       Each version is an immutable snapshot of a schedule with startDate
       and optional endDate. The active version is the one where
       today >= startDate AND (endDate is null OR today <= endDate). When
       a new version activates, classes from the prior version that aren't
       in the new one get seasonEnd set (preserved as historical, not
       deleted). */
    var schedVersionsTuple = useState([]);
    var scheduleVersions = schedVersionsTuple[0];
    var setScheduleVersions = schedVersionsTuple[1];

    /* Notifications: trainer-scoped, server-authored. No initial-load
       coordination with loadAll - the list is keyed on session.trainer_id
       and (re)loads in its own effect when sign-in resolves. No save
       useEffect / dirty-check ref - mutations go through targeted
       storage.notifications.markRead / markAllRead, not replace-all. */
    var notificationsTuple = useState([]);
    var notifications = notificationsTuple[0];
    var setNotifications = notificationsTuple[1];

    var pinTuple = useState(DEFAULT_PIN);
    var pin = pinTuple[0];

      document.addEventListener('keydown', bump);
      document.addEventListener('touchstart', bump);
      document.addEventListener('scroll', bump, true);
      var iv = setInterval(function(){
        var elapsed = Date.now() - lastActivityRef.current;
        if (elapsed >= IDLE_TIMEOUT_MS) {

         catches every create path (NewClientModal, ImportClientsModal,
         WRO conversion) without each having to remember to stamp it. */

      setClients(function(list){
        var exists = list.some(function(x){ return x.id === c.id; });
        if (exists) return list.map(function(x){ return x.id === c.id ? c : x; });

             treat the log as a sign-off of that slot and update in

            });

          setQueue(function(qList){
            var alreadyHasEntry = qList.some(function(q){ return q.fromWroId === w.id; });
            if (alreadyHasEntry) return qList;
            var todayY = todayStr();
            var followUpYMD = toYMD(addDays(parseYMD(todayY), 3));
            var note = 'WRO follow-up: ' + triggers.join(', ');
            if (w.post.notes && w.post.notes.trim()) note += ' \u00b7 ' + w.post.notes.trim();
            var newEntry = {
              id: uid(),
              name: w.participantName,
              phone: w.phone || '',
              email: w.email || '',
              note: note,
              source: 'wro_conversion',
              sourceTag: null,
              fromWroId: w.id,
              status: 'assigned',
              assignedTo: w.post.specialistName,
              assignedAt: new Date().toISOString(),
              assignedBy: w.post.specialistName,
              followUpBy: followUpYMD,
              statusHistory: [
                { status: 'waiting', at: new Date().toISOString(), by: 'system', note: 'Auto-created from WRO post-form' },
                { status: 'assigned', at: new Date().toISOString(), by: w.post.specialistName, note: 'Auto-assigned to WRO specialist' }
              ],
              createdAt: new Date().toISOString()
            };
            return qList.concat([newEntry]);
          });
        }
      }
    }
    function deleteWRO(id){

    /* v2.5: claim a pending WRO. Marks it as in-progress so other team
       members can see who's picking it up. Idempotent: re-claiming by the
       same person is a no-op; claiming by someone else overwrites (with a
       note in the audit history if we add one later). */
    function claimWRO(wroId, claimerName){
      if (!wroId || !claimerName) return;
      setWros(function(list){

    /* ---- trainer CRUD ---- */
    function addTrainer(name){
      name = (name || '').trim();
      if (!name) return false;
      var existing = trainerProfiles.find(function(p){ return p.name === name; });
      if (existing) {
        if (!existing.id) {
          /* Already in local state but never persisted to Supabase. Point
             the admin at the reconcile banner. */
          toast('Already in local list - use Reconcile to save them', 'error');
        } else {
          toast('Team member already exists', 'error');
        }
        return false;
      }
      var fresh = appendAuditEntry(
        { id: null, name: name, role: 'trainer', role_tier: 'trainer', pin: null, is_active: true, audit_log: [] },
        session,
        'create',
        { entity_type: 'trainer', target_id: null, before: null, after: { name: name, role_tier: 'trainer' } }
      );
      setTrainerProfiles(function(list){
        return list.concat([fresh]).sort(function(a,b){ return a.name < b.name ? -1 : 1; });
      });
      return true;
    }
    function removeTrainer(name){
      setTrainerProfiles(function(list){ return list.filter(function(p){ return p.name !== name; }); });
    }
    /* Merge a profile update (e.g., from EditTrainerModal). Matches by id
       when present, falls back to name match. */
    function upsertTrainerProfile(profile){
      setTrainerProfiles(function(list){
        var idx = -1;
        if (profile.id) idx = list.findIndex(function(p){ return p.id === profile.id; });
        if (idx === -1) idx = list.findIndex(function(p){ return p.name === profile.name; });
        if (idx === -1) return list.concat([profile]).sort(function(a,b){ return a.name < b.name ? -1 : 1; });
        var copy = list.slice();
        copy[idx] = Object.assign({}, copy[idx], profile);
        return copy.sort(function(a,b){ return a.name < b.name ? -1 : 1; });
      });
    }

    /* ---- v2 / v2.3: Consult queue / leads pipeline CRUD ---- */
    function upsertQueueEntry(q){
      setQueue(function(list){
        var exists = list.some(function(x){ return x.id === q.id; });

        return list.concat([q]);
      });

    function deleteQueueEntry(id){
      setQueue(function(list){ return list.filter(function(x){ return x.id !== id; }); });
    }
    function claimQueueEntry(id, claimerName, claimedByRole){
      setQueue(function(list){
        return list.map(function(q){
          if (q.id !== id) return q;
          /* v2.3: route through applyQueueStatusChange so the timeline records it */
          var updated = applyQueueStatusChange(q, 'assigned', { by: claimerName });
          var assigned = Object.assign(updated, {
            assignedTo: claimerName,
            assignedAt: new Date().toISOString(),

          });
          return appendAuditEntry(assigned, session, 'lead_status_change', {
            entity_type: 'lead', target_id: id,

            after:  { status: 'assigned', assignedTo: claimerName }
          });
        });
      });
    }
    /* v2.3: generic status transition handler used by the trainer/admin UIs.
       Validates the transition against the state machine. opts may include
       { by, note, lostReason, convertedToClientId }. */
    function transitionQueueEntry(id, newStatus, opts){
      opts = opts || {};
      setQueue(function(list){
        return list.map(function(q){
          if (q.id !== id) return q;
          var valid = queueValidNextStatuses(q.status || 'waiting');
          if (valid.indexOf(newStatus) === -1) return q;
          var updated = applyQueueStatusChange(q, newStatus, opts);
          return appendAuditEntry(updated, session, 'lead_status_change', {
            entity_type: 'lead', target_id: id,
            before: { status: q.status || 'waiting' },
            after:  { status: newStatus, note: opts.note || null }
          });
        });
      });
    }
    /* v2.3: reassign an assigned/contacted lead to a different trainer. */
    function reassignQueueEntry(id, newTrainer, byName){
      setQueue(function(list){
        return list.map(function(q){
          if (q.id !== id) return q;
          var history = (q.statusHistory || []).slice();
          history.push({
            from: q.status,
            to: q.status,
            at: new Date().toISOString(),
            by: byName || 'admin',

          });
          var updated = Object.assign({}, q, {
            assignedTo: newTrainer,

          });
          return appendAuditEntry(updated, session, 'lead_reassigned', {
            entity_type: 'lead', target_id: id,

    /* Auto-conversion hook: when a session is logged for a client whose

          if (q.id !== client.fromQueueId) return q;
          if (q.status === 'converted') return q;

    /* ---- v2: Sub approval state machine ---- */
    function approveSub(classId, subId, approverName, note){
      setClasses(function(list){
        return list.map(function(c){
          if (c.id !== classId) return c;
          var copy = Object.assign({}, c);

    function claimSub(classId, subId, claimerName){
      var prevClass = (classes || []).find(function(x){ return x.id === classId; });
      var prevSub = prevClass && (prevClass.subAssignments || [])
        .find(function(s){ return s.id === subId; });

      setClasses(function(list){
        return list.map(function(c){
          if (c.id !== classId) return c;
          var copy = Object.assign({}, c);
          copy.subAssignments = (c.subAssignments || []).map(function(s){
            if (s.id !== subId) return s;
            return Object.assign({}, s, {
              status: 'claimed',
              claimedBy: claimerName,
              claimedAt: new Date().toISOString(),
              subInstructor: claimerName
            });
          });
          return copy;
        });
      });

      /* sub_claimed: notify the original requester. Only on the open ->
         claimed transition (skip re-claims of an already-claimed row). */
      if (prevSub && prevSub.status === 'open') {
        var requesterId = trainerIdByName(prevSub.requestedBy || prevSub.originalInstructor);
        if (!_selfSuppress(requesterId)) {
          storage.notifications.emit(requesterId, 'sub_claimed', {
            trainerName: claimerName,
            className: prevClass ? prevClass.name : null,

          });

      }
    }

    /* v2.6: schedule version functions ===============================
       saveScheduleVersion: upsert a version with optional auto-activate
       deleteScheduleVersion: remove a version (does NOT roll back classes)
       activateScheduleVersion: apply a version's class roster to the live
         classes array, marking dropped classes with seasonEnd to preserve
         their historical attendance/instructor data. */
    function saveScheduleVersion(v){
      setScheduleVersions(function(list){
        var exists = list.some(function(x){ return x.id === v.id; });
        if (exists) return list.map(function(x){ return x.id === v.id ? v : x; });
        return list.concat([v]);
      });
    }
    function deleteScheduleVersion(id){
      setScheduleVersions(function(list){ return list.filter(function(x){ return x.id !== id; }); });
    }
    /* Apply a schedule version: reconcile classes against the version's
       roster. Idempotent; safe to re-run.

       For each class in the version: match to existing class by
       matchKey = name|location|dayOfWeek (lowercased). If it exists and
       was previously ended, reactivate it (clear seasonEnd, set new
       seasonStart). If it exists and is active, update its time/instructor
       and seasonStart. If it doesn't exist, create it.

       For classes NOT in the version: if they're currently active and
       were previously activated by an earlier schedule version OR have
       no seasonEnd set, mark them as ended on (newScheduleStart - 1 day).
       This preserves all historical attendance and instructor data while
       removing them from active rotation. */
    function activateScheduleVersion(versionId){
      var version = (schedVersionsTuple[0] || []).find(function(v){ return v.id === versionId; });
      if (!version) return { ok: false, reason: 'Version not found' };
      var startYMD = version.startDate;
      var endYMD = version.endDate || null;
      if (!startYMD) return { ok: false, reason: 'Version has no start date' };

      var dayBeforeStart = toYMD(addDays(parseYMD(startYMD), -1));

      function classMatchKey(c){
        return [
          (c.name || '').toLowerCase().trim(),
          (c.location || '').toLowerCase().trim(),
          (c.dayOfWeek || '').toUpperCase().trim()
        ].join('|');
      }

      var versionKeys = {};
      (version.classes || []).forEach(function(vc){ versionKeys[classMatchKey(vc)] = vc; });

      setClasses(function(list){
        var seenInVersion = {};
        /* Pass 1: update or create from version */
        var updated = list.map(function(c){
          var key = classMatchKey(c);
          var vc = versionKeys[key];
          if (!vc) return c;
          seenInVersion[key] = true;
          /* Reactivate or update with version data */
          var copy = Object.assign({}, c);
          if (vc.time) copy.time = vc.time;
          if (vc.duration != null) copy.duration = vc.duration;
          if (vc.instructor) copy.instructor = vc.instructor;
          copy.seasonStart = startYMD;
          copy.seasonEnd = endYMD;
          copy.scheduleVersionId = versionId;
          return copy;
        });
        /* Pass 2: append classes from version that aren't in list yet */
        (version.classes || []).forEach(function(vc){
          var key = classMatchKey(vc);
          if (seenInVersion[key]) return;
          updated.push({
            id: uid(),
            name: vc.name,
            location: vc.location,
            dayOfWeek: vc.dayOfWeek,
            time: vc.time || '',
            duration: vc.duration || 60,
            instructor: vc.instructor || '',
            seasonStart: startYMD,
            seasonEnd: endYMD,
            scheduleVersionId: versionId,
            attendance: [],
            subAssignments: [],
            cancellations: [],
            createdAt: new Date().toISOString()
          });
        });
        /* Pass 3: classes that aren't in this version. If they were
           activated by an earlier schedule version, end them on
           dayBeforeStart. Standalone manually-created classes (no
           scheduleVersionId) are left alone unless seasonEnd is unset and
           the class is dropping off due to rotation. We only auto-end
           classes tied to a scheduleVersionId different from the new one. */
        return updated.map(function(c){
          var key = classMatchKey(c);
          if (versionKeys[key]) return c;
          /* Only auto-end if it was tied to a previous schedule version */
          if (!c.scheduleVersionId) return c;
          if (c.scheduleVersionId === versionId) return c;
          /* Already ended before the new version starts: leave alone */
          if (c.seasonEnd && c.seasonEnd < startYMD) return c;
          var copy = Object.assign({}, c);
          copy.seasonEnd = dayBeforeStart;
          return copy;
        });
      });

      /* Mark this version as activated */
      setScheduleVersions(function(list){
        return list.map(function(v){
          if (v.id !== versionId) return v;
          return Object.assign({}, v, {
            activatedAt: new Date().toISOString()
          });
        });
      });

      return { ok: true };
    }

    /* v2.6: auto-activation. On every render where today >= a version's
       startDate AND that version isn't already activated, activate it.
       Idempotent: activatedAt prevents repeat activation. */
    useEffect(function(){
      var todayY = todayStr();
      var pending = (schedVersionsTuple[0] || []).filter(function(v){
        return v.startDate && v.startDate <= todayY && !v.activatedAt;
      }).sort(function(a, b){ return (a.startDate || '') < (b.startDate || '') ? -1 : 1; });
      pending.forEach(function(v){ activateScheduleVersion(v.id); });
    }, [scheduleVersions]);

    /* Derive the legacy string[] of trainer names from profile state. Most
       call sites still expect ctx.trainers to be a name list. */
    var trainers = trainerProfiles
      .filter(function(p){ return p.is_active !== false && !p.deleted_at; })
      .map(function(p){ return p.name; });

    function ctxCan(action){ return hasPermission(session, action); }
    function ctxCurrentUserName(){
      if (!session) return null;
      if (session.role === 'kiosk_wro') return null;
      return session.trainer_name || session.name || null;
    }

    /* Active (non-soft-deleted) views. Most consumers want these. Admin
       "Show deleted" UIs read the underscore-prefixed full lists. */
    var activeClients = clients.filter(function(c){ return !c.deleted_at; });
    var activeClasses = classes.filter(function(cl){ return !cl.deleted_at; });
    var activeQueue = queue.filter(function(q){ return !q.deleted_at; });

    /* ---- Audited write handlers ----
       Each looks up the prior record for diffing, stamps an audit entry,
       and routes through the existing setter so subscriptions/saves Just
       Work. Action labels match the Audit History viewer's expectations. */
    function auditedUpsertClient(c, action, opts){
      opts = opts || {};
      var before = clients.find(function(x){ return x.id === c.id; }) || null;
      var stamped = appendAuditEntry(c, session, action, Object.assign({
        entity_type: 'client',
        target_id: opts.target_id || c.id,
        before: opts.before !== undefined ? opts.before : before,
        after: opts.after !== undefined ? opts.after : c
      }, opts.changes !== undefined ? { changes: opts.changes } : {}));
      upsertClient(stamped);
    }
    function softDeleteClient(id){
      var before = clients.find(function(x){ return x.id === id; });
      if (!before) return;
      var actor = ctxCurrentUserName() || 'unknown';
      var deleted = Object.assign({}, before, {
        deleted_at: new Date().toISOString(),
        deleted_by: actor
      });
      var stamped = appendAuditEntry(deleted, session, 'soft_delete', {
        entity_type: 'client', target_id: id, before: before, after: deleted
      });
      upsertClient(stamped);
    }
    function restoreClient(id){
      var before = clients.find(function(x){ return x.id === id; });
      if (!before) return;
      var restored = Object.assign({}, before, { deleted_at: null, deleted_by: null });
      var stamped = appendAuditEntry(restored, session, 'restore', {
        entity_type: 'client', target_id: id, before: before, after: restored
      });
      upsertClient(stamped);
    }
    /* Soft-delete a single package on a client. */
    function softDeletePackage(clientId, packageId){
      var before = clients.find(function(x){ return x.id === clientId; });
      if (!before) return;
      var pkgBefore = (before.packages || []).find(function(p){ return p.id === packageId; });
      if (!pkgBefore) return;
      var actor = ctxCurrentUserName() || 'unknown';
      var pkgAfter = Object.assign({}, pkgBefore, {
        deleted_at: new Date().toISOString(),
        deleted_by: actor
      });
      var updated = Object.assign({}, before, {
        packages: before.packages.map(function(p){ return p.id === packageId ? pkgAfter : p; })
      });
      var stamped = appendAuditEntry(updated, session, 'package_deleted', {
        entity_type: 'client', target_id: packageId, before: pkgBefore, after: pkgAfter
      });
      upsertClient(stamped);
    }
    function restorePackage(clientId, packageId){
      var before = clients.find(function(x){ return x.id === clientId; });
      if (!before) return;
      var pkgBefore = (before.packages || []).find(function(p){ return p.id === packageId; });
      if (!pkgBefore) return;
      var pkgAfter = Object.assign({}, pkgBefore, { deleted_at: null, deleted_by: null });
      var updated = Object.assign({}, before, {
        packages: before.packages.map(function(p){ return p.id === packageId ? pkgAfter : p; })
      });
      var stamped = appendAuditEntry(updated, session, 'package_restored', {
        entity_type: 'client', target_id: packageId, before: pkgBefore, after: pkgAfter
      });
      upsertClient(stamped);
    }
    /* Stamp a service-recovery payload onto a session and audit it on the
       client record. Replaces the bare ctx.updateSession path for recovery
       so the audit log captures who logged what recovery work. */
    function logServiceRecovery(clientId, sessionId, recovery){
      var before = clients.find(function(x){ return x.id === clientId; });
      if (!before) return;
      var sessBefore = (before.sessions || []).find(function(s){ return s.id === sessionId; });
      if (!sessBefore) return;
      var prevRecovery = sessBefore.serviceRecovery || null;
      var updatedSessions = (before.sessions || []).map(function(s){
        return s.id === sessionId ? Object.assign({}, s, { serviceRecovery: recovery }) : s;
      });
      var updated = Object.assign({}, before, { sessions: updatedSessions });
      var stamped = appendAuditEntry(updated, session, 'recovery_logged', {
        entity_type: 'client', target_id: sessionId,
        before: prevRecovery,
        after: recovery
      });
      upsertClient(stamped);
    }
    /* Hard-delete a single package on a client. Reachable only from the
       deleted-records filter view via the "Delete forever" link. */
    function hardDeletePackage(clientId, packageId){
      var before = clients.find(function(x){ return x.id === clientId; });
      if (!before) return;
      var pkgBefore = (before.packages || []).find(function(p){ return p.id === packageId; });
      if (!pkgBefore) return;
      var updated = Object.assign({}, before, {
        packages: before.packages.filter(function(p){ return p.id !== packageId; })
      });
      var stamped = appendAuditEntry(updated, session, 'package_hard_deleted', {
        entity_type: 'client', target_id: packageId, before: pkgBefore, after: null
      });
      upsertClient(stamped);
    }

    function auditedUpsertClass(cl, action, opts){
      opts = opts || {};
      var before = classes.find(function(x){ return x.id === cl.id; }) || null;
      var stamped = appendAuditEntry(cl, session, action, Object.assign({
        entity_type: 'class',
        target_id: opts.target_id || cl.id,
        before: opts.before !== undefined ? opts.before : before,
        after: opts.after !== undefined ? opts.after : cl
      }, opts.changes !== undefined ? { changes: opts.changes } : {}));
      upsertClass(stamped);

      /* class_assigned + class_rescheduled. Both target after.instructor
         (newly-scheduled trainer). On combined edits both fire per spec.
         Schedule version activations bypass auditedUpsertClass and write
         directly via upsertClass + setClasses, so they don't fan out
         here - intentionally excluded for V1. */
      var newInstructorId = trainerIdByName(cl.instructor);
      if (action === 'create' && cl.instructor && !_selfSuppress(newInstructorId)) {
        storage.notifications.emit(newInstructorId, 'class_assigned', {
          className: cl.name,
          date: cl.dayOfWeek,
          classId: cl.id
        });
      } else if (action === 'update' && before) {
        var rescheduled =
          before.dayOfWeek !== cl.dayOfWeek ||
          before.startTime !== cl.startTime ||
          before.endTime !== cl.endTime;
        if (rescheduled && cl.instructor && !_selfSuppress(newInstructorId)) {
          storage.notifications.emit(newInstructorId, 'class_rescheduled', {
            className: cl.name,
            oldDate: before.dayOfWeek,
            newDate: cl.dayOfWeek,
            oldTime: before.startTime,
            newTime: cl.startTime,
            classId: cl.id
          });
        }
        var reassigned = before.instructor !== cl.instructor && !!cl.instructor;
        if (reassigned && !_selfSuppress(newInstructorId)) {
          storage.notifications.emit(newInstructorId, 'class_assigned', {
            className: cl.name,
            date: cl.dayOfWeek,
            classId: cl.id
          });
        }
      }
    }
    function softDeleteClass(id){
      var before = classes.find(function(x){ return x.id === id; });
      if (!before) return;
      var actor = ctxCurrentUserName() || 'unknown';
      var deleted = Object.assign({}, before, {
        deleted_at: new Date().toISOString(),
        deleted_by: actor
      });
      var stamped = appendAuditEntry(deleted, session, 'soft_delete', {
        entity_type: 'class', target_id: id, before: before, after: deleted
      });
      upsertClass(stamped);
    }
    function restoreClass(id){
      var before = classes.find(function(x){ return x.id === id; });
      if (!before) return;
      var restored = Object.assign({}, before, { deleted_at: null, deleted_by: null });
      var stamped = appendAuditEntry(restored, session, 'restore', {
        entity_type: 'class', target_id: id, before: before, after: restored
      });
      upsertClass(stamped);
    }

    /* Audit lead transitions. transitionQueueEntry already maintains the
       statusHistory timeline; this hook also writes to audit_log so the
       Audit History viewer surfaces lead changes. */
    function auditQueueChange(leadId, action, opts){
      opts = opts || {};
      setQueue(function(list){
        return list.map(function(q){
          if (q.id !== leadId) return q;
          return appendAuditEntry(q, session, action, Object.assign({
            entity_type: 'lead', target_id: leadId
          }, opts));
        });
      });
    }

    /* Notification trigger hooks (Phase 3). Helpers used by addSubAssignment,
       claimSub, addCancellation, auditedUpsertClass to fan out emits. */
    function trainerIdByName(name){
      if (!name) return null;
      var p = (trainerProfiles || []).find(function(x){ return trainerNameMatches(name, x.name); });
      return p ? p.id : null;
    }
    /* Self-suppress: skip emit if the target is the current actor. The
       requester is also pre-filtered out of sub_posted target lists, but
       this is the belt-and-suspenders check that all five hooks share. */
    function _selfSuppress(targetId){
      return !targetId || (session && targetId === session.trainer_id);
    }

    /* Notification mutators. Optimistic local update first, then PATCH;
       rollback on error and surface via toast (matches the _saveIfDirty
       failure-surface pattern). */
    function markNotificationRead(id){
      var existing = notifications.find(function(n){ return n.id === id; });
      if (!existing || existing.readAt) return;
      var now = new Date().toISOString();
      setNotifications(notifications.map(function(n){
        return n.id === id ? Object.assign({}, n, { readAt: now }) : n;
      }));
      storage.notifications.markRead(id).catch(function(err){
        console.error('Mark notification read failed:', err);
        setNotifications(function(prev){
          return prev.map(function(n){
            return n.id === id ? Object.assign({}, n, { readAt: existing.readAt || null }) : n;
          });
        });
        toast('Mark read failed: ' + (err && err.message ? err.message : 'unknown error'), 'error');
      });
    }
    function markAllNotificationsRead(){
      if (!session || !session.trainer_id) return;
      var trainerId = session.trainer_id;
      var prevList = notifications;
      if (!prevList.some(function(n){ return !n.readAt; })) return;
      var now = new Date().toISOString();
      setNotifications(prevList.map(function(n){
        return n.readAt ? n : Object.assign({}, n, { readAt: now });
      }));
      storage.notifications.markAllRead(trainerId).catch(function(err){
        console.error('Mark all notifications read failed:', err);
        setNotifications(prevList);
        toast('Mark all read failed: ' + (err && err.message ? err.message : 'unknown error'), 'error');

    var unreadCount = notifications.filter(function(n){ return !n.readAt; }).length;

    var ctx = {

    /* Loading / error screen. Initial Promise.all hits Supabase over the
       network; on failure, show a retry button rather than hanging. */
    if (loading || loadError) {

  function notificationText(n){
    var p = n.payload || {};
    if (n.type === 'sub_posted')        return 'Sub needed: ' + (p.className || 'class') + ' on ' + (p.date || '?') + ' at ' + (p.time || '?');
    if (n.type === 'sub_claimed')       return (p.trainerName || 'Someone') + ' claimed your sub for ' + (p.className || 'class') + ' on ' + (p.date || '?');
    if (n.type === 'class_canceled')    return (p.className || 'Class') + ' on ' + (p.date || '?') + ' canceled';
    if (n.type === 'class_rescheduled') return (p.className || 'Class') + ' moved from ' + (p.oldTime || '?') + ' to ' + (p.newTime || '?');
    if (n.type === 'class_assigned')    return 'You’re scheduled for ' + (p.className || 'class') + ' on ' + (p.date || '?');
    var snippet;
    try { snippet = JSON.stringify(p); } catch(_){ snippet = ''; }
    return n.type + ' ' + (snippet || '').slice(0, 80);
  }
  function relativeTime(iso){
    if (!iso) return '';
    var t = Date.parse(iso);
    if (isNaN(t)) return '';
    var diff = Math.max(0, Date.now() - t);
    var s = Math.floor(diff / 1000);
    if (s < 60) return 'just now';
    var m = Math.floor(s / 60);
    if (m < 60) return m + 'm ago';
    var h = Math.floor(m / 60);
    if (h < 24) return h + 'h ago';
    var d = Math.floor(h / 24);
    if (d === 1) return 'yesterday';
    if (d < 7) return d + 'd ago';
    var date = new Date(t);
    return (date.getMonth() + 1) + '/' + date.getDate();
  }

  function PinModal(props){
    var digitsTuple = useState('');
    var digits = digitsTuple[0];
    var setDigits = digitsTuple[1];

    function press(n){
      if (digits.length >= 4) return;
      var next = digits + n;
      setDigits(next);
      if (next.length === 4) {
        setTimeout(function(){
          if (next === props.expected) {
            props.onSuccess();
          } else {
            props.onFail();
            setDigits('');
          }
        }, 180);
      }
    }
    function back(){ setDigits(digits.slice(0,-1)); }

    var dots = [0,1,2,3].map(function(i){
      return e('div', { key: i, className: 'pin-dot ' + (i < digits.length ? 'filled' : '') });
    });

  /* ============ SIGNATURE PAD ============ */
  function SignaturePad(props){
    /* props: label, onChange(base64|null), value (optional preset) */
    var canvasRef = useRef(null);
    var wrapRef = useRef(null);
    var drawingRef = useRef(false);
    var lastRef = useRef({ x:0, y:0 });
    var hasInkTuple = useState(false);
    var hasInk = hasInkTuple[0];
    var setHasInk = hasInkTuple[1];

    function setupCanvas(){
      var c = canvasRef.current;
      var wrap = wrapRef.current;
      if (!c || !wrap) return;
      var rect = wrap.getBoundingClientRect();
      var w = rect.width;
      var h = 180;
      var dpr = window.devicePixelRatio || 1;
      c.width = Math.floor(w * dpr);
      c.height = Math.floor(h * dpr);
      c.style.width = w + 'px';
      c.style.height = h + 'px';
      var ctx = c.getContext('2d');
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.lineWidth = 2.5;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.strokeStyle = '#1a2e4a';
      ctx.fillStyle = '#fff';
      ctx.fillRect(0,0,w,h);
    }

    useEffect(function(){
      setupCanvas();
      var handler = function(){ setupCanvas(); setHasInk(false); if (props.onChange) props.onChange(null); };
      window.addEventListener('resize', handler);
      return function(){ window.removeEventListener('resize', handler); };
    }, []);

    function getPos(ev){
      var c = canvasRef.current;
      var rect = c.getBoundingClientRect();
      var clientX, clientY;
      if (ev.touches && ev.touches.length) { clientX = ev.touches[0].clientX; clientY = ev.touches[0].clientY; }
      else { clientX = ev.clientX; clientY = ev.clientY; }
      return { x: clientX - rect.left, y: clientY - rect.top };
    }
    function start(ev){
      ev.preventDefault();
      drawingRef.current = true;
      lastRef.current = getPos(ev);
    }
    function move(ev){
      if (!drawingRef.current) return;
      ev.preventDefault();
      var p = getPos(ev);
      var ctx = canvasRef.current.getContext('2d');
      ctx.beginPath();
      ctx.moveTo(lastRef.current.x, lastRef.current.y);
      ctx.lineTo(p.x, p.y);
      ctx.stroke();
      lastRef.current = p;
      if (!hasInk) setHasInk(true);
    }
    function end(ev){
      if (!drawingRef.current) return;
      drawingRef.current = false;
      if (props.onChange) {
        try { props.onChange(canvasRef.current.toDataURL('image/png')); } catch(_) {}
      }
    }
    function clearPad(){
      setupCanvas();
      setHasInk(false);
      if (props.onChange) props.onChange(null);
    }

    return e('div', null,
      e('div', { ref: wrapRef, className: 'sig-box' },
        !hasInk && e('div', { className: 'sig-label' }, props.label || 'Signature'),
        e('canvas', {
          ref: canvasRef,
          onMouseDown: start, onMouseMove: move, onMouseUp: end, onMouseLeave: end,
          onTouchStart: start, onTouchMove: move, onTouchEnd: end
        })
      ),
      e('div', { className: 'sig-actions' },
        e('button', { className: 'btn btn-ghost btn-sm', onClick: clearPad }, 'Clear'),
        e('span', { style: { fontSize: '12px', color: hasInk ? 'var(--green)' : 'var(--slate-soft)', alignSelf: 'center' } },
          hasInk ? '✓ Captured' : 'Sign above'
        )
      )
    );
  }

  /* ============ TRAINER NOTIFICATION BAR (v2.6) ============
     Sign-in surface for available pickups across three categories:
     1. Open GX classes needing sub coverage (open sub assignments)
     2. New clients waiting for trainer assignment (PT clients with no
        assigned trainer, or queue entries in 'waiting' status)
     3. New WROs waiting to be picked up (state = 'pending')

     Only renders categories with items. If everything is zero, returns null
     so the bar doesn't take up space. Each item is tappable.

     SERVER NOTE: The "open" state is whatever this iPad sees in localStorage.
     Until hosted, two iPads can both show the same item as "open" and both
     trainers can claim it independently. Real-time uniqueness needs hosting. */
  function TrainerNotificationBar(props){
    var ctx = props.ctx;
    var trainerName = ctx.session.name;
    var onJumpToTab = props.onJumpToTab;

    /* Open sub coverage: classes with subAssignments where status is 'open'
       (originally assigned trainer dropped, no replacement claimed yet) */
    var openSubs = [];
    (ctx.classes || []).forEach(function(c){
      (c.subAssignments || []).forEach(function(s){
        if (subStatus(s) === 'open') {
          /* Skip if we know the original instructor is the current viewer
             (no point asking them to sub for themselves) */
          if (trainerNameMatches(trainerName, s.originalInstructor)) return;
          openSubs.push({ classId: c.id, className: c.name, subId: s.id, sub: s, klass: c });
        }
      });
    });

    /* New clients waiting: PT queue waiting status (unclaimed) */
    var waitingLeads = (ctx.queue || []).filter(function(q){
      return q.status === 'waiting';
    });

    /* New WROs waiting pickup */
    var availableWros = (ctx.wros || []).filter(function(w){
      return wroState(w) === 'pending';
    });

    /* This trainer's own clients with package alerts */
    var myClients = (ctx.clients || []).filter(function(c){
      return trainerNameMatches(trainerName, c.trainerName);
    });
    var lastSessionClients = myClients.filter(function(c){ return clientPackageFlags(c).lastSessionFlag; });
    var staleClients = myClients.filter(function(c){ return clientPackageFlags(c).staleFlag; });

    var totalCount = openSubs.length + waitingLeads.length + availableWros.length +
                     lastSessionClients.length + staleClients.length;
    if (totalCount === 0) return null;

    function chip(opts){
      return e('button', {
        onClick: opts.onClick,
        style: {
          flex: '1 1 100px',
          minWidth: '120px',
          background: '#fff',
          border: '1.5px solid ' + opts.color,
          color: opts.color,
          padding: '10px 14px',
          borderRadius: '10px',
          fontSize: '13px',
          fontWeight: 600,
          fontFamily: 'Arial',
          cursor: 'pointer',
          display: 'flex',
          flexDirection: 'column',
          alignItems: 'flex-start',
          gap: '4px',
          textAlign: 'left'
        }
      },
        e('div', { style: { fontSize: '11px', textTransform: 'uppercase', letterSpacing: '0.05em', opacity: 0.85 } }, opts.label),
        e('div', { style: { fontSize: '20px', fontFamily: "'DM Serif Display', serif", lineHeight: 1 } }, opts.count),
        e('div', { style: { fontSize: '11px', opacity: 0.7 } }, 'Tap to view')
      );
    }

    return e('div', {
      style: {
        background: 'linear-gradient(135deg, #fff8eb, #fff4dc)',
        border: '1.5px solid var(--gold)',
        borderRadius: '12px',
        padding: '12px 14px',
        marginBottom: '14px'
      }
    },
      e('div', {
        style: {
          fontSize: '11px',
          fontWeight: 700,
          textTransform: 'uppercase',
          letterSpacing: '0.06em',
          color: 'var(--gold)',
          marginBottom: '8px',
          display: 'flex',
          alignItems: 'center',
          gap: '6px'
        }
      },
        e('span', null, '\ud83d\udd14'),
        e('span', null, 'Available pickups (' + totalCount + ')')
      ),
      e('div', {
        style: {
          display: 'flex',
          gap: '8px',
          flexWrap: 'wrap'
        }
      },
        openSubs.length > 0 && chip({
          label: 'Open GX classes',
          count: openSubs.length,
          color: '#7B68B6',
          onClick: function(){ onJumpToTab && onJumpToTab('gx', { filter: 'available_subs' }); }
        }),
        lastSessionClients.length > 0 && chip({
          label: 'On last session',
          count: lastSessionClients.length,
          color: 'var(--amber)',
          onClick: function(){ onJumpToTab && onJumpToTab('pt', { filter: 'last_session' }); }
        }),
        staleClients.length > 0 && chip({
          label: 'Stale packages',
          count: staleClients.length,
          color: 'var(--slate)',
          onClick: function(){ onJumpToTab && onJumpToTab('pt', { filter: 'stale' }); }
        }),
        waitingLeads.length > 0 && chip({
          label: 'New clients waiting',
          count: waitingLeads.length,
          color: 'var(--teal)',
          onClick: function(){ onJumpToTab && onJumpToTab('leads'); }
        }),
        availableWros.length > 0 && chip({
          label: 'New WROs',

  /* ============ TRAINER TODAY VIEW (v2.6) ============
     Default landing page for trainers. Auto-detects today's date and
     surfaces:
     - The trainer's GX classes scheduled today
     - The trainer's PT sessions scheduled today
     - WROs scheduled for today (if any)
     - Pay-period summary
     Trainer doesn't need to navigate to find what's happening today. */
  function TrainerToday(props){
    var ctx = props.ctx;
    var trainerName = ctx.session.name;

    var todayYMD = todayStr();
    var todayDate = parseYMD(todayYMD);
    var todayDow = IDX_TO_DOW[todayDate.getDay()];

    /* Tap-to-open state. Mirrors the patterns in TrainerGX (ClassDetail
       swap), TrainerPT (ClientDetail swap), and TrainerLeads (PostWROModal
       overlay) so a card tap on Today reuses the existing flows. */
    var classDetailIdTuple = useState(null);
    var classDetailId = classDetailIdTuple[0]; var setClassDetailId = classDetailIdTuple[1];
    var clientDetailIdTuple = useState(null);
    var clientDetailId = clientDetailIdTuple[0]; var setClientDetailId = clientDetailIdTuple[1];
    var wroOpenTuple = useState(null);
    var wroOpen = wroOpenTuple[0]; var setWroOpen = wroOpenTuple[1];
    /* Direct sign-off from Today: tapping a 'scheduled' PT card opens
       LogSessionModal in edit mode without first swapping to ClientDetail.
       signOff holds { client, session } so onLog has the client id for
       updateSession. Service recovery prompt fires for no_show/late_cancel. */
    var signOffTuple = useState(null);
    var signOff = signOffTuple[0]; var setSignOff = signOffTuple[1];
    /* Read-only detail view for already-completed PT sessions tapped on
       Today. Keeps the trainer on the Today tab instead of routing to
       ClientDetail. */
    var sessionDetailTuple = useState(null);
    var sessionDetail = sessionDetailTuple[0]; var setSessionDetail = sessionDetailTuple[1];
    var recoveryTargetTuple = useState(null);
    var recoveryTarget = recoveryTargetTuple[0]; var setRecoveryTarget = recoveryTargetTuple[1];

    /* Today's class occurrences */
    var todayOccs = useMemo(function(){
      return occurrencesInWindow(ctx.classes, todayDate, todayDate, ctx.closures);
    }, [ctx.classes, ctx.closures, todayYMD]);

    /* Filter to classes I'm teaching today (primary instructor or subbing) */
    var myClassesToday = todayOccs.filter(function(o){
      var c = o.cls;
      if (!c) return false;
      /* Primary instructor */
      if (trainerNameMatches(trainerName, c.instructor)) return true;
      /* Sub assignment for this date */
      var sub = (c.subAssignments || []).find(function(s){
        return s.date === o.date && (subStatus(s) === 'claimed' || subStatus(s) === 'approved');
      });
      if (sub && trainerNameMatches(trainerName, sub.subInstructor || sub.claimedBy)) return true;
      return false;
    }).sort(function(a, b){ return (a.time || '') < (b.time || '') ? -1 : 1; });

    /* Today's PT sessions for this trainer, plus any pre-scheduled
       sessions that are past-due and still need sign-off. Trainer-name
       matching is tolerant: prefers s.trainerName when stamped (new
       scheduled sessions stamp this), falls back to client.trainerName
       for legacy session records that pre-date the field. */
    var ptSessionsToday = [];
    (ctx.clients || []).forEach(function(client){
      (client.sessions || []).forEach(function(s){
        var sessTrainer = s.trainerName || client.trainerName;
        if (!trainerNameMatches(trainerName, sessTrainer)) return;
        var isToday = s.date === todayYMD;
        var isOverdueScheduled = s.status === 'scheduled' && s.date < todayYMD;
        if (isToday || isOverdueScheduled) {
          ptSessionsToday.push({ client: client, session: s });
        }
      });
    });
    ptSessionsToday.sort(function(a, b){
      /* Overdue scheduled surface first (oldest first), then today's by time. */
      var aOverdue = a.session.status === 'scheduled' && a.session.date < todayYMD;
      var bOverdue = b.session.status === 'scheduled' && b.session.date < todayYMD;
      if (aOverdue !== bOverdue) return aOverdue ? -1 : 1;
      if (aOverdue && bOverdue) return a.session.date < b.session.date ? -1 : 1;
      return (a.session.time || '') < (b.session.time || '') ? -1 : 1;
    });

    /* WROs scheduled for today (orientation date) where I'm the claimer or specialist */
    var myWrosToday = (ctx.wros || []).filter(function(w){
      var orientYMD = (w.post && w.post.orientationDate) || w.date;
      if (orientYMD !== todayYMD) return false;
      if (w.claimedBy && trainerNameMatches(trainerName, w.claimedBy)) return true;
      if (w.post && trainerNameMatches(trainerName, w.post.specialistName)) return true;
      return false;
    });

    /* Pay-period summary */
    var summary = calcTrainerHours(trainerName, 0, ctx.clients, ctx.classes, ctx.items || [], ctx.wros || [], ctx.contacts || []);

    var todayCount = myClassesToday.length + ptSessionsToday.length + myWrosToday.length;

    /* Full-screen detail swaps. Same pattern as TrainerGX/TrainerPT: when
       a detail id is set, return the detail component instead of the
       Today list. Closing returns here without changing tabs. The detail
       components run with hideHeader=true so the consolidated header in
       TrainerView (driven by setHeaderContext below) is the only sticky
       bar shown to the user. */
    var setHeaderContext = props.setHeaderContext || function(){};
    if (classDetailId) {
      var clForDetail = ctx.classes.find(function(x){ return x.id === classDetailId; });
      if (!clForDetail) { setClassDetailId(null); return null; }
      return e(ClassDetail, {
        ctx: ctx, cls: clForDetail, hideHeader: true,
        onBack: function(){ setClassDetailId(null); setHeaderContext(null); },
        canEdit: true
      });
    }
    if (clientDetailId) {
      var cliForDetail = ctx.clients.find(function(x){ return x.id === clientDetailId; });
      if (!cliForDetail) { setClientDetailId(null); return null; }
      return e(ClientDetail, {
        ctx: ctx, client: cliForDetail, hideHeader: true,
        onBack: function(){ setClientDetailId(null); setHeaderContext(null); },
        canEdit: true
      });
    }

    return e('div', null,
      /* Today header - emphasizes the actual date */
      e('div', {
        style: {
          background: 'linear-gradient(135deg, var(--navy), #2a4a73)',
          color: '#fff',

      e('div', {
