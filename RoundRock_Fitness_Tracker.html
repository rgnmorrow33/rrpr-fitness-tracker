  /* ============ WEEK VIEW (trainer + admin) ============
     7-day stacked schedule for a single trainer. Reused by the trainer
     Schedule tab and the admin Operations Schedule tab (with a trainer
     picker on top). Forward navigation is unlimited (long-range planning);
     back is capped at 4 weeks. Each day collects:
       - GX classes the trainer is scheduled to teach
       - PT sessions on the trainer's clients (any status)
       - WROs the trainer is the specialist for (orientationDate)
     Per-card try/catch keeps a single bad record from crashing the view.
     allowDirectSignOff defaults true (trainer); admin sets false. */
  function TrainerWeekView(props){
    var ctx = props.ctx;
    var trainerName = props.trainerName;
    var setHeaderContext = props.setHeaderContext || function(){};
    var allowDirectSignOff = props.allowDirectSignOff !== false;
    var hideDetailHeader = !!props.setHeaderContext;

    var offsetTuple = useState(0);
    var offset = offsetTuple[0]; var setOffset = offsetTuple[1];

    var classDetailIdTuple = useState(null);
    var classDetailId = classDetailIdTuple[0]; var setClassDetailId = classDetailIdTuple[1];
    var clientDetailIdTuple = useState(null);
    var clientDetailId = clientDetailIdTuple[0]; var setClientDetailId = clientDetailIdTuple[1];
    var signOffTuple = useState(null);
    var signOff = signOffTuple[0]; var setSignOff = signOffTuple[1];
    var recoveryTargetTuple = useState(null);
    var recoveryTarget = recoveryTargetTuple[0]; var setRecoveryTarget = recoveryTargetTuple[1];
    var wroOpenTuple = useState(null);
    var wroOpen = wroOpenTuple[0]; var setWroOpen = wroOpenTuple[1];

    var todayYMD = todayStr();
    var todayDate = parseYMD(todayYMD);
    var startOfThisWeek = (function(){
      var d = new Date(todayDate.getTime());
      d.setHours(0,0,0,0);
      d.setDate(d.getDate() - d.getDay()); /* back to Sunday */
      return d;
    })();
    var weekStart = addDays(startOfThisWeek, offset * 7);
    var weekEnd = addDays(weekStart, 6);
    var weekStartYMD = toYMD(weekStart);
    var weekEndYMD = toYMD(weekEnd);

    /* Detail swaps. hideDetailHeader is false on admin (admin keeps inner
       header) and true on trainer (consolidated header at top). */
    if (classDetailId) {
      var clForDetail = ctx.classes.find(function(x){ return x.id === classDetailId; });
      if (!clForDetail) { setClassDetailId(null); return null; }
      return e(ClassDetail, {
        ctx: ctx, cls: clForDetail, hideHeader: hideDetailHeader,
        onBack: function(){ setClassDetailId(null); setHeaderContext(null); },
        canEdit: true
      });
    }
    if (clientDetailId) {
      var cliForDetail = ctx.clients.find(function(x){ return x.id === clientDetailId; });
      if (!cliForDetail) { setClientDetailId(null); return null; }
      return e(ClientDetail, {
        ctx: ctx, client: cliForDetail, hideHeader: hideDetailHeader,
        onBack: function(){ setClientDetailId(null); setHeaderContext(null); },
        canEdit: true
      });
    }

    /* Week data */
    var occs = trainerName ? occurrencesInWindow(ctx.classes, weekStart, weekEnd, ctx.closures) : [];
    var gxByDate = {};
    occs.forEach(function(o){
      var assignedSub = o.assignedSub;
      var teaching = trainerNameMatches(trainerName, o.cls.instructor) ||
                     (assignedSub && trainerNameMatches(trainerName, assignedSub.subInstructor || assignedSub.claimedBy));
      if (!teaching) return;
      if (!gxByDate[o.date]) gxByDate[o.date] = [];
      gxByDate[o.date].push(o);
    });

    var ptByDate = {};
    (ctx.clients || []).forEach(function(client){
      (client.sessions || []).forEach(function(s){
        var sessTrainer = s.trainerName || client.trainerName;
        if (!trainerNameMatches(trainerName, sessTrainer)) return;
        if (!s.date || s.date < weekStartYMD || s.date > weekEndYMD) return;
        if (!ptByDate[s.date]) ptByDate[s.date] = [];
        ptByDate[s.date].push({ client: client, session: s });
      });
    });

    var wrosByDate = {};
    (ctx.wros || []).forEach(function(w){
      var orientYMD = (w.post && w.post.orientationDate) || w.date;
      if (!orientYMD || orientYMD < weekStartYMD || orientYMD > weekEndYMD) return;
      var sp = (w.post && w.post.specialistName) || w.claimedBy;
      if (!trainerNameMatches(trainerName, sp)) return;
      if (!wrosByDate[orientYMD]) wrosByDate[orientYMD] = [];
      wrosByDate[orientYMD].push(w);
    });

    function weekLabel(){
      var startStr = weekStart.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      var endStr = weekEnd.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      if (offset === 0) return 'This week · ' + startStr + ' – ' + endStr;
      if (offset === 1) return 'Next week · ' + startStr + ' – ' + endStr;
      if (offset === -1) return 'Last week · ' + startStr + ' – ' + endStr;
      return startStr + ' – ' + endStr;
    }

    /* Per-card error boundary: a single bad record shouldn't crash the
       whole view. Returns a small inline error placeholder if fn throws. */
    function safeRender(key, fn){
      try { return fn(); }
      catch (err) {
        return e('div', {
          key: key,
          style: {
            padding: '8px 12px', background: '#fff5f5',
            border: '1px solid var(--red)', borderRadius: '6px',
            fontSize: '12px', color: 'var(--red)', marginBottom: '6px'
          }
        }, 'Could not render this card.' + (err && err.message ? (' ' + err.message) : ''));
      }
    }

    function gxCard(o){
      var c = o.cls;
      var logged = !!o.logged;
      var stripeColor = logged ? 'var(--green)' : (CLASS_TYPE_COLOR[c.classType] || 'var(--teal)');
      return e('div', {
        key: 'gx-' + c.id + ':' + o.date,
        onClick: function(){
          if (props.onOpenClass) {
            /* Admin: delegate detail nav up so admin's outer single-header
               swap pattern is preserved. */
            props.onOpenClass(c.id);
            return;
          }
          setClassDetailId(c.id);
          setHeaderContext({
            title: c.name, sub: c.location,
            onBack: function(){ setClassDetailId(null); setHeaderContext(null); }
          });
        },
        style: {
          background: logged ? 'var(--green-bg)' : '#fff',
          border: '1.5px solid var(--border)',
          borderLeft: '4px solid ' + stripeColor,
          borderRadius: '10px', padding: '8px 12px', marginBottom: '6px',
          cursor: 'pointer', fontSize: '13px'
        }
      },
        e('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: '8px', flexWrap: 'wrap' } },
          e('div', { style: { flex: 1, minWidth: 0 } },
            e('div', { style: { fontWeight: 600, color: 'var(--navy)' } },
              c.name,
              logged && e('span', { style: { color: 'var(--green)', marginLeft: '6px', fontWeight: 700 } }, '✓')
            ),
            e('div', { style: { fontSize: '12px', color: 'var(--slate)', marginTop: '2px' } },
              (c.startTime ? formatTime12(c.startTime) : '') +
              ' · ' + (c.location || '—') +
              (c.room ? (' · ' + c.room) : '')
            )
          ),
          e('span', { style: { fontSize: '10px', padding: '2px 6px', borderRadius: '4px', background: 'var(--cream-2)', color: 'var(--slate)', fontWeight: 700, letterSpacing: '0.04em', textTransform: 'uppercase' } }, 'GX')
        )
      );
    }

    function ptCard(item){
      var sess = item.session;
      var client = item.client;
      var status = sess.status || 'attended';
      var stColor = SESSION_STATUS_COLOR[status] || 'var(--slate)';
      var stLabel = SESSION_STATUS_LABEL[status] || status;
      var isScheduled = status === 'scheduled';
      var isOverdueScheduled = isScheduled && sess.date < todayYMD;
      var stripeColor = isOverdueScheduled ? 'var(--red)' : (isScheduled ? 'var(--gold)' : stColor);
      /* Mirrors the attended-class card treatment: green-bg + checkmark
         when the session has been signed off as attended. Stripe is
         already green for 'attended' via SESSION_STATUS_COLOR. */
      var isSignedAttended = status === 'attended';
      return e('div', {
        key: 'pt-' + sess.id,
        onClick: function(){
          if (isScheduled && allowDirectSignOff) {
            setSignOff({ client: client, session: sess });
            return;
          }
          if (props.onOpenClient) {
            props.onOpenClient(client.id);
            return;
          }
          setClientDetailId(client.id);
          setHeaderContext({
            title: client.name, sub: client.location,
            onBack: function(){ setClientDetailId(null); setHeaderContext(null); }
          });
        },
        style: {
          background: isSignedAttended ? 'var(--green-bg)' : '#fff',
          border: '1.5px solid var(--border)',
          borderLeft: '4px solid ' + stripeColor,
          borderRadius: '10px', padding: '8px 12px', marginBottom: '6px',
          cursor: 'pointer', fontSize: '13px'
        }
      },
        e('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: '8px', flexWrap: 'wrap' } },
          e('div', { style: { flex: 1, minWidth: 0 } },
            e('div', { style: { fontWeight: 600, color: 'var(--navy)' } },
              client.name,
              isSignedAttended && e('span', { style: { color: 'var(--green)', marginLeft: '6px', fontWeight: 700 } }, '✓')
            ),
            e('div', { style: { fontSize: '12px', color: 'var(--slate)', marginTop: '2px' } },
              (sess.time ? formatTime12(sess.time) : '—') + ' · ' + stLabel
            )
          ),
          e('span', { style: { fontSize: '10px', padding: '2px 6px', borderRadius: '4px', background: 'var(--cream-2)', color: 'var(--slate)', fontWeight: 700, letterSpacing: '0.04em', textTransform: 'uppercase' } }, 'PT')
        )
      );
    }

    function wroCard(w){
      return e('div', {
        key: 'wro-' + w.id,
        onClick: function(){ setWroOpen(w); },
        style: {
          background: '#fff',
          border: '1.5px solid var(--border)',
          borderLeft: '4px solid var(--gold)',
          borderRadius: '10px', padding: '8px 12px', marginBottom: '6px',
          cursor: 'pointer', fontSize: '13px'
        }
      },
        e('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: '8px', flexWrap: 'wrap' } },
          e('div', { style: { flex: 1, minWidth: 0 } },
            e('div', { style: { fontWeight: 600, color: 'var(--navy)' } }, w.participantName || 'WRO'),
            e('div', { style: { fontSize: '12px', color: 'var(--slate)', marginTop: '2px' } },
              ((w.post && w.post.timeIn) ? formatTime12(w.post.timeIn) : '—') + ' · ' + (w.location || 'CMRC')
            )
          ),
          e('span', { style: { fontSize: '10px', padding: '2px 6px', borderRadius: '4px', background: 'var(--cream-2)', color: 'var(--slate)', fontWeight: 700, letterSpacing: '0.04em', textTransform: 'uppercase' } }, 'WRO')
        )
      );
    }

    var days = [];
    for (var i = 0; i < 7; i++) {
      var d = addDays(weekStart, i);
      var ymd = toYMD(d);
      var isToday = ymd === todayYMD;
      var dayLabel = d.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
      var gxList = gxByDate[ymd] || [];
      var ptList = ptByDate[ymd] || [];
      var wroList = wrosByDate[ymd] || [];
      var hasAny = gxList.length + ptList.length + wroList.length > 0;
      days.push(e('div', {
        key: ymd,
        style: {
          background: isToday ? 'var(--cream-2)' : '#fff',
          border: '1.5px solid ' + (isToday ? 'var(--teal)' : 'var(--border)'),
          borderRadius: '12px',
          padding: '10px 12px',
          marginBottom: '10px'
        }
      },
        e('div', { style: { display: 'flex', alignItems: 'center', gap: '8px', marginBottom: hasAny ? '8px' : '0' } },
          e('div', { style: { fontSize: '13px', fontWeight: 700, color: 'var(--navy)' } }, dayLabel),
          isToday && e('span', { style: { fontSize: '10px', padding: '2px 8px', borderRadius: '999px', background: 'var(--teal)', color: '#fff', fontWeight: 700, letterSpacing: '0.05em' } }, 'TODAY')
        ),
        hasAny
          ? e('div', null,
              gxList.map(function(o){ return safeRender('gx-' + (o.cls && o.cls.id) + ':' + o.date, function(){ return gxCard(o); }); }),
              ptList.map(function(it){ return safeRender('pt-' + (it.session && it.session.id), function(){ return ptCard(it); }); }),
              wroList.map(function(w){ return safeRender('wro-' + w.id, function(){ return wroCard(w); }); })
            )
          : e('div', { style: { fontSize: '12px', color: 'var(--slate-soft)', fontStyle: 'italic' } }, 'No sessions or classes')
      ));
    }

    var canGoBack = offset > -4;

    return e('div', null,
      /* Week navigation */
      e('div', {
        style: {
          display: 'flex', alignItems: 'center', justifyContent: 'space-between',
          gap: '10px',
          background: 'var(--navy)', color: '#fff',
          padding: '10px 14px', borderRadius: '12px', marginBottom: '12px'
        }
      },
        e('button', {
          onClick: function(){ if (canGoBack) setOffset(offset - 1); },
          disabled: !canGoBack,
          'aria-label': 'Previous week',
          style: {
            background: 'transparent', border: 'none',
            color: canGoBack ? '#fff' : 'rgba(255,255,255,0.3)',
            fontSize: '20px', cursor: canGoBack ? 'pointer' : 'not-allowed',
            padding: '4px 10px'
          }
        }, '←'),
        e('div', { style: { fontSize: '14px', fontWeight: 700, textAlign: 'center', flex: 1 } }, weekLabel()),
        e('button', {
          onClick: function(){ setOffset(offset + 1); },
          'aria-label': 'Next week',
          style: {
            background: 'transparent', border: 'none', color: '#fff',
            fontSize: '20px', cursor: 'pointer', padding: '4px 10px'
          }
        }, '→')
      ),
      offset === -4 && e('div', { style: { fontSize: '11px', color: 'var(--slate-soft)', fontStyle: 'italic', marginBottom: '8px', textAlign: 'center' } },
        'Earliest viewable week (4 weeks back).'
      ),
      days,
      /* Modals/swaps */
      signOff && e(LogSessionModal, {
        ctx: ctx,
        client: signOff.client,
        existingSession: signOff.session,
        onClose: function(){ setSignOff(null); },
        onLog: function(sess){
          var needsRecovery = sess.status === 'no_show' || sess.status === 'late_cancel';
          var clientId = signOff.client.id;
          var sessId = signOff.session.id;
          ctx.updateSession(clientId, sessId, {
            status: sess.status, date: sess.date, time: sess.time,
            note: sess.note, durationHours: sess.durationHours,
            trainerSig: sess.trainerSig, clientSig: sess.clientSig
          });
          setSignOff(null);
          ctx.toast('Session signed off ✓');
          if (needsRecovery) setRecoveryTarget({
            clientId: clientId, sessionId: sessId,
            status: sess.status, durationHours: sess.durationHours || 1
          });
        }
      }),
      recoveryTarget && e(ServiceRecoveryModal, {
        ctx: ctx,
        durationHours: recoveryTarget.durationHours,
        sourceLabel: recoveryTarget.status === 'no_show' ? 'No-show session' : 'Late cancel session',
        onClose: function(){ setRecoveryTarget(null); },
        onSave: function(recovery){
          ctx.logServiceRecovery(recoveryTarget.clientId, recoveryTarget.sessionId, recovery);
          setRecoveryTarget(null);
          ctx.toast('Recovery logged ✓');
        }
      }),
      wroOpen && e(PostWROModal, {
        ctx: ctx,
        wro: wroOpen,
        onClose: function(){ setWroOpen(null); },
        onSave: function(updated){
          ctx.upsertWRO(updated);
          setWroOpen(null);
          ctx.toast('Orientation saved ✓');
        }
      })
    );
  }

  /* ============ TRAINER VIEW (PT + GX toggle) ============ */
  function TrainerView(props){
    var ctx = props.ctx;
    /* v2.6: 'today' is now the default landing tab. Trainers see their day
       immediately on sign-in. */
    var tabTuple = useState('today');
    var tab = tabTuple[0];
    var setTab = tabTuple[1];

    /* v2.4: contact modal state - floating button opens it from any tab */
    var contactOpenTuple = useState(false);
    var contactOpen = contactOpenTuple[0]; var setContactOpen = contactOpenTuple[1];

    /* v2.7: consolidated header. When a tab opens a detail (Client/Class
       Detail), it pushes { title, sub } here so the global header renders
       the detail name primary and trainer/location as a smaller subtitle.
       Cleared on tab change so a switch doesn't carry stale context. */
    var headerContextTuple = useState(null);
    var headerContext = headerContextTuple[0]; var setHeaderContext = headerContextTuple[1];

    /* Tab filter signal. Set by notification-bar chip taps to land the
       user on a pre-filtered tab view. Each tab interprets relevant
       filter values in its own context (PT: 'last_session' | 'stale';
       GX: 'available_subs'). Cleared on every tab nav so it never
       leaks across switches. */
    var tabFilterTuple = useState(null);
    var tabFilter = tabFilterTuple[0]; var setTabFilter = tabFilterTuple[1];

    function navigate(t, opts){
      setHeaderContext(null);
      setTabFilter((opts && opts.filter) || null);
      setTab(t);
    }

    var trainerName = ctx.session.name;

    var subLabel = {
      today: 'Today',
      schedule: 'Schedule',
      pt: 'Personal Training',
      gx: 'Group Exercise',
      leads: 'Leads',
      time_card: 'Time Card'
    };

    /* Counts for badges */
    var waitingLeads = (ctx.queue || []).filter(function(q){ return q.status === 'waiting'; }).length;
    var myAssignedLeads = (ctx.queue || []).filter(function(q){
      return q.status === 'assigned' && trainerNameMatches(trainerName, q.assignedTo);
    }).length;
    /* v2.2: pending WROs (need specialist form) also surface as claimable leads. */
    var pendingWroCount = (ctx.wros || []).filter(function(w){
      return w.preCompleted !== false && !w.postCompleted;
    }).length;
    var leadBadge = waitingLeads + myAssignedLeads + pendingWroCount;

    /* Compact summary chip for the header (only shown on non-time-card tabs;
       the time-card tab has its own bigger summary). */
    var summary = calcTrainerHours(trainerName, 0, ctx.clients, ctx.classes, ctx.items || [], ctx.wros || [], ctx.contacts || []);

    /* v2.4: today's contact count for this trainer - shown in chip */
    var todayYMD = todayStr();
    var todayContactCount = (ctx.contacts || []).filter(function(c){
      return c.date === todayYMD && trainerNameMatches(trainerName, c.trainerName);
    }).length;

    var content;
    if (tab === 'today') content = e(TrainerToday, { ctx: ctx, setHeaderContext: setHeaderContext });

  /* ============ TRAINER PT ============ */
  function TrainerPT(props){
    var ctx = props.ctx;
    var trainerName = ctx.session.name;

    var detailTuple = useState(null);
    var detailId = detailTuple[0];
    var setDetailId = detailTuple[1];

    var myClients = useMemo(function(){
      return ctx.clients.filter(function(c){ return c.trainerName === trainerName; });
    }, [ctx.clients, trainerName]);

    /* Filter signal from a notification-bar chip tap. Filters the My
       Clients list to just last-session or stale clients. The full client
       set still drives the upcoming-sessions list above so the trainer
       sees the full week regardless of filter. */
    var initialFilter = props.initialFilter || null;
    var visibleClients = myClients.filter(function(c){
      if (!initialFilter) return true;
      var f = clientPackageFlags(c);
      if (initialFilter === 'last_session') return f.lastSessionFlag;
      if (initialFilter === 'stale') return f.staleFlag;
      return true;
    });

    /* Upcoming scheduled sessions across this trainer's clients. Includes
       overdue (past-due 'scheduled' that still need sign-off) at the top,
       then today's, then future ascending. */
    var todayYMD = todayStr();
    var upcomingScheduled = useMemo(function(){
      var rows = [];
      myClients.forEach(function(client){
        (client.sessions || []).forEach(function(s){
          if (s.status !== 'scheduled') return;
          rows.push({ client: client, session: s });
        });
      });
      rows.sort(function(a, b){
        var aOverdue = a.session.date < todayYMD;
        var bOverdue = b.session.date < todayYMD;
        if (aOverdue !== bOverdue) return aOverdue ? -1 : 1;
        if (a.session.date !== b.session.date) return a.session.date < b.session.date ? -1 : 1;
        return (a.session.time || '') < (b.session.time || '') ? -1 : 1;
      });
      return rows;
    }, [myClients, todayYMD]);

    var setHeaderContext = props.setHeaderContext || function(){};
    if (detailId) {
      var cl = ctx.clients.find(function(c){ return c.id === detailId; });
      if (!cl) { setDetailId(null); return null; }
      return e(ClientDetail, {
        ctx: ctx, client: cl, hideHeader: true,
        onBack: function(){ setDetailId(null); setHeaderContext(null); },
        canEdit: true
      });
    }

    return e('div', null,
      /* Upcoming scheduled sessions section - chronological forward,
         overdue at top in red, taps route to ClientDetail. */
      e('div', { style: { marginBottom: '20px' } },
        e('h3', { style: { fontSize: '15px', color: 'var(--slate)', marginBottom: '10px' } },
          'Upcoming Scheduled Sessions' + (upcomingScheduled.length > 0 ? (' (' + upcomingScheduled.length + ')') : '')
        ),
        upcomingScheduled.length === 0
          ? e('div', {
              style: {
                background: 'var(--cream-2)', border: '1.5px solid var(--border)',
                borderRadius: '10px', padding: '14px',
                fontSize: '13px', color: 'var(--slate-soft)', fontStyle: 'italic',
                textAlign: 'center'
              }
            }, 'No upcoming scheduled sessions')
          : upcomingScheduled.map(function(item){
              var sess = item.session;
              var client = item.client;
              var isOverdue = sess.date < todayYMD;
              var isToday = sess.date === todayYMD;
              var stripeColor = isOverdue ? 'var(--red)' : (isToday ? 'var(--gold)' : 'var(--teal)');
              var daysOverdue = isOverdue
                ? Math.floor((parseYMD(todayYMD).getTime() - parseYMD(sess.date).getTime()) / 86400000)
                : 0;
              var pillText = isOverdue
                ? ('Overdue · ' + daysOverdue + 'd')
                : isToday ? 'Today' : null;
              var remaining = sessionsRemaining(client);
              return e('div', {
                key: client.id + ':' + sess.id,
                onClick: function(){
                  setDetailId(client.id);
                  setHeaderContext({
                    title: client.name, sub: client.location,
                    onBack: function(){ setDetailId(null); setHeaderContext(null); }
                  });
                },
                style: {
                  background: '#fff',
                  border: '1.5px solid var(--border)',
                  borderLeft: '4px solid ' + stripeColor,
                  borderRadius: '12px',
                  padding: '10px 14px',
                  marginBottom: '8px',
                  cursor: 'pointer',
                  display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                  gap: '10px', flexWrap: 'wrap'
                }
              },
                e('div', { style: { flex: 1, minWidth: '160px' } },
                  e('div', { style: { display: 'flex', alignItems: 'center', gap: '8px', flexWrap: 'wrap' } },
                    e('div', { style: { fontWeight: 600, color: 'var(--navy)' } }, client.name),
                    pillText && e('span', {
                      style: {
                        fontSize: '10px', padding: '2px 8px', borderRadius: '999px',
                        background: stripeColor, color: '#fff',
                        fontWeight: 700, letterSpacing: '0.04em'
                      }
                    }, pillText)
                  ),
                  e('div', { style: { fontSize: '12px', color: 'var(--slate)', marginTop: '4px' } },
                    formatShort(parseYMD(sess.date)) + (sess.time ? (' · ' + formatTime12(sess.time)) : '')
                  )
                ),
                e('span', {
                  style: {
                    fontSize: '11px', padding: '4px 10px', borderRadius: '999px',
                    background: remaining === 0 ? 'var(--red)' : (remaining <= 2 ? 'var(--amber)' : 'var(--teal-bg)'),
                    color: remaining <= 2 ? '#fff' : 'var(--teal)',
                    fontWeight: 700, fontSize: '11px', whiteSpace: 'nowrap'
                  }
                }, remaining + ' left')
              );
            })
      ),
      /* Add Client is admin-only as of the team-management changes.
         Trainers see their assigned clients but creation goes through
         admin > Clients now. */
      e('div', { className: 'section-head' },
        e('div', null,
          e('h2', null, 'My Clients'),
          e('div', { className: 'meta' },
            (initialFilter
              ? (visibleClients.length + ' of ' + myClients.length + ' shown · filter: ' + (initialFilter === 'last_session' ? 'on last session' : 'stale'))
              : (myClients.length + ' active · ' + myClients.reduce(function(s,c){ return s + sessionsRemaining(c); }, 0) + ' sessions remaining')
            )
          )
        )
      ),
      visibleClients.length === 0
        ? e('div', { className: 'empty' },
            e('div', { className: 'icon' }, '🏋️'),
            e('h3', null, initialFilter ? 'No clients match this filter' : 'No clients assigned yet'),
            e('div', null, initialFilter ? 'Switch tabs and back to clear the filter.' : 'Ask an admin to add new clients and assign them to you.')
          )
        : visibleClients.map(function(c){
            return e(ClientCard, {
              key: c.id, client: c,
              onClick: function(){
                setDetailId(c.id);
                setHeaderContext({
                  title: c.name, sub: c.location,
                  onBack: function(){ setDetailId(null); setHeaderContext(null); }
                });
              }
            });
          })
    );
  }

  function ClientDetail(props){
    var ctx = props.ctx;
    var c = props.client;
    var remaining = sessionsRemaining(c);

    var logOpenTuple = useState(false);
    var logOpen = logOpenTuple[0];
    var setLogOpen = logOpenTuple[1];

    var scheduleOpenTuple = useState(false);
    var scheduleOpen = scheduleOpenTuple[0];
    var setScheduleOpen = scheduleOpenTuple[1];

    /* Holds the scheduled session being signed off, or null. When set,
       LogSessionModal opens in edit mode and writes through updateSession
       instead of addSession. */
    var signOffTuple = useState(null);
    var signOff = signOffTuple[0];
    var setSignOff = signOffTuple[1];

    var editOpenTuple = useState(false);
    var editOpen = editOpenTuple[0];
    var setEditOpen = editOpenTuple[1];

    var fillSigTuple = useState(null); /* { sessId } */
    var fillSig = fillSigTuple[0];
    var setFillSig = fillSigTuple[1];

    var referOpenTuple = useState(false);
    var referOpen = referOpenTuple[0];
    var setReferOpen = referOpenTuple[1];

    var addPkgOpenTuple = useState(false);
    var addPkgOpen = addPkgOpenTuple[0];
    var setAddPkgOpen = addPkgOpenTuple[1];

    /* Holds the package being edited in EditPackageModal, or null. */
    var editPkgTargetTuple = useState(null);
    var editPkgTarget = editPkgTargetTuple[0];
    var setEditPkgTarget = editPkgTargetTuple[1];

    /* Service recovery prompt target. Set after a session save when status
       is no_show or late_cancel; cleared when modal closes or saves. */
    var recoveryTargetTuple = useState(null);
    var recoveryTarget = recoveryTargetTuple[0];
    var setRecoveryTarget = recoveryTargetTuple[1];

    /* Holds the session being viewed in the read-only detail modal. */
    var detailSessionTuple = useState(null);
    var detailSession = detailSessionTuple[0];
    var setDetailSession = detailSessionTuple[1];

    /* Audit history viewer + Show-deleted-packages toggle. Both admin-only. */
    var auditOpenTuple = useState(false);
    var auditOpen = auditOpenTuple[0];
    var setAuditOpen = auditOpenTuple[1];
    var showDeletedPkgsTuple = useState(false);
    var showDeletedPkgs = showDeletedPkgsTuple[0];
    var setShowDeletedPkgs = showDeletedPkgsTuple[1];

    var isAdmin = ctx.session && ctx.session.role === 'admin';
    var canAddPackage = ctx.can('canAddPackage');
    var canEditClient = ctx.can('canEditClient');
    var canEditPackage = ctx.can('canEditPackage');
    var canDeletePackage = ctx.can('canDeletePackage');
    var canDeleteSession = ctx.can('canDeleteSession');
    var canViewAuditHistory = ctx.can('canViewAuditHistory');
    var canRestoreDeleted = ctx.can('canRestoreDeleted');
    var canHardDelete = ctx.can('canHardDelete');

    /* Lazy id-stamping: legacy packages may not have ids. Anyone with edit
       perm triggers a one-time backfill so edit/delete can identify rows
       deterministically. */
    useEffect(function(){
      if (!canEditPackage) return;
      if (!c.packages || c.packages.length === 0) return;
      var needsIds = c.packages.some(function(p){ return !p.id; });
      if (!needsIds) return;
      ctx.upsertClient(Object.assign({}, c, {
        packages: c.packages.map(function(p){
          return p.id ? p : Object.assign({}, p, { id: uid() });
        })
      }));
    }, [c.id, canEditPackage]);

    var strikes = clientStrikeCount(c);
    var strikeStatus = clientStrikeStatus(c);
    var clientReferrals = (ctx.referrals || []).filter(function(r){ return r.clientId === c.id; });
    var openReferrals = clientReferrals.filter(function(r){ return r.status === 'pending' || r.status === 'contacted'; });

    function doDelete(){
      if (!window.confirm('Delete this client? They will be hidden from active lists. Sessions stay on file. Restore from the deleted clients view if needed.')) return;
      ctx.softDeleteClient(c.id);
      ctx.toast('Client deleted ✓', 'error');
      props.onBack();
    }
    function doRestore(){
      ctx.restoreClient(c.id);
      ctx.toast('Client restored ✓');
    }
    function doHardDelete(){
      var msg = 'This permanently removes the record. Cannot be undone. Use soft delete unless you specifically need to remove this from the database entirely.\n\nType the client name to confirm: ' + c.name;
      var input = window.prompt(msg);
      if (input !== c.name) return;
      ctx.deleteClient(c.id);
      ctx.toast('Client hard-deleted', 'error');
      props.onBack();
    }

    var banner = null;
    if (strikeStatus === 'discharge') {
      banner = e('div', { className: 'banner red' },

      );

      banner = e('div', { className: 'banner amber' },
        '⚠ ' + strikes.lateCancels + ' late cancel' + (strikes.lateCancels !== 1 ? 's' : '') +
        ', ' + strikes.noShows + ' no-show' + (strikes.noShows !== 1 ? 's' : '') +
        ' on file. One more late cancel or no-show may trigger discharge consideration.'
      );
    } else if (remaining === 0) {
      banner = e('div', { className: 'banner red' }, '🚫 All sessions used - offer new package purchase.');
    } else if (remaining === 1) {
      banner = e('div', { className: 'banner amber' }, '⚠ Last session - consider discussing renewal today.');
    } else if (remaining === 2) {
      banner = e('div', { className: 'banner amber' }, '2 sessions remaining - renewal conversation soon.');

    var openReferralBanner = openReferrals.length > 0
      ? e('div', { className: 'banner teal' },
          '🩺 Open PT referral: ' + REFERRAL_STATUS_LABEL[openReferrals[0].status] +

          ),

        ),

  /* Edit an existing package on a client. Free-text type per spec
     (allows entries beyond the facility template list). Stores
     sessionsUsed, sessionsRemaining, and is_active on the package on
     save - these fields are admin-tracked metadata; the existing
     client.sessions[] count remains the source of truth for live
     remaining displays. */
  function EditPackageModal(props){
    var ctx = props.ctx;
    var client = props.client;
    var original = props.pkg;

    var pkgList = getPackagesForFacility(client.location);
    var packagesAvailable = pkgList.list;
    var locationFallback = pkgList.fallback;

    var typeTuple = useState(original.type || '');
    var type = typeTuple[0]; var setType = typeTuple[1];
    var sessionsTuple = useState(String(original.sessions != null ? original.sessions : ''));
    var sessions = sessionsTuple[0]; var setSessions = sessionsTuple[1];
    var sessionsUsedTuple = useState(String(original.sessionsUsed != null ? original.sessionsUsed : 0));
    var sessionsUsed = sessionsUsedTuple[0]; var setSessionsUsed = sessionsUsedTuple[1];
    var purchaseDateTuple = useState(original.purchaseDate || '');
    var purchaseDate = purchaseDateTuple[0]; var setPurchaseDate = purchaseDateTuple[1];
    var paymentTypeTuple = useState(original.paymentType || '');
    var paymentType = paymentTypeTuple[0]; var setPaymentType = paymentTypeTuple[1];
    var totalPaidTuple = useState(String(original.amountPaid != null ? original.amountPaid : (original.price != null ? original.price : '')));
    var totalPaid = totalPaidTuple[0]; var setTotalPaid = totalPaidTuple[1];
    /* template_id stamped when admin picks from the Apply template
       dropdown. Cleared when admin manually edits the type to something
       off-list. */
    var templateIdTuple = useState(original.template_id || '');
    var templateId = templateIdTuple[0]; var setTemplateId = templateIdTuple[1];

    var errorTuple = useState(null);
    var error = errorTuple[0]; var setError = errorTuple[1];

    function applyTemplate(newId){
      if (!newId) { setTemplateId(''); return; }
      var t = packagesAvailable.find(function(p){ return p.id === newId; });
      if (!t) return;
      setTemplateId(t.id);
      setType(t.type);
      setSessions(String(t.sessions));
      setTotalPaid(String(t.price));
    }
    function onTypeChange(newType){
      setType(newType);
      /* Manual edit drops the template stamp - admin moved off-list. */
      if (templateId) {
        var t = packagesAvailable.find(function(p){ return p.id === templateId; });
        if (!t || t.type !== newType) setTemplateId('');
      }
    }

    var sessionsInt = parseInt(sessions, 10);
    var sessionsUsedInt = parseInt(sessionsUsed, 10);

    var dirty = (
      type.trim() !== (original.type || '') ||
      (isNaN(sessionsInt) ? '' : String(sessionsInt)) !== String(original.sessions != null ? original.sessions : '') ||
      (isNaN(sessionsUsedInt) ? '' : String(sessionsUsedInt)) !== String(original.sessionsUsed != null ? original.sessionsUsed : 0) ||
      purchaseDate !== (original.purchaseDate || '') ||
      paymentType !== (original.paymentType || '') ||
      totalPaid !== String(original.amountPaid != null ? original.amountPaid : (original.price != null ? original.price : '')) ||
      templateId !== (original.template_id || '')
    );

    function validate(){
      if (!type.trim()) return 'Package type is required';
      if (isNaN(sessionsInt) || sessionsInt < 0) return 'Sessions purchased must be 0 or more';
      if (isNaN(sessionsUsedInt) || sessionsUsedInt < 0) return 'Sessions used must be 0 or more';
      if (sessionsUsedInt > sessionsInt) return 'Sessions used cannot exceed sessions purchased';
      return null;
    }

    function save(){
      var err = validate();
      if (err) { setError(err); return; }
      setError(null);
      var paid = totalPaid === '' ? null : parseFloat(totalPaid);

  /* ============ NEW / EDIT CLIENT MODAL ============ */
  function NewClientModal(props){
    var ctx = props.ctx;
    var existing = props.client;
    var isEdit = !!existing;

    var formTuple = useState(function(){
      if (existing) {
        var existingLoc = existing.location;
        var existingList = getPackagesForFacility(existingLoc).list;
        return {
          name: existing.name,
          phone: existing.phone || '',
          email: existing.email || '',
          location: existingLoc,
          datePurchased: existing.datePurchased,
          pkgId: (function(){
            var existingPkgs = getPackages(existing);
            var firstPkg = existingPkgs[0];
            if (!firstPkg) {
              var fallback = existingList.find(function(t){ return t.sessions === 5; }) || existingList[Math.min(3, existingList.length - 1)];
              return fallback.id;
            }
            if (firstPkg.template_id) {
              var match = existingList.find(function(t){ return t.id === firstPkg.template_id; });
              if (match) return match.id;
            }
            var bySessions = existingList.find(function(t){ return t.sessions === firstPkg.sessions; });
            if (bySessions) return bySessions.id;
            return existingList[0].id;
          })(),
          paymentType: existing.paymentType || 'Card',
          teamMember: existing.teamMember || '',
          membershipVerified: !!existing.membershipVerified,
          membershipType: existing.membershipType || 'Non-Member',
          membershipEnd: existing.membershipEnd || '',
          trainerName: existing.trainerName,
          referralSource: existing.referralSource || ''
        };
      }
      var prefill = props.prefill || {};
      var initialLoc = prefill.location || 'CMRC';
      var initialList = getPackagesForFacility(initialLoc).list;
      var initialDefault = initialList.find(function(t){ return t.sessions === 5; }) || initialList[Math.min(3, initialList.length - 1)];
      return {
        name: prefill.name || '',
        phone: prefill.phone || '',
        email: prefill.email || '',
        location: initialLoc,
        datePurchased: todayStr(),
        pkgId: initialDefault.id,
        paymentType: 'Card',
        teamMember: '',
        membershipVerified: false,
        membershipType: 'Non-Member',
        membershipEnd: '',
        trainerName: props.lockTrainer || ctx.trainers[0] || '',
        referralSource: prefill.referralSource || ''
      };
    });
    var form = formTuple[0];
    var setForm = formTuple[1];

    var errorsTuple = useState({});
    var errors = errorsTuple[0]; var setErrors = errorsTuple[1];

    /* v2: PAR-Q+ (Physical Activity Readiness Questionnaire) state.
       Answers stored separately from the flat form to keep things clean.
       Standard 7-question version. Any 'yes' surfaces a flag banner; doesn't
       block creation since a PT/ATC/CSCS on the team is the right professional
       to clear it. The screening exists primarily as documented evidence
       that readiness was checked at intake. */
    var parQTuple = useState(function(){
      if (existing && existing.parQ) {
        return Object.assign({ q1: false, q2: false, q3: false, q4: false, q5: false, q6: false, q7: false, completed: false }, existing.parQ);
      }
      return { q1: false, q2: false, q3: false, q4: false, q5: false, q6: false, q7: false, completed: false };
    });
    var parQ = parQTuple[0];
    var setParQ = parQTuple[1];
    function setParQAnswer(k, v){ setParQ(function(p){ var n = Object.assign({}, p); n[k] = v; return n; }); }
    function markParQComplete(){
      setParQ(function(p){
        return Object.assign({}, p, {
          completed: true,
          completedAt: new Date().toISOString(),
          completedBy: (ctx.session && ctx.session.name) || 'admin'
        });
      });
    }
    var parQFlagCount = ['q1','q2','q3','q4','q5','q6','q7'].filter(function(k){ return parQ[k]; }).length;

    function update(k, v){ setForm(function(f){ var n = Object.assign({}, f); n[k] = v; return n; }); }

    /* When location changes, re-map the selected package template to the
       new facility's list so we don't end up referencing a CMRC id while
       location is Baca (or vice versa). */
    function onLocationChange(newLoc){
      setForm(function(f){
        var prevList = getPackagesForFacility(f.location).list;
        var prevTpl = prevList.find(function(t){ return t.id === f.pkgId; });
        var newList = getPackagesForFacility(newLoc).list;
        var nextTpl = reSelectTemplate(prevTpl, newList);
        return Object.assign({}, f, { location: newLoc, pkgId: nextTpl.id });
      });
    }

    var pkgList = getPackagesForFacility(form.location);
    var packagesAvailable = pkgList.list;
    var locationFallback = pkgList.fallback;
    var selectedPkg = packagesAvailable.find(function(p){ return p.id === form.pkgId; }) || packagesAvailable[0];

    function submit(){
      var errs = intakeFieldErrors(form);
      setErrors(errs);
      if (hasErrors(errs)) { ctx.toast('Please fix the highlighted fields', 'error'); return; }
      if (!form.trainerName) { ctx.toast('Trainer is required', 'error'); return; }
      var pkg = selectedPkg;
      var pkgRecord = {
        sessions: pkg.sessions,
        price: pkg.price,
        type: pkg.type,
        template_id: pkg.id,
        amountPaid: pkg.price,
        purchaseDate: form.datePurchased,
        paymentType: form.paymentType,
        source: 'manual'
      };
      var out;
      if (isEdit) {
        /* Editing - preserve any additional packages, replace just the first one's metadata */
        var existingPkgs = getPackages(existing);
        var updatedPkgs = [pkgRecord].concat(existingPkgs.slice(1));
        out = Object.assign({}, existing, {
          name: form.name.trim(),
          phone: form.phone,
          email: form.email,
          location: form.location,
          datePurchased: form.datePurchased,
          packages: updatedPkgs,
          paymentType: form.paymentType,
          teamMember: form.teamMember,
          membershipVerified: form.membershipVerified,
          membershipType: form.membershipType,
          membershipEnd: form.membershipEnd,
          trainerName: form.trainerName,
          referralSource: form.referralSource || null,
          parQ: Object.assign({}, parQ, { flagCount: parQFlagCount })
        });
        delete out.pkg;
        delete out.amountPaid;
        delete out.purchaseDate;
      } else {
        out = {
          id: uid(),
          name: form.name.trim(),
          phone: form.phone,
          email: form.email,
          location: form.location,
          datePurchased: form.datePurchased,
          packages: [pkgRecord],
          paymentType: form.paymentType,
          teamMember: form.teamMember,
          membershipVerified: form.membershipVerified,
          membershipType: form.membershipType,
          membershipEnd: form.membershipEnd,
          trainerName: form.trainerName,
          referralSource: form.referralSource || null,
          parQ: Object.assign({}, parQ, { flagCount: parQFlagCount }),
          sessions: []
        };
      }
      props.onCreate(out);
    }

    return e('div', { className: 'modal-overlay' },
      e('div', { className: 'modal', onClick: function(ev){ ev.stopPropagation(); } },
        e('div', { className: 'modal-header' },
          e('h2', null, isEdit ? 'Edit Client' : 'New Client'),
          e('button', { className: 'modal-close', onClick: props.onClose }, '×')
        ),
        e('div', { className: 'modal-body' },
          e('div', { className: 'field' },
            e('label', null, 'Full Name *'),
            e('input', {
              value: form.name,
              onChange: function(ev){ update('name', ev.target.value); },
              placeholder: 'First Last',
              style: errors.name ? { borderColor: 'var(--red)' } : null
            }),
            errors.name && e('div', { style: { fontSize: '12px', color: 'var(--red)', marginTop: '4px' } }, errors.name)
          ),
          e('div', { className: 'row2' },
            e('div', { className: 'field' },
              e('label', null, 'Phone'),
              e('input', {
                value: form.phone, onChange: function(ev){ update('phone', ev.target.value); },
                type: 'tel', placeholder: '(512) 555-1234',
                style: errors.phone ? { borderColor: 'var(--red)' } : null
              }),
              errors.phone && e('div', { style: { fontSize: '12px', color: 'var(--red)', marginTop: '4px' } }, errors.phone)
            ),
            e('div', { className: 'field' },
              e('label', null, 'Email'),
              e('input', {
                value: form.email, onChange: function(ev){ update('email', ev.target.value); },
                type: 'email', placeholder: 'name@example.com',
                style: errors.email ? { borderColor: 'var(--red)' } : null
              }),
              errors.email && e('div', { style: { fontSize: '12px', color: 'var(--red)', marginTop: '4px' } }, errors.email)

          e('div', { className: 'row2' },

            ),
            e('div', { className: 'field' },

  /* ============ LOG SESSION MODAL ============ */
  /* Pre-schedule a future session. Creates a placeholder with status
     'scheduled' that consumes a slot against the package cap and shows up
     on the trainer's Today view on the booked date (and as overdue if the
     date passes without sign-off). The trainer signs off later via
     LogSessionModal in edit mode, which flips the status to a final
     outcome. Hard-blocks scheduling when the package has 0 remaining;
     warns when this is the last session. */
  function ScheduleSessionModal(props){
    var ctx = props.ctx;
    var client = props.client;
    var remaining = props.remaining;

    var now = new Date();
    var hh = String(now.getHours()).padStart(2,'0');
    var mm = String(now.getMinutes()).padStart(2,'0');

    var dateTuple = useState(todayStr());
    var date = dateTuple[0]; var setDate = dateTuple[1];
    var timeTuple = useState(hh + ':' + mm);
    var time = timeTuple[0]; var setTime = timeTuple[1];
    var noteTuple = useState('');
    var note = noteTuple[0]; var setNote = noteTuple[1];

    function save(){
      if (!date) { ctx.toast('Date is required', 'error'); return; }
      if (!time) { ctx.toast('Time is required', 'error'); return; }
      if (remaining <= 0) { ctx.toast('No sessions remaining in package', 'error'); return; }
      var sess = {
        id: uid(),
        date: date,
        time: time,
        status: 'scheduled',
        note: note || null,
        trainerName: client.trainerName,
        scheduledBy: (ctx.session && ctx.session.name) || null,
        scheduledAt: new Date().toISOString()
      };
      props.onSchedule(sess);
    }

    return e('div', { className: 'modal-overlay' },
      e('div', { className: 'modal', onClick: function(ev){ ev.stopPropagation(); } },
        e('div', { className: 'modal-header' },
          e('h3', null, 'Schedule Session'),

          e('div', { className: 'row2' },

  function LogSessionModal(props){
    var ctx = props.ctx;
    var now = new Date();
    var hh = String(now.getHours()).padStart(2,'0');
    var mm = String(now.getMinutes()).padStart(2,'0');

    /* When editing an existing session (sign-off of a pre-scheduled
       placeholder), prefill date/time/note from the existing record. */
    var existing = props.existingSession || null;

    var stepTuple = useState(1); /* 1: status+date, 2: trainer sig (attended), 3: client sig (attended) */
    var step = stepTuple[0];
    var setStep = stepTuple[1];

    var statusTuple = useState('attended');
    var status = statusTuple[0];
    var setStatus = statusTuple[1];

    var dateTuple = useState(existing ? existing.date : todayStr());
    var date = dateTuple[0];
    var setDate = dateTuple[1];

    var timeTuple = useState(existing && existing.time ? existing.time : (hh + ':' + mm));
    var time = timeTuple[0];
    var setTime = timeTuple[1];

    var noteTuple = useState(existing && existing.note ? existing.note : '');
    var note = noteTuple[0];
    var setNote = noteTuple[1];

    /* v2.1: PT session duration picker. 1 hour or 30 minutes.
       Default to 1 hour. Only affects forward hours when status='attended'. */
    var durationTuple = useState(1);
    var duration = durationTuple[0];
    var setDuration = durationTuple[1];

    var trainerSigTuple = useState(null);
    var trainerSig = trainerSigTuple[0];
    var setTrainerSig = trainerSigTuple[1];

    var clientSigTuple = useState(null);
    var clientSig = clientSigTuple[0];
    var setClientSig = clientSigTuple[1];

    function finish(skipClientSig){
      /* trainerSig is captured for both attended (full sig flow) and no_show
         (trainer-only sig). Other non-attended statuses skip sigs entirely. */
      var collectsTrainerSig = status === 'attended' || status === 'no_show';
      var sess = {
        id: uid(),
        date: date,
        time: time,
        status: status,
        note: note || null,
        /* v2.1: trainer-selected duration (1 hour or 30 minutes).
           Only counts toward calcTrainerHours when status === 'attended'. */
        durationHours: duration,
        trainerSig: collectsTrainerSig ? trainerSig : null,
        clientSig: status === 'attended' && !skipClientSig ? clientSig : null
      };
      props.onLog(sess);
    }
    function finishNonAttended(){
      /* Late cancel / excused: no signatures collected. (no_show now goes
         through step 2 to capture a trainer-only signature - see footer.) */
      finish(true);
    }

    var statusBanner = null;
    if (status === 'late_cancel') {
      statusBanner = e('div', { className: 'banner amber' },
        '⚠ Late cancel (less than 24 hr). Per policy: counts as a full session loss and a strike. 3 late cancels per episode = discharge consideration.'
      );
    } else if (status === 'no_show') {
      statusBanner = e('div', { className: 'banner red' },
        '🚫 No-show. Per policy: counts as a full session loss and a strike. 2 no-shows per episode = discharge consideration.'
      );
    } else if (status === 'excused') {
      statusBanner = e('div', { className: 'banner green' },
        '✓ Excused absence (illness, family emergency, transportation issue, facility closure, or safety event). No charge, no strike.'
      );
    }

    var body, footer;
    if (step === 1) {
      body = e('div', null,
        e('div', { style: { fontSize: '14px', color: 'var(--slate)', marginBottom: '14px' } },
          'Logging a session for ', e('b', null, props.client.name), '.'
        ),
        e('div', { className: 'field' },
          e('label', null, 'What happened?'),
          e('div', { style: { display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '8px' } },
            SESSION_STATUSES.map(function(s){
              var selected = status === s;
              var color = SESSION_STATUS_COLOR[s];
              return e('button', {
                key: s,
                onClick: function(){ setStatus(s); },
                style: {
                  padding: '14px 10px',
                  borderRadius: '10px',
                  border: '2px solid ' + (selected ? color : 'var(--border)'),
                  background: selected ? color : '#fff',
                  color: selected ? '#fff' : 'var(--navy)',
                  fontWeight: selected ? 700 : 500,
                  fontSize: '14px',
                  cursor: 'pointer'
                }
              }, SESSION_STATUS_LABEL[s]);
            })
          )
        ),
        statusBanner,
        e('div', { className: 'row2' },

    var avg = total ? Math.round(sum / total) : 0;
    var cap = c.capacity;
    var fill = (cap && avg) ? Math.round((avg / cap) * 100) : null;
    var typeColor = CLASS_TYPE_COLOR[c.classType] || 'var(--teal)';

    /* "Today logged" indicator: only positive state (no clutter when not
       logged). Today qualifies only if the class meets today (dayOfWeek
       matches) and today's date has an attendance record. */
    var todayYMDClass = todayStr();
    var meetsToday = normalizeDow(c.dayOfWeek) === IDX_TO_DOW[parseYMD(todayYMDClass).getDay()];

    /* v2.2: season status. Ended classes get a strike-through styling and
       a status pill so they're visible in lists but clearly retired. */
    var seasonStatus = classSeasonStatus(c);

  /* ============ CLASS DETAIL ============ */
  function ClassDetail(props){
    var ctx = props.ctx;
    var c = props.cls;
    var att = c.attendance || [];
    var subs = (c.subAssignments || []).slice().sort(function(a,b){ return a.date < b.date ? -1 : 1; });
    var total = att.length;
    var sum = att.reduce(function(s,a){ return s + (a.headcount || 0); }, 0);
    var avg = total ? Math.round(sum / total) : 0;
    var best = att.reduce(function(m,a){ return (a.headcount || 0) > m ? (a.headcount || 0) : m; }, 0);

    var logOpenTuple = useState(false);
    var logOpen = logOpenTuple[0];
    var setLogOpen = logOpenTuple[1];

    var editOpenTuple = useState(false);
    var editOpen = editOpenTuple[0];
    var setEditOpen = editOpenTuple[1];

    /* Sub-request modal (queue or direct assign). */
    var subRequestOpenTuple = useState(false);
    var subRequestOpen = subRequestOpenTuple[0];
    var setSubRequestOpen = subRequestOpenTuple[1];

    var canManageSubs = ctx.can('canEditClassStructure') ||
                        (ctx.currentUserName && ctx.currentUserName() === c.instructor);
    var canViewAuditHistory = ctx.can('canViewAuditHistory');
    var canRestoreDeleted = ctx.can('canRestoreDeleted');
    var canHardDelete = ctx.can('canHardDelete');

    var auditOpenTuple = useState(false);
    var auditOpen = auditOpenTuple[0];
    var setAuditOpen = auditOpenTuple[1];

    function doDelete(){
      if (!window.confirm('Delete this class? It will be hidden from active lists. Attendance records stay on file. Restore from the deleted classes view if needed.')) return;
      ctx.softDeleteClass(c.id);
      ctx.toast('Class deleted ✓', 'error');
      props.onBack();
    }
    function doRestore(){
      ctx.restoreClass(c.id);
      ctx.toast('Class restored ✓');
    }
    function doHardDelete(){
      var msg = 'This permanently removes the record. Cannot be undone. Use soft delete unless you specifically need to remove this from the database entirely.\n\nType the class name to confirm: ' + c.name;
      var input = window.prompt(msg);
      if (input !== c.name) return;
      ctx.deleteClass(c.id);
      ctx.toast('Class hard-deleted', 'error');
      props.onBack();
    }
    function removeSub(s){
      if (!window.confirm('Remove sub assignment? ' + s.subInstructor + ' covering ' + formatShort(parseYMD(s.date)) + '.')) return;
      ctx.deleteSubAssignment(c.id, s.id);
      ctx.toast('Sub assignment removed', 'error');

  /* ============ NEW / EDIT CLASS MODAL ============ */
  function NewClassModal(props){
    var ctx = props.ctx;
    var existing = props.cls;
    var isEdit = !!existing;

    var formTuple = useState(function(){
      if (existing) {
        return {
          name: existing.name,
          location: existing.location,
          instructor: existing.instructor,
          dayOfWeek: existing.dayOfWeek || 'Monday',
          startTime: existing.startTime || '09:00',
          endTime: existing.endTime || '09:45',
          room: existing.room || 'Meeting Room',
          capacity: existing.capacity != null ? String(existing.capacity) : '',
          classType: existing.classType || 'Strength & Conditioning',
          isPremium: !!existing.isPremium,
          seasonStart: existing.seasonStart || '',
          seasonEnd: existing.seasonEnd || ''
        };
      }
      return {
        name: '',
        location: 'CMRC',
        instructor: props.lockInstructor || ctx.trainers[0] || '',
        dayOfWeek: 'Monday',
        startTime: '09:00',
        endTime: '09:45',
        room: 'Meeting Room',
        capacity: '',
        classType: 'Strength & Conditioning',
        isPremium: false,
        seasonStart: '',
        seasonEnd: ''
      };
    });
    var form = formTuple[0];
    var setForm = formTuple[1];
    function update(k,v){ setForm(function(f){ var n = Object.assign({}, f); n[k] = v; return n; }); }

    function submit(){
      if (!form.name.trim()) { ctx.toast('Class name is required', 'error'); return; }
      if (!form.instructor) { ctx.toast('Instructor is required', 'error'); return; }
      if (minutesBetween(form.startTime, form.endTime) <= 0) {
        ctx.toast('End time must be after start time', 'error'); return;
      }
      var capNum = form.capacity === '' ? null : parseInt(form.capacity, 10);
      if (form.capacity !== '' && (isNaN(capNum) || capNum < 0)) {
        ctx.toast('Capacity must be a positive number', 'error'); return;
      }
      /* v2.2: validate season window if both dates are present. */
      if (form.seasonStart && form.seasonEnd && form.seasonEnd < form.seasonStart) {
        ctx.toast('Season end must be on or after season start', 'error'); return;
      }
      var out;
      if (isEdit) {
        out = Object.assign({}, existing, {
          name: form.name.trim(),
          location: form.location,
          instructor: form.instructor,
          dayOfWeek: form.dayOfWeek,
          startTime: form.startTime,
          endTime: form.endTime,
          room: form.room,
          capacity: capNum,
          classType: form.classType,
          isPremium: form.isPremium,
          seasonStart: form.seasonStart || null,
          seasonEnd: form.seasonEnd || null
        });
      } else {
        out = {
          id: uid(),
          name: form.name.trim(),
          location: form.location,
          instructor: form.instructor,
          dayOfWeek: form.dayOfWeek,
          startTime: form.startTime,
          endTime: form.endTime,
          room: form.room,
          capacity: capNum,
          classType: form.classType,
          isPremium: form.isPremium,
          seasonStart: form.seasonStart || null,
          seasonEnd: form.seasonEnd || null,
          attendance: []
        };
      }
      props.onCreate(out);
    }

    return e('div', { className: 'modal-overlay' },
      e('div', { className: 'modal', onClick: function(ev){ ev.stopPropagation(); } },
        e('div', { className: 'modal-header' },
          e('h2', null, isEdit ? 'Edit Class' : 'New Class'),

        ),
        e('div', { className: 'modal-body' },

            e('input', { value: form.name, onChange: function(ev){ update('name', ev.target.value); }, placeholder: 'E.g. Total Body Strength' })
          ),
          e('div', { className: 'row2' },
            e('div', { className: 'field' },
              e('label', null, 'Location'),
              e('select', { value: form.location, onChange: function(ev){ update('location', ev.target.value); } },
                LOCATIONS.map(function(l){ return e('option', { key: l, value: l }, l); })
              )
            ),
            e('div', { className: 'field' },
              e('label', null, 'Room'),
              e('select', { value: form.room, onChange: function(ev){ update('room', ev.target.value); } },
                ROOMS.map(function(r){ return e('option', { key: r, value: r }, r); })
              )
            )
          ),
          e('div', { className: 'field' },
            e('label', null, 'Instructor'),
            e('select', {
              value: form.instructor,
              disabled: !!props.lockInstructor,
              onChange: function(ev){ update('instructor', ev.target.value); }
            },
              ctx.trainers.map(function(t){ return e('option', { key: t, value: t }, t); })
            )
          ),
          e('div', { className: 'row2' },
            e('div', { className: 'field' },
              e('label', null, 'Day of Week'),
              e('select', { value: form.dayOfWeek, onChange: function(ev){ update('dayOfWeek', ev.target.value); } },
                DAYS.map(function(d){ return e('option', { key: d, value: d }, d); })
              )
            ),
            e('div', { className: 'field' },
              e('label', null, 'Class Type'),
              e('select', { value: form.classType, onChange: function(ev){ update('classType', ev.target.value); } },
                CLASS_TYPES.map(function(t){ return e('option', { key: t, value: t }, t); })
              )
            )
          ),
          e('div', { className: 'row2' },
            e('div', { className: 'field' },
              e('label', null, 'Start Time'),
              e('input', { type: 'time', value: form.startTime, onChange: function(ev){ update('startTime', ev.target.value); } })
            ),
            e('div', { className: 'field' },

            )
          ),
          e('div', { className: 'row2' },
            e('div', { className: 'field' },
              e('label', null, 'Capacity'),
              e('input', {
                type: 'number',

                onChange: function(ev){ update('capacity', ev.target.value); },
                placeholder: 'e.g. 20',
                min: 0
              })

            e('div', { className: 'field' },
              e('label', null, 'Premium (Paid)'),

          e('div', {

  /* ============ LOG ATTENDANCE MODAL ============ */
  function LogAttendanceModal(props){
    var ctx = props.ctx;
    var now = new Date();
    var hh = String(now.getHours()).padStart(2,'0');
    var mm = String(now.getMinutes()).padStart(2,'0');

    var initialDate = props.initialDate || todayStr();
    var dateTuple = useState(initialDate);
    var date = dateTuple[0];
    var setDate = dateTuple[1];

    var timeTuple = useState(props.cls.startTime || (hh + ':' + mm));
    var time = timeTuple[0];
    var setTime = timeTuple[1];

    var headcountTuple = useState('');
    var headcount = headcountTuple[0];
    var setHeadcount = headcountTuple[1];

    /* Initial instructor: forced (props.forceInstructor) > assigned sub for date >
       current trainer (if logged in) > class's regular instructor */
    var instructorTuple = useState(function(){
      if (props.forceInstructor) return props.forceInstructor;
      var sub = getAssignedSubForDate(props.cls, initialDate);
      if (sub) return sub.subInstructor;
      var me = ctx.currentUserName && ctx.currentUserName();
      if (me) return me;
      return props.cls.instructor;
    });
    var instructor = instructorTuple[0];
    var setInstructor = instructorTuple[1];

    /* When the date changes, if a sub is assigned for that date, auto-pick that instructor */
    useEffect(function(){
      var sub = getAssignedSubForDate(props.cls, date);
      if (sub) setInstructor(sub.subInstructor);
    }, [date]);

    var isSubbing = instructor && instructor !== props.cls.instructor;
    var assignedSub = getAssignedSubForDate(props.cls, date);

    function submit(){
      var n = parseInt(headcount, 10);
      if (isNaN(n) || n < 0) { ctx.toast('Enter a valid headcount', 'error'); return; }
      var att = {
        id: uid(),
        date: date,
        time: time,
        headcount: n,
        instructor: instructor,
        /* v2: actualInstructor mirrors instructor; calcTrainerHours reads it
           by either name. durationHours snapshots the class window so future
           class-time edits don't retroactively change paid hours.
           v2.1: applies gxClassHours rule (50-60 min = 1 hour, else actual). */
        actualInstructor: instructor,
        durationHours: gxClassHours(props.cls)
      };

      /* v2: if logging attendance with a different instructor than the regular,
         make sure a sub assignment record exists in the claimed state for

      var isSub = instructor && !trainerNameMatches(instructor, props.cls.instructor);

  /* ============ SUB ASSIGNMENT MODAL ============ */
  /* SubRequestModal: trainer-initiated coverage request. Two flows:
       (a) Post to sub queue (status: 'open') - any trainer can claim via
           the existing notification bar / claim flow
       (b) Direct assign (status: 'claimed') - specific trainer slotted in,
           still routes through the existing approval pipeline */
  function SubRequestModal(props){
    var ctx = props.ctx;
    var cls = props.cls;
    var sessionName = (ctx.session && ctx.session.name) || '';

    var dateTuple = useState(todayStr());

    var assignee = assigneeTuple[0]; var setAssignee = assigneeTuple[1];

    var noteTuple = useState('');

    var d = parseYMD(date);
    var dayMatch = d && IDX_TO_DOW[d.getDay()] === normalizeDow(cls.dayOfWeek);
    var existing = getAssignedSubForDate(cls, date);

    function submit(){

      var assignment;
      if (mode === 'queue') {
        assignment = {
          id: existing ? existing.id : uid(),
          date: date,
          status: 'open',
          originalInstructor: cls.instructor,
          requestedBy: sessionName || cls.instructor,
          requestedAt: nowIso,
          subInstructor: null,
          claimedBy: null,
          claimedAt: null,
          approvedBy: null,
          approvedAt: null,
          denyReason: null,
          note: note,
          createdAt: nowIso
        };
      } else {
        assignment = {
          id: existing ? existing.id : uid(),
          date: date,
          status: 'claimed',
          originalInstructor: cls.instructor,
          requestedBy: sessionName || cls.instructor,
          requestedAt: nowIso,
          subInstructor: assignee,
          claimedBy: assignee,
          claimedAt: nowIso,
          approvedBy: null,

  /* Item types for manual admin time logging. 'Other' surfaces a custom field. */
  /* Item types for manual admin time logging.
     'Program Creation' is a recurring 30-min admin shift type per Reagan.
     'Other' surfaces a custom field. */
  var ITEM_TYPES = ['Program Creation', 'Meeting', 'Programming', 'Admin Task', 'Training', 'Community Event', 'Other'];

  /* Default duration in minutes per item type (used to auto-fill timeOut). */
  var ITEM_TYPE_DEFAULT_MINUTES = {
    'Program Creation': 30,
    'Meeting': 60,
    'Programming': 60,
    'Admin Task': 30,
    'Training': 60,
    'Community Event': 120,
    'Other': 60
  };

  /* ============ LOG ADMIN TIME MODAL ============ */
  function LogAdminTimeModal(props){
    var ctx = props.ctx;
    var existing = props.item || null;
    var defaultAssignee = props.defaultAssignee || (ctx.session && ctx.session.name) || '';

    var titleTuple = useState(existing ? existing.title : '');
    var title = titleTuple[0]; var setTitle = titleTuple[1];
    var typeTuple = useState(existing ? existing.type : 'Program Creation');
    var type = typeTuple[0]; var setType = typeTuple[1];
    var customTypeTuple = useState(existing ? (existing.customType || '') : '');
    var customType = customTypeTuple[0]; var setCustomType = customTypeTuple[1];
    var dateTuple = useState(existing ? existing.date : todayStr());
    var date = dateTuple[0]; var setDate = dateTuple[1];
    var inTuple = useState(existing ? existing.timeIn : '');
    var timeIn = inTuple[0]; var setTimeIn = inTuple[1];
    var outTuple = useState(existing ? existing.timeOut : '');
    var timeOut = outTuple[0]; var setTimeOut = outTuple[1];
    var assigneesTuple = useState(existing ? (existing.assignees || []) : (defaultAssignee ? [defaultAssignee] : []));
    var assignees = assigneesTuple[0]; var setAssignees = assigneesTuple[1];
    var noteTuple = useState(existing ? (existing.note || '') : '');
    var note = noteTuple[0]; var setNote = noteTuple[1];

    /* Source-session linkage. Triggered by session? toggle. When yes,
       picker shows the assignee trainer's last 14 days of sessions.
       Linking only works when there's exactly one assignee. */
    var linkSessionTuple = useState(!!(existing && existing.sourceSessionId));
    var linkSession = linkSessionTuple[0]; var setLinkSession = linkSessionTuple[1];
    var sourceSessionTuple = useState(existing ? (existing.sourceSessionId || '') : '');
    var sourceSessionId = sourceSessionTuple[0]; var setSourceSessionId = sourceSessionTuple[1];

    var hours = hoursFromTimes(timeIn, timeOut);

    /* Compute the picker options: sessions for the single assignee in the
       last 14 days, sorted most-recent first. */
    var pickerSessions = (function(){
      if (assignees.length !== 1) return [];
      var trainerName = assignees[0];
      var todayMs = Date.now();
      var cutoffMs = todayMs - 14 * 24 * 60 * 60 * 1000;
      var rows = [];
      (ctx.clients || []).forEach(function(c){
        (c.sessions || []).forEach(function(s){
          if (s.trainerName !== trainerName) return;
          if (!s.date) return;
          var t = new Date(s.date).getTime();
          if (isNaN(t) || t < cutoffMs) return;
          rows.push({ id: s.id, label: formatDate(s.date) + ' · ' + c.name + (s.time ? ' · ' + s.time : ''), date: s.date });
        });
      });
      rows.sort(function(a, b){ return a.date < b.date ? 1 : -1; });
      return rows;
    })();

    /* v2.1: when the type changes (e.g., user picks 'Program Creation'),
       and the user has set a timeIn but no timeOut, auto-fill timeOut
       using the type's default duration. Doesn't touch existing items
       on edit. */
    function changeType(newType){
      setType(newType);
      if (existing) return;
      if (!timeIn) return;
      if (timeOut) return;
      var mins = ITEM_TYPE_DEFAULT_MINUTES[newType];
      if (!mins) return;
      var parts = timeIn.split(':');
      if (parts.length !== 2) return;
      var totalMins = parseInt(parts[0], 10) * 60 + parseInt(parts[1], 10) + mins;
      if (totalMins >= 24 * 60) return;
      var hh = String(Math.floor(totalMins / 60)).padStart(2, '0');
      var mm = String(totalMins % 60).padStart(2, '0');
      setTimeOut(hh + ':' + mm);
    }

    /* When timeIn is set first and type already chosen, auto-fill timeOut
       too (helps Program Creation flow: pick type, set start, done). */
    function changeTimeIn(newTimeIn){
      setTimeIn(newTimeIn);
      if (existing) return;
      if (timeOut) return;
      if (!newTimeIn) return;
      var mins = ITEM_TYPE_DEFAULT_MINUTES[type];
      if (!mins) return;
      var parts = newTimeIn.split(':');
      if (parts.length !== 2) return;
      var totalMins = parseInt(parts[0], 10) * 60 + parseInt(parts[1], 10) + mins;
      if (totalMins >= 24 * 60) return;
      var hh = String(Math.floor(totalMins / 60)).padStart(2, '0');
      var mm = String(totalMins % 60).padStart(2, '0');
      setTimeOut(hh + ':' + mm);
    }

    function toggleAssignee(name){
      setAssignees(function(list){
        if (list.indexOf(name) === -1) return list.concat([name]);
        return list.filter(function(x){ return x !== name; });
      });
    }

    function submit(){
      if (!title.trim()) { ctx.toast('Title is required', 'error'); return; }
      if (!timeIn || !timeOut) { ctx.toast('Time in and time out are required', 'error'); return; }
      if (hours <= 0) { ctx.toast('Time out must be after time in', 'error'); return; }
      if (!assignees.length) { ctx.toast('At least one assignee is required', 'error'); return; }
      if (type === 'Other' && !customType.trim()) { ctx.toast('Custom type is required when type is Other', 'error'); return; }
      var item = {
        id: existing ? existing.id : uid(),
        title: title.trim(),
        type: type,
        customType: type === 'Other' ? customType.trim() : null,
        date: date,
        timeIn: timeIn,
        timeOut: timeOut,
        hours: hours,
        assignees: assignees.slice(),
        note: note.trim() || null,
        sourceSessionId: linkSession && sourceSessionId ? sourceSessionId : null,
        createdBy: existing ? existing.createdBy : ((ctx.session && ctx.session.name) || 'admin'),
        createdAt: existing ? existing.createdAt : new Date().toISOString()
      };
      ctx.upsertItem(item);
      ctx.toast(existing ? 'Admin time updated \u2713' : 'Admin time logged \u2713');
      props.onClose();
    }

    return e('div', { className: 'modal-backdrop' },
      e('div', { className: 'modal', onClick: function(ev){ ev.stopPropagation(); } },
        e('div', { className: 'modal-head' },
          e('h3', null, existing ? 'Edit Admin Time' : 'Log Admin Time'),
          e('button', { className: 'modal-close', onClick: props.onClose }, '\u00d7')
        ),
        e('div', { className: 'modal-body' },
          e('div', { className: 'field' },
            e('label', null, 'Title'),
            e('input', { type: 'text', value: title, placeholder: 'e.g. Q3 program planning', onChange: function(ev){ setTitle(ev.target.value); } })
          ),
          e('div', { className: 'field' },
            e('label', null, 'Type'),
            e('select', { value: type, onChange: function(ev){ changeType(ev.target.value); } },
              ITEM_TYPES.map(function(t){ return e('option', { key: t, value: t }, t); })
            )
          ),
          type === 'Other' && e('div', { className: 'field' },
            e('label', null, 'Custom type'),
            e('input', { type: 'text', value: customType, onChange: function(ev){ setCustomType(ev.target.value); } })
          ),
          e('div', { className: 'field' },
            e('label', null, 'Date'),
            e('input', { type: 'date', value: date, onChange: function(ev){ setDate(ev.target.value); } })
          ),
          e('div', { style: { display: 'flex', gap: '10px' } },
            e('div', { className: 'field', style: { flex: 1 } },
              e('label', null, 'Time in'),
              e('input', { type: 'time', value: timeIn, onChange: function(ev){ changeTimeIn(ev.target.value); } })
            ),
            e('div', { className: 'field', style: { flex: 1 } },
              e('label', null, 'Time out'),
              e('input', { type: 'time', value: timeOut, onChange: function(ev){ setTimeOut(ev.target.value); } })
            )
          ),
          e('div', { style: { fontSize: '13px', color: hours > 0 ? 'var(--teal)' : 'var(--slate)', marginBottom: '14px' } },
            hours > 0 ? ('Calculated: ' + hours.toFixed(2) + ' hours') : 'Enter time in and time out'
          ),
          e('div', { className: 'field' },
            e('label', null, 'Assignees (each gets full hours credited, not divided)'),
            e('div', { style: { display: 'flex', flexWrap: 'wrap', gap: '6px' } },
              ctx.trainers.map(function(t){
                var picked = assignees.indexOf(t) !== -1;
                return e('button', {
                  key: t,
                  type: 'button',
                  onClick: function(){ toggleAssignee(t); },
                  style: {
                    border: '1.5px solid ' + (picked ? 'var(--teal)' : 'var(--border)'),
                    background: picked ? 'var(--teal-bg)' : '#fff',
                    color: picked ? 'var(--teal)' : 'var(--navy)',
                    padding: '8px 12px',
                    borderRadius: '999px',
                    fontSize: '13px',
                    fontWeight: picked ? 600 : 500
                  }
                }, (picked ? '\u2713 ' : '') + t);
              })
            )
          ),
          /* Source-session linkage. Picker only appears when linked AND
             there's exactly one assignee - admin time split across people
             can't sensibly share a single source session. */
          e('div', { className: 'field' },
            e('label', null, 'Triggered by a session?'),
            e('div', { style: { display: 'flex', gap: '14px', marginBottom: '6px' } },
              e('label', { style: { display: 'flex', alignItems: 'center', gap: '6px', fontSize: '13px', cursor: 'pointer' } },
                e('input', {
                  type: 'radio',
                  checked: !linkSession,
                  onChange: function(){ setLinkSession(false); setSourceSessionId(''); }
                }),
                'No, manual entry'
              ),
              e('label', { style: { display: 'flex', alignItems: 'center', gap: '6px', fontSize: '13px', cursor: 'pointer', opacity: assignees.length === 1 ? 1 : 0.5 } },
                e('input', {
                  type: 'radio',
                  checked: linkSession,
                  disabled: assignees.length !== 1,
                  onChange: function(){ setLinkSession(true); }
                }),
                'Yes, link to session'
              )
            ),
            linkSession && assignees.length !== 1 && e('div', { style: { fontSize: '11px', color: 'var(--slate-soft)', marginTop: '4px' } },
              'Linking requires a single assignee.'
            ),
            linkSession && assignees.length === 1 && e('select', {
              value: sourceSessionId,
              onChange: function(ev){ setSourceSessionId(ev.target.value); }
            },
              e('option', { value: '' }, 'Pick a session...'),
              pickerSessions.map(function(s){
                return e('option', { key: s.id, value: s.id }, s.label);
              }),
              pickerSessions.length === 0 && e('option', { value: '', disabled: true }, '(No sessions in last 14 days)')
            )
          ),
          e('div', { className: 'field' },
            e('label', null, 'Note (optional)'),
            e('textarea', { rows: 2, value: note, onChange: function(ev){ setNote(ev.target.value); } })
          )
        ),
        e('div', { className: 'modal-footer' },
          existing && e('button', {
            className: 'btn btn-ghost',
            style: { color: 'var(--red)', marginRight: 'auto' },
            onClick: function(){

        )
      )
