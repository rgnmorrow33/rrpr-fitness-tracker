  /* ============ CSV IMPORT MODAL (RecTrac → app) ============
     Two phases: paste/upload CSV, then map columns and confirm import. */
  function ImportClientsModal(props){
    var ctx = props.ctx;
    var stepTuple = useState(1); /* 1=paste, 2=map+preview, 3=done */
    var step = stepTuple[0];
    var setStep = stepTuple[1];

    var rawTuple = useState('');
    var raw = rawTuple[0];
    var setRaw = rawTuple[1];

    var parsedTuple = useState({ headers: [], rows: [] });
    var parsed = parsedTuple[0];
    var setParsed = parsedTuple[1];

    var mappingTuple = useState({});
    var mapping = mappingTuple[0];
    var setMapping = mappingTuple[1];

    var defaultsTuple = useState({
      packageType: PACKAGES[3].type, /* 10-session most common */
      location: 'CMRC',
      trainerName: '' /* unassigned by default */
    });
    var defaults = defaultsTuple[0];
    var setDefaults = defaultsTuple[1];

    var selectedTuple = useState({});
    var selected = selectedTuple[0];
    var setSelected = selectedTuple[1];

    var resultTuple = useState({ created: 0, reups: 0, queued: 0, skipped: 0 });
    var result = resultTuple[0];
    var setResult = resultTuple[1];

    /* Robust CSV parser that handles quoted fields */
    function parseCSV(text){
      var lines = [];
      var cur = [];
      var field = '';
      var inQuotes = false;
      for (var i = 0; i < text.length; i++) {
        var ch = text[i];
        if (inQuotes) {
          if (ch === '"') {
            if (text[i+1] === '"') { field += '"'; i++; }
            else { inQuotes = false; }
          } else {
            field += ch;
          }
        } else {
          if (ch === '"') { inQuotes = true; }
          else if (ch === ',') { cur.push(field); field = ''; }
          else if (ch === '\n' || ch === '\r') {
            if (ch === '\r' && text[i+1] === '\n') i++;
            cur.push(field); field = '';
            if (cur.length > 1 || (cur.length === 1 && cur[0] !== '')) lines.push(cur);
            cur = [];
          } else { field += ch; }
        }
      }
      if (field !== '' || cur.length > 0) { cur.push(field); lines.push(cur); }
      return lines;
    }

    /* Try to auto-detect column mapping by header name patterns */
    function autoDetect(headers){
      var m = {};
      headers.forEach(function(h, idx){
        var lh = h.toLowerCase().trim();
        if (!m.firstName && /^first\s*name$|^fname$/.test(lh)) m.firstName = idx;
        if (!m.lastName && /^last\s*name$|^lname$|^surname$/.test(lh)) m.lastName = idx;
        if (!m.fullName && (/^full\s*name$|^name$|^customer\s*name$|^member\s*name$|^patron\s*name$|^pass\s*member$/.test(lh))) m.fullName = idx;
        if (!m.email && /e[\-\s]?mail/.test(lh)) m.email = idx;
        if (!m.phone && /^(phone|cell|mobile|telephone)$/.test(lh.replace(/[#:]/g,''))) m.phone = idx;
        if (!m.dob && /^(dob|date\s*of\s*birth|birth\s*date)$/.test(lh)) m.dob = idx;
        if (!m.purchaseDate && /(purchase|registr|trans|sale|sold|date)/.test(lh) && /(date)/.test(lh)) m.purchaseDate = idx;
        if (!m.packageDescription && /(package|product|item|description|class|activity|pass\s*code)/.test(lh)) m.packageDescription = idx;
        if (!m.amountPaid && /(amount|paid|total|fee|price|charge)/.test(lh)) m.amountPaid = idx;
        if (!m.location && /(facility|location|site|center|centre)/.test(lh)) m.location = idx;
        if (!m.membershipType && /membership/.test(lh)) m.membershipType = idx;
        /* v2: RecTrac ID is the unique customer key. RecTrac column is just 'ID'. */
        if (!m.rectracMemberId && /^(id|member\s*id|rectrac\s*id|customer\s*id|patron\s*id)$/.test(lh)) m.rectracMemberId = idx;
        /* v2: Tran Type drives Purchase vs Renewal routing */
        if (!m.tranType && /^tran\s*type$|^transaction\s*type$/.test(lh)) m.tranType = idx;
        /* v2: Trainer column (future RecTrac enhancement) */
        if (!m.trainerName && /^trainer$|^instructor$|^coach/.test(lh)) m.trainerName = idx;
      });
      return m;
    }

    function handleFileUpload(ev){
      var f = ev.target.files && ev.target.files[0];
      if (!f) return;
      var reader = new FileReader();
      reader.onload = function(e){ setRaw(e.target.result); };
      reader.readAsText(f);
    }

    function processRaw(){
      var trimmed = (raw || '').trim();
      if (!trimmed) { ctx.toast('Paste or upload a CSV first', 'error'); return; }
      var lines = parseCSV(trimmed);
      if (lines.length < 2) { ctx.toast('CSV needs a header row + at least one data row', 'error'); return; }
      var headers = lines[0].map(function(h){ return (h || '').trim(); });
      var rows = lines.slice(1).filter(function(r){ return r.some(function(c){ return (c || '').trim(); }); });
      setParsed({ headers: headers, rows: rows });
      var detected = autoDetect(headers);
      setMapping(detected);
      var sel = {};
      rows.forEach(function(_, i){ sel[i] = true; });
      setSelected(sel);
      setStep(2);
    }

    /* Detect package from a description string */
    function detectPackage(desc){
      if (!desc) return PACKAGES.find(function(p){ return p.type === defaults.packageType; });
      var lower = desc.toLowerCase();
      var sessionMatch = lower.match(/(\d+)\s*[-\s]*(session|pack|class|visit)/);
      if (sessionMatch) {
        var n = parseInt(sessionMatch[1], 10);
        var found = PACKAGES.find(function(p){ return p.sessions === n; });
        if (found) return found;
      }
      /* Single session fallback */
      if (/single|drop[-\s]?in|1[-\s]session/.test(lower)) {
        return PACKAGES.find(function(p){ return p.sessions === 1; });
      }
      return PACKAGES.find(function(p){ return p.type === defaults.packageType; });
    }

    function buildClientFromRow(row){
      function val(field){
        if (mapping[field] == null) return '';
        return (row[mapping[field]] || '').trim();
      }
      var name = val('fullName');
      if (!name) {
        var fn = val('firstName');
        var ln = val('lastName');
        name = (fn + ' ' + ln).trim();
      }
      if (!name) return null;

      var pkg = detectPackage(val('packageDescription'));
      var amountPaidStr = val('amountPaid').replace(/[^0-9.\-]/g, '');
      var amountPaid = amountPaidStr ? parseFloat(amountPaidStr) : pkg.price;
      var purchaseDate = val('purchaseDate') || todayStr();
      try {
        var d = new Date(purchaseDate);
        if (!isNaN(d.getTime())) purchaseDate = d.toISOString().substring(0, 10);
      } catch(_) {}

      var loc = val('location') || defaults.location;
      if (LOCATIONS.indexOf(loc) === -1) loc = defaults.location;

      /* v2: capture RecTrac ID (primary match key), Tran Type, and trainer
         if the export includes them. */
      var rectracId = val('rectracMemberId');
      var tranType = val('tranType').toLowerCase();
      var trainerFromRow = val('trainerName');

      return {
        id: uid(),
        name: name,
        email: val('email'),
        phone: val('phone'),
        dob: val('dob') || null,
        rectracMemberId: rectracId || null,
        tranType: tranType || null,
        location: loc,
        membershipType: val('membershipType') || 'Non-Member',
        trainerName: trainerFromRow || defaults.trainerName || ctx.trainers[0],
        packages: [{
          sessions: pkg.sessions,
          price: pkg.price,
          type: pkg.type,
          amountPaid: amountPaid,
          purchaseDate: purchaseDate,
          paymentType: 'Card',
          source: 'rectrac_import'
        }],
        paymentType: 'Card',
        sessions: [],
        source: 'rectrac_import',
        createdAt: new Date().toISOString()
      };
    }

    /* Returns { kind, candidate, match? } where kind is one of:
         'invalid'        - missing name, can't process
         'duplicate'      - already imported (matched client + matching purchase date + sessions)
         'reup'           - matched client; new package will be appended
         'new_to_queue'   - no match, Purchase tran type: route to consult queue (v2)
         'new_to_client'  - no match, no/unknown tran type: create client directly (legacy path) */
    function classifyRow(row){
      var candidate = buildClientFromRow(row);
      if (!candidate) return { kind: 'invalid' };
      var matchInfo = findMatchingClient(ctx.clients, candidate);
      if (matchInfo) {
        var newPkg = candidate.packages[0];
        var existingPkgs = getPackages(matchInfo.match);
        var alreadyImported = existingPkgs.some(function(p){
          return p.purchaseDate === newPkg.purchaseDate && p.sessions === newPkg.sessions;
        });
        if (alreadyImported) {
          return { kind: 'duplicate', candidate: candidate, match: matchInfo.match, matchInfo: matchInfo };
        }
        return { kind: 'reup', candidate: candidate, match: matchInfo.match, matchInfo: matchInfo };
      }
      /* No match. v2 routing: if Tran Type is 'Purchase' (or no Tran Type column
         was mapped, treat as Purchase by default), route to the consult queue
         instead of creating a client directly. Lets the team triage and assign
         a trainer before the client record exists. */
      var tt = (candidate.tranType || '').toLowerCase();
      if (tt === 'renewal') {
        /* Renewal with no match is weird - usually means the original is missing.
           Fall back to creating directly so the data isn't lost. */
        return { kind: 'new_to_client', candidate: candidate };
      }
      return { kind: 'new_to_queue', candidate: candidate };
    }

    function doImport(){
      var created = 0, reups = 0, queued = 0, skipped = 0;
      parsed.rows.forEach(function(row, i){
        if (!selected[i]) return;
        var classified = classifyRow(row);
        if (classified.kind === 'invalid' || classified.kind === 'duplicate') { skipped++; return; }
        if (classified.kind === 'reup') {
          var newPkg = Object.assign({}, classified.candidate.packages[0], { source: 'rectrac_reup' });
          var updated = addPackageToClient(classified.match, newPkg);
          /* Make sure the matched client has the RecTrac ID stored for next time */
          if (classified.candidate.rectracMemberId && !updated.rectracMemberId) {
            updated.rectracMemberId = classified.candidate.rectracMemberId;
          }
          ctx.upsertClient(updated);
          reups++;
        } else if (classified.kind === 'new_to_queue') {
          /* v2: route new purchases into the consult queue */
          var c = classified.candidate;
          var pkg = c.packages[0];
          var queueEntry = {
            id: 'q_' + uid(),
            name: c.name,
            phone: c.phone || null,
            email: c.email || null,
            note: null,
            addedBy: (ctx.session && ctx.session.name) || 'admin',
            date: todayStr(),
            status: 'waiting',
            source: 'rectrac_import',
            rectracMemberId: c.rectracMemberId || null,
            packageInfo: {
              sessions: pkg.sessions,
              price: pkg.price,
              type: pkg.type,
              location: c.location
            },
            assignedTo: null,
            assignedAt: null,
            assignedBy: null,
            convertedToClientId: null,
            createdAt: new Date().toISOString()
          };
          ctx.upsertQueueEntry(queueEntry);
          queued++;
        } else {
          ctx.upsertClient(classified.candidate);
          created++;
        }
      });
      setResult({ created: created, reups: reups, queued: queued, skipped: skipped });
      setStep(3);
    }

    function reset(){
      setStep(1);
      setRaw('');
      setParsed({ headers: [], rows: [] });
      setMapping({});
      setSelected({});
      setResult({ created: 0, reups: 0, queued: 0, skipped: 0 });

  /* ============ ADMIN: All Classes ============ */
  function AdminAllClasses(props){
    var ctx = props.ctx;
    var newOpenTuple = useState(false);
    var newOpen = newOpenTuple[0];
    var setNewOpen = newOpenTuple[1];

    /* v2.2: filter by season status */
    var filterTuple = useState('active'); /* active | upcoming | ended | all */
    var filter = filterTuple[0];
    var setFilter = filterTuple[1];

    var counts = { active: 0, upcoming: 0, ended: 0, all: ctx.classes.length };
    ctx.classes.forEach(function(c){
      counts[classSeasonStatus(c)]++;
    });

    var visible = ctx.classes
      .filter(function(c){ return filter === 'all' || classSeasonStatus(c) === filter; })
      .slice()
      .sort(function(a,b){ return a.name.localeCompare(b.name); });

    return e('div', null,
      e('div', { className: 'section-head' },
        e('div', null,
          e('h2', null, 'Group Classes'),
          e('div', { className: 'meta' },
            counts.active + ' active \u00b7 ' +
            counts.upcoming + ' upcoming \u00b7 ' +
            counts.ended + ' ended \u00b7 ' +

          )
        ),
        e('button', { className: 'btn btn-teal', onClick: function(){ setNewOpen(true); } }, '+ New Class')
      ),
      e('div', { style: { display: 'flex', gap: '6px', marginBottom: '14px', flexWrap: 'wrap' } },
        ['active', 'upcoming', 'ended', 'all'].map(function(s){
          var active = filter === s;
          var ct = counts[s];
          return e('button', {
            key: s,
            onClick: function(){ setFilter(s); },
            style: {
              padding: '8px 14px', borderRadius: '999px',
              border: '1.5px solid ' + (active ? 'var(--navy)' : 'var(--border)'),
              background: active ? 'var(--navy)' : '#fff',
              color: active ? '#fff' : 'var(--slate)',
              fontWeight: 600, fontSize: '13px',
              textTransform: 'capitalize'

          }, s + ' (' + ct + ')');
        })
      ),
      visible.length === 0
        ? e('div', { className: 'empty' },
            e('div', { className: 'icon' }, '\ud83c\udfc3'),
            e('h3', null, 'No ' + filter + ' classes'),
            e('div', null, filter === 'active' ? 'Tap "+ New Class" to set up the first class.' : 'No classes match this filter.')
          )
        : visible.map(function(c){
            return e(ClassCard, { key: c.id, cls: c, onClick: function(){ props.onClassClick(c.id); } });
          }),
      newOpen && e(NewClassModal, {
        ctx: ctx,
        onClose: function(){ setNewOpen(false); },
        onCreate: function(cl){
          ctx.upsertClass(cl);
          setNewOpen(false);
          ctx.toast('Class created \u2713');
        }
      })
    );
  }

  /* ============ ADMIN: Manage Team ============ */
  function AdminManageInstructors(props){
    var ctx = props.ctx;
    var nameTuple = useState('');
    var name = nameTuple[0];
    var setName = nameTuple[1];

    var pinInputTuple = useState('');
    var pinInput = pinInputTuple[0];
    var setPinInput = pinInputTuple[1];

    function add(){
      if (ctx.addTrainer(name)) {
        ctx.toast('Team member added ✓');
        setName('');
      }
    }
    function remove(n){
      var hasClients = ctx.clients.some(function(c){ return c.trainerName === n; });
      var hasClasses = ctx.classes.some(function(c){ return c.instructor === n; });
      if (hasClients || hasClasses) {
        if (!window.confirm(n + ' still has clients and/or classes assigned. Remove anyway? Their clients and classes will remain but may appear without a valid team member until reassigned.')) return;
      } else {
        if (!window.confirm('Remove ' + n + '?')) return;
      }
      ctx.removeTrainer(n);
      ctx.toast('Team member removed', 'error');
    }
    function updatePin(){
      if (!/^\d{4}$/.test(pinInput)) { ctx.toast('PIN must be 4 digits', 'error'); return; }
      ctx.setPin(pinInput);
      ctx.toast('Admin PIN updated ✓');
      setPinInput('');
    }

    return e('div', null,
      e('h2', { style: { fontSize: '26px', marginBottom: '14px' } }, 'Manage Team'),
      e('div', { style: { background: '#fff', padding: '18px', borderRadius: '14px', border: '1px solid var(--border)', marginBottom: '18px' } },
        e('div', { className: 'field' },
          e('label', null, 'Add team member'),
          e('div', { style: { display: 'flex', gap: '10px' } },
            e('input', { value: name, onChange: function(ev){ setName(ev.target.value); }, placeholder: 'Full name', onKeyDown: function(ev){ if (ev.key === 'Enter') add(); } }),
            e('button', { className: 'btn btn-primary', onClick: add }, 'Add')
          )
        )
      ),
      e('div', { style: { background: '#fff', padding: '18px', borderRadius: '14px', border: '1px solid var(--border)', marginBottom: '18px' } },
        e('h3', { style: { fontSize: '16px', marginBottom: '10px' } }, 'Current team (' + ctx.trainers.length + ')'),
        ctx.trainers.map(function(n){
          var c = ctx.clients.filter(function(x){ return x.trainerName === n; }).length;
          var cl = ctx.classes.filter(function(x){ return x.instructor === n; }).length;
          return e('div', { key: n, className: 'list-row' },
            e('div', null,
              e('div', { style: { fontWeight: 600 } }, n),
              e('div', { style: { fontSize: '12px', color: 'var(--slate)' } }, c + ' clients · ' + cl + ' classes')
            ),
            e('button', { className: 'btn btn-ghost btn-sm', style: { color: 'var(--red)' }, onClick: function(){ remove(n); } }, 'Remove')
          );
        })
      ),
      e('div', { style: { background: '#fff', padding: '18px', borderRadius: '14px', border: '1px solid var(--border)' } },
        e('h3', { style: { fontSize: '16px', marginBottom: '10px' } }, 'Admin PIN'),
        e('div', { style: { fontSize: '13px', color: 'var(--slate)', marginBottom: '10px' } },
          'Current PIN is saved on this device. Default is 1234 when the app is first installed.'
        ),
        e('div', { className: 'field' },
          e('label', null, 'Set new 4-digit PIN'),
          e('div', { style: { display: 'flex', gap: '10px' } },
            e('input', {
              value: pinInput,
              onChange: function(ev){ setPinInput(ev.target.value.replace(/\D/g,'').slice(0,4)); },
              inputMode: 'numeric',
              type: 'password',
              placeholder: '••••',
              maxLength: 4
            }),
            e('button', { className: 'btn btn-primary', onClick: updatePin }, 'Save')
          )
        )
      )
    );
  }

  /* ============ WEIGHT ROOM ORIENTATION (WRO) ============ */
  function NewWROModal(props){
    /* PRE-orientation intake. Member fills out before the orientation.
       The full informed-consent / liability waiver is signed in person AT
       the orientation by the lead fitness specialist. */
    var ctx = props.ctx;
    var existing = props.existing; // resuming a draft pre-form
    var stepTuple = useState(1);
    var step = stepTuple[0];
    var setStep = stepTuple[1];

    var formTuple = useState(function(){
      if (existing) return existing;
      return {
        // Section 1: About you
        participantName: '',
        dob: '',
        phone: '',
        email: '',
        bestContactMethod: 'Phone',
        bestContactTime: '',
        // Section 2: What brings you in
        goals: [],
        goalsOther: '',
        experienceLevel: 'new',
        // Section 3: What you want to learn
        tourInterests: [],
        equipmentSpecific: '',
        // Section 4: Anything we should know
        healthFlags: '',
        prefersInPersonHealthDiscussion: false,
        // Section 5: Follow-up interests
        followupInterests: [],
        trainerPreference: '',
        scheduleAvailability: '',
        // Logistical
        date: todayStr(),
        location: 'CMRC',
        signature: null
      };
    });
    var form = formTuple[0];
    var setForm = formTuple[1];
    function update(k, v){ setForm(function(f){ var n = Object.assign({}, f); n[k] = v; return n; }); }
    function toggleArray(k, v){
      setForm(function(f){
        var arr = (f[k] || []).slice();
        var i = arr.indexOf(v);
        if (i === -1) arr.push(v); else arr.splice(i, 1);
        var n = Object.assign({}, f); n[k] = arr; return n;
      });
    }

    var sigTuple = useState(form.signature || null);
    var sig = sigTuple[0];
    var setSig = sigTuple[1];

    function step1Valid(){ return form.participantName.trim().length > 0; }
    function step2Valid(){ return form.goals.length > 0 || form.goalsOther.trim().length > 0; }
    /* Steps 3 and 4 are optional content - anything goes including nothing. */
    function step5Valid(){ return form.followupInterests.length > 0; }
    function step6Valid(){ return !!sig; }

    function finish(){
      var w = {
        id: existing && existing.id ? existing.id : uid(),
        // Snapshot the form at signing
        participantName: form.participantName.trim(),
        dob: form.dob,
        phone: form.phone,
        email: form.email,
        bestContactMethod: form.bestContactMethod,
        bestContactTime: form.bestContactTime,
        goals: form.goals,
        goalsOther: form.goalsOther,
        experienceLevel: form.experienceLevel,
        tourInterests: form.tourInterests,
        equipmentSpecific: form.equipmentSpecific,
        healthFlags: form.healthFlags,
        prefersInPersonHealthDiscussion: form.prefersInPersonHealthDiscussion,
        followupInterests: form.followupInterests,
        trainerPreference: form.trainerPreference,
        scheduleAvailability: form.scheduleAvailability,
        date: form.date,
        location: form.location,
        signature: sig,
        // Stage flags
        preCompletedAt: new Date().toISOString(),

          )
        ),

  function PostWROModal(props){
    var ctx = props.ctx;
    var w = props.wro;
    var existing = w.post || {};

    /* v2.5: auto-claim on modal open if the form is incomplete and the
       trainer hasn't already claimed it. This way the team can see who's
       working on it even if the trainer leaves the form mid-flow. */
    useEffect(function(){
      if (w.postCompleted) return;
      var claimer = (ctx.session && ctx.session.role === 'trainer') ? ctx.session.name : null;
      if (!claimer) return;
      if (w.claimedBy && trainerNameMatches(claimer, w.claimedBy)) return;
      ctx.claimWRO && ctx.claimWRO(w.id, claimer);
    }, [w.id]);

    var formTuple = useState(function(){
      return {
        specialistName: existing.specialistName || ((ctx.session && ctx.session.role === 'trainer') ? ctx.session.name : ctx.trainers[0] || ''),
        orientationDate: existing.orientationDate || todayStr(),
        /* v2.2: time-in / time-out for trainer hour credit. Defaults to a
           1-hour orientation block. Trainer can override with shorter or
           longer values. */
        timeIn: existing.timeIn || '10:00',
        timeOut: existing.timeOut || '11:00',
        confirmedGoals: existing.confirmedGoals || '',
        observedFlags: existing.observedFlags || '',
        recommendations: existing.recommendations || [],
        conversionOutcomes: existing.conversionOutcomes || [],
        notes: existing.notes || ''
      };
    });
    var form = formTuple[0];
    var setForm = formTuple[1];
    function update(k, v){ setForm(function(f){ var n = Object.assign({}, f); n[k] = v; return n; }); }
    function toggleArray(k, v){
      setForm(function(f){
        var arr = (f[k] || []).slice();
        var i = arr.indexOf(v);
        if (i === -1) arr.push(v); else arr.splice(i, 1);
        var n = Object.assign({}, f); n[k] = arr; return n;
      });
    }

    function checkRow(checked, onChange, label){
      return e('div', {
        onClick: onChange,
        style: {
          display: 'flex', alignItems: 'center', gap: '10px',
          padding: '8px 12px', marginBottom: '6px',
          background: checked ? 'var(--cream-2)' : '#fff',
          border: '1.5px solid ' + (checked ? 'var(--gold)' : 'var(--border)'),
          borderRadius: '10px', cursor: 'pointer', fontSize: '14px'
        }
      },
        e('div', {
          style: {
            width: '18px', height: '18px', borderRadius: '4px',
            border: '2px solid ' + (checked ? 'var(--gold)' : 'var(--slate-soft)'),
            background: checked ? 'var(--gold)' : '#fff',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            color: '#fff', fontSize: '12px', fontWeight: 700, flexShrink: 0
          }
        }, checked ? '✓' : ''),
        e('div', { style: { flex: 1 } }, label)
      );
    }

    function submit(){
      if (!form.specialistName) { ctx.toast('Specialist name is required', 'error'); return; }
      if (!form.confirmedGoals.trim()) { ctx.toast('Top 1-2 goals confirmed in conversation', 'error'); return; }
      if (!form.timeIn || !form.timeOut) { ctx.toast('Time in and time out are required', 'error'); return; }
      var hrs = hoursFromTimes(form.timeIn, form.timeOut);
      if (hrs <= 0) { ctx.toast('Time out must be after time in', 'error'); return; }
      var post = Object.assign({}, form, {
        durationHours: hrs,
        completedAt: new Date().toISOString()
      });
      props.onSave(Object.assign({}, w, { post: post, postCompleted: true }));
    }

    return e('div', { className: 'modal-overlay', onClick: props.onClose },
      e('div', { className: 'modal', onClick: function(ev){ ev.stopPropagation(); } },
        e('div', { className: 'modal-header' },
          e('h2', null, 'Specialist Form · ' + w.participantName),
          e('button', { className: 'modal-close', onClick: props.onClose }, '×')
        ),
        e('div', { className: 'modal-body' },
          e('div', { className: 'banner teal', style: { marginBottom: '14px', fontSize: '13px' } },
            'FITNESS SPECIALIST USE ONLY. Complete after orientation. Returns to lead fitness for tracking.'
          ),
          e('div', { className: 'row2' },
            e('div', { className: 'field' },
              e('label', null, 'Specialist'),
              e('select', { value: form.specialistName, onChange: function(ev){ update('specialistName', ev.target.value); } },
                ctx.trainers.map(function(t){ return e('option', { key: t, value: t }, t); })
              )
            ),
            e('div', { className: 'field' },
              e('label', null, 'Date of orientation'),
              e('input', { type: 'date', value: form.orientationDate, onChange: function(ev){ update('orientationDate', ev.target.value); } })
            )
          ),
          /* v2.2: time-in / time-out for trainer hour credit on the timecard. */
          e('div', { className: 'row2' },
            e('div', { className: 'field' },
              e('label', null, 'Time in'),
              e('input', { type: 'time', value: form.timeIn, onChange: function(ev){ update('timeIn', ev.target.value); } })
            ),
            e('div', { className: 'field' },
              e('label', null, 'Time out'),
              e('input', { type: 'time', value: form.timeOut, onChange: function(ev){ update('timeOut', ev.target.value); } })
            )
          ),
          (form.timeIn && form.timeOut) && e('div', { style: { fontSize: '12px', color: 'var(--teal)', marginBottom: '12px', marginTop: '-6px' } },
            'Hours credited to ' + form.specialistName + ': ' +
            hoursFromTimes(form.timeIn, form.timeOut).toFixed(2) + ' hr (PT category on timecard)'
          ),
          e('div', { className: 'field' },
            e('label', null, 'Top 1-2 goals confirmed in conversation *'),
            e('textarea', {
              value: form.confirmedGoals,
              onChange: function(ev){ update('confirmedGoals', ev.target.value); },
              placeholder: 'Brief. What did they actually say they wanted?',
              style: { minHeight: '70px', resize: 'vertical' }
            })
          ),
          e('div', { className: 'field' },
            e('label', null, 'Movement or health flags observed (if any)'),
            e('textarea', {
              value: form.observedFlags,
              onChange: function(ev){ update('observedFlags', ev.target.value); },
              placeholder: 'Optional. Anything that might warrant a PT referral or modified programming.',
              style: { minHeight: '70px', resize: 'vertical' }
            })
          ),
          e('div', { className: 'field' },
            e('label', null, 'Recommendations made (check all that apply)'),
            WRO_RECOMMENDATIONS.map(function(r){
              return e('div', { key: r }, checkRow(form.recommendations.indexOf(r) !== -1, function(){ toggleArray('recommendations', r); }, r));
            })
          ),
          e('div', { className: 'field' },
            e('label', null, 'Conversion outcome'),
            WRO_CONVERSION_OUTCOMES.map(function(o){
              return e('div', { key: o }, checkRow(form.conversionOutcomes.indexOf(o) !== -1, function(){ toggleArray('conversionOutcomes', o); }, o));
            })
          ),
          e('div', { className: 'field' },
            e('label', null, 'Notes / follow-up plan'),
            e('textarea', {
              value: form.notes,
              onChange: function(ev){ update('notes', ev.target.value); },
              placeholder: 'Optional.',
              style: { minHeight: '90px', resize: 'vertical' }
            })
          )
        ),
        e('div', { className: 'modal-footer' },
          e('button', { className: 'btn btn-ghost', onClick: props.onClose }, 'Cancel'),
          e('button', { className: 'btn btn-primary', onClick: submit }, w.postCompleted ? 'Save Changes' : 'Complete Specialist Form')
        )
      )
    );

  function AdminWROsView(props){
    var ctx = props.ctx;

    var newOpenTuple = useState(false);
    var newOpen = newOpenTuple[0];
    var setNewOpen = newOpenTuple[1];

    var detailTuple = useState(null);
    var detailId = detailTuple[0];
    var setDetailId = detailTuple[1];

    var convertTuple = useState(null);
    var convertWRO = convertTuple[0];
    var setConvertWRO = convertTuple[1];

    var filterTuple = useState('all'); // all | pending_post | flags | converted
    var filter = filterTuple[0];
    var setFilter = filterTuple[1];

    if (detailId) {
      var w = ctx.wros.find(function(x){ return x.id === detailId; });
      if (!w) { setDetailId(null); return null; }
      return e(WRODetail, {
        ctx: ctx,
        wro: w,
        onBack: function(){ setDetailId(null); },
        onConvert: function(wro){ setConvertWRO(wro); }
      });
    }

    var sorted = ctx.wros.slice().sort(function(a,b){
      if (a.date !== b.date) return a.date < b.date ? 1 : -1;
      return (a.createdAt || '') < (b.createdAt || '') ? 1 : -1;
    });

    var nowMonth = todayStr().substring(0, 7);
    var thisMonth = sorted.filter(function(w){ return (w.date || '').substring(0,7) === nowMonth; });
    var converted = sorted.filter(function(w){ return w.convertedToClientId; });
    /* v2.5: split pending into available (no claim) and in-progress (claimed) */
    var pendingPost = sorted.filter(function(w){ return !w.postCompleted; });
    var availableNow = pendingPost.filter(function(w){ return wroState(w) === 'pending'; });
    var inProgressNow = pendingPost.filter(function(w){ return wroState(w) === 'in_progress'; });
    var withFlags = sorted.filter(function(w){
      return (w.healthFlags && w.healthFlags.trim()) || w.prefersInPersonHealthDiscussion;
    });
    var convertRate = sorted.length ? Math.round((converted.length / sorted.length) * 100) : 0;

    var filtered = sorted;
    if (filter === 'pending_post') filtered = pendingPost;
    else if (filter === 'available') filtered = availableNow;
    else if (filter === 'in_progress') filtered = inProgressNow;
    else if (filter === 'flags') filtered = withFlags;
    else if (filter === 'converted') filtered = converted;

    /* v2: CSV backup export. Browser localStorage can be wiped by an iOS
       update or a Safari clear; this gives the front desk a way to take a
       monthly snapshot of WRO data before that risk materializes. Includes
       both pre-form and post-form fields. */
    function exportWROsCSV(){
      function csv(v){
        if (v == null) return '';
        var s = String(v).replace(/"/g, '""');
        return '"' + s + '"';
      }
      var rows = [];
      rows.push([
        'WRO ID','Date','Participant','Phone','Email','DOB','Location','Source',
        'Goals','Experience Level','Tour Interests','Health Flags',
        'Prefers In-Person Health Discussion','Follow-up Interests',
        'Pre Signature Captured','Post Completed','Specialist',
        'Confirmed Goals','Observed Flags','Recommendations','Conversion Outcome',
        'Post Notes','Converted To PT Client','Created At'
      ].join(','));
      sorted.forEach(function(w){
        rows.push([
          csv(w.id),
          csv(w.date || ''),
          csv(w.participantName || ''),
          csv(w.phone || ''),
          csv(w.email || ''),
          csv(w.dob || ''),
          csv(w.location || ''),
          csv(w.source || 'kiosk'),
          csv(w.goals || ''),
          csv(w.experienceLevel || ''),
          csv((w.tourInterests || []).join('; ')),
          csv(w.healthFlags || ''),
          csv(w.prefersInPersonHealthDiscussion ? 'Yes' : 'No'),
          csv((w.followUpInterests || []).join('; ')),
          csv(w.preSignature ? 'Yes' : 'No'),
          csv(w.postCompleted ? 'Yes' : 'No'),
          csv(w.specialist || ''),
          csv(w.confirmedGoals || ''),
          csv(w.observedFlags || ''),
          csv(w.recommendations || ''),
          csv(w.conversionOutcome || ''),
          csv(w.postNotes || ''),
          csv(w.convertedToClientId ? 'Yes' : 'No'),
          csv(w.createdAt || '')
        ].join(','));
      });
      var blob = new Blob([rows.join('\n')], { type: 'text/csv;charset=utf-8' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = 'RRPR_WROs_backup_' + todayStr() + '.csv';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(function(){ URL.revokeObjectURL(url); }, 500);
      ctx.toast('WRO backup CSV exported \u2713');
    }

    return e('div', null,
      e('div', { className: 'section-head' },
        e('div', null,
          e('h2', null, 'Weight Room Orientations'),
          e('div', { className: 'meta' }, sorted.length + ' total \u00b7 ' + thisMonth.length + ' this month \u00b7 ' + convertRate + '% converted to PT')
        ),
        e('div', { style: { display: 'flex', gap: '8px', flexWrap: 'wrap' } },
          e('button', { className: 'btn btn-ghost btn-sm', onClick: exportWROsCSV, title: 'Backup all WROs to CSV' }, '\u2193 Backup CSV'),
          e('button', { className: 'btn btn-gold', onClick: function(){ setNewOpen(true); } }, '+ New WRO Request')
        )
      ),
      e('div', { className: 'stats-grid', style: { marginBottom: '16px' } },
        e('div', { className: 'stat-card' },
          e('div', { className: 'label' }, 'WROs This Month'),
          e('div', { className: 'value' }, thisMonth.length),
          e('div', { style: { fontSize: '11px', color: 'var(--slate)', marginTop: '2px' } }, 'Goal: 10+ /mo')
        ),
        e('div', { className: 'stat-card' + (availableNow.length > 0 ? ' warn' : '') },
          e('div', { className: 'label' }, 'Available'),
          e('div', { className: 'value' }, availableNow.length),
          e('div', { style: { fontSize: '11px', color: 'var(--slate)', marginTop: '2px' } }, 'Awaiting pickup')
        ),
        e('div', { className: 'stat-card' },
          e('div', { className: 'label' }, 'In Progress'),
          e('div', { className: 'value', style: { color: 'var(--teal)' } }, inProgressNow.length),
          e('div', { style: { fontSize: '11px', color: 'var(--slate)', marginTop: '2px' } }, 'Claimed, not done')
        ),
        e('div', { className: 'stat-card' + (withFlags.length > 0 ? ' warn' : '') },
          e('div', { className: 'label' }, 'With Health Flags'),
          e('div', { className: 'value' }, withFlags.length)
        ),
        e('div', { className: 'stat-card' + (sorted.length >= 5 && convertRate < 15 ? ' warn' : '') },
          e('div', { className: 'label' }, 'Conversion Rate'),
          e('div', { className: 'value' }, convertRate + '%'),
          e('div', { style: { fontSize: '11px', color: 'var(--slate)', marginTop: '2px' } }, 'Goal: 15%+')
        )
      ),
      e('div', { className: 'audit-subtabs' },
        e('button', { className: filter === 'all' ? 'active' : '', onClick: function(){ setFilter('all'); } }, 'All (' + sorted.length + ')'),
        e('button', { className: filter === 'available' ? 'active' : '', onClick: function(){ setFilter('available'); } }, 'Available (' + availableNow.length + ')'),
        e('button', { className: filter === 'in_progress' ? 'active' : '', onClick: function(){ setFilter('in_progress'); } }, 'In Progress (' + inProgressNow.length + ')'),
        e('button', { className: filter === 'flags' ? 'active' : '', onClick: function(){ setFilter('flags'); } }, 'Health Flags (' + withFlags.length + ')'),
        e('button', { className: filter === 'converted' ? 'active' : '', onClick: function(){ setFilter('converted'); } }, 'Converted (' + converted.length + ')')
      ),
      filtered.length === 0
        ? e('div', { className: 'empty' },
            e('div', { className: 'icon' }, '\ud83d\udccb'),
            e('h3', null, sorted.length === 0 ? 'No WROs yet' : 'No WROs match this filter'),
            e('div', null, sorted.length === 0 ? 'Tap "+ New WRO Request" to capture a member\'s pre-orientation intake.' : 'Try a different filter.')
          )
        : filtered.map(function(w){
            var alreadyConverted = !!w.convertedToClientId;
            var hasFlags = (w.healthFlags && w.healthFlags.trim()) || w.prefersInPersonHealthDiscussion;
            var state = wroState(w);
            var leftBorder = alreadyConverted ? 'var(--green)' :
                             hasFlags ? 'var(--amber)' :
                             state === 'pending' ? 'var(--gold)' :
                             state === 'in_progress' ? 'var(--teal)' :
                             'var(--slate-soft)';
            return e('div', {
              key: w.id,
              className: 'list-row',
              style: { cursor: 'pointer', borderLeft: '4px solid ' + leftBorder },
              onClick: function(){ setDetailId(w.id); }
            },
              e('div', null,
                e('div', { style: { fontWeight: 700 } },
                  w.participantName,
                  alreadyConverted && e('span', { style: { fontSize: '11px', background: 'var(--green-bg)', color: 'var(--green)', padding: '2px 8px', borderRadius: '999px', marginLeft: '8px', fontWeight: 700 } }, '\u2713 PT'),
                  hasFlags && e('span', { style: { fontSize: '11px', background: 'var(--amber-bg)', color: 'var(--amber)', padding: '2px 8px', borderRadius: '999px', marginLeft: '6px', fontWeight: 700 } }, '\u26a0 FLAGS'),
                  /* v2.5: state badge */
                  !w.postCompleted && e('span', {
                    style: {
                      fontSize: '11px',
                      background: WRO_STATE_COLOR[state],
                      color: '#fff',
                      padding: '2px 8px',
                      borderRadius: '999px',
                      marginLeft: '6px',
                      fontWeight: 700,
                      letterSpacing: '0.04em'
                    }
                  }, WRO_STATE_BADGE[state])
                ),
                e('div', { style: { fontSize: '12px', color: 'var(--slate)', marginTop: '2px' } },
                  formatDate(w.date) + ' \u00b7 ' + w.location +
                  /* v2.5: surface claimer name when in progress */
                  (state === 'in_progress' && w.claimedBy ? ' \u00b7 ' : '') +
                  ((w.post && w.post.specialistName) ? ' \u00b7 by ' + w.post.specialistName : '') +
                  (w.phone ? ' \u00b7 ' + w.phone : '')
                ),
                state === 'in_progress' && w.claimedBy && e('div', { style: { fontSize: '12px', color: 'var(--teal)', marginTop: '4px', fontWeight: 600 } },
                  '\u2192 ' + w.claimedBy + ' is on it' +
                  (w.claimedAt ? (' \u00b7 claimed ' + new Date(w.claimedAt).toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' })) : '')
                )
              ),
              e('span', { style: { color: 'var(--slate)', fontSize: '20px' } }, '\u203a')
            );
          }),
      newOpen && e(NewWROModal, {
        ctx: ctx,
        onClose: function(){ setNewOpen(false); },
        onSave: function(w){
          ctx.upsertWRO(w);
          setNewOpen(false);
          ctx.toast('WRO request saved ✓');
        }
      }),
      convertWRO && e(NewClientModal, {
        ctx: ctx,
        prefill: {
          name: convertWRO.participantName,
          phone: convertWRO.phone,
          email: convertWRO.email,
          location: convertWRO.location,
          /* v2: auto-tag the source so this WRO conversion shows in the
             pipeline stat without requiring manual selection. */
          referralSource: 'wro'
        },
        onClose: function(){ setConvertWRO(null); },
        onCreate: function(c){
          ctx.upsertClient(c);
          ctx.upsertWRO(Object.assign({}, convertWRO, { convertedToClientId: c.id }));
          setConvertWRO(null);
          ctx.toast('WRO converted to PT client \u2713');
        }
      })
    );
  }


  /* ============ ADMIN REFERRALS VIEW ============ */
  function AdminReferralsView(props){
    var ctx = props.ctx;
    var statusFilterTuple = useState('open'); /* open | all */
    var statusFilter = statusFilterTuple[0];
    var setStatusFilter = statusFilterTuple[1];

    var editTuple = useState(null);
    var editRef = editTuple[0];
    var setEditRef = editTuple[1];

    var refs = (ctx.referrals || []).slice().sort(function(a,b){
      var aOpen = a.status === 'pending' || a.status === 'contacted';
      var bOpen = b.status === 'pending' || b.status === 'contacted';
      if (aOpen !== bOpen) return aOpen ? -1 : 1;
      var ua = a.urgency === 'urgent' ? 0 : a.urgency === 'priority' ? 1 : 2;
      var ub = b.urgency === 'urgent' ? 0 : b.urgency === 'priority' ? 1 : 2;
      if (ua !== ub) return ua - ub;
      return a.createdAt < b.createdAt ? 1 : -1;
    });
    var filtered = statusFilter === 'open'
      ? refs.filter(function(r){ return r.status === 'pending' || r.status === 'contacted'; })
      : refs;

    var pendingCount = refs.filter(function(r){ return r.status === 'pending'; }).length;
    var contactedCount = refs.filter(function(r){ return r.status === 'contacted'; }).length;
    var completedCount = refs.filter(function(r){ return r.status === 'completed'; }).length;
    var declinedCount = refs.filter(function(r){ return r.status === 'declined'; }).length;

    function updateStatus(r, newStatus){
      ctx.upsertReferral(Object.assign({}, r, {
        status: newStatus,
        statusUpdatedAt: new Date().toISOString()
      }));
      ctx.toast('Referral status updated ✓');
    }
    function deleteRef(r){
      if (!window.confirm('Delete this referral? This cannot be undone.')) return;
      ctx.deleteReferral(r.id);
      ctx.toast('Referral deleted', 'error');
    }

    function exportCSV(){
      var rows = [];
      rows.push(['Date','Client','Reason','Concern','Referred By','Urgency','Status','Status Updated','Created'].join(','));
      refs.forEach(function(r){
        rows.push([
          r.date || '',
          '"' + (r.clientName || '').replace(/"/g,'""') + '"',
          '"' + (r.reason || '').replace(/"/g,'""') + '"',
          '"' + (r.concern || '').replace(/"/g,'""') + '"',
          '"' + (r.referredBy || '').replace(/"/g,'""') + '"',
          r.urgency || '',
          r.status || '',
          r.statusUpdatedAt || '',
          r.createdAt || ''
        ].join(','));
      });
      var blob = new Blob([rows.join('\n')], { type: 'text/csv;charset=utf-8' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = 'RRPR_pt_referrals_' + todayStr() + '.csv';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(function(){ URL.revokeObjectURL(url); }, 500);
      ctx.toast('Referrals CSV exported ✓');
    }

    return e('div', null,
      e('div', { className: 'section-head' },
        e('div', null,
          e('h2', null, 'PT Referrals'),
          e('div', { className: 'meta' },
            pendingCount + ' pending · ' + contactedCount + ' contacted · ' + completedCount + ' completed'
          )
        ),
        e('button', { className: 'btn btn-outline btn-sm', onClick: exportCSV }, '↓ Export CSV')
      ),
      e('div', { className: 'stats-grid', style: { marginBottom: '16px' } },
        e('div', { className: 'stat-card' + (pendingCount > 0 ? ' warn' : '') },
          e('div', { className: 'label' }, 'Pending'),
          e('div', { className: 'value' }, pendingCount)
        ),
        e('div', { className: 'stat-card' },
          e('div', { className: 'label' }, 'PT Contacted'),
          e('div', { className: 'value' }, contactedCount)
        ),
        e('div', { className: 'stat-card' },
          e('div', { className: 'label' }, 'Completed'),
          e('div', { className: 'value' }, completedCount)
        ),
        e('div', { className: 'stat-card' },
          e('div', { className: 'label' }, 'Declined'),
          e('div', { className: 'value' }, declinedCount)
        )
      ),
      e('div', { className: 'audit-subtabs' },
        e('button', { className: statusFilter === 'open' ? 'active' : '', onClick: function(){ setStatusFilter('open'); } },
          'Open (' + (pendingCount + contactedCount) + ')'),
        e('button', { className: statusFilter === 'all' ? 'active' : '', onClick: function(){ setStatusFilter('all'); } }, 'All')
      ),
      filtered.length === 0
        ? e('div', { className: 'empty' },
            e('div', { className: 'icon' }, '🩺'),
            e('h3', null, statusFilter === 'open' ? 'No open referrals' : 'No referrals yet'),
            e('div', null, statusFilter === 'open'
              ? 'All referrals are completed or declined.'
              : 'Trainers can refer clients to PT from the client detail page.')
          )
        : filtered.map(function(r){
            var urgentColor = r.urgency === 'urgent' ? 'var(--red)' :
                              r.urgency === 'priority' ? 'var(--amber)' : 'var(--slate)';
            return e('div', {
              key: r.id,
              className: 'audit-section',
              style: {
                borderLeft: '4px solid ' + REFERRAL_STATUS_COLOR[r.status],
                marginBottom: '12px',
                padding: '14px 18px'
              }
            },
              e('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: '10px', flexWrap: 'wrap' } },
                e('div', { style: { flex: 1, minWidth: '200px' } },
                  e('div', { style: { fontFamily: 'DM Serif Display', fontSize: '20px', color: 'var(--navy)' } },
                    r.clientName,
                    r.urgency === 'urgent' && e('span', {
                      style: {
                        background: 'var(--red)', color: '#fff',
                        fontFamily: 'DM Sans', fontSize: '11px', fontWeight: 700,
                        padding: '2px 8px', borderRadius: '999px', marginLeft: '10px',
                        verticalAlign: 'middle', letterSpacing: '0.04em'
                      }
                    }, 'URGENT')
                  ),
                  e('div', { style: { fontSize: '13px', color: 'var(--slate)', marginTop: '4px' } },
                    formatDate(r.date) + ' · referred by ' + r.referredBy +
                    ' · urgency: ', e('span', { style: { color: urgentColor, fontWeight: 700 } }, r.urgency || 'routine')
                  )
                ),
                e('span', {
                  style: {
                    background: REFERRAL_STATUS_COLOR[r.status], color: '#fff',
                    padding: '4px 12px', borderRadius: '999px',
                    fontSize: '12px', fontWeight: 700, letterSpacing: '0.04em',
                    whiteSpace: 'nowrap'
                  }
                }, REFERRAL_STATUS_LABEL[r.status])
              ),
              e('div', { style: { marginTop: '12px', padding: '12px', background: 'var(--cream-2)', borderRadius: '10px', fontSize: '13px' } },
                e('div', null, e('b', null, 'Reason: '), r.reason || '-'),
                r.concern && e('div', { style: { marginTop: '6px' } }, e('b', null, 'Concern: '), r.concern)
              ),
              e('div', { style: { display: 'flex', gap: '8px', marginTop: '12px', flexWrap: 'wrap' } },
                r.clientId && e('button', {
                  className: 'btn btn-outline btn-sm',
                  onClick: function(){ props.onClientClick(r.clientId); }
                }, 'View Client'),
                r.status === 'pending' && e('button', {
                  className: 'btn btn-teal btn-sm',
                  onClick: function(){ updateStatus(r, 'contacted'); }
                }, 'Mark Contacted'),
                (r.status === 'pending' || r.status === 'contacted') && e('button', {
                  className: 'btn btn-green btn-sm',
                  onClick: function(){ updateStatus(r, 'completed'); }
                }, 'Mark Completed'),
                (r.status === 'pending' || r.status === 'contacted') && e('button', {
                  className: 'btn btn-ghost btn-sm',
                  onClick: function(){ updateStatus(r, 'declined'); }
                }, 'Client Declined'),
                (r.status === 'completed' || r.status === 'declined') && e('button', {
                  className: 'btn btn-ghost btn-sm',
                  onClick: function(){ updateStatus(r, 'pending'); }
                }, 'Re-open'),
                e('button', {
                  className: 'btn btn-ghost btn-sm',
                  onClick: function(){ setEditRef(r); }
                }, 'Edit'),
                e('button', {
                  className: 'btn btn-ghost btn-sm',
                  style: { color: 'var(--red)' },
                  onClick: function(){ deleteRef(r); }
                }, 'Delete')
              )
            );
          }),
      editRef && e(NewReferralModal, {
        ctx: ctx,
        referral: editRef,
        client: editRef.clientId ? ctx.clients.find(function(c){ return c.id === editRef.clientId; }) : null,
        onClose: function(){ setEditRef(null); },
        onSave: function(r){
          ctx.upsertReferral(r);
          setEditRef(null);
          ctx.toast('Referral updated ✓');
        }
      })
    );
  }


  /* ============ TODAY VIEW (Front Desk Home) ============ */
  function TodayView(props){
    var ctx = props.ctx;
    /* v2.1: domain filter from admin dashboard. 'pt' hides GX sections,
       'gx' hides PT sections, 'both' (or undefined) shows everything. */
    var domain = props.domain || 'both';
    var showPT = domain === 'pt' || domain === 'both';
    var showGX = domain === 'gx' || domain === 'both';

    var todayYMD = todayStr();
    var todayDate = parseYMD(todayYMD);
    var todayDow = IDX_TO_DOW[todayDate.getDay()];

    /* Pay period header */
    var pp = payPeriodForDate(todayDate);
    var dayInPeriod = Math.floor((todayDate - pp.start) / (24*60*60*1000)) + 1;

    /* Today's classes (using occurrence builder, scoped to today) */
    var todayOccs = useMemo(function(){
      return occurrencesInWindow(ctx.classes, todayDate, todayDate, ctx.closures);
    }, [ctx.classes, ctx.closures, todayYMD]);

    /* Search */
    var searchTuple = useState('');
    var search = searchTuple[0];
    var setSearch = searchTuple[1];
    var searchResults = search.trim().length > 1
      ? ctx.clients.filter(function(c){
          var q = search.toLowerCase();
          return (c.name || '').toLowerCase().indexOf(q) !== -1
              || (c.phone || '').toLowerCase().indexOf(q) !== -1
              || (c.email || '').toLowerCase().indexOf(q) !== -1
              || (c.trainerName || '').toLowerCase().indexOf(q) !== -1;
        }).slice(0, 8)
      : [];

    /* Renewal alerts (≤2 sessions remaining), sorted by remaining ascending */
    var renewals = ctx.clients
      .map(function(c){ return { c: c, r: sessionsRemaining(c) }; })
      .filter(function(x){ return x.r <= 2; })
      .sort(function(a,b){ return a.r - b.r; });

    /* Cold clients - paid for sessions but haven't been seen in 21+ days */
    var coldClients = ctx.clients
      .filter(function(c){ return isClientCold(c); })
      .map(function(c){ return { c: c, days: daysSinceLastSeen(c) }; })
      .sort(function(a,b){ return b.days - a.days; });

    /* WROs today */
    var todayYMDStr = todayYMD;
    var wrosToday = (ctx.wros || []).filter(function(w){ return w.date === todayYMDStr; });

    /* Open PT referrals (pending or contacted) */
    var openReferrals = (ctx.referrals || []).filter(function(r){
      return r.status === 'pending' || r.status === 'contacted';
    }).sort(function(a,b){
      var ua = a.urgency === 'urgent' ? 0 : a.urgency === 'priority' ? 1 : 2;
      var ub = b.urgency === 'urgent' ? 0 : b.urgency === 'priority' ? 1 : 2;
      if (ua !== ub) return ua - ub;
      return a.createdAt < b.createdAt ? 1 : -1;
    });

    /* PT clients with strike warnings or discharge thresholds */
    var clientsWithStrikes = ctx.clients
      .map(function(c){ return { c: c, status: clientStrikeStatus(c), strikes: clientStrikeCount(c) }; })
      .filter(function(x){ return x.status !== 'clean'; })
      .sort(function(a,b){
        if (a.status !== b.status) return a.status === 'discharge' ? -1 : 1;
        return b.strikes.total - a.strikes.total;
      });

    /* Today's logged PT activity */
    var todayPT = [];
    ctx.clients.forEach(function(c){
      (c.sessions || []).forEach(function(s){
        if (s.date === todayYMD) {
          todayPT.push({ client: c, session: s });
        }
      });
    });
    todayPT.sort(function(a,b){ return (a.session.time || '') < (b.session.time || '') ? -1 : 1; });

    /* Today's active subs */
    var todaySubs = todayOccs.filter(function(o){ return o.assignedSub || o.wasSub; });

    /* Inline log modal state */
    var logTargetTuple = useState(null);
    var logTarget = logTargetTuple[0];
    var setLogTarget = logTargetTuple[1];

    var newWroOpenTuple = useState(false);
    var newWroOpen = newWroOpenTuple[0];
    var setNewWroOpen = newWroOpenTuple[1];

    /* Sort today's classes by start time, computed once */
    var todayClasses = todayOccs.slice().sort(function(a,b){
      return (a.cls.startTime || '') < (b.cls.startTime || '') ? -1 : 1;
    });

    /* Compute "now" minutes for status */
    var now = new Date();
    var nowMin = now.getHours() * 60 + now.getMinutes();
    function startMin(c){ var p = (c.startTime || '00:00').split(':'); return parseInt(p[0],10)*60 + parseInt(p[1],10); }
    function endMin(c){ var p = (c.endTime || '00:00').split(':'); return parseInt(p[0],10)*60 + parseInt(p[1],10); }
    function classStatus(o){
      if (o.isClosed) return { label: 'Facility Closed', color: 'var(--slate)', bg: 'var(--cream-2)' };
      if (o.isCancelled) return { label: 'Cancelled', color: '#fff', bg: 'var(--red)' };
      if (o.logged) return { label: 'Logged ✓ ' + (o.headcount != null ? o.headcount : ''), color: 'var(--green)', bg: 'var(--green-bg)' };
      var s = startMin(o.cls); var ed = endMin(o.cls);
      if (nowMin < s) return { label: 'Upcoming', color: 'var(--slate)', bg: 'var(--cream-2)' };
      if (nowMin >= s && nowMin <= ed) return { label: 'In Progress', color: 'var(--teal)', bg: 'var(--teal-bg)' };

  /* ============ CANCEL CLASS MODAL ============ */
  function CancelClassModal(props){
    var ctx = props.ctx;
    var reasonTuple = useState('Low enrollment');
    var reason = reasonTuple[0];
    var setReason = reasonTuple[1];
    var customTuple = useState('');
    var custom = customTuple[0];
    var setCustom = customTuple[1];
    var REASONS = ['Low enrollment', 'Instructor sick', 'Instructor unavailable', 'Weather', 'Facility closure', 'Equipment issue', 'Other'];

    function submit(){
      var finalReason = reason === 'Other' ? (custom.trim() || 'Other') : reason;
      props.onSave({
        id: uid(),
        date: props.date,
        reason: finalReason,
        createdAt: new Date().toISOString()

    return e('div', { className: 'modal-overlay', onClick: props.onClose },
      e('div', { className: 'modal', onClick: function(ev){ ev.stopPropagation(); } },

        ),
        e('div', { className: 'modal-body' },
          e('div', { style: { fontSize: '14px', color: 'var(--slate)', marginBottom: '12px' } },
            e('b', null, props.cls.name), ' · ' + formatShort(parseYMD(props.date))
          ),
          e('div', { className: 'field' },
            e('label', null, 'Reason'),
            e('select', { value: reason, onChange: function(ev){ setReason(ev.target.value); } },
              REASONS.map(function(r){ return e('option', { key: r, value: r }, r); })
            )
          ),
          reason === 'Other' && e('div', { className: 'field' },
            e('label', null, 'Specify'),
            e('input', { value: custom, onChange: function(ev){ setCustom(ev.target.value); }, placeholder: 'Brief reason…' })
          )
        ),
        e('div', { className: 'modal-footer' },
          e('button', { className: 'btn btn-ghost', onClick: props.onClose }, 'Cancel'),
          e('button', { className: 'btn btn-danger', onClick: submit }, 'Mark Cancelled')

      )

  /* ============ CLOSURES MANAGER MODAL ============ */
  function ClosuresManagerModal(props){
    var ctx = props.ctx;
    var dateTuple = useState(todayStr());
    var date = dateTuple[0];
    var setDate = dateTuple[1];
    var reasonTuple = useState('Holiday');
    var reason = reasonTuple[0];
    var setReason = reasonTuple[1];

  /* ============ AUDIT VIEW ============ */
  function AuditView(props){
    var ctx = props.ctx;
    var classes = ctx.classes;

    /* Pay-period selector. Default = previous (just-closed) period - most useful audit context. */
    var nowPeriod = payPeriodForDate(new Date());
    var selectedIdxTuple = useState(nowPeriod.index - 1);
    var selectedIdx = selectedIdxTuple[0];
    var setSelectedIdx = selectedIdxTuple[1];

    var subTuple = useState('summary'); /* summary | period | next */
    var sub = subTuple[0];
    var setSub = subTuple[1];

    var hoursModeTuple = useState('scheduled');
    var hoursMode = hoursModeTuple[0];
    var setHoursMode = hoursModeTuple[1];

    var closuresOpenTuple = useState(false);
    var closuresOpen = closuresOpenTuple[0];
    var setClosuresOpen = closuresOpenTuple[1];

    var cancelTargetTuple = useState(null); /* { cls, date } */
    var cancelTarget = cancelTargetTuple[0];
    var setCancelTarget = cancelTargetTuple[1];

    var period = payPeriodByIndex(selectedIdx);
    var nextPeriod = payPeriodByIndex(selectedIdx + 1);

    var periodOcc = useMemo(function(){
      return occurrencesInWindow(classes, period.start, period.end, ctx.closures);
    }, [classes, ctx.closures, selectedIdx]);
    var nextOcc = useMemo(function(){
      return occurrencesInWindow(classes, nextPeriod.start, nextPeriod.end, ctx.closures);
    }, [classes, ctx.closures, selectedIdx]);

    /* ---- summary stats over selected period ---- */
    var scheduledCount = periodOcc.length;
    var loggedCount = periodOcc.filter(function(o){ return o.logged; }).length;
    var cancelledCount = periodOcc.filter(function(o){ return o.isCancelled; }).length;
    var unloggedCount = periodOcc.filter(function(o){ return !o.logged && !o.isCancelled; }).length;
    var logRate = (scheduledCount - cancelledCount) > 0
      ? Math.round((loggedCount / (scheduledCount - cancelledCount)) * 100)
      : 0;
    var totalHeadcount = periodOcc.reduce(function(s,o){ return s + (o.headcount || 0); }, 0);
    var avgHeadcount = loggedCount ? (totalHeadcount / loggedCount).toFixed(1) : '0';
    var scheduledHours = periodOcc.filter(function(o){ return !o.isCancelled; }).reduce(function(s,o){ return s + classDurationHours(o.cls); }, 0);

    /* ---- sub activity ---- */
    var subsLogged = periodOcc.filter(function(o){ return o.wasSub; });
    var subsAssigned = periodOcc.filter(function(o){ return o.assignedSub; });
    var subsUpcoming = nextOcc.filter(function(o){ return o.assignedSub; });
    var subPairs = {};
    subsLogged.forEach(function(o){
      var key = o.actualInstructor + ' \u2192 ' + o.cls.instructor;
      subPairs[key] = (subPairs[key] || 0) + 1;
    });
    var subPairRows = Object.keys(subPairs).sort(function(a,b){ return subPairs[b] - subPairs[a]; });

    /* ---- instructor hours (selected period) - two modes ---- */
    var instructorHours = {};
    if (hoursMode === 'scheduled') {
      periodOcc.forEach(function(o){
        if (o.isCancelled) return;
        var inst = o.scheduledInstructor || '\u2014';
        instructorHours[inst] = (instructorHours[inst] || 0) + classDurationHours(o.cls);
      });
    } else {
      periodOcc.forEach(function(o){
        if (!o.logged) return;
        var inst = o.actualInstructor || o.cls.instructor;
        instructorHours[inst] = (instructorHours[inst] || 0) + classDurationHours(o.cls);
      });
    }
    var instructorRows = Object.keys(instructorHours).sort(function(a,b){ return instructorHours[b] - instructorHours[a]; });
    var maxInstHours = instructorRows.length ? instructorHours[instructorRows[0]] : 0;

    /* ---- room usage ---- */
    var roomUsage = {};
    periodOcc.forEach(function(o){
      if (o.isCancelled) return;
      var key = o.cls.location + ' \u00b7 ' + (o.cls.room || 'Unspecified');
      roomUsage[key] = (roomUsage[key] || 0) + classDurationHours(o.cls);
    });
    var roomRows = Object.keys(roomUsage).sort(function(a,b){ return roomUsage[b] - roomUsage[a]; });
    var maxRoomHours = roomRows.length ? roomUsage[roomRows[0]] : 0;

    /* ---- class-type mix ---- */
    var typeCounts = {};
    periodOcc.forEach(function(o){
      if (o.isCancelled) return;
      var k = o.cls.classType || 'Unspecified';
      typeCounts[k] = (typeCounts[k] || 0) + 1;
    });
    var typeRows = Object.keys(typeCounts).sort(function(a,b){ return typeCounts[b] - typeCounts[a]; });

    /* ---- capacity utilization ---- */
    var capRows = classes.map(function(c){
      var windowAtt = (c.attendance || []).filter(function(a){
        var d = parseYMD(a.date);
        return d && d >= period.start && d <= period.end;
      });
      if (windowAtt.length === 0) return null;
      var sum = windowAtt.reduce(function(s,a){ return s + (a.headcount || 0); }, 0);
      var avg = sum / windowAtt.length;
      var fill = c.capacity ? Math.round((avg / c.capacity) * 100) : null;
      return { cls: c, avg: avg, sessions: windowAtt.length, fill: fill };
    }).filter(Boolean).sort(function(a,b){
      if (a.fill != null && b.fill != null) return b.fill - a.fill;
      return b.avg - a.avg;
    });

    /* ---- location split ---- */
    var locHours = { CMRC: 0, Baca: 0 };
    periodOcc.forEach(function(o){
      if (o.isCancelled) return;
      locHours[o.cls.location] = (locHours[o.cls.location] || 0) + classDurationHours(o.cls);
    });

    /* ---- premium split ---- */
    var premiumOcc = periodOcc.filter(function(o){ return o.cls.isPremium && !o.isCancelled; });
    var premiumLogged = premiumOcc.filter(function(o){ return o.logged; });
    var premiumHeadcount = premiumLogged.reduce(function(s,o){ return s + (o.headcount || 0); }, 0);

    /* ---- unlogged occurrences (audit flags) ---- */
    var unlogged = periodOcc.filter(function(o){ return !o.logged && !o.isCancelled; });

    /* ---- group by date ---- */
    var periodByDate = {};
    periodOcc.forEach(function(o){
      if (!periodByDate[o.date]) periodByDate[o.date] = [];
      periodByDate[o.date].push(o);
    });
    var periodDates = Object.keys(periodByDate).sort();

    var nextByDate = {};
    nextOcc.forEach(function(o){
      if (!nextByDate[o.date]) nextByDate[o.date] = [];
      nextByDate[o.date].push(o);
    });
    var nextDates = Object.keys(nextByDate).sort();

    /* ---- CSV export (full audit) ---- */
    function exportCSV(){
      var rows = [];
      rows.push(['Section','Date','Day','Time','Class','Location','Room','Regular Instructor','Scheduled Instructor','Actual Instructor','Was Sub','Capacity','Headcount','Fill %','Logged','Cancelled','Cancellation Reason','Class Type','Premium','Sub Note'].join(','));
      function row(section, o){
        var c = o.cls;
        var fill = (c.capacity && o.headcount != null) ? Math.round((o.headcount / c.capacity) * 100) : '';
        var date = parseYMD(o.date);
        rows.push([
          section,
          o.date,
          date ? IDX_TO_DOW[date.getDay()] : '',
          formatTime12(c.startTime) + '\u2013' + formatTime12(c.endTime),
          '"' + (c.name || '').replace(/"/g,'""') + '"',
          c.location || '',
          '"' + (c.room || '').replace(/"/g,'""') + '"',
          '"' + (c.instructor || '').replace(/"/g,'""') + '"',
          '"' + (o.scheduledInstructor || '').replace(/"/g,'""') + '"',
          '"' + (o.actualInstructor || '').replace(/"/g,'""') + '"',
          o.wasSub ? 'Y' : '',
          c.capacity != null ? c.capacity : '',
          o.headcount != null ? o.headcount : '',
          fill,
          o.logged ? 'Y' : 'N',
          o.isCancelled ? 'Y' : 'N',
          '"' + ((o.cancellation && o.cancellation.reason) || '').replace(/"/g,'""') + '"',
          '"' + (c.classType || '').replace(/"/g,'""') + '"',
          c.isPremium ? 'Y' : 'N',
          '"' + ((o.assignedSub && o.assignedSub.note) || '').replace(/"/g,'""') + '"'
        ].join(','));
      }
      periodOcc.forEach(function(o){ row('Period ' + period.startYMD + ' to ' + period.endYMD, o); });
      nextOcc.forEach(function(o){ row('Next ' + nextPeriod.startYMD + ' to ' + nextPeriod.endYMD, o); });
      var blob = new Blob([rows.join('\n')], { type: 'text/csv;charset=utf-8' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = 'RRPR_audit_' + period.startYMD + '_to_' + period.endYMD + '.csv';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(function(){ URL.revokeObjectURL(url); }, 500);
      ctx.toast('Audit CSV exported \u2713');
    }

    /* ---- Payroll CSV (per-instructor for selected period) ---- */
    function exportPayrollCSV(){
      var rows = [];
      /* v2 columns: forward / auto admin / manual / total per trainer.
         Legacy columns kept for continuity with prior payroll spreadsheets. */
      rows.push([
        'Pay Period','Pay Day','Instructor',
        'Hours (Scheduled w/ Subs)','Hours (Logged Delivery)','Classes Logged',
        'Sub Hours Worked','Sub Hours Out (covered for them)',
        'PT Hours','GX Hours','Sub Hours (approved)',
        'Forward Hours','Auto Admin Hours','Manual Admin Hours','Total Hours'
      ].join(','));
      var schedHrs = {}; var delivHrs = {}; var subHrsIn = {}; var subHrsOut = {}; var classesLogged = {};
      periodOcc.forEach(function(o){
        if (o.isCancelled) return;
        var dur = classDurationHours(o.cls);
        var sched = o.scheduledInstructor || '\u2014';
        schedHrs[sched] = (schedHrs[sched] || 0) + dur;
        if (o.logged) {
          var actual = o.actualInstructor || o.cls.instructor;
          delivHrs[actual] = (delivHrs[actual] || 0) + dur;
          classesLogged[actual] = (classesLogged[actual] || 0) + 1;
          if (o.wasSub) {
            subHrsIn[actual] = (subHrsIn[actual] || 0) + dur;
            subHrsOut[o.cls.instructor] = (subHrsOut[o.cls.instructor] || 0) + dur;
          }
        }
      });

      /* v2: pull per-trainer breakdowns from calcTrainerHours so the CSV
         matches the on-screen Trainer Hours Breakdown panel exactly. */
      var offset = selectedIdx - nowPeriod.index;
      var v2Rows = {};
      ctx.trainers.forEach(function(t){
        v2Rows[t] = calcTrainerHours(t, offset, ctx.clients, ctx.classes, ctx.items || [], ctx.wros || [], ctx.contacts || []);
      });

      var allInst = {};
      Object.keys(schedHrs).forEach(function(k){ allInst[k] = true; });
      Object.keys(delivHrs).forEach(function(k){ allInst[k] = true; });
      Object.keys(v2Rows).forEach(function(k){
        var r = v2Rows[k];
        if (r.grandTotal > 0) allInst[k] = true;
      });
      Object.keys(allInst).sort().forEach(function(name){
        var v2 = v2Rows[name] || calcTrainerHours(name, offset, ctx.clients, ctx.classes, ctx.items || [], ctx.wros || [], ctx.contacts || []);
        rows.push([
          payPeriodLabel(period),
          formatShort(period.payDay),
          '"' + name.replace(/"/g,'""') + '"',
          (schedHrs[name] || 0).toFixed(2),
          (delivHrs[name] || 0).toFixed(2),
          classesLogged[name] || 0,
          (subHrsIn[name] || 0).toFixed(2),
          (subHrsOut[name] || 0).toFixed(2),
          v2.forwardFacing.ptHours.toFixed(2),
          v2.forwardFacing.gxHours.toFixed(2),
          v2.forwardFacing.subHours.toFixed(2),
          v2.forwardFacing.total.toFixed(2),
          v2.autoAdmin.hours.toFixed(2),
          v2.manualAdmin.hours.toFixed(2),
          v2.grandTotal.toFixed(2)
        ].join(','));
      });
      var blob = new Blob([rows.join('\n')], { type: 'text/csv;charset=utf-8' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = 'RRPR_payroll_' + period.startYMD + '_to_' + period.endYMD + '.csv';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(function(){ URL.revokeObjectURL(url); }, 500);
      ctx.toast('Payroll CSV exported \u2713');
    }

    var periodOptions = listPayPeriodOptions();

                    : isPrevious ? 'Previous (just closed)'

        ),
        e('div', { className: 'stat-card' },
          e('div', { className: 'label' }, 'Cancelled'),
          e('div', { className: 'value' }, cancelledCount)
        ),
        e('div', { className: 'stat-card' },
          e('div', { className: 'label' }, 'Subs (Logged)'),
          e('div', { className: 'value' }, subsLogged.length)
        ),
        e('div', { className: 'stat-card' },
          e('div', { className: 'label' }, 'Scheduled Hours'),
          e('div', { className: 'value' }, scheduledHours.toFixed(1))
        ),
        e('div', { className: 'stat-card' },
          e('div', { className: 'label' }, 'Total Attendees'),
          e('div', { className: 'value' }, totalHeadcount)
        ),
        e('div', { className: 'stat-card' },
          e('div', { className: 'label' }, 'Avg per Class'),

        ),

              e('th', null, 'Instructor'),
              e('th', null, 'Location'),
              e('th', null, 'Action')
            )
          ),

          e('h3', null, 'Hours per Instructor'),
          e('div', { style: { display: 'flex', gap: '4px', background: 'var(--cream-2)', padding: '3px', borderRadius: '999px' } },
